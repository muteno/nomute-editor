<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>변환</title>
<link rel="stylesheet" href="tokens.css">   <!-- 공유 구조토큰(§🎨 STAGE3·index :root 파생·색 제외) — ly/k/track 동일 계승. 인라인 :root가 팔레트 오버라이드 -->
<style>
  /* 팔레트·폼 = track.html(영상 도구) 계승 verbatim · 구조토큰은 tokens.css */
  :root{
    --bg:#121212; --pan:#16171a; --line:#2a2c31; --fg:#eef7f0; --mut:#8fa697;
    --accent:#00EED2; --accent-rgb:0,238,210; --accent-dim:rgba(var(--accent-rgb),.13); --on-accent:#032322;
    --danger:#e23b2a; --danger-rgb:226,59,42;
    --press-pico:.55; --press-xs:.82; --press-s:.85; --press-m:.9; --press-l:.95;
  }
  @media (prefers-reduced-motion:reduce){ :root{ --press-pico:1; --press-xs:1; --press-s:1; --press-m:1; --press-l:1; } }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  button:focus-visible, a:focus-visible, [tabindex]:focus-visible, [role=button]:focus-visible, label.file:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  body { margin:0; background:radial-gradient(125% 70% at 50% -8%, rgba(var(--accent-rgb),.06), transparent 55%) fixed, var(--bg); color:var(--fg); font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif; }
  html.inmodal, html.inmodal body { background:transparent; }
  .wrap { max-width:600px; margin:0 auto; padding:16px 16px 40px; }

  label { display:block; font-size:var(--fs-label); color:var(--fg); margin:14px 0 6px; }
  label.fl { font-weight:var(--fw-x); color:var(--fg); }
  label.fl::before { content:'• '; color:var(--accent); font-weight:var(--fw-b); }
  input[type=url] { width:100%; padding:12px; background:#0e0f11; border:1px solid var(--line); border-radius:var(--r-s); color:var(--fg); font:inherit; }
  input:focus { border-color:rgba(var(--accent-rgb),.35); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.08); outline:none; }
  input::placeholder { color:var(--mut); }
  .urlwrap { position:relative; }
  .urlclip { position:absolute; top:0; right:14px; transform:translateY(-50%); display:grid; place-items:center; width:26px; height:26px; padding:0; z-index:5; opacity:.6;
    border-radius:50%; border:1px solid rgba(255,255,255,.17); background:rgba(26,28,26,.3); color:var(--mut); cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
    -webkit-backdrop-filter:blur(13px) saturate(1.3); backdrop-filter:blur(13px) saturate(1.3); transition:transform .12s, color .15s, border-color .15s; }
  .urlclip::before { content:""; position:absolute; inset:-8px; }
  .urlclip svg { display:block; width:13px; height:13px; }
  .urlclip:hover { color:var(--fg); border-color:rgba(255,255,255,.27); }
  .urlclip:active { transform:translateY(-50%) scale(var(--press-s)); color:var(--accent); border-color:rgba(var(--accent-rgb),.6); }
  .orsep { text-align:center; color:var(--mut); font-size:12px; margin:13px 0; }
  .filerow { display:flex; gap:10px; align-items:stretch; }
  .filerow .file { flex:1.4; margin:0; }
  .filerow .go { flex:1; margin:0; align-self:stretch; }
  .file { display:block; padding:12px; border:1px dashed transparent; border-radius:var(--r-s); text-align:center; color:var(--accent); cursor:pointer; background:transparent; user-select:none; transition:transform .12s ease, background .15s ease, border-color .15s ease, color .15s ease; }
  .file svg { width:26px; height:26px; display:block; margin:0 auto; transition:transform .14s cubic-bezier(.2,.9,.3,1.25); }
  .file:active svg { transform:scale(var(--press-xs)); }
  .file.has { color:var(--fg); }
  .file .ftype { display:inline-grid; place-items:center; min-width:34px; height:22px; padding:0 7px; margin-right:7px; border-radius:6px; background:rgba(var(--accent-rgb),.14); color:var(--accent); font-size:11px; font-weight:var(--fw-x); letter-spacing:.4px; }
  .file .fname { font-size:12.5px; vertical-align:middle; display:inline-block; max-width:70%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* 변환 버튼 = track .go(전송 게이지 glive 포함) 계승 verbatim */
  .go { width:100%; padding:13px; margin-top:0; background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),.4); border-radius:var(--r-s);
    color:var(--accent); font:inherit; font-weight:var(--fw-x); cursor:pointer; transition:transform .12s; position:relative; overflow:hidden; }
  .go:active { transform:scale(var(--press-m)); }
  .go:disabled { opacity:.45; cursor:default; }
  .go.err { color:var(--danger); border-color:rgba(var(--danger-rgb),.5); }
  .go.shake { animation:shake .32s; }
  @keyframes shake { 20%{ transform:translateX(-5px);} 45%{ transform:translateX(4px);} 70%{ transform:translateX(-3px);} 90%{ transform:translateX(2px);} }
  .go.glive.firing { animation:none;
    background-image:linear-gradient(90deg, rgba(var(--accent-rgb),.34), rgba(var(--accent-rgb),.34)), linear-gradient(90deg, var(--accent-dim), var(--accent-dim));
    background-size:0% 100%, 100% 100%; background-repeat:no-repeat;
    transition:background-size 3.6s var(--gauge-ease); }   /* ⚠️ 2번 레이어 크기 명시(100% 100%) — 생략 = 보간 불가 90% 스냅(index 실측 함정) */
  .go.glive.firing.grun { background-size:90% 100%, 100% 100%; }
  .go.glive.firing.gdone { background-size:100% 100%, 100% 100%; transition:background-size .3s linear; }
  @media (prefers-reduced-motion:reduce) { .go.glive.firing, .go.glive.firing.gdone { transition-duration:.12s; } }
  .go .gtime { margin-left:7px; color:var(--mut); font-weight:var(--fw-b); font-variant-numeric:tabular-nums; }
  .gdots { display:inline-block; width:1.1em; text-align:left; }   /* 처리중 점모션(§디자인 g · index 정본 계승) */
  .gdots i { font-style:normal; opacity:0; animation:gdots 1.4s infinite; }
  .gdots i:nth-child(2) { animation-delay:.22s; } .gdots i:nth-child(3) { animation-delay:.44s; }
  @keyframes gdots { 0% { opacity:0; } 25%,70% { opacity:1; } 95%,100% { opacity:0; } }

  /* 옵션 세그 = track .modeseg/.mseg 계승 · 옵션 행 = .mo-row 계승 */
  .modeseg { display:flex; gap:8px; margin:0 0 4px; flex-wrap:wrap; }
  .mseg { flex:1; min-width:56px; padding:11px 8px; text-align:center; border-radius:var(--r-pill); border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--mut); font-weight:var(--fw-x); font-size:var(--fs-label); font-family:inherit; cursor:pointer; user-select:none; transition:transform .12s, color .15s, border-color .15s, background .15s; }
  .mseg:active { transform:scale(var(--press-m)); }
  .mseg.on { color:var(--accent); border-color:rgba(var(--accent-rgb),.55); background:rgba(var(--accent-rgb),.08); }
  .mo-row { display:grid; grid-template-columns:76px 1fr 44px; align-items:center; gap:10px; margin:10px 0 2px; font-size:var(--fs-label); }
  .mo-row[hidden], .poshint[hidden], #dlVid[hidden] { display:none; }   /* display:grid/flex가 UA [hidden]을 덮는 함정 가드(헤드리스 실측 260710 · track:120 전례) */
  .mo-k { color:var(--fg); font-weight:var(--fw-b); }
  .mo-row input[type=range] { width:100%; accent-color:var(--accent); }
  .mo-v { text-align:right; color:var(--accent); font-weight:var(--fw-x); font-variant-numeric:tabular-nums; }
  .trimrow { display:flex; gap:10px; align-items:center; }
  .trimrow input[type=number] { flex:1; width:100%; padding:11px 12px; background:#0e0f11; border:1px solid var(--line); border-radius:var(--r-s); color:var(--fg); font:inherit; font-variant-numeric:tabular-nums; }
  .trimrow .tsep { color:var(--mut); flex:none; }
  .trimrow .tu { color:var(--mut); font-size:12px; flex:none; }
  .poshint { margin-top:6px; }
  .ghost { background:rgba(255,255,255,.04); border:1px solid var(--line); color:var(--fg); font-weight:var(--fw-b); font-size:13px; font-family:inherit; padding:9px 15px; border-radius:var(--r-pill); cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:transform .12s; }
  .ghost:active { transform:scale(var(--press-l)); } .ghost svg { width:14px; height:14px; }

  /* 결과·대기 = track .vstage + 대기 미리보기(운영자 픽 260710 = 플레이그라운드 p2 스캔라인 ★ · 딤.48·블러5·스캔1.4s · 캡션 = 프리뷰 안 (NNNs)) */
  .vstage { position:relative; width:100%; border-radius:var(--r-l); overflow:hidden; border:1px solid var(--line); background:#000; min-height:120px; margin-top:16px; }
  .vstage video { width:100%; display:block; max-height:62vh; background:#000; }
  .vstage[hidden] { display:none; }
  .vstage .wscrim { position:absolute; inset:0; background:rgba(8,15,11,.48); -webkit-backdrop-filter:blur(5px); backdrop-filter:blur(5px); }
  .scanline { position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); box-shadow:0 0 14px var(--accent); animation:scan 1.4s var(--gauge-ease) infinite; }
  @keyframes scan { 0%{ top:6%;} 50%{ top:94%;} 100%{ top:6%;} }
  @media (prefers-reduced-motion:reduce){ .scanline { animation:none; top:50%; } }
  .vstage .wmsg { position:absolute; left:12px; bottom:10px; z-index:2; font-size:var(--fs-label); font-weight:var(--fw-x); color:var(--accent); white-space:nowrap; text-shadow:0 1px 10px rgba(0,0,0,.5); }
  .status { margin-top:16px; font-size:13px; color:var(--mut); white-space:pre-wrap; text-align:center; }
  .status.err { color:var(--danger); }
  .status svg { vertical-align:-2px; }
  .footer { display:flex; align-items:center; gap:12px; margin-top:14px; }
  .dlbtn { background:rgba(var(--accent-rgb),.10)!important; color:var(--accent)!important; border:1px solid rgba(var(--accent-rgb),.34)!important; }
  .dlbtn.dl-done { color:var(--mut)!important; }
  .ghost.dlbtn { margin-left:auto; width:38px; height:38px; padding:0; justify-content:center; }

  /* 위치 미리보기 오버레이 = track .scrub 계승(크롭 프레임 드래그) */
  .scrub { position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.72); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:18px; }
  .scrub[hidden] { display:none; }
  .scrub-stage { position:relative; max-width:100%; border-radius:var(--r-l); overflow:hidden; border:1px solid var(--line); touch-action:none; }
  .scrub-stage video { display:block; max-width:100%; max-height:56vh; }
  .cropfr { position:absolute; top:0; left:0; border:2px solid var(--accent); box-shadow:0 0 0 200vmax rgba(0,0,0,.55); cursor:grab; }
  .cropfr:active { cursor:grabbing; }
  .scrub-bar { width:100%; max-width:520px; display:flex; align-items:center; gap:10px; }
  .scrub-bar input[type=range] { flex:1; min-width:60px; accent-color:var(--accent); }
  .scrub-t { flex:none; font:11px ui-monospace,SFMono-Regular,Menlo,monospace; min-width:44px; text-align:right; color:var(--fg); }
  .scrub-acts { display:flex; gap:10px; }
  .cta { background:var(--accent); color:var(--on-accent); font-weight:var(--fw-x); font-size:14px; font-family:inherit; border:none; border-radius:var(--r-pill); padding:11px 22px; cursor:pointer; transition:transform .12s; }
  .cta:active { transform:scale(var(--press-l)); }
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('inmodal');</script>
</head>
<body>
<div class="wrap">
  <!-- 폼 = track STEP1(URL·파일·버튼) 계승 + 옵션(운영자 확정 스코프 260710: 60fps 보간·비율 크롭·트림·해상도) -->
  <label class="fl" for="url">URL</label>
  <div class="urlwrap">
    <input type="url" id="url" placeholder="https://…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="go">
    <button class="urlclip" id="urlClip" type="button" aria-label="붙여넣기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg></button>
  </div>
  <div class="orsep">— 또는 —</div>
  <label class="fl">파일</label>
  <div class="filerow">
    <label class="file" id="fileLab" aria-label="영상 파일 선택" title="영상 파일 선택"><span id="fileTxt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3m0 0L8 7m4-4 4 4"/><path d="M4 15v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"/></svg></span>
      <input type="file" accept="video/*" id="file" style="display:none">
    </label>
    <button class="go" id="convGo">변환</button>
  </div>

  <label class="fl">프레임</label>
  <div class="modeseg" id="segFps" role="tablist" aria-label="프레임레이트">
    <button class="mseg on" data-v="keep" role="tab" aria-selected="true">유지</button>
    <button class="mseg" data-v="60i" role="tab" aria-selected="false">60fps 보간</button>
    <button class="mseg" data-v="30" role="tab" aria-selected="false">30</button>
    <button class="mseg" data-v="24" role="tab" aria-selected="false">24</button>
  </div>

  <label class="fl">비율</label>
  <div class="modeseg" id="segAr" role="tablist" aria-label="화면 비율">
    <button class="mseg on" data-v="orig" role="tab" aria-selected="true">원본</button>
    <button class="mseg" data-v="9:16" role="tab" aria-selected="false">9:16</button>
    <button class="mseg" data-v="1:1" role="tab" aria-selected="false">1:1</button>
    <button class="mseg" data-v="4:5" role="tab" aria-selected="false">4:5</button>
    <button class="mseg" data-v="16:9" role="tab" aria-selected="false">16:9</button>
  </div>
  <div class="mo-row" id="posRow" hidden><span class="mo-k">위치</span><input type="range" id="pos" min="0" max="100" step="1" value="50" aria-label="크롭 위치 — 0 좌/상 · 50 중앙 · 100 우/하"><span class="mo-v" id="posV">중앙</span></div>
  <div class="poshint" id="posBtnRow" hidden><button class="ghost" id="posPrev" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M9 5v14"/></svg>위치 미리보기</button></div>

  <label class="fl">구간</label>
  <div class="trimrow">
    <input type="number" id="t0" min="0" step="0.1" placeholder="0" inputmode="decimal" aria-label="시작 초">
    <span class="tsep">~</span>
    <input type="number" id="t1" min="0" step="0.1" placeholder="끝" inputmode="decimal" aria-label="끝 초">
    <span class="tu">초</span>
  </div>

  <label class="fl">해상도</label>
  <div class="modeseg" id="segRes" role="tablist" aria-label="해상도">
    <button class="mseg on" data-v="orig" role="tab" aria-selected="true">원본</button>
    <button class="mseg" data-v="1080" role="tab" aria-selected="false">1080p</button>
    <button class="mseg" data-v="720" role="tab" aria-selected="false">720p</button>
  </div>

  <div class="status" id="cstatus" role="status"></div>
  <div class="vstage" id="vwrap" hidden></div>
  <div class="footer">
    <button class="ghost dlbtn" id="dlVid" hidden aria-label="저장" title="저장"></button>
  </div>
</div>

<!-- 위치 미리보기 — 크롭 프레임 드래그(키잉 스크럽 오버레이 계승 · 파일 선택 시) -->
<div class="scrub" id="scrub" hidden>
  <div class="scrub-stage" id="scrubStage"><video id="scrubVid" playsinline muted preload="metadata"></video><div class="cropfr" id="cropFr"></div></div>
  <div class="scrub-bar"><input type="range" id="scrubT" min="0" max="10" step="0.05" value="0" aria-label="장면 위치"><span class="scrub-t" id="scrubTv">0:00</span></div>
  <div class="scrub-acts">
    <button class="ghost" id="scrubCancel" type="button">취소</button>
    <button class="cta" id="scrubOk" type="button">이 위치로</button>
  </div>
</div>

<script src="nm-svg.js"></script><!-- 공유 아이콘 SSOT — CHECK/OK/ERR/WAIT/WARN/DOWNLOAD_SVG -->
<script>
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const PEND_KEY='nm_conv_pend';
const API='/api/conv';
const BUDGET=1100;   // 폴 소프트 예산(초) — 60fps 보간 예산 25분(py INTERP_BUDGET) + 배포 여유 · 하드 = ×2
const AR_NUM={'9:16':9/16,'1:1':1,'4:5':4/5,'16:9':16/9};
let OPT={fps:'keep', ar:'orig', pos:50, res:'orig'};
let FILE_B64='', FILE_NAME='', FILE_URL='';   // FILE_URL = objectURL(위치 미리보기용)
let USER_ACT=false, _curStop=null, _dur=0;

const pendSet=o=>{ try{ localStorage.setItem(PEND_KEY, JSON.stringify(o)); }catch(e){} };
const pendGet=()=>{ try{ return JSON.parse(localStorage.getItem(PEND_KEY)||'null'); }catch(e){ return null; } };
const pendClear=()=>{ try{ localStorage.removeItem(PEND_KEY); }catch(e){} };

// ── 입력(track STEP1 계승) ──
const FILE_ICON=$('#fileTxt').innerHTML;
$('#file').addEventListener('change',()=>{
  const f=$('#file').files[0]; if(!f) return;
  FILE_B64=''; FILE_NAME='';
  if(FILE_URL){ try{ URL.revokeObjectURL(FILE_URL); }catch(e){} FILE_URL=''; }
  if(f.size>30*1024*1024){ $('#file').value=''; $('#fileLab').classList.remove('has'); $('#fileTxt').innerHTML=FILE_ICON; syncPosPrev(); return errStatus('파일은 ≤30MB — 큰 영상은 URL로'); }
  FILE_NAME=f.name; FILE_URL=URL.createObjectURL(f);
  const v=document.createElement('video'); v.preload='metadata'; v.src=FILE_URL;
  v.onloadedmetadata=()=>{ _dur=v.duration||0; if(_dur&&!$('#t1').value) $('#t1').placeholder=String(Math.round(_dur*10)/10); };
  const btn=$('#convGo'); btn.disabled=true;
  const rd=new FileReader();
  rd.onload=()=>{ FILE_B64=String(rd.result||''); btn.disabled=false; $('#fileLab').classList.add('has'); $('#fileTxt').innerHTML='<span class="ftype">'+esc((f.name.split('.').pop()||'VID').toUpperCase())+'</span><span class="fname">'+esc(f.name)+'</span>'; syncPosPrev(); };
  rd.onerror=()=>{ btn.disabled=false; FILE_NAME=''; $('#fileLab').classList.remove('has'); $('#fileTxt').innerHTML=FILE_ICON; syncPosPrev(); errStatus('파일을 못 읽었어 — 다시'); };
  rd.readAsDataURL(f);
});
$('#urlClip').addEventListener('click',async()=>{ try{ const t=await navigator.clipboard.readText(); if(t)$('#url').value=t.trim(); }catch(e){} });

// ── 옵션 세그(단일 위임 — 세 그룹 공통) ──
function segBind(id, key, after){
  $(id).addEventListener('click',e=>{
    const b=e.target.closest('.mseg'); if(!b) return;
    $$(id+' .mseg').forEach(x=>{ x.classList.toggle('on',x===b); x.setAttribute('aria-selected',String(x===b)); });
    OPT[key]=b.dataset.v; if(after) after();
  });
}
segBind('#segFps','fps');
segBind('#segAr','ar',syncPos);
segBind('#segRes','res');
function syncPos(){ const on=OPT.ar!=='orig'; $('#posRow').hidden=!on; syncPosPrev(); }
function syncPosPrev(){ $('#posBtnRow').hidden=!(OPT.ar!=='orig'&&FILE_URL); }
$('#pos').addEventListener('input',()=>{ OPT.pos=+$('#pos').value; $('#posV').textContent=OPT.pos===50?'중앙':(OPT.pos<50?'좌/상 ':'우/하 ')+Math.abs(OPT.pos-50)*2+'%'; });

// ── 위치 미리보기(크롭 프레임 드래그 · 파일 선택 시) ──
const fmtT=s=>{ s=Math.max(0,Math.round(s)); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); };
let _fit=null;   // {vw,vh, dispW,dispH} 표시 좌표계
function cropLayout(){
  const v=$('#scrubVid'), fr=$('#cropFr');
  const dw=v.clientWidth, dh=v.clientHeight; if(!dw||!dh) return;
  const target=AR_NUM[OPT.ar]; if(!target) return;
  const cur=dw/dh; let fw=dw, fh=dh;
  if(target<cur) fw=dh*target; else if(target>cur) fh=dw/target;
  fr.style.width=fw+'px'; fr.style.height=fh+'px';
  const p=OPT.pos/100;
  fr.style.left=(target<cur? p*(dw-fw) : 0)+'px';
  fr.style.top =(target>cur? p*(dh-fh) : 0)+'px';
  _fit={dw,dh,fw,fh,horiz:target<cur};
}
$('#posPrev').addEventListener('click',()=>{
  if(!FILE_URL) return;
  const v=$('#scrubVid'); v.src=FILE_URL;
  $('#scrub').hidden=false;
  v.onloadedmetadata=()=>{ $('#scrubT').max=String(v.duration||10); cropLayout(); };
  setTimeout(cropLayout,60);
});
$('#scrubT').addEventListener('input',()=>{ const v=$('#scrubVid'); try{ v.currentTime=+$('#scrubT').value; }catch(e){} $('#scrubTv').textContent=fmtT(+$('#scrubT').value); });
(function(){   // 드래그 = 잘리는 축 팬(포인터 캡처 · 키보드 대안 = 위치 슬라이더)
  const fr=$('#cropFr'); let drag=null;
  fr.addEventListener('pointerdown',e=>{ if(!_fit) return; drag={x:e.clientX,y:e.clientY,l:parseFloat(fr.style.left)||0,t:parseFloat(fr.style.top)||0}; fr.setPointerCapture(e.pointerId); e.preventDefault(); });
  fr.addEventListener('pointermove',e=>{
    if(!drag||!_fit) return;
    if(_fit.horiz){ const l=Math.max(0,Math.min(_fit.dw-_fit.fw, drag.l+e.clientX-drag.x)); fr.style.left=l+'px'; OPT.pos=Math.round((_fit.dw-_fit.fw)? l/(_fit.dw-_fit.fw)*100 : 50); }
    else { const t=Math.max(0,Math.min(_fit.dh-_fit.fh, drag.t+e.clientY-drag.y)); fr.style.top=t+'px'; OPT.pos=Math.round((_fit.dh-_fit.fh)? t/(_fit.dh-_fit.fh)*100 : 50); }
    $('#pos').value=OPT.pos; $('#pos').dispatchEvent(new Event('input'));
  });
  fr.addEventListener('pointerup',()=>{ drag=null; });
})();
function scrubClose(){ $('#scrub').hidden=true; const v=$('#scrubVid'); try{ v.pause(); }catch(e){} }
$('#scrubCancel').addEventListener('click',scrubClose);
$('#scrubOk').addEventListener('click',scrubClose);
document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&!$('#scrub').hidden) scrubClose(); });

// ── 전송(track 게이지·에러 문법 계승) ──
function errStatus(m){
  const g=$('#convGo'); if(!g) return;
  if(!g.dataset.label) g.dataset.label=g.textContent;
  clearTimeout(g._errT); g.classList.remove('firing'); g.removeAttribute('aria-busy');
  g.textContent=m; g.setAttribute('aria-live','assertive');
  g.classList.add('err'); g.classList.remove('shake'); void g.offsetWidth; g.classList.add('shake');
  g._errT=setTimeout(()=>{ g.classList.remove('err','shake'); if(g.classList.contains('wait')) g.innerHTML='변환 중<span class="gdots"><i>.</i><i>.</i><i>.</i></span>'; else g.textContent=g.dataset.label; },1700);
}
let _goTick=null,_goT0=0;
function goWait(on,t0){
  const g=$('#convGo'); if(!g) return;
  clearInterval(_goTick); _goTick=null;
  if(on){
    if(!g.dataset.label) g.dataset.label=g.textContent;
    _goT0=t0||_goT0||Date.now();
    g.classList.add('wait'); g.setAttribute('aria-busy','true');
    const paint=()=>{ if(g._flash||g.classList.contains('err')) return;
      const tEl=g.querySelector('.gtime');
      if(tEl){ tEl.textContent=fmtT((Date.now()-_goT0)/1000); return; }
      g.innerHTML='변환 중<span class="gdots"><i>.</i><i>.</i><i>.</i></span><span class="gtime">'+fmtT((Date.now()-_goT0)/1000)+'</span>'; };
    paint(); _goTick=setInterval(paint,1000);
  } else { _goT0=0; g.classList.remove('wait'); g.removeAttribute('aria-busy'); if(g.dataset.label) g.textContent=g.dataset.label; }
}
function gaugeStart(btn){ if(!btn) return; btn.classList.add('glive','firing'); requestAnimationFrame(()=>requestAnimationFrame(()=>btn.classList.add('grun'))); }
function gaugeDone(btn){ if(btn) btn.classList.add('gdone'); }
function gaugeClear(btn){ if(btn) btn.classList.remove('glive','firing','grun','gdone'); }

function buildOpts(){
  const o={fps:OPT.fps, ar:OPT.ar, res:OPT.res};
  if(OPT.ar!=='orig') o.pos=Math.round(OPT.pos)/100;
  const t0=parseFloat($('#t0').value), t1=parseFloat($('#t1').value);
  if(Number.isFinite(t0)&&t0>0) o.t0=t0;
  if(Number.isFinite(t1)&&t1>0) o.t1=t1;
  return o;
}
$('#convGo').addEventListener('click',async()=>{
  const url=$('#url').value.trim();
  if(!url && !FILE_B64) return errStatus('영상 URL이나 파일을 넣어줘');
  if(url && !/^https?:\/\//i.test(url)) return errStatus('URL은 http(s)로');
  const o=buildOpts();
  if(o.t0!==undefined&&o.t1!==undefined&&o.t1<=o.t0) return errStatus('끝이 시작보다 커야 해');
  if(o.fps==='60i'){ const eff=(o.t1!==undefined?o.t1:(_dur||0))-(o.t0||0); if(eff>121&&(o.t1!==undefined||_dur)) return errStatus('60fps 보간은 120초까지 — 구간을 잘라줘'); }   // 서버 재검증 = 이중(URL 소스는 dur 미지 = 서버가 최종)
  USER_ACT=true;
  const status=$('#cstatus'); status.classList.remove('err'); status.textContent='';
  const gb=$('#convGo'); gb.disabled=true;
  const t0=Date.now();
  gaugeStart(gb);
  goLblFlash(gb);
  goWait(true,t0);
  try{
    const payload = url? {url, opts:o} : {fileB64:FILE_B64, name:FILE_NAME, opts:o};
    const res=await fetch(API,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});
    const j=await res.json();
    if(!res.ok||j.error){ gaugeClear(gb); goWait(false); status.innerHTML=WARN_SVG+' '+esc(String(j.error||('서버 오류 '+res.status+' — 잠시 후 다시'))); status.classList.add('err'); return; }
    pendSet({id:j.id, t0, lbl:convLbl(o)});
    gaugeDone(gb);
    pollConv(j.id, t0, convLbl(o));
    setTimeout(()=>{ gaugeClear(gb); },700);
  }catch(e){ gaugeClear(gb); goWait(false); status.innerHTML=WARN_SVG+' 요청 실패 — 잠시 후 다시 ('+esc(e.message)+')'; status.classList.add('err'); }
  finally{ $('#convGo').disabled=false; }
});
function goLblFlash(g){ if(!g.dataset.label) g.dataset.label=g.textContent; g.innerHTML=CHECK_SVG; g._flash=true; setTimeout(()=>{ g._flash=false; },600); }   // 누른 즉시 ✓ 접수(track 계승)
function convLbl(o){ return (o.fps==='60i'?'60fps 보간':'변환')+' 중'; }

// ── 폴(track pollRender 문법 계승: error.log 내용변화 기준선 · HTML 가드 · 대기 미리보기 = 운영자 픽) ──
function pollConv(id, t0, wlbl){
  if(_curStop)_curStop();
  const status=$('#cstatus'); status.classList.remove('err'); status.textContent='';
  const vw=$('#vwrap'); vw.hidden=false; $('#dlVid').hidden=true; $('#dlVid').classList.remove('dl-done');
  const wsrc=FILE_URL||'';   // 업로드 = 로컬 objectURL 미리보기 · URL 소스 = 프리뷰 없음(스캔+문구만 — 정직)
  vw.innerHTML=(wsrc?'<video class="wv" muted loop playsinline preload="metadata" src="'+esc(wsrc)+'"></video>':'')
    +'<div class="wscrim"></div><div class="scanline"></div>'
    +'<div class="wmsg">'+esc(wlbl||'변환 중')+'<span class="gdots"><i>.</i><i>.</i><i>.</i></span><span class="wsec"></span></div>';
  const wv=vw.querySelector('.wv');
  if(wv){ if(matchMedia('(prefers-reduced-motion:reduce)').matches){ wv.removeAttribute('loop'); } else { wv.play().catch(()=>{}); } }
  const wclear=()=>{ vw.innerHTML=''; vw.hidden=true; };
  const outPath='conv_out/'+id+'/video.json';
  const errPath='conv_out/'+id+'/error.log';
  let live=true, prevErr=null; const stop=()=>{ live=false; clearInterval(disp); goWait(false); }; _curStop=stop;
  const draw=()=>{
    if(!live) return;
    const sec=Math.round((Date.now()-t0)/1000);
    if(sec>BUDGET*2){ stop(); wclear(); status.innerHTML=ERR_SVG+' 시간 초과 — 완성되면 다음에 열 때 이어받아'; status.classList.add('err'); return; }
    const ws=vw.querySelector('.wsec'); if(ws) ws.textContent=' ('+sec+'s)';
  };
  const disp=setInterval(draw,1000); draw();
  const tick=async()=>{
    if(!live) return;
    try{
      const er=await fetch(errPath+'?t='+Date.now());
      if(!live) return;
      if(er.ok){
        const ect=(er.headers.get('content-type')||'').toLowerCase();
        const em=await er.text();
        if(!live) return;
        const eHtml=ect.includes('text/html')||/^\s*<!doctype/i.test(em)||/<html[\s>]/i.test(em.slice(0,300));
        if(em&&em.trim()&&!eHtml){
          if(prevErr===null) prevErr=em.trim();
          else if(em.trim()!==prevErr){ stop(); wclear(); pendClear(); status.innerHTML=ERR_SVG+' '+esc(em.trim()); status.classList.add('err'); return; }
        }else if(prevErr===null) prevErr='';
      }else if(prevErr===null) prevErr='';
    }catch(e){ /* 재시도 */ }
    try{
      const r=await fetch(outPath+'?t='+Date.now());
      if(!live) return;
      if(r.ok){
        const ct=(r.headers.get('content-type')||'').toLowerCase();
        const tx=await r.text();
        if(!live) return;
        const isHtml=ct.includes('text/html')||/^\s*<!doctype/i.test(tx)||/<html[\s>]/i.test(tx.slice(0,300));
        if(tx&&tx.trim()&&!isHtml){
          let d=null; try{ d=JSON.parse(tx); }catch(e){}
          if(d&&d.url){
            const ts=Date.parse(d.ts||'');
            if(!isNaN(ts)&&ts>=t0-90000){ stop(); pendClear(); showResult(d, Math.round((Date.now()-t0)/1000)); return; }   // 이번 발사 이후 산출만(과거 오인 차단 · ts=KST ISO)
          }
        }
      }
    }catch(e){ /* 재시도 */ }
    if(live) setTimeout(tick,5000);
  };
  tick();
}
let RESULT_URL='';
function showResult(d, sec){
  RESULT_URL=d.url||'';
  $('#cstatus').classList.remove('err');
  $('#cstatus').innerHTML=OK_SVG+' 완료'+(sec?(' ('+sec+'s)'):'')+(d.w?(' — '+d.w+'×'+d.h+' '+(d.fps||'')+'fps'):'');
  const vw=$('#vwrap'); vw.hidden=false;
  vw.innerHTML='<video controls playsinline preload="metadata" src="'+esc(d.url)+'"></video>';
  $('#dlVid').hidden=false;
}
$('#dlVid').innerHTML=DOWNLOAD_SVG;
$('#dlVid').addEventListener('click',e=>{
  const b=e.currentTarget, u=RESULT_URL;
  if(!u||!/^https:\/\//.test(u)) return;
  const name='conv_'+((pendGet()||{}).id||Date.now())+'.mp4';
  const a=document.createElement('a');
  a.href='api/dl?u='+encodeURIComponent(u)+'&n='+encodeURIComponent(name);   // R2 교차출처 = api/dl 프록시(ly/track 정본)
  a.download=name; document.body.appendChild(a); a.click(); a.remove();
  b.classList.add('dl-done');
});

// ── 재개(pend) — 리로드/재진입 시 진행 중 변환 폴 이어받기(track 문법 · 클램프 = 소프트 예산) ──
(function(){
  const p=pendGet(); if(!p||!p.id||USER_ACT) return;
  const age=(Date.now()-(p.t0||0))/1000;
  if(age>BUDGET*2){ pendClear(); return; }
  goWait(true, p.t0);
  pollConv(p.id, p.t0, p.lbl||'변환 중');
})();
</script>
