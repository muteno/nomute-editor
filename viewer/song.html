<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>음원</title>
<link rel="stylesheet" href="tokens.css">   <!-- 공유 구조토큰(§🎨 STAGE3·index :root 파생·색 제외) — conv/ly/k/track 동일 계승. 인라인 :root가 팔레트 오버라이드 -->
<style>
  /* 팔레트·폼 = conv.html(영상 도구) 계승 verbatim · 구조토큰은 tokens.css — 음원 = 수노 규격 가사·스타일 프롬프팅(오디오 생성 아님 · 운영자 260712 B안) */
  :root{
    --bg:#121212; --pan:#16171a; --line:#2a2c31; --fg:#eef7f0; --mut:#8fa697;
    --accent:#00EED2; --accent-rgb:0,238,210; --accent-dim:rgba(var(--accent-rgb),.13); --on-accent:#032322;
    --danger:#e23b2a; --danger-rgb:226,59,42;
    --press-pico:.55; --press-xs:.82; --press-s:.85; --press-m:.9; --press-l:.95;
  }
  @media (prefers-reduced-motion:reduce){ :root{ --press-pico:1; --press-xs:1; --press-s:1; --press-m:1; --press-l:1; } }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  button:focus-visible, a:focus-visible, [tabindex]:focus-visible, [role=button]:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  body { margin:0; background:radial-gradient(125% 70% at 50% -8%, rgba(var(--accent-rgb),.06), transparent 55%) fixed, var(--bg); color:var(--fg); font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif; }
  html.inmodal, html.inmodal body { background:transparent; }
  .wrap { max-width:600px; margin:0 auto; padding:16px 16px 40px; }

  label { display:block; font-size:var(--fs-label); color:var(--fg); margin:14px 0 6px; }
  label.fl { font-weight:var(--fw-x); color:var(--fg); }
  label.fl::before { content:'• '; color:var(--accent); font-weight:var(--fw-b); }
  textarea, input[type=text] { width:100%; padding:12px; background:#0e0f11; border:1px solid var(--line); border-radius:var(--r-s); color:var(--fg); font:inherit; }
  textarea { min-height:120px; resize:vertical; line-height:1.55; }
  textarea:focus, input:focus { border-color:rgba(var(--accent-rgb),.35); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.08); outline:none; }
  textarea::placeholder, input::placeholder { color:var(--mut); }
  .custrow { margin-top:8px; }
  .custrow[hidden] { display:none; }

  /* 칩 세그 = conv .modeseg/.mseg 계승 verbatim(줄바꿈 허용) */
  .modeseg { display:flex; gap:8px; margin:0 0 4px; flex-wrap:wrap; }
  .mseg { flex:1; min-width:56px; padding:11px 8px; text-align:center; border-radius:var(--r-pill); border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--mut); font-weight:var(--fw-x); font-size:var(--fs-label); font-family:inherit; cursor:pointer; user-select:none; transition:transform .12s, color .15s, border-color .15s, background .15s; }
  .mseg:active { transform:scale(var(--press-m)); }
  .mseg.on { color:var(--accent); border-color:rgba(var(--accent-rgb),.55); background:rgba(var(--accent-rgb),.08); }

  /* 발사 버튼 = conv .go(전송 게이지 glive) 계승 verbatim */
  .go { width:100%; padding:13px; margin-top:18px; background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),.4); border-radius:var(--r-s);
    color:var(--accent); font:inherit; font-weight:var(--fw-x); cursor:pointer; transition:transform .12s; position:relative; overflow:hidden; }
  .go:active { transform:scale(var(--press-m)); }
  .go:disabled { opacity:.45; cursor:default; }
  .go.err { color:var(--danger); border-color:rgba(var(--danger-rgb),.5); }
  .go.shake { animation:shake .32s; }
  @keyframes shake { 20%{ transform:translateX(-5px);} 45%{ transform:translateX(4px);} 70%{ transform:translateX(-3px);} 90%{ transform:translateX(2px);} }
  .go.glive.firing { animation:none;
    background-image:linear-gradient(90deg, rgba(var(--accent-rgb),.34), rgba(var(--accent-rgb),.34)), linear-gradient(90deg, var(--accent-dim), var(--accent-dim));
    background-size:0% 100%, 100% 100%; background-repeat:no-repeat;
    transition:background-size 3.6s var(--gauge-ease); }   /* ⚠️ 2번 레이어 크기 명시(100% 100%) — 생략 = 보간 불가 90% 스냅(index 실측 함정) */
  .go.glive.firing.grun { background-size:90% 100%, 100% 100%; }
  .go.glive.firing.gdone { background-size:100% 100%, 100% 100%; transition:background-size .3s linear; }
  @media (prefers-reduced-motion:reduce) { .go.glive.firing, .go.glive.firing.gdone { transition-duration:.12s; } }
  .go .gtime { margin-left:7px; color:var(--mut); font-weight:var(--fw-b); font-variant-numeric:tabular-nums; }
  .gdots { display:inline-block; width:1.1em; text-align:left; }   /* 처리중 점모션(§디자인 g · index 정본 계승) */
  .gdots i { font-style:normal; opacity:0; animation:gdots 1.4s infinite; }
  .gdots i:nth-child(2) { animation-delay:.22s; } .gdots i:nth-child(3) { animation-delay:.44s; }
  @keyframes gdots { 0% { opacity:0; } 25%,70% { opacity:1; } 95%,100% { opacity:0; } }

  .status { margin-top:16px; font-size:13px; color:var(--mut); white-space:pre-wrap; text-align:center; }
  .status.err { color:var(--danger); }
  .status svg { vertical-align:-2px; }
  .sronly { position:absolute; width:1px; height:1px; margin:-1px; padding:0; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0; }   /* SR 전용(§디자인 e 접근성 라벨) */

  /* 결과 블록 — 소머리 라벨 + 우측 복사(글래스 원형 = conv .urlclip 계승·인라인 배치) */
  #out[hidden] { display:none; }
  .rhead { display:flex; align-items:center; margin:18px 0 6px; }
  .rhead label { margin:0; flex:1; }
  .cpy { display:grid; place-items:center; width:26px; height:26px; padding:0; opacity:.75; position:relative;
    border-radius:50%; border:1px solid rgba(255,255,255,.17); background:rgba(26,28,26,.3); color:var(--mut); cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
    -webkit-backdrop-filter:blur(13px) saturate(1.3); backdrop-filter:blur(13px) saturate(1.3); transition:transform .12s, color .15s, border-color .15s; }
  .cpy::before { content:""; position:absolute; inset:-8px; }
  .cpy svg { display:block; width:13px; height:13px; }
  .cpy:hover { color:var(--fg); border-color:rgba(255,255,255,.27); }
  .cpy:active { transform:scale(var(--press-s)); color:var(--accent); border-color:rgba(var(--accent-rgb),.6); }
  .rbox { padding:12px; background:#0e0f11; border:1px solid var(--line); border-radius:var(--r-s); font-size:14px; line-height:1.6; white-space:pre-wrap; word-break:break-word; }
  .rbox.en { color:var(--mut); }   /* 영문 태그(스타일·제외) = 보조 톤 — 가사·제목은 본문 흰색 */
  .rmeta { margin-top:14px; font-size:12px; color:var(--mut); text-align:center; }
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('inmodal');</script>
</head>
<body>
<div class="wrap">
  <label class="fl">장르</label>
  <div class="modeseg" id="segGenre" role="tablist" aria-label="장르">
    <button class="mseg on" data-v="자동" role="tab" aria-selected="true">자동</button>
    <button class="mseg" data-v="발라드" role="tab" aria-selected="false">발라드</button>
    <button class="mseg" data-v="힙합" role="tab" aria-selected="false">힙합</button>
    <button class="mseg" data-v="록" role="tab" aria-selected="false">록</button>
    <button class="mseg" data-v="R&B" role="tab" aria-selected="false">R&amp;B</button>
    <button class="mseg" data-v="댄스·EDM" role="tab" aria-selected="false">댄스</button>
    <button class="mseg" data-v="트로트" role="tab" aria-selected="false">트로트</button>
    <button class="mseg" data-v="재즈" role="tab" aria-selected="false">재즈</button>
    <button class="mseg" data-v="어쿠스틱" role="tab" aria-selected="false">어쿠스틱</button>
    <button class="mseg" data-v="OST·시네마틱" role="tab" aria-selected="false">OST</button>
    <button class="mseg" data-v="custom" role="tab" aria-selected="false">직접</button>
  </div>
  <div class="custrow" id="genreRow" hidden>
    <input type="text" id="genreIn" placeholder="장르 직접 입력 — 예: 시티팝" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
  </div>

  <label class="fl">표현방식</label>
  <div class="modeseg" id="segExp" role="tablist" aria-label="표현방식">
    <button class="mseg on" data-v="자동" role="tab" aria-selected="true">자동</button>
    <button class="mseg" data-v="감성 서정" role="tab" aria-selected="false">감성</button>
    <button class="mseg" data-v="유머·풍자" role="tab" aria-selected="false">풍자</button>
    <button class="mseg" data-v="웅장·시네마틱" role="tab" aria-selected="false">웅장</button>
    <button class="mseg" data-v="담담한 내레이션" role="tab" aria-selected="false">담담</button>
    <button class="mseg" data-v="신나는 훅" role="tab" aria-selected="false">신나는</button>
    <button class="mseg" data-v="몽환" role="tab" aria-selected="false">몽환</button>
    <button class="mseg" data-v="분노·비판" role="tab" aria-selected="false">분노</button>
    <button class="mseg" data-v="custom" role="tab" aria-selected="false">직접</button>
  </div>
  <div class="custrow" id="expRow" hidden>
    <input type="text" id="expIn" placeholder="표현방식 직접 입력 — 예: 새벽 감성 위스퍼" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
  </div>

  <label class="fl" for="story">스토리</label>
  <textarea id="story" placeholder="대사 또는 상황 — 그대로 붙여넣으면 훅으로 살려서 1분 30초 곡 구조로 만든다." autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="done"></textarea>

  <button class="go" id="songGo">프롬프트 생성</button>
  <div class="status" id="sstatus" role="status"></div>

  <div id="out" hidden>
    <div class="rhead"><label class="fl">제목 (Title)</label><button class="cpy" type="button" data-k="title" aria-label="제목 복사"></button></div>
    <div class="rbox" id="rTitle"></div>
    <div class="rhead"><label class="fl">스타일 (Styles)</label><button class="cpy" type="button" data-k="style" aria-label="스타일 복사"></button></div>
    <div class="rbox en" id="rStyle"></div>
    <div class="rhead"><label class="fl">가사 (Lyrics)</label><button class="cpy" type="button" data-k="lyrics" aria-label="가사 복사"></button></div>
    <div class="rbox" id="rLyrics"></div>
    <div class="rhead"><label class="fl">제외 (Exclude Styles)</label><button class="cpy" type="button" data-k="exclude" aria-label="제외 스타일 복사"></button></div>
    <div class="rbox en" id="rExcl"></div>
    <div class="rmeta" id="rMeta"></div>
  </div>
</div>

<script src="nm-svg.js"></script><!-- 공유 아이콘 SSOT — COPY/CHECK/OK/ERR/WARN_SVG -->
<script>
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const PEND_KEY='nm_song_pend';
const API='/api/song';
const BUDGET=1000;   // 폴 예산(초) — 하드 ×2 = 2000s ≥ 잡 캡 15분(900)+디스패치+Pages 배포(conv 문법 · 재개 게이트는 24h 별도)
let USER_ACT=false, _curStop=null, RES=null;

const pendSet=o=>{ try{ localStorage.setItem(PEND_KEY, JSON.stringify(o)); }catch(e){} };
const pendGet=()=>{ try{ return JSON.parse(localStorage.getItem(PEND_KEY)||'null'); }catch(e){ return null; } };
const pendClear=()=>{ try{ localStorage.removeItem(PEND_KEY); }catch(e){} };

// ── 칩 세그(conv segBind 계승 + 직접 = 입력 행 펼침) ──
function segBind(segId, rowId, inId){
  $(segId).addEventListener('click',e=>{
    const b=e.target.closest('.mseg'); if(!b) return;
    $$(segId+' .mseg').forEach(x=>{ x.classList.toggle('on',x===b); x.setAttribute('aria-selected',String(x===b)); });
    const cust=b.dataset.v==='custom';
    $(rowId).hidden=!cust;
    if(cust) setTimeout(()=>$(inId).focus(),0);
  });
}
segBind('#segGenre','#genreRow','#genreIn');
segBind('#segExp','#expRow','#expIn');
function segVal(segId, inId){
  const on=$(segId+' .mseg.on'); if(!on) return '자동';
  if(on.dataset.v==='custom') return ($(inId).value.trim()||'자동').slice(0,40);
  return on.dataset.v;
}

// ── 전송(conv 게이지·에러 문법 계승) ──
function errStatus(m){
  const g=$('#songGo'); if(!g) return;
  if(!g.dataset.label) g.dataset.label=g.textContent;
  clearTimeout(g._errT); g.classList.remove('firing'); g.removeAttribute('aria-busy');
  g.textContent=m; g.setAttribute('aria-live','assertive');
  g.classList.add('err'); g.classList.remove('shake'); void g.offsetWidth; g.classList.add('shake');
  g._errT=setTimeout(()=>{ g.classList.remove('err','shake'); if(g.classList.contains('wait')) g.innerHTML='생성 중<span class="gdots"><i>.</i><i>.</i><i>.</i></span>'; else g.textContent=g.dataset.label; },1700);
}
const fmtT=s=>{ s=Math.max(0,Math.round(s)); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); };
let _goTick=null,_goT0=0;
function goWait(on,t0){
  const g=$('#songGo'); if(!g) return;
  clearInterval(_goTick); _goTick=null;
  if(on){
    if(!g.dataset.label) g.dataset.label=g.textContent;
    _goT0=t0||_goT0||Date.now();
    g.classList.add('wait'); g.setAttribute('aria-busy','true');
    const paint=()=>{ if(g._flash||g.classList.contains('err')) return;
      const tEl=g.querySelector('.gtime');
      if(tEl){ tEl.textContent=fmtT((Date.now()-_goT0)/1000); return; }
      g.innerHTML='생성 중<span class="gdots"><i>.</i><i>.</i><i>.</i></span><span class="gtime">'+fmtT((Date.now()-_goT0)/1000)+'</span>'; };
    paint(); _goTick=setInterval(paint,1000);
  } else { _goT0=0; g.classList.remove('wait'); g.removeAttribute('aria-busy'); if(g.dataset.label) g.textContent=g.dataset.label; }
}
function gaugeStart(btn){ if(!btn) return; btn.classList.add('glive','firing'); requestAnimationFrame(()=>requestAnimationFrame(()=>btn.classList.add('grun'))); }
function gaugeDone(btn){ if(btn) btn.classList.add('gdone'); }
function gaugeClear(btn){ if(btn) btn.classList.remove('glive','firing','grun','gdone'); }
function goLblFlash(g){ if(!g.dataset.label) g.dataset.label=g.textContent; g.innerHTML=CHECK_SVG; g._flash=true; setTimeout(()=>{ g._flash=false; },600); }   // 누른 즉시 ✓ 접수(track 계승)

$('#songGo').addEventListener('click',async()=>{
  const story=$('#story').value.trim();
  if(!story) return errStatus('스토리(대사나 상황)를 적어줘');
  USER_ACT=true;
  const status=$('#sstatus'); status.classList.remove('err'); status.textContent='';
  const gb=$('#songGo'); gb.disabled=true;
  const t0=Date.now();
  gaugeStart(gb); goLblFlash(gb); goWait(true,t0);
  try{
    const payload={ genre:segVal('#segGenre','#genreIn'), express:segVal('#segExp','#expIn'), story:story.slice(0,1500) };
    const res=await fetch(API,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});
    const j=await res.json();
    if(!res.ok||j.error){ gaugeClear(gb); goWait(false); status.innerHTML=WARN_SVG+' '+esc(String(j.error||('서버 오류 '+res.status+' — 잠시 후 다시'))); status.classList.add('err'); return; }
    pendSet({id:j.id, t0});
    gaugeDone(gb);
    pollSong(j.id, t0, t0-90000);
    setTimeout(()=>{ gaugeClear(gb); },700);
  }catch(e){ gaugeClear(gb); goWait(false); status.innerHTML=WARN_SVG+' 요청 실패 — 잠시 후 다시 ('+esc(e.message)+')'; status.classList.add('err'); }
  finally{ $('#songGo').disabled=false; }
});

// ── 폴(conv pollConv 문법 계승: error.log 즉시 보고 · SPA-HTML 가드 — 빌드 전 200을 완료로 오인 금지) ──
function pollSong(id, t0, minTs){
  if(_curStop)_curStop();
  const status=$('#sstatus'); status.classList.remove('err');
  status.innerHTML='<span class="sronly">생성 중</span>';
  const outPath='song_out/'+id+'/song.json';
  const errPath='song_out/'+id+'/error.log';
  let live=true; const stop=()=>{ live=false; goWait(false); }; _curStop=stop;
  const tick=async()=>{
    if(!live) return;
    if(Date.now()-t0>BUDGET*2000){ stop(); status.innerHTML=ERR_SVG+' 시간 초과 — 완성되면 다음에 열 때 이어받아'; status.classList.add('err'); return; }
    try{
      const er=await fetch(errPath+'?t='+Date.now());
      if(!live) return;
      if(er.ok){
        const ect=(er.headers.get('content-type')||'').toLowerCase();
        const em=await er.text();
        if(!live) return;
        const eHtml=ect.includes('text/html')||/^\s*<!doctype/i.test(em)||/<html[\s>]/i.test(em.slice(0,300));
        if(em&&em.trim()&&!eHtml){ stop(); pendClear(); status.innerHTML=ERR_SVG+' '+esc(em.trim().slice(0,300)); status.classList.add('err'); return; }
      }
    }catch(e){ /* 재시도 */ }
    try{
      const r=await fetch(outPath+'?t='+Date.now());
      if(!live) return;
      if(r.ok){
        const ct=(r.headers.get('content-type')||'').toLowerCase();
        const tx=await r.text();
        if(!live) return;
        const isHtml=ct.includes('text/html')||/^\s*<!doctype/i.test(tx)||/<html[\s>]/i.test(tx.slice(0,300));
        if(tx&&tx.trim()&&!isHtml){
          let d=null; try{ d=JSON.parse(tx); }catch(e){}
          if(d&&d.lyrics){
            const ts=Date.parse(d.ts||'');
            if(!isNaN(ts)&&ts>=minTs){ stop(); pendClear(); showResult(d, Math.round((Date.now()-t0)/1000)); return; }   // 원 디스패치 이후 산출만(과거 오인 차단 · ts=KST ISO)
          }
        }
      }
    }catch(e){ /* 재시도 */ }
    if(live) setTimeout(tick,5000);
  };
  tick();
}
function showResult(d, sec){
  RES=d;
  $('#sstatus').classList.remove('err');
  $('#sstatus').innerHTML=OK_SVG+' 완료'+(sec?(' ('+sec+'s)'):'')+' — 수노 커스텀 모드에 칸별로 붙여넣기';
  $('#rTitle').textContent=d.title||'';
  $('#rStyle').textContent=d.style||'';
  $('#rLyrics').textContent=d.lyrics||'';
  $('#rExcl').textContent=d.exclude||'';
  $('#rMeta').textContent=(d.genre||'자동')+' · '+(d.express||'자동')+' · 목표 '+(d.target||'1:30');
  const out=$('#out'); out.hidden=false;
  try{ out.scrollIntoView({behavior:'smooth', block:'nearest'}); }catch(e){}
}

// ── 복사(클립보드 + CHECK 플래시 · nm-svg SSOT) ──
$$('.cpy').forEach(b=>{ b.innerHTML=COPY_SVG; });
document.addEventListener('click',async e=>{
  const b=e.target.closest('.cpy'); if(!b||!RES) return;
  const v=String(RES[b.dataset.k]||''); if(!v) return;
  let ok=false;
  try{ await navigator.clipboard.writeText(v); ok=true; }
  catch(err){
    try{ const ta=document.createElement('textarea'); ta.value=v; ta.style.cssText='position:fixed;opacity:0'; document.body.appendChild(ta); ta.select(); ok=document.execCommand('copy'); ta.remove(); }catch(e2){}
  }
  clearTimeout(b._t);
  b.innerHTML=ok?CHECK_SVG:COPY_SVG;
  if(ok){ b._t=setTimeout(()=>{ b.innerHTML=COPY_SVG; },900); }
});

// ── 재개(pend) — 리로드/재진입 시 진행 중 생성 폴 이어받기(conv 문법 · 24h 게이트) ──
(function(){
  const p=pendGet(); if(!p||!p.id||USER_ACT) return;
  if(Date.now()-(p.t0||0)>24*3600e3){ pendClear(); return; }
  const t0c=Math.max(p.t0||0, Date.now()-BUDGET*1000);   // 경과·타임아웃 기점 클램프 = 재개마다 폴 창 확보 · 신선도는 원 t0 기준(분리)
  goWait(true, t0c);
  pollSong(p.id, t0c, (p.t0||0)-90000);
})();
</script>
