<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>편집기</title>
<link rel="stylesheet" href="tokens.css">   <!-- 공유 구조토큰(§🎨 STAGE3·index :root 파생·색 제외) — ly/k/track/conv 동일 계승 -->
<style>@font-face{font-family:'Pretendard Variable';font-weight:45 920;font-style:normal;font-display:swap;src:local('Pretendard Variable'),url(assets/fonts/pretendard.woff2) format('woff2-variations')}</style><!-- 본문 폰트 = index 정본 그대로 이식(운영자 260718 "이미지 스튜디오 통일 규격 → 비디오 스튜디오 정합" · thumb:10 이주 동문 — iframe이라 부모 index Pretendard 미상속 = 옵션 카드가 Image Studio와 글자부터 달랐던 원인 동일) · 자산·경로 = index @font-face 동일 · swap = 첫 페인트 무차단 -->
<style>
  /* 팔레트·폼 = conv/track(영상 도구) 계승 verbatim · 구조토큰은 tokens.css
     골격 B 지오메트리 = 운영자 260710 플레이그라운드 선택값{칩 라운드 --r-s(9) · 섹션 간격 --sp-3(18) · 스택 카드 간격 --sp-2(12)
     · 발사 40px(260711 2차) · 레시피 틴트 .04 · 비활성 흐림 .32 · 바텀시트 64% · 나머지 = 260711 선택값(작업이력 정본)} */
  :root{ --well:#0e0f11;   /* 인셋 웰(입력·코드박스 배경 — 7뷰어 공유 raw 추출 = 동값·픽셀 0 · 평의회 260713 ⑨) */
    --bg:#121212; --pan:#16171a; --line:#2a2c31; --fg:#eef7f0; --mut:#8fa697;
    --hist-accent:#d8ff3d; --hist-rgb:216,255,61;   /* 이력색(라임) = 작업 내역 접기 마커 — index·thumb --hist-accent 동값 복사 계승(4뷰어 색 비공유 = inline 정본 · 운영자 260712 영상 계승) */
    --accent:#00EED2; --accent-rgb:0,238,210; --accent-dim:rgba(var(--accent-rgb),.13); --on-accent:#032322;
    --danger:#e23b2a; --danger-rgb:226,59,42; --warn:#FFE13D;
    --accent-5:#0FFD02; --accent-6:#FF5EC8; --bias-l2:#3a6ddb;   /* 콘텐츠 산출물 색(index 값 계승 · ly/track 로컬 계승 관례 동형 · §핵심명령 3-b-1) = 자막 음영 색 선택지 견본·프리뷰 — :root 정본 정의는 게이트 미계수·컴포넌트는 var()만 */
    --press-pico:.72; --press-xs:.82; --press-s:.85; --press-m:.9; --press-l:.95;
  }
  @media (prefers-reduced-motion:reduce){ :root{ --press-pico:1; --press-xs:1; --press-s:1; --press-m:1; --press-l:1; } }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  button:focus-visible, a:focus-visible, [tabindex]:focus-visible, [role=button]:focus-visible, label.file:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  body { margin:0; background:radial-gradient(125% 70% at 50% -8%, rgba(var(--accent-rgb),.06), transparent 55%) fixed, var(--bg); color:var(--fg); font:15px/1.6 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; letter-spacing:-.2px /* raw-ok: 자간 = index body 정본 exact 계승(§디자인 letter-spacing WARN 통로) */; -webkit-font-smoothing:antialiased; }   /* 폰트 = index.html body 정본 문자단위 exact 계승(운영자 260718 이미지→비디오 스튜디오 정합 · thumb:33 동문 · 페이블 M1 판례: 구 시스템 스택[Segoe/Roboto 임의]+자간 누락 = 계승위반형) · 15px/1.6·배경 radial은 edit 고유분 유지 */
  html.inmodal, html.inmodal body { background:transparent; }
  /* 스크롤바 표준 = 제작·합성(thumb) 이식(운영자 260713 "다 같게" — 구 260712 전면 숨김 대체) · 실제 보이는 바 = cscroll.js 오버레이(네이티브는 no-JS 폴백 · 색 변경 = viewer/cscroll.js) */
  html .cscroll, html .escroll { display:none !important; }   /* 스크롤바 표시 제거(운영자 260716 "이미지·영상 스튜디오 둘다 스크롤 없애") — 공유 cscroll 오버레이 + edit 전용 escroll(아래 사본 IIFE) 썸 둘 다 숨김·스크롤 동작/네이티브 숨김은 종전 · !important = 주입 <style>이 소스순 뒤라 재승리 필수(thumb 동문) · 복원 = 이 행 삭제 */
  html { scrollbar-width:thin; scrollbar-color:rgba(0,0,0,.45) transparent; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(0,0,0,.42); border-radius:999px;
    border:2px solid var(--bg); background-clip:padding-box; }
  ::-webkit-scrollbar-thumb:hover { background:rgba(0,0,0,.6); background-clip:padding-box; }
  .wrap { max-width:600px; margin:0 auto; padding:18px max(16px, env(safe-area-inset-right)) calc(28px + env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left)); }   /* raw-ok: 좌우 16·상 18 = thumb/ly/k 3형제 계승(운영자 260712 "좌우 마진 붙은 것 수정" — 구 12/16은 영상 3탭 중 편집만 어긋남) · 발사 바 인라인이라 하단만 28 유지 · viewport-fit=cover 대응 = thumb .wrap env() 정본 계승(가로 노치 max 흡수·하단 가산 · 감사5 260718) */

  label.fl { display:block; font-size:var(--fs-label); color:var(--fg); font-weight:var(--fw-x); margin:16px 0 9px; }   /* 소머리 간격 = 이미지 모달 .csec 리듬 그대로(16/0/9 · 운영자 260712 6차 — 구 18/6) */
  label.fl::before { content:'• '; color:var(--accent); font-weight:var(--fw-b); }

  /* 소스 행 = 파일 픽토(좌·기존 .file 그대로 = 액티브 축소 포함) + URL(우) — 운영자 260710 "파일이 더 기본이니 좌측" */
  .srcwrap { padding-bottom:0; }   /* sticky 고정 해제(운영자 260712 "스크롤 내려도 위 파일 영역이 따라내려옴 해결" — 구 srcPin=pin(260711) 뒤집음 · 스크롤 비침 가림용 그라데 배경·z-index도 고정 전용이라 동반 제거) · 하단 여백 6→0(운영자 260712 5차 "소스 구간 마진 이상" — 섹션 간격은 .sech 상시 리듬(--sp-3+--sp-2)이 전담 = 이중 가산 제거) */
  .srcrow { display:flex; gap:10px; align-items:stretch; padding-top:2px; }
  .file { flex:0 0 84px; display:grid; place-items:center; padding:10px; border:1px dashed transparent; border-radius:var(--r-s); text-align:center; color:var(--accent); cursor:pointer; background:transparent; user-select:none; transition:transform .12s ease, background .15s ease, border-color .15s ease, color .15s ease; }
  .file svg { width:26px; height:26px; display:block; margin:0 auto; transition:transform .14s cubic-bezier(.2,.9,.3,1.25); }
  .file:active svg { transform:scale(var(--press-xs)); }
  .file.has { color:var(--fg); }
  .file .ftype { display:inline-grid; place-items:center; min-width:42px; height:22px; padding:0 7px; border-radius:6px; background:rgba(var(--accent-rgb),.14); color:var(--accent); font-size:11px; font-weight:var(--fw-x); letter-spacing:.4px; font-variant-numeric:tabular-nums; }   /* tabular+min-width 42 = 업로드 % 자릿수 지터 방지(평의회10) */
  .file .fname { font-size:11px; max-width:74px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block; margin-top:3px; }
  .urlwrap { position:relative; flex:1; }
  input[type=url] { width:100%; height:100%; min-height:52px; padding:12px 40px 12px 12px; background:rgba(14,15,17,.55); border:1px solid var(--line); border-radius:var(--r-s); color:var(--fg); font:inherit; font-size:16px; }   /* raw-ok: iOS 자동줌 방지 하한(16px 미만 입력 포커스 = 강제 줌 · 감사2 260718) · 배경 = 이미지 모달 입력칸 정본(rgba .55 반투명 실크 · 운영자 260712 6차 — 구 var(--well) 불투명) */
  input:focus { border-color:rgba(var(--accent-rgb),.35); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.08); outline:none; }
  input::placeholder { color:var(--mut); }
  .urlclip { position:absolute; top:50%; right:12px; transform:translateY(-50%); display:grid; place-items:center; width:26px; height:26px; padding:0; z-index:5; opacity:.6;
    border-radius:50%; border:1px solid rgba(255,255,255,.17); background:rgba(26,28,26,.3); color:var(--mut); cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
    -webkit-backdrop-filter:blur(13px) saturate(1.3); backdrop-filter:blur(13px) saturate(1.3); transition:transform .12s, color .15s, border-color .15s; }
  .urlclip::before { content:""; position:absolute; inset:-8px; }
  .urlclip svg { display:block; width:13px; height:13px; }
  .urlclip:active { transform:translateY(-50%) scale(var(--press-s)); color:var(--accent); border-color:rgba(var(--accent-rgb),.6); }

  /* 레시피 칩(원탭 프리셋 — ly '빠른' 행 승격 · 틴트 .10 = 운영자 선택값) */
  .recrow { display:grid; grid-template-columns:repeat(auto-fit, minmax(0,1fr)); gap:6px; margin:var(--sp-1) 0 var(--sp-2); }   /* 균등 N분할(운영자 260712 "4개면 4분할·글자폭 쏠림 금지" · auto-fit = 칩 수 변해도 등분·비고정) */   /* 칩 간격 6(--sp-1) · 레시피↔첫 섹션 하단 여백 12(--sp-2 · 운영자 260712 세로 리듬 — 구 무여백은 '1 리사이징'이 칩에 붙음) */
  .rec { height:var(--btn-sm); min-width:0; padding:0 4px; display:flex; align-items:center; justify-content:center; gap:5px; white-space:nowrap; border-radius:var(--r-s); border:1px solid rgba(var(--accent-rgb),.3); background:rgba(var(--accent-rgb),.04); color:var(--fg); font-weight:var(--fw-x); font-size:var(--fs-label); font-family:inherit; cursor:pointer; transition:transform .12s; }   /* 그리드 셀 중앙(운영자 260712 균등 분할) */
  .rec:active { transform:scale(var(--press-m)); }
  .rec .st { color:var(--accent); }

  /* 처리 스택(골격 B 심장) — 카드 = 최외곽 아님(내부 중첩)·간격 --sp-2(12 · 운영자 선택값) */
  .stack { display:flex; flex-direction:column; gap:var(--sp-2); }
  .scard { border:1px solid rgba(255,255,255,.06); border-radius:var(--r-s); background:rgba(255,255,255,.015); }   /* 겉면 2배 투명(운영자 260712 — 테두리 --line→화이트알파 .06(.prm 구분선 실존값 재사용)·배경 .03→.015) */   /* 카드 라운드 9 = --r-s(운영자 260711 cardR — 내부 중첩 카드라 최외곽 --r-l 기틀 비대상) */
  .scard .hd { display:flex; align-items:center; gap:9px; padding:8px 13px; cursor:pointer;   /* 세로 8 = 운영자 260711 cardPadY 선택값(시안 실측 10에서 −2 — 구 10px는 미달·평의회 260711 3차 정정) */ user-select:none; }
  .scard .no { color:var(--accent); font-weight:var(--fw-x); font-size:var(--fs-xs); min-width:13px; font-variant-numeric:tabular-nums; }
  .scard .nm { font-weight:var(--fw-b); font-size:var(--fs-label); flex:none; }   /* 라벨 굵기 = Image Studio 카드 라벨 정본(thumb .scard .nm = index .pub-l exact · fw-b 700) 계승 — 구 fw-x 800 편차 정합(운영자 260718 스튜디오 정합) */
  .scard .sum { color:var(--mut); font-size:var(--fs-xs); margin-left:auto; text-align:right; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; opacity:.4; }   /* 요약 흐림(운영자 260711 sumA) */
  .scard .rm { position:relative; width:26px; height:26px; flex:none; display:grid; place-items:center; border-radius:var(--r-s); border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04); color:var(--mut); cursor:pointer; transition:transform .12s; }
  .scard .rm::before { content:""; position:absolute; inset:-9px; }   /* 탭영역 확장(시각 불변 · 26+18=44 도달 · .urlclip/.lyseg-adj 히트슬롭 계승 — -9 초과 금지 = .hd 접기 탭 흡수 방지 · 감사2 260718) */
  .scard .rm:active { transform:scale(var(--press-s)); }
  .scard .rm svg { width:11px; height:11px; }
  .scard .prm { padding:2px 13px 12px; border-top:1px solid rgba(255,255,255,.06); }
  .empty-stack { color:var(--mut); font-size:var(--fs-sm); border:1px dashed var(--line); border-radius:var(--r-l); padding:12px; text-align:center; }   /* 도먼트(섹션 상시형 260712) */
  .sech { display:flex; align-items:center; gap:6px; margin:16px 0 9px; padding-top:var(--sp-2); border-top:1px solid var(--line); font-weight:var(--fw-x); font-size:var(--fs-label); color:var(--fg); }   /* 섹션 헤더 = 이미지 모달 소머리 문법 계승(운영자 260712 6차 "이미지를 기준" — thumb .csec 정본: • 블릿+흰 라벨·마진 16/0/9·gap 6 · 구 번호(1~4) 폐지) · 구분선 = 항상 유지(운영자 260712 5차 — 이미지엔 없으나 명시 지시 존치·편집기 다구획 유효) */
  .sech::before { content:'•'; color:var(--accent); font-weight:var(--fw-b); }   /* 블릿 = 형광·700(thumb .csec::before 그대로 · §표기표준 가) */
  .scard .hd.st { cursor:default; }   /* 상시형 = 접기 클릭 폐지 */
  .addbtn { margin-top:var(--sp-2); width:100%; height:42px; border-radius:var(--r-l); border:1px dashed var(--line); background:transparent; color:var(--accent); font:inherit; font-weight:var(--fw-x); font-size:var(--fs-label); cursor:pointer; transition:transform .12s; }
  .addbtn:active { transform:scale(var(--press-l)); }

  /* 카드 안 파라미터 — 칩·세그 = 라운드 --r-s(9 · 운영자 선택값) · 종속 dim .47 */
  .prow { display:flex; gap:5px; flex-wrap:wrap; margin-top:9px; }
  .plbl { flex-basis:100%; color:var(--mut); font-size:var(--fs-xs); font-weight:var(--fw-x); margin-top:9px; }
  .plbl.plbl-nm { color:var(--fg); font-size:var(--fs-label); font-weight:var(--fw-b); }   /* 동급 라벨 = 카드 제목(.scard .nm fg·fs-label·fw-b) 미러 — 방식 = 비율과 동급 상향(운영자 260712 3차) · fw-b 동행 = .nm 800→700 전향(260718 스튜디오 정합)에 선언 미러 짝 맞춤(평의회5 — 방치 시 같은 카드 안 700/800 위계 어긋남) */
  .pc { height:var(--btn); padding:0 11px; display:inline-flex; align-items:center; border-radius:var(--r-s); border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--mut); font-weight:var(--fw-x); font-size:var(--fs-label); font-family:inherit; cursor:pointer; user-select:none; transition:transform .12s, color .15s, border-color .15s, background .15s; }
  .pc:active { transform:scale(var(--press-m)); }
  .pc.on { color:var(--accent); border-color:rgba(var(--accent-rgb),.55); background:rgba(var(--accent-rgb),.04); }   /* 켜짐 틴트 .04(운영자 260711 onA — 같은 토큰 알파 변주) */
  .pc.dim { opacity:.32; }   /* 비활성 흐림(운영자 260711 dimOff) */
  .scard.dim { opacity:.32; }   /* 클리퍼 배타 스캔 중 = 꺼진 축 카드 흐림(운영자 260712 6차 승인 — .pc.dim 값 계승 · 탭은 살아있음 = setAxis가 배타 해제하며 그 축 점등이라 pointer-events 유지·aria-disabled 미부여) */
  .pc .swd { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:5px; background:var(--sw,rgba(0,0,0,1)); border:1px solid rgba(255,255,255,.25); }   /* 자막 음영 색 칩 견본 점(.pc 소확장 · 색 = 콘텐츠 var 참조만 · 260711) */
  /* ── 순환값 문법(운영자 260712 5문법 — 도형/필 폐지 · 한 카테고리 = 값 하나·탭=한 바퀴 순환 · ovfmt 정본 결) ── */
  .scard.cyc .hd { gap:6px; flex-wrap:wrap; cursor:default; align-items:baseline; }   /* baseline = 라벨·구분자(|)·순환값 글리프 완전 정렬(thumb .csec 인라인 흐름과 동일 · flex 박스중앙은 파이프 글리프 +0.4px 편심 노출 = 실측 260712) */
  .cyv { color:var(--accent); font-weight:var(--fw-x); font-size:var(--fs-sm); letter-spacing:.03em; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:color .14s, transform .1s; }   /* 상태/값 글자 = 이미지 모달 .onoff 정본 정렬(운영자 260712 6차 — fs 12(--fs-sm)·자간 .03em·라벨(13)과 위계) */
  #xtrsec .cyv { min-width:3ch; white-space:nowrap; }   /* ON(2자)↔OFF(3자) 전환에도 폭 고정 = 카드 불변(운영자 260712 "한 음절 늘어나도 무너지면 안됨" — OFF 폭 선예약 · ON/OFF 순환값 한정 = 가변 값 카드(비율·해상도)는 비대상) */
  #xtrsec .prm .plbl { margin-top:16px; }   /* 구획(가림 모양·키잉·채움·색상) 위 여백 9→16 = 이미지 제작 폼 소머리(.csec margin:16 0 9) 리듬 계승 — 다구획 연속 시 그룹 경계(운영자 260712 "세부 간격 적절?" 실측) · 첫 구획은 인라인 margin-top:0이 이겨 유지 */
  .cysp { flex:1 1 0; min-width:0; }   /* 단독 카드 행의 우측 빈 슬롯(운영자 260712 "세로축 나열 — 우측이 비어도") */
  .cyv.off { color:var(--mut); }   /* 원본/그대로/끔 = 미적용(mut) · 실값 = 강조(accent) */
  .cyv:active { transform:scale(var(--press-m)); }
  .cysep { color:var(--mut); opacity:.45; font-weight:400; }
  .cyrow { display:flex; gap:8px; }   /* 반폭 페어 = 남는 공간 활용(운영자 260712 "행 반만 쓰니 반으로 잘라 둘 다") */
  .cyrow > .scard { flex:1 1 0; min-width:0; }
  .cnote { padding:2px 13px 10px; font-size:var(--fs-xs); color:var(--mut); line-height:1.5; }   /* 카드 하단 STT/클립 노트(켰을 때만 · 산문 최소) */
  .grow { display:grid; grid-template-columns:60px 1fr 44px; align-items:center; gap:9px; margin-top:9px; font-size:var(--fs-xs); }   /* 라벨 열 60px = track .mo-k 미러(구 52px = 「부드럽게」·「키잉 페더」 2줄 꺾임 — 이미지 제작 폼 결 정렬 · 운영자 260712) */
  .grow .k { color:var(--mut); font-weight:var(--fw-b); }
  .grow input[type=range] { width:100%; accent-color:var(--accent); }
  .grow .v { text-align:right; color:var(--accent); font-weight:var(--fw-x); font-variant-numeric:tabular-nums; }
  .trimrow { display:flex; gap:9px; align-items:center; margin-top:9px; }
  .trimrow input[type=number] { flex:1; width:100%; padding:10px 11px; background:rgba(14,15,17,.55); border:1px solid var(--line); border-radius:var(--r-s); color:var(--fg); font:inherit; font-size:16px; font-variant-numeric:tabular-nums; }   /* raw-ok: iOS 자동줌 방지 하한(구 var(--fs-sm)=12는 포커스 강제 줌 트리거 · 폼 입력 한정 상향 = 폼 외 타이포 티어 불변 · 감사2 260718) · 배경 = 이미지 모달 입력칸 정본 정렬(260712 6차) */
  .trimrow .tsep, .trimrow .tu { color:var(--mut); flex:none; font-size:var(--fs-sm); }

  /* 바텀시트(처리 추가 · 높이 64% = 운영자 선택값) */
  .sheetdim { position:fixed; inset:0; z-index:30; background:rgba(8,9,10,.55); }
  .sheetdim[hidden] { display:none; }
  .sheet { position:fixed; left:0; right:0; bottom:0; height:64dvh; max-width:600px; margin-inline:auto; z-index:31; background:rgba(22,23,26,.97); border-top:1px solid rgba(255,255,255,.08); border-radius:var(--r-modal) var(--r-modal) 0 0; padding:14px 16px calc(14px + env(safe-area-inset-bottom)); overflow-y:auto; }   /* raw-ok: 하단 = env 가산(스크롤 끝 여백형 — 홈바 위로 마지막 행 노출 · viewport-fit=cover 대응) · max-width 600 = 본문 .wrap 칼럼 계승(PC 전폭 스트레치 해소) · 감사2·5 260718 */
  .sheet[hidden] { display:none; }
  .sheet .sh { display:flex; align-items:center; margin-bottom:4px; }
  .sheet .sh b { font-size:var(--fs-h3); font-weight:var(--fw-x); }
  .sheet .shx { margin-left:auto; width:var(--btn-sm); height:var(--btn-sm); display:grid; place-items:center; border-radius:var(--r-s); border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04); color:var(--fg); cursor:pointer; transition:transform .12s; }
  .sheet .shx:active { transform:scale(var(--press-s)); }
  .sheet .shx svg { width:13px; height:13px; }
  .sheet .grp { color:var(--mut); font-size:var(--fs-xs); font-weight:var(--fw-x); margin:12px 0 6px; }

  /* 발사 바 = 폼 끝 인라인 40px(운영자 260711 fireStick=inline·fireH 40 — 구 하단 고정 44px 폐지) · 상태머신 = thumb '이미지 제작' 전송 게이지 계승(운영자 260712 — 구 conv .glive 폐지) */
  .xtr { margin-top:0; }   /* 기타 옵션 = 4번 섹션·스택 최하단(운영자 260712 2차 "번호 매겨 제일 아래") · 카드/헤더 = .sech/.scard 계승 — 헤더 위 간격·구분선 = 1~3 섹션과 동일 리듬(.sech 상시 · 운영자 260712 5차) · 힌트·노트 산문 = 운영자 비움(§디자인 e) */
  .xtr .scard > .prm:first-child { border-top:none; padding-top:10px; }   /* 기타 옵션 세부(가림 모양·크기·페더·키잉 페더) = 3분할 토글 행 아래 전폭 카드(운영자 260712 5차 "가로 3분할" — 1/3폭엔 게이지 폭 미달) · 헤더 없는 카드라 .prm 상단선만 제거(신규 클래스 0) */
  .xtr .xgo { margin-top:var(--sp-2); width:100%; padding:9px 15px; border-radius:var(--r-pill); background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),.4); color:var(--accent); font:inherit; font-size:var(--fs-label); font-weight:var(--fw-x); cursor:pointer; transition:transform .12s; }   /* 강조(발사류) = 구 .go 틴트 계승(운영자 260712 xtrGoStyle=acc — 구 ghost 폐지) · radius = pill(발사류 모서리 .go와 통일 · 260712 6차 이미지 기준 — 크기·색은 유지 = 최종 발사와 위계 구분) */
  .xtr .xgo:active { transform:scale(var(--press-l)); }
  .xtr .xgo:disabled { opacity:.32; cursor:default; transform:none; }   /* 기능 미선택 = 흐림(.pc.dim 값 계승) — 어포던스로 설명(산문 0) */
  .xnote { margin-top:6px; color:var(--mut); font-size:var(--fs-xs); line-height:1.5; }   /* 기타 기능+카드 공용 노트(컷 STT-only 노트 재사용 — 신규 클래스 창작 회피 · 평의회 260711 3차) */
  .firebar { position:static; padding:0; background:none; }   /* 상단 도크(.topdock) 안 = 미리보기 바로 아래 발사바(운영자 260718 "미리보기에 붙이면") · 미리보기↔버튼 gap = .pvsec margin-bottom(sp-2) 전담(thumb .topdock .makerow margin-top:0 미러) · 무파일 시 도크 padding-top(16)이 버튼 위 여백 · 구 하단 인라인 14/6+safe 폐지 */
  .firebar .inner { max-width:600px; margin:0 auto; }
  /* 선택 요약 스트립 = thumb .optstrip 정본 미러(Q128 "미리보기 아래 박스 — 모든 옵션 나열·OFF도 표기·생성 전에 고정" · 운영자 260718 이미지→비디오 스튜디오 정합) — 박스/활자/라벨/구분자 전부 thumb 동값 계승 */
  .optstrip { margin:0 0 var(--sp-2); padding:8px 13px /* raw-ok: 세로8·좌우13 = .scard .hd 카드 정본 동일 계승(thumb .optstrip 동문) */; background:#000 /* raw-ok: 미리보기 스테이지 전경색 동값(thumb 정본) */; border:1px solid var(--line); border-radius:var(--r-s); }
  .optstrip .gospec { margin:0; padding:0; font-size:11.25px /* raw-ok: 구 #goSpec 명세 활자값(thumb 정본 동값 · 운영자 260624 90%) */; line-height:1.9; }
  .gospec .gs-lbl { color:var(--mut); font-weight:var(--fw-b); }
  .gospec .gs-v { color:var(--mut); }
  .gospec .gs-v.on { color:var(--accent); font-weight:var(--fw-b); }   /* 활성값(적용 중) = accent 점등(thumb .gs-v.on 정본) */
  .optstrip .gs-sep { color:var(--mut); opacity:.45; font-weight:400; margin:0 5px /* raw-ok: 구분자 좌우 5 = thumb .gs-sep 정본 동값 */; }
  .go { width:100%; padding:12px; background:rgba(255,255,255,.02); border:1px solid var(--line); border-radius:var(--r-pill);   /* 배경 .05→.02(운영자 260713 B) · padding 18→12 = "9→6 줄어든 만큼"(⅔·33%↓ · 운영자 260713 2차 · 높이 52→40 · 18→12=sp-3→sp-2) + line-height:1 = thumb .go 발사 게이지바 정본 계승(글자 정중앙 dy0 · 8뷰어 통일) */
    color:var(--accent); font:inherit; font-weight:var(--fw-x); font-size:14px; line-height:1; cursor:pointer; transition:transform .12s; position:relative; overflow:hidden; }   /* 이미지 모달 .go 정본 그대로(운영자 260712 6차 "이미지를 기준" — pill·padding 14·fs 14 = thumb 값 복사 · 구 높이 40·r-s 폐지) · 바탕 글래스·firing 상태머신 불변 */
  .go:active { transform:scale(.955); background:rgba(var(--accent-rgb),.08); border-color:rgba(var(--accent-rgb),.35); }   /* 발사 버튼 눌림 = 5뷰어 정본(thumb/ly/k/track/song .955+accent 피드백) 통일 — 구 press-m 단독 이탈 */
  .go:disabled { opacity:.47; cursor:default; }
  #editGo { border-radius:var(--r-m); padding:var(--sp-1); font-size:var(--fs-label); overflow:visible; }   /* 생성 버튼 디자인 = Image Studio 정본 계승(#geniGo→thumb #go 사다리 = r-m 11·sp-1 6·fs-label 13 · thumb #go id 스코프 동문 — 운영자 260718 "이미지·비디오 스튜디오 정합") · 공유 .go(8뷰어 pill 정본)는 무접촉 = #editGo id 스코프 · 발사 게이지·상태머신 = .go 정본 그대로 · overflow:visible = 아래 히트슬롭 통로(운영자 260719 승인 · thumb #go 공동 수선 — 게이지 goFill = background 애니라 radius 자동 클립 = 시각 불변) */
  #editGo::before { content:''; position:absolute; left:0; right:0; top:-9px; bottom:-9px; }   /* 탭존 45px(시각 27 불변) = 44px 관례 복원(평의회3 260718) · raw-ok: ±9 = .rm 히트슬롭 정본 동값(.scard .rm::before inset:-9px 동문) */
  .go.err { color:var(--danger); border-color:rgba(var(--danger-rgb),.5); }
  .go.shake { animation:shake .32s; }
  @keyframes shake { 20%{ transform:translateX(-5px);} 45%{ transform:translateX(4px);} 70%{ transform:translateX(-3px);} 90%{ transform:translateX(2px);} }
  /* 전송 상태머신 = thumb .go 정본 계승(구성도 .send.is-fire · 운영자 260712 "이미지 전송 버튼 참고") — '전송 중…'+초록 풀필 → 접수 성공에만 ✓ 스트로크 → '전송됨' → 라벨 원복 · 진행 표기는 대기 스테이지(wmsg)가 전담 {구 .glive 디스패치 게이지+클릭 즉시 ✓ 플래시+상주 '편집 중…N:NN' 라벨 3중첩 = 운영자 첨부 실측 '어중간한 멘트+체크' → 폐지} */
  .go.firing { color:var(--on-accent); pointer-events:none; opacity:1;
    background:linear-gradient(var(--accent),var(--accent)) left/0% 100% no-repeat, linear-gradient(var(--accent-dim),var(--accent-dim));
    animation:goFill .72s var(--gauge-ease) forwards; }
  @keyframes goFill { from { background-size:0% 100%, 100% 100%; } to { background-size:100% 100%, 100% 100%; } }   /* 0%(퍼센트)+명시 from = 부드러운 보간(thumb 정본 그대로) */
  @media (prefers-reduced-motion:reduce) { .go.firing { animation-duration:.2s; } }
  .go.okdone { background:var(--accent); color:var(--on-accent); border-color:var(--accent); }
  .go.checking { display:grid; place-items:center; }
  .go .gck { width:26px; height:26px; }   /* = thumb #go 정본 26px 동값 — 260718 #editGo r-m·sp-1·fs-label 전향 후에도 thumb과 동일 지오메트리(구 근거 'pill·padding 14' = 260712 시절 이력 · 평의회1 주석 부패 정정) */
  .go .gck path { fill:none; stroke:var(--on-accent); stroke-width:2.7; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:24; stroke-dashoffset:24; animation:goTick .38s .04s ease forwards; }
  @keyframes goTick { to { stroke-dashoffset:0; } }
  @media (prefers-reduced-motion:reduce) { .go .gck path { animation:none; stroke-dashoffset:0; } }
  .go .eta { margin-left:8px; color:var(--mut); font-weight:var(--fw-b); font-size:var(--fs-sm); font-variant-numeric:tabular-nums; }
  .gdots { display:inline-block; width:1.1em; text-align:left; }
  .gdots i { font-style:normal; opacity:0; animation:gdots 1.4s infinite; }
  .gdots i:nth-child(2) { animation-delay:.22s; } .gdots i:nth-child(3) { animation-delay:.44s; }
  @keyframes gdots { 0% { opacity:0; } 25%,70% { opacity:1; } 95%,100% { opacity:0; } }
  @media (prefers-reduced-motion:reduce){ .gdots i { animation:none; opacity:1; } }

  /* 라이브 미리보기(비율 카드 귀속 · 운영자 260711 3분류 pvPlace=rsz — 파일 첨부 + 비율 카드 펼침 시) — 프레임 = 아래 .vstage 정의에 콤마 편승(신규 raw 0 · 계승) · 크기는 pvSync가 캔버스 비율로 산출 */
  .pvstage { display:flex; justify-content:center; }
  .pvstage[hidden] { display:none; }
  .pvbox { position:relative; overflow:hidden; background:rgb(0,0,0); border-radius:var(--r-l); }   /* 캔버스 = 결과물과 동일 순검정(여백(검정) 실산출색 재현 · 중립 검정 = 팔레트 반입 아님) · 라운드 = --r-l 최외곽 16px 기틀 계승(운영자 260712 3차 "둥근 도형 안에") */
  .pvbox video { position:relative; width:100%; height:100%; display:block; }   /* relative = 아래 .pvbg(absolute) 위에 페인트 */
  .pvbox .pvbg { position:absolute; inset:0; background-size:cover; background-position:center; filter:blur(var(--blur-s)) saturate(1.05); transform:scale(1.2); }   /* 여백(블러) 질감 연출 = 현재 프레임 스냅샷(운영자 260712 "블러일 때 옆 연출" · blur = --blur-s 근접 계승(시안 9px≈8) · 이중 비디오 디코드 회피) */
  .pvbox .pvbg[hidden] { display:none; }
  .pvsub { position:absolute; display:flex; justify-content:center; pointer-events:none; z-index:2; }
  .pvsub[hidden] { display:none; }
  .pvsub span { color:var(--fg); font-weight:var(--fw-x); white-space:nowrap; text-align:center; }
  /* 프리셋 = 프리뷰 좌하단 오버레이 여닫이(운영자 260712 2차 "Preset 누르면 그 행에 촤르륵·하나 고르면 Preset 복귀") — 글자만(도형 0)·영상 테두리와 --sp-2 마진(딱 안 붙임)·가독 = wmsg 그림자 계승 · 촤르륵 = .platpop ppbtn-in 스태거 계승(thumb 정본) */
  .pvpre { position:absolute; left:var(--sp-2); bottom:var(--sp-2); z-index:3; display:flex; align-items:center; gap:var(--sp-2); }   /* 스테이지 자식(pvBox 밖) = overflow:hidden 캔버스에 안 잘림(세로 영상) · left는 pvSync가 영상(캔버스) 좌변+마진으로 정렬 · gap = Preset↔항목 일정 간격(운영자 260712 3차) */
  .pvpre-t { background:none; border:0; padding:0; font:inherit; font-weight:var(--fw-x); font-size:var(--fs-label); color:var(--fg); cursor:pointer; text-shadow:0 1px 10px rgba(0,0,0,.5); -webkit-tap-highlight-color:transparent; transition:color .18s; }   /* 기본 = 무채 fg(운영자 260712 3차 "적용 전엔 강조색 안 들어오게" — 열림도 색 불변) · 상시 유지(열어도 남음 = 재탭 닫기) */
  .pvpre-t.on { color:rgba(var(--accent-rgb),.5); }   /* 프리셋 적용됨 = 강조색 불투명도 50%(운영자 지정 · 같은 토큰 알파 변주) */
  .pvpre-t:active { transform:scale(var(--press-m)); }
  .pvpre-row { display:flex; gap:var(--sp-2); }
  .pvpre-row[hidden] { display:none; }
  .pvpre-i { background:none; border:0; padding:0; font:inherit; font-weight:var(--fw-x); font-size:var(--fs-label); color:var(--fg); cursor:pointer; text-shadow:0 1px 10px rgba(0,0,0,.5); white-space:nowrap; -webkit-tap-highlight-color:transparent; }
  .pvpre-i:active { transform:scale(var(--press-m)); }
  .pvpre-row:not([hidden]):not(.fold) .pvpre-i { animation:pvpre-in .24s both var(--ease); }   /* 페이드인(운영자 260712 3차 "우측에 페이드인" — 이동 최소·스태거 유지) */
  .pvpre-row:not([hidden]):not(.fold) .pvpre-i:nth-child(1) { animation-delay:.02s; }
  .pvpre-row:not([hidden]):not(.fold) .pvpre-i:nth-child(2) { animation-delay:.05s; }
  .pvpre-row:not([hidden]):not(.fold) .pvpre-i:nth-child(3) { animation-delay:.08s; }
  .pvpre-row:not([hidden]):not(.fold) .pvpre-i:nth-child(4) { animation-delay:.11s; }
  @keyframes pvpre-in { from { opacity:0; transform:translateX(-4px); } to { opacity:1; transform:none; } }
  .pvpre-row.fold .pvpre-i { animation:pvpre-out .18s both var(--ease); }   /* 페이드아웃 = 우→좌 역스태거 */
  .pvpre-row.fold .pvpre-i:nth-child(4) { animation-delay:0s; }
  .pvpre-row.fold .pvpre-i:nth-child(3) { animation-delay:.04s; }
  .pvpre-row.fold .pvpre-i:nth-child(2) { animation-delay:.08s; }
  .pvpre-row.fold .pvpre-i:nth-child(1) { animation-delay:.12s; }

function etaCalc(){
  let s=40;
  for(const k of ORDER){ if(ON[k]) s+=CARD[k].eta; }
  if(ON.cut&&!ON.sub) s+=150;   // 컷 단독 = STT(전사)만 추가로 돈다(의역 0 · 자막 eta 210엔 STT 포함이라 동시엔 미가산)
  if(ON.fps&&P.fps==='60i') s+= _dur? Math.min(900, Math.round(_dur*18)) : 540;   // 실측 단가 0.30s/프레임@1080×1920 근사(URL = 중간값)
  if(ON.res&&P.res==='src'&&_varea>2*2073600) s+=Math.min(720, Math.round((_dur||60)*3));   // 4K 인코딩 근사(x264 veryfast ≈ 3×실시간 · 실측 전 보수)
  return s;
}

function updateOptStrip(){

  const sig=axes.map(k=>k+':'+curCyc(k)).join('|')+(ON.screen?'|s':'');   // 서명 캐시 = 게이지 드래그(pvSync 연타 ~60/s) 중 동일 내용 innerHTML 재생성 낭비 제거(평의회7 260718 · 값 불변 = 조기 return)

function setAxis(k,v){   // 축 상태 단일 정본(순환값·잔존 chip 공유 — buildOpts/etaCalc/레시피/클리퍼 배타 계약 불변)
  if(k==='ar'){ if(v==='off')ON.screen=false; else {ON.screen=true;ON.clip=false;P.ar=v;} return; }
  if(k==='res'||k==='fps'){ if(v==='off')ON[k]=false; else {ON[k]=true;ON.clip=false;P[k]=v;} return; }
  if(k==='cutlv'){ if(v==='off')ON.cut=false; else {ON.cut=true;ON.clip=false;P.cutlv=v;} return; }
  if(k==='clip'){ if(v==='on'){ for(const kk in ON) ON[kk]=false; ON.clip=true; } else { ON.clip=false; ON.anorm=true; } return; }   // 클립 = 배타 스캔 · 끔 = 기본(음량 보정) 복귀
  if(k==='bgm'||k==='anorm'){ if(v==='on'){ON[k]=true;ON.clip=false;} else ON[k]=false; return; }
  if(k==='trim'){ if(v==='on'){ON.trim=true;ON.clip=false;} else ON.trim=false; return; }   // 구간 = OFF/ON 토글(운영자 260713 · ON시 구간 입력 펼침 · 클리퍼 배타)
  if(k==='spre'){ const pr=SUBPRE[v]; if(pr){ for(const kk in pr){ if(kk!=='nm') P[kk]=pr[kk]; } } return; }
  if(['filler','karaoke','pop','keyword'].includes(k)){ P[k]=v==='1'; if(k==='karaoke'&&P.karaoke)P.pop=false; if(k==='pop'&&P.pop)P.karaoke=false; return; }
  P[k]=v; if(k==='fit'&&v!=='crop') scrubClose();
}

  return '<div class="scard cyc'+(half?' half':'')+(ON.clip&&k!=='clip'?' dim':'')+'"><div class="hd st"><span class="nm">'+CARD[k].nm+'</span>'+vals+'</div>'+body+'</div>';   // 클리퍼 배타 중 = 타 축 dim(운영자 260712 6차 승인 — 시각만·탭=배타 해제 그대로)
}
function secCards(ks){ let out='',i=0; while(i<ks.length){ const k=ks[i]; if(HALF.has(k)&&i+1<ks.length&&HALF.has(ks[i+1])){ out+='<div class="cyrow">'+cardHtml(k,true)+cardHtml(ks[i+1],true)+'</div>'; i+=2; } else { out+=cardHtml(k,false); i++; } } return out; }

//    서버 산식 미러 = ly_burn.py 정본: 자막 바닥 = H×(0.02+0.0082×pos)[:554] · 글자 = H×(size‰)[:546 — min18은 실캔버스 보호라 표시선 최소 9px]

//    · 여백(블러) = 프레임 스냅샷 블러로 연출(운영자 260712 — 실물은 움직이는 블러·프리뷰는 정지 질감·첫 프레임 loadeddata 스냅) · URL 소스 = 프리뷰 불가(픽셀이 브라우저에 없음 = 크롭 스크럽과 동일 정직).

  const sec=document.getElementById('pvsec');
  if(!FILE_URL || !slot || _pollLive){ pv.hidden=true;
    const _hasUrl=!_pollLive && !!($('#url')&&$('#url').value.trim());
    if(sec){ sec.hidden=!_hasUrl; if(_hasUrl){ const _pa0=document.getElementById('pvAttr'); if(_pa0) _pa0.innerHTML=''; } }   // URL 소스 = 프리뷰 없이 헤더(베스트컷·PRESET)만 유지(운영자 260713 "유튜브 링크에서도 한 버튼" — 픽셀이 브라우저에 없음 = 프리뷰 불가 정직·명세줄 공백)
    const _sr0=document.querySelector('.srcrow'); if(_sr0) _sr0.style.display=''; if(!FILE_URL && vv.getAttribute('src')){ vv.removeAttribute('src'); vv.load(); } return; }   // _pollLive 게이트 = 대기 표시 중 재렌더가 미리보기 부활시키던 중복 화면 차단 · 소스 행 복원(첨부 해제 시)
  if(pv.parentElement!==slot) slot.appendChild(pv);   // 영속 노드 이주(재렌더에도 video 리로드 0)
  pv.hidden=false; if(sec) sec.hidden=false;
  const _sr=document.querySelector('.srcrow'); if(_sr) _sr.style.display='none';   // 소스 행 → PREVIEW가 대체(운영자 260712 4차 "영상 입력하면 PREVIEW로 바뀜·항상 상단 고정" — 소스 전제라 빈 편집 없음)
  const _pa=document.getElementById('pvAttr');   // (도먼트) 구 속성 명세줄 — 기록 로직만 유지·표시는 도크 스트립(#optStrip)이 전담(260718 이주 · 복원 = .pvattr display:none 제거 · 평의회8 주석 정합)
  if(_pa){ const _t=ORDER.filter(x=>ON[x]).map(x=>x==='anorm'?'음량':x==='bgm'?'배경음 제거':sum(x)); _pa.innerHTML=_t.length?('<b>'+_t.map(esc).join('</b> · <b>')+'</b>'):''; }
  if(vv.getAttribute('src')!==FILE_URL){ vv.src=FILE_URL; if(vv.play) vv.play().catch(()=>{}); }
  else if(vv.paused&&vv.getAttribute('src')){ vv.play().catch(()=>{}); }   // DOM 이주는 재생을 멈춤(스펙) → 재개(muted 루프)

    const sub=$('#pvSub');

    sub.style.bottom=(bh*(0.02+0.0082*P.pos))+'px'; sub.style.left='7.4%'; sub.style.right='7.4%';

    loadPvFont(P.font);

function pvBlurBg(vv){   // 여백(블러) 선택 시 = 현재 프레임 스냅샷을 블러 배경으로(이중 비디오 디코드 회피 = 폰 부담 0 · 실물은 움직이는 블러 — 질감·배치 연출 목적 · 운영자 260712)
  const bg=document.getElementById('pvBg'); if(!bg) return;
  if(!(ON.screen&&P.fit==='blur')||!FILE_URL||!vv||!vv.videoWidth){ bg.hidden=true; return; }
  try{
    const sc=Math.min(1, 96/Math.max(vv.videoWidth,vv.videoHeight));
    const c=document.createElement('canvas'); c.width=Math.max(2,Math.round(vv.videoWidth*sc)); c.height=Math.max(2,Math.round(vv.videoHeight*sc));
    c.getContext('2d').drawImage(vv,0,0,c.width,c.height);
    bg.style.backgroundImage='url('+c.toDataURL('image/jpeg',.6)+')';
    bg.hidden=false;
  }catch(e){ bg.hidden=true; }
}

(function(){   /* 커스텀 오버레이 스크롤바(운영자 260712 3차) — cscroll.js 패턴 계승 사본(edit 전용 · 공유 cscroll은 thumb 불투명 계약이라 미수정): 트랙 = 끝라인 1px 실선 · 썸 = 강조색 30%(운영자 지정 알파 변주) · 썸 길이 = 콘텐츠 비례하되 트랙 높이 50% 상한(운영자) · 위아래 삼각형 버튼 없음 · pointer-events:none(터치 무방해) */
  var st=document.createElement('style');
  st.textContent='.escroll{position:fixed;top:0;right:0;width:7px;height:100%;z-index:99999;pointer-events:none;opacity:0;transition:opacity .3s;}'
    +'.escroll.on{opacity:1;}'
    +'.escroll::before{content:"";position:absolute;right:3px;top:0;bottom:0;width:0.5px;background:rgba(255,255,255,.04);}'   /* 실선 = 2배 얇게·2배 투명(운영자 260712 4차 — 알파 변주) */

  var root=document.documentElement;

  }

  if(window.ResizeObserver) new ResizeObserver(upd).observe(document.body);   // 카드 펼침 등 콘텐츠 높이 변화 동기
  upd();
})();

const fileSlotPct=(f,p)=>{ $('#fileLab').classList.add('has'); $('#fileTxt').innerHTML='<span class="ftype">'+p+'%</span><span class="fname">'+esc(f.name)+'</span>'; };   // 업로드 진행 = 확장자 배지 자리에 %(신규 요소 0 — 기존 슬롯 계승)
const fileSlotClear=()=>{ $('#file').value=''; $('#fileLab').classList.remove('has'); $('#fileTxt').innerHTML=FILE_ICON; };
function legacyRead(f, btn){   // R2 미가용·실패 폴백 = 종전 base64 경로 그대로(≤30MB · 회귀 0) · _lastFile 신선도 가드 = 연속 선택 last-writer 꼬임 방지(평의회7 F3)
  const rd=new FileReader();
  rd.onload=()=>{ if(_lastFile!==f) return; FILE_B64=String(rd.result||''); btn.disabled=false; fileSlotName(f); };
  rd.onerror=()=>{ if(_lastFile!==f) return; _lastFile=null; btn.disabled=false; FILE_NAME=''; fileSlotClear(); errStatus('파일을 못 읽었어 — 다시'); };
  rd.readAsDataURL(f);
}
(function(){   // 미리보기 쉘 드롭 = 영상 첨부/교체(운영자 260716 "동일하게" — thumb 드롭 문법 계승) · 기존 #file change 파이프에 DataTransfer 주입으로 그대로 태움(업로드·프리뷰·상태머신 무접촉) · video/*만
  const sec=document.getElementById('pvsec'); if(!sec) return;
  sec.addEventListener('dragover',e=>{ const t=e.dataTransfer; if(t&&Array.from(t.types||[]).includes('Files')){ e.preventDefault(); t.dropEffect='copy'; sec.classList.add('dropping'); } });
  sec.addEventListener('dragleave',e=>{ if(!sec.contains(e.relatedTarget)) sec.classList.remove('dropping'); });
  sec.addEventListener('drop',e=>{ e.preventDefault(); sec.classList.remove('dropping'); const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0]; if(!f||!/^video\//.test(f.type||'')) return; const inp=$('#file'); try{ const dt=new DataTransfer(); dt.items.add(f); inp.files=dt.files; }catch(_){ return; } inp.dispatchEvent(new Event('change')); });
})();
$('#file').addEventListener('change',async()=>{
  const f=$('#file').files[0]; if(!f) return;
  FILE_B64=''; FILE_NAME=''; FILE_R2=''; _lastFile=null; _varea=0;
  CLIPS=null; $('#cliplist').hidden=true; $('#cliplist').innerHTML='';   // 새 소스 = 옛 스캔 후보 무효(엉뚱한 구간 적용 풋건 차단 · 검증⑦C)
  if(FILE_URL&&!_pollLive){ try{ URL.revokeObjectURL(FILE_URL); }catch(e){} }
  FILE_URL=''; render();   // 크롭 미리보기 버튼 즉시 소거(열린 비율 카드 · conv 이식 260711)
  if(f.size>2*1024*1024*1024){ fileSlotClear(); $('#editGo').disabled=false; return errStatus('파일은 2GB까지 — 구간을 잘라서 올려줘'); }   // 거절 = 버튼 복구(직전 업로드가 잠근 상태 고착 방지 · 평의회7 F1)
  const r2on=await nmUpArm();   // R2 직업로드 가용(문서당 1회 핑 · 4s 타임아웃) — 미가용 = 종전 30MB 경로 폴백
  if(!r2on&&f.size>30*1024*1024){ fileSlotClear(); $('#editGo').disabled=false; return errStatus('30MB 초과 — 대용량 저장 미설정(R2 바인딩 필요). URL로 해줘'); }
  FILE_NAME=f.name; FILE_URL=URL.createObjectURL(f); render();   // 미리보기 버튼 노출(objectURL = 업로드 완료 전에도 로컬 프리뷰 가능)
  const v=document.createElement('video'); v.preload='metadata'; v.src=FILE_URL;
  v.onloadedmetadata=()=>{ _dur=v.duration||0; _varea=(v.videoWidth||0)*(v.videoHeight||0); setEta(); pvSync(); };
  const btn=$('#editGo'); btn.disabled=true;
  _lastFile=f;
  if(!r2on){ legacyRead(f, btn); return; }
  fileSlotPct(f,0);
  try{
    const up=await nmUpload(f,p=>{ if(_lastFile===f) fileSlotPct(f,p); });
    if(_lastFile!==f){ nmUpDrop(up.key); return; }   // 업로드 중 다른 파일 선택 = 낡은 완료 무시 + 고아 키 즉시 정리(평의회7 F2)
    FILE_R2=up.key; btn.disabled=false; fileSlotName(f);
  }catch(e){
    if(_lastFile!==f) return;
    if(f.size<=30*1024*1024){ legacyRead(f, btn); return; }   // 작은 파일 = 종전 경로 폴백(가용성 우선)
    btn.disabled=false; _lastFile=null; FILE_NAME=''; fileSlotClear();
    errStatus('업로드 실패 — 다시 ('+String(e&&e.message||'').slice(0,60)+')');
  }
});

/* ══ 크롭 위치 미리보기 — 프레임 드래그(conv .scrub 이식 · track 키잉 스크럽 계승 · 변환 탭 = 260711 2차 복원 · 진입 버튼 미노출 = scrubBtn=off · 코드 보존) ══ */
const AR_NUM={'9:16':9/16,'1:1':1,'4:5':4/5,'16:9':16/9};
let _fit=null,_posSnap=50;
function cropLayout(){
  const v=$('#scrubVid'), fr=$('#cropFr');
  const dw=v.clientWidth, dh=v.clientHeight; if(!dw||!dh) return false;
  const target=AR_NUM[P.ar]; if(!target) return false;
  const cur=dw/dh; let fw=dw, fh=dh;
  if(Math.abs(target-cur)>=1e-3){ if(target<cur) fw=dh*target; else fh=dw/target; }   // 동일 비율 = 크롭 생략(py 1e-3 대칭 · conv 평의회6)
  fr.style.width=fw+'px'; fr.style.height=fh+'px';
  const p=P.vpos/100;
  fr.style.left=(fw<dw? p*(dw-fw) : 0)+'px';
  fr.style.top =(fh<dh? p*(dh-fh) : 0)+'px';
  const pan=Math.max(dw-fw, dh-fh);
  fr.style.pointerEvents = pan<2? 'none':'auto';   // 팬 여지 <2px = 드래그 무효(거짓 grab 차단)
  fr.style.cursor = pan<2? 'default':'grab';
  _fit={dw,dh,fw,fh,horiz:fw<dw};
  return true;
}
function syncVposUI(){ const g=$('#stack input[data-g="vpos"]'); if(g){ g.value=P.vpos; const vv=g.parentElement.querySelector('.v'); if(vv) vv.textContent=P.vpos+'%'; } }   // 열린 게이지 라이브 동기(카드 접힘 = null 무해)
function scrubOpen(){
  if(!FILE_URL) return;
  _posSnap=P.vpos;   // 취소 복원 스냅샷(드래그 = 라이브 반영 · conv 평의회6)
  const v=$('#scrubVid'); if(v.dataset.src!==FILE_URL){ v.src=FILE_URL; v.dataset.src=FILE_URL; }   // 동일 src 재로드 방지(track 가드 계승)
  $('#scrub').hidden=false;
  v.onloadedmetadata=()=>{ $('#scrubT').max=String(v.duration||10); cropLayout(); };
  let _try=0; const kick=()=>{ if($('#scrub').hidden) return; if(!cropLayout()&&_try++<10) requestAnimationFrame(kick); }; requestAnimationFrame(kick);   // 레이아웃 지연 재시도
}
function scrubClose(){ $('#scrub').hidden=true; const v=$('#scrubVid'); try{ v.pause(); }catch(e){} }
document.addEventListener('click',e=>{ if(e.target.closest('#posPrev')) scrubOpen(); });   // 버튼 = 카드 동적 렌더라 위임
$('#scrubT').addEventListener('input',()=>{ const v=$('#scrubVid'); try{ v.currentTime=+$('#scrubT').value; }catch(e){} $('#scrubTv').textContent=fmtT(+$('#scrubT').value); });
(function(){   // 드래그 = 잘리는 축 팬(포인터 캡처 · 키보드 대안 = 위치 게이지)
  const fr=$('#cropFr'); let drag=null;
  fr.addEventListener('pointerdown',e=>{ if(!_fit) return; drag={x:e.clientX,y:e.clientY,l:parseFloat(fr.style.left)||0,t:parseFloat(fr.style.top)||0}; fr.setPointerCapture(e.pointerId); e.preventDefault(); });
  fr.addEventListener('pointermove',e=>{
    if(!drag||!_fit) return;
    if(_fit.horiz){ const l=Math.max(0,Math.min(_fit.dw-_fit.fw, drag.l+e.clientX-drag.x)); fr.style.left=l+'px'; P.vpos=Math.round((_fit.dw-_fit.fw)? l/(_fit.dw-_fit.fw)*100 : 50); }
    else { const t=Math.max(0,Math.min(_fit.dh-_fit.fh, drag.t+e.clientY-drag.y)); fr.style.top=t+'px'; P.vpos=Math.round((_fit.dh-_fit.fh)? t/(_fit.dh-_fit.fh)*100 : 50); }
    syncVposUI();
  });
  fr.addEventListener('pointerup',()=>{ drag=null; });
})();
$('#scrubCancel').addEventListener('click',()=>{ P.vpos=_posSnap; syncVposUI(); scrubClose(); });   // 취소 = 오픈 전 위치 복원
$('#scrubOk').addEventListener('click',scrubClose);

/* ══ 발사(conv 게이지·에러 문법 계승) ══ */
function errStatus(m){
  const g=$('#editGo'); if(!g) return;
  if(!g.dataset.label) g.dataset.label='생성';   // 라벨 = '생성' 단일(운영자 260718 Q142 "모든 곳 단일 통일" 비디오 계승 — 구 '편집 시작')
  clearTimeout(g._errT); clearTimeout(_goFT2); clearTimeout(_goFT3);
  g.classList.remove('firing','okdone','checking'); g.removeAttribute('aria-busy');
  g.textContent=m; g.setAttribute('aria-live','assertive');
  g.classList.add('err'); g.classList.remove('shake'); void g.offsetWidth; g.classList.add('shake');
  g._errT=setTimeout(()=>{ g.classList.remove('err','shake'); g.textContent=g.dataset.label; setEta(); },1700);
}
const fmtT=s=>{ s=Math.max(0,Math.round(s)); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); };
/* 발사 상태머신 = thumb goFire 정본 계승(운영자 260712 "이미지 전송 버튼 참고") — '전송 중…' 풀필 → 접수 성공에만 ✓ 드로우 → '전송됨' → 라벨 원복.
   구 3중첩{클릭 즉시 ✓ 플래시(goLblFlash)+3.6s 디스패치 게이지(.glive)+상주 '편집 중…N:NN' 라벨(goWait)} = '어중간한 멘트+체크'(운영자 첨부 실측) → 전부 폐지.
   진행 표기 = 대기 스테이지 wmsg가 전담. thumb와 달리 ✓는 시간이 아니라 접수 응답 성공에 게이트(edit는 잡 카드가 없어 버튼이 유일 접수 신호 = 정직 우선). */
let _goFT2=null,_goFT3=null;
function goFireStart(g){
  if(!g.dataset.label) g.dataset.label='생성';   // 라벨 = '생성' 단일(운영자 260718 Q142 "모든 곳 단일 통일" 비디오 계승 — 구 '편집 시작')
  clearTimeout(g._errT); clearTimeout(_goFT2); clearTimeout(_goFT3);
  g.classList.remove('firing','okdone','checking','err','shake'); void g.offsetWidth;   // 리플로우 = 게이지 재시작(thumb 정본)
  g.classList.add('firing'); g.textContent='요청 전송'; g.setAttribute('aria-busy','true');   // 문구 = 운영자 260712 선택값(구 '전송 중…')
  g._fireT0=Date.now();
}
function goFireOk(g){
  const hold=Math.max(0, 900-(Date.now()-(g._fireT0||0)));   // 풀필 .72s+여운 = thumb 900ms 리듬 보장(응답이 더 빨라도 스윕 안 끊김)
  _goFT2=setTimeout(()=>{
    g.classList.remove('firing'); g.classList.add('okdone','checking');
    g.innerHTML='<svg class="gck" viewBox="0 0 24 24" role="img" aria-label="전송됨"><path d="M5 13l4 4L19 7"/></svg>';
    g.removeAttribute('aria-busy');
    _goFT3=setTimeout(()=>{ g.classList.remove('checking'); g.textContent='전송됨';
      _goFT3=setTimeout(()=>{ g.classList.remove('okdone'); g.textContent=g.dataset.label||'생성'; setEta(); },850);
    },560);
  },hold);
}
function goFireFail(g){
  clearTimeout(_goFT2); clearTimeout(_goFT3);
  g.classList.remove('firing','okdone','checking'); g.removeAttribute('aria-busy');
  g.textContent=g.dataset.label||'생성'; setEta();
}

function buildOpts(){
  const o={};
  if(ON.clip) return {clip:true};   // 클리퍼 = 배타 스캔(후보만 — 렌더 옵션은 후보 확정 뒤 일반 발사)
  if(ON.sub){ o.burn=true; o.lang=P.lang; o.tone=P.tone; o.filler=P.filler; o.style=P.style;
    o.karaoke=P.karaoke; o.pop=P.pop; o.keyword=P.keyword; o.pos=P.pos; o.bg=P.bg; o.size=Math.round(P.size)/1000;
    o.outline=Math.round(P.sh*10)/1000;   // 음영 게이지 % → 외곽선 배율(100% = ×1.0 = 종전 편집기 렌더 바이트 그대로 · 260711)
    o.pad=Math.min(.5,Math.max(.02,Math.round(P.sh)/1000));   // 같은 게이지 → 박스 패딩 계수(100% = 0.10 종전) — bg>0 줄박스에선 패딩이 곧 '주변부 음영'
    o.oc=P.shc; o.font=P.font; }
  if(ON.bgm) o.bgm=true;
  if(ON.cut){ o.cut=true; o.cutlv=P.cutlv; if(!ON.sub) o.burn=false; }   // 컷 단독 = burn:false 명시(서버 번인 억제 신호 · STT-only 260711)
  if(ON.trim){ const a=parseFloat(P.t0), b=parseFloat(P.t1);   // 자막과 동시 OK(서버 리맵 · 260711)
    if(Number.isFinite(a)&&a>0) o.vid_t0=a;
    if(Number.isFinite(b)&&b>0) o.vid_t1=b; }
  if(ON.screen){ o.vid_ar=P.ar; o.vid_fit=P.fit; if(P.fit==='crop') o.vid_pos=Math.round(P.vpos)/100; }
  if(ON.res) o.vid_res=P.res;
  if(ON.fps) o.vid_fps=P.fps;
  if(ON.anorm) o.aud_norm=true;
  return o;
}
$('#editGo').addEventListener('click',async()=>{
  const url=$('#url').value.trim();
  if(!url && !FILE_B64 && !FILE_R2 && !_lastFile) return errStatus('영상 URL이나 파일을 넣어줘');
  if(url && !/^https?:\/\//i.test(url)) return errStatus('URL은 http(s)로');
  if(!ORDER.some(k=>ON[k])) return errStatus('처리를 하나는 넣어줘');
  const o=buildOpts();
  if(o.vid_t0!==undefined&&o.vid_t1!==undefined&&o.vid_t1<=o.vid_t0) return errStatus('끝이 시작보다 커야 해');
  if(_dur){   // 차등 길이 캡(운영자 260711 "잘라서 10분 이하로" — 서버 선게이트와 동형): 전사(자막·컷·클리퍼) = 20분 · 트림 구간≤10분 = 원본 60분 · 통짜 = 10분
    const stt=!!(o.burn||o.cut||o.clip);
    const span=(o.vid_t1!==undefined)? o.vid_t1-(o.vid_t0||0) : -1;
    if(stt){ if(_dur>1201) return errStatus('자막·컷·클리퍼는 20분 이하만(전사가 전체를 돎) — 구간만 자르거나 20분 이하로'); }
    else if(span>=0&&span<=600){ if(_dur>3601) return errStatus('구간 편집도 원본 60분까지 — 잘라서 올려줘'); }
    else if(_dur>601) return errStatus('편집기는 10분 이하만(릴스/쇼츠용) — 긴 영상은 구간 카드로 잘라줘');
  }
  if(o.vid_res==='src'&&!url&&_varea>2*2073600&&!o.cut){   // 4K 클라 선게이트(서버 180초 게이트 예고 · 컷은 길이가 줄어 서버 실측에 위임)
    const eff=(o.vid_t0!==undefined||o.vid_t1!==undefined)? Math.min(_dur||1e9, o.vid_t1||_dur||1e9)-(o.vid_t0||0) : _dur;
    if(eff&&eff>181) return errStatus('원본(4K) 유지는 3분까지 — 1080p로 내리거나 구간을 잘라줘');   // 181 = 서버(180+1)와 동일 · conv 대칭(평의회2)
  }
  USER_ACT=true;
  const status=$('#cstatus'); status.classList.remove('err'); status.textContent='';
  const gb=$('#editGo'); gb.disabled=true;
  if(url && FILE_R2){ nmUpDrop(FILE_R2); FILE_R2=''; }   // URL 발사 = 첨부 R2 키 미소비 → 고아 정리(평의회7 F2)
  if(!url && !FILE_B64 && !FILE_R2 && _lastFile){   // 소진된 R2 키 재업로드(러너가 잡 끝에 원본 삭제 = 일회용 · 파일은 브라우저에 남아 재선택 불필요)
    const f=_lastFile;
    try{ fileSlotPct(f,0); const up=await nmUpload(f,p=>{ if(_lastFile===f) fileSlotPct(f,p); }); FILE_R2=up.key; fileSlotName(f); }
    catch(e){ gb.disabled=false; return errStatus('재업로드 실패 — 다시 ('+String(e&&e.message||'').slice(0,60)+')'); }
  }
  const t0=Date.now();
  gb.disabled=false; goFireStart(gb);   // 잠금은 .firing pointer-events:none이 담당(disabled 딤이 풀필 게이지를 흐리는 겹침 방지 — 재업로드 창에서만 disabled)
  try{
    const payload = url? {url, opts:o} : FILE_R2? {r2key:FILE_R2, name:FILE_NAME, opts:o} : {fileB64:FILE_B64, name:FILE_NAME, opts:o};
    const res=await fetch(API,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)});
    const j=await res.json();
    if(!res.ok||j.error){ goFireFail(gb); status.innerHTML=WARN_SVG+' '+esc(String(j.error||('서버 오류 '+res.status+' — 잠시 후 다시'))); status.classList.add('err'); FILE_R2=''; return; }   // 실패 시 키 폐기 = 죽은 키(만료·소진) 재사용 루프 차단 — 다음 발사는 _lastFile 재업로드(평의회7)
    FILE_R2='';   // R2 키 소진(러너가 잡 끝에 원본 삭제 = 일회용) — 재발사는 _lastFile 재업로드 경로
    try{ EDIT_SUB=false; lyHideEditor(); lyBurnReset(); }catch(e){}   // 새 발사 = 이전 자막 편집기·완성 영상 정리(B-2 — 편집 스냅샷은 lyHideEditor가 flush 저장)
    pendSet({id:j.id, t0, lbl:editLbl(o), clip:o.clip?1:0});
    goFireOk(gb);
    pollEdit(j.id, t0, t0-90000, editLbl(o), o.clip?'clip':'');
  }catch(e){ goFireFail(gb); status.innerHTML=WARN_SVG+' 요청 실패 — 잠시 후 다시 ('+esc(e.message)+')'; status.classList.add('err'); }

function renderMd(md) {
  const parts = md.split('```');
  let html = '';
  parts.forEach((part, i) => {
    if (i % 2 === 1) {
      let code = part; const nl = code.indexOf('\n');
      const first = nl >= 0 ? code.slice(0, nl).trim() : '';
      if (/^[a-zA-Z]+$/.test(first)) code = code.slice(nl + 1);
      code = code.replace(/\s+$/, '');
      html += `<div class="code"><button data-c="${encodeURIComponent(code)}" aria-label="복사" title="복사">${COPY_SVG}</button><pre>${esc(code)}</pre></div>`;
    } else {
      const lines = part.split('\n'); let tbl = [];
      const flush = () => {
        if (!tbl.length) return;
        const rows = tbl.filter(r => !/^\s*\|?\s*[-:|\s]+\|?\s*$/.test(r));   // 구분줄 제거
        html += '<table>' + rows.map(r => {
          const cells = r.replace(/^\s*\||\|\s*$/g, '').split('|').map(c => c.trim());
          return '<tr>' + cells.map(c => `<td>${esc(c)}</td>`).join('') + '</tr>';
        }).join('') + '</table>';
        tbl = [];
      };
      lines.forEach(line => {
        const t = line.trim();
        if (t.startsWith('|')) { tbl.push(t); return; }
        flush();
        if (!t) return;
        if (t.startsWith('### ')) html += `<h3>${esc(t.slice(4))}</h3>`;
        else if (t.startsWith('## ')) html += `<h2>${esc(t.slice(3))}</h2>`;
        else if (t.startsWith('# ')) html += `<h1 class="t">${esc(t.slice(2))}</h1>`;
        else if (t === '---') html += '<hr class="divider">';
        else html += `<p>${esc(t)}</p>`;
      });
      flush();
    }
  });
  return html;
}

/* ══ 베스트컷(CH1 한 버튼) — PREVIEW 헤더 우측(운영자 260713 배치 확정) · /api/framethumb 발사{fx_chain 베스트 프레임→업스케일→Gemini 4:5 확장 · 수동 유료 = 슛류} → ft_out/<id>/frames.json 폴 → 스틸 스트립 · 소스 사다리 = 메인 발사 동형{URL > R2 직업로드(일회용 키 소진·고아 정리·재업로드) > base64 ≤30MB} ══ */
$('#ftGo').addEventListener('click', async e=>{
  const b=e.currentTarget, st=$('#cstatus');
  if(b.disabled) return;
  const url=$('#url').value.trim();
  if(!url && !FILE_B64 && !FILE_R2 && !_lastFile){ st.innerHTML=ERR_SVG+' 영상 URL이나 파일을 넣어줘'; st.classList.add('err'); return; }
  b.disabled=true; b.textContent='추출 중'; st.classList.remove('err'); st.innerHTML='';
  $('#ftRes').innerHTML='';
  const fail=m=>{ st.innerHTML=ERR_SVG+' '+esc(String(m)); st.classList.add('err'); b.disabled=false; b.textContent='베스트컷'; };
  if(url && FILE_R2){ nmUpDrop(FILE_R2); FILE_R2=''; }   // URL 발사 = 첨부 R2 키 미소비 → 고아 정리(메인 발사 관례 계승)
  if(!url && !FILE_B64 && !FILE_R2 && _lastFile){   // 소진된 R2 키 재업로드(메인 발사 동형 — 러너가 잡 끝 원본 삭제 = 일회용)
    const f=_lastFile;
    try{ fileSlotPct(f,0); const up=await nmUpload(f,p=>{ if(_lastFile===f) fileSlotPct(f,p); }); FILE_R2=up.key; fileSlotName(f); }
    catch(err){ return fail('업로드 실패 — 다시 눌러줘'); }
  }
  const FT_O={n:2,scale:2,ar:'4:5'};
  const payload = url? {url, opts:FT_O} : FILE_R2? {r2key:FILE_R2, name:FILE_NAME, opts:FT_O} : {fileB64:FILE_B64, name:FILE_NAME, opts:FT_O};
  fetch('/api/framethumb',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)})
    .then(async r=>({r, j:await r.json().catch(()=>null)}))
    .then(({r,j})=>{
      if(!url) FILE_R2='';   // 키 소진/폐기(성공=러너가 잡 끝 원본 삭제 · 실패=죽은 키 재사용 루프 차단 — 다음 발사 = _lastFile 재업로드)
      if(!r.ok||!j||!j.ok) return fail((j&&j.error)||('발사 실패 '+r.status));
      const t0=Date.now();
      (function tick(){
        if(Date.now()-t0>8*60000) return fail('시간 초과 — 잠시 뒤 다시 눌러줘');
        fetch('ft_out/'+j.id+'/frames.json?t='+Date.now()).then(rr=>rr.ok?rr.text():'').then(tx=>{
          let d=null; if(tx&&!/^\s*</.test(tx)){ try{ d=JSON.parse(tx); }catch(_){} }
          if(d&&d.state==='done'){ ftRender(d); b.disabled=false; b.textContent='베스트컷'; return; }
          if(d&&d.state==='failed') return fail(d.error||'추출 실패');
          setTimeout(tick, 7000);
        }).catch(()=>setTimeout(tick, 7000));
      })();
    })
    .catch(()=>{ if(!url) FILE_R2=''; fail('네트워크 오류 — 다시 눌러줘'); });
});
function ftRender(d){
  const res=$('#ftRes'); res.innerHTML='';
  (d.frames||[]).forEach((f,i)=>{
    const it=document.createElement('div'); it.className='ftit';
    const im=document.createElement('img'); im.alt='베스트컷 '+(i+1); im.loading='lazy'; im.src=f.url;
    const dl=document.createElement('button'); dl.type='button'; dl.className='dlbtn ftdl'; dl.setAttribute('aria-label','스틸 저장'); dl.innerHTML=DOWNLOAD_SVG;
    dl.addEventListener('click',()=>{
      const name='bestcut_'+d.id+'_'+(i+1)+'.png';
      const a=document.createElement('a');
      if(/^https:\/\//.test(f.url)) a.href='api/dl?u='+encodeURIComponent(f.url)+'&n='+encodeURIComponent(name);   // R2 = api/dl 프록시(완성 영상 정본 동형)
      else a.href=f.url;   // git 폴백 = 같은 출처 상대경로
      a.download=name; document.body.appendChild(a); a.click(); a.remove();
      dl.classList.add('dl-done');
    });
    it.appendChild(im); it.appendChild(dl); res.appendChild(it);
  });
}

/* ══ 과거 작업 열기(openJob) — 완료 푸시 딥링크(#done=<id>)와 작업 내역 게시판 공용(260712) · video.json → 결과 표시(+자막 편집기 활성) / clips.json → 클립 후보 목록 / error.log → 사유 표시 · 반환 = 볼거리(영상·후보)를 열었는지 ══ */
async function openJob(id){
  EDIT_ID=id;
  const st=$('#cstatus');
  try{
    const r=await fetch('ly_out/'+id+'/video.json?t='+Date.now());
    if(r.ok){ const tx=await r.text();
      if(tx&&!/^\s*</.test(tx)){ let d=null; try{ d=JSON.parse(tx); }catch(e){}
        if(d&&d.url){ showResult(d,0); await editSubsInit(id); return true; }   // 과거 잡도 자막 편집기 활성(B-2 딥링크 동일) · await = 자막 라우팅(#vwrap→#lyBurn) 완료 후 반환 = 포커싱이 최종 화면 잡음
        if(d&&(d.error||d.skip)){ st.innerHTML=ERR_SVG+' '+esc(String(d.error||d.skip)); st.classList.add('err'); return false; } } }
    const rc=await fetch('ly_out/'+id+'/clips.json?t='+Date.now());   // 클리퍼 잡 — 후보 목록 직행(260711)
    if(rc.ok){ const tc=await rc.text();
      if(tc&&!/^\s*</.test(tc)){ let dc=null; try{ dc=JSON.parse(tc); }catch(e){}
        if(dc&&Array.isArray(dc.clips)){ showClips(dc); return true; } } }
    const er=await fetch('ly_out/'+id+'/error.log?t='+Date.now());
    if(er.ok){ const em=await er.text();
      if(em&&em.trim()&&!/^\s*</.test(em)){ st.innerHTML=ERR_SVG+' '+esc(em.trim().slice(0,160)); st.classList.add('err'); return false; } }
    st.textContent='결과를 못 찾았어 — 진행 중이면 완성 후 다시 열어줘';
  }catch(e){ st.textContent='결과 불러오기 실패 — 새로고침해줘'; }
  return false;
}

/* ══ 완료 푸시 딥링크(?done=<id> · 구 #done 호환) — 알림 탭 = 그 작업 결과로 직행+강조(thumb 정본 계승 · 발송 = edit-make 완료 푸시 스텝) ══ */
function edFocusResult(tries){   // 완성 결과 컨테이너로 스크롤+강조 = '그 작업' 핀포인트(thumb flashEl 미러). 우선순위 = 자막영상(#lyBurn) > 편집영상(#vwrap) > 클립(#cliplist) > 자막탭(#lyTabs) > 개요(#out) — editSubsInit(subs.md 라우팅)이 async라 보일 때까지 짧게 폴
  const el=['#lyBurn','#vwrap','#cliplist','#lyTabs','#out'].map(s=>$(s)).find(e=>e&&!e.hidden&&e.offsetParent!==null);
  if(el){ try{ el.scrollIntoView({behavior:LY_RM.matches?'auto':'smooth',block:'center'}); }catch(e){}
    el.classList.add('edfocus'); setTimeout(()=>el.classList.remove('edfocus'),2200); return; }
  if(tries>0) setTimeout(()=>edFocusResult(tries-1),200);   // 아직 라우팅 전 = 재시도(캡 ~1.6s)
}
(function(){
  const q=(location.search.match(/[?&]done=([0-9]{12}-[0-9a-f]{6})\b/)||[])[1];   // ?done= = 정본(Cloudflare Access 재로그인 하드 리다이렉트서 해시는 유실·쿼리는 생존 · thumb 260710)
  const h=(location.hash.match(/^#done=([0-9]{12}-[0-9a-f]{6})$/)||[])[1];        // #done= = 기 발송 알림 호환
  const id=q||h; if(!id) return;
  USER_ACT=true; pendClear();   // 딥링크 = pend 재개보다 우선(그 작업 확정 랜딩)
  (async()=>{ if(await openJob(id)) edFocusResult(8); })();   // 결과 열리면 완성 화면으로 이동+강조
})();

/* ══ 재개(pend) — conv 문법(24h 게이트·폴 창 클램프·신선도 분리) ══ */
(function(){
  const p=pendGet(); if(!p||!p.id||USER_ACT) return;
  if(Date.now()-(p.t0||0)>24*3600e3){ pendClear(); return; }
  const t0c=Math.max(p.t0||0, Date.now()-BUDGET*1000);
  pollEdit(p.id, t0c, (p.t0||0)-90000, p.lbl||'편집 중', p.clip?'clip':'');   // 재개 표기 = 대기 스테이지(wmsg)만 — 버튼 상주 라벨(goWait) 폐지(260712)
})();

render();   // 초기 렌더(빈 스택 = 운영자 260711 stackInit=empty 유지) — ⚠ 구 recipe('reels') 제거 때 이 초기 렌더 트리거까지 사라져 '처리 추가' 시트가 빈 채 열리던 회귀(운영자 260712 스샷 실증) 봉합: 프리필 없이 render()만 복원(스택·시트·eta·요약 전부 이 호출이 첫 페인트)

// ── 작업 내역 게시판(운영자 260712 "이미지 생성기처럼 최근·기존 제작 라이브러리화" · 자막 탭 260707 게시판 원문 계승) — ly_out/index.json(서버측 = 기기간 공유·만료 없음) 로드 · 행 = 일시(KST)·라벨·길이·상태 · 탭 = openJob(과거 산출 상시 재열람 — 종전엔 pend 24h·푸시 딥링크뿐이라 시간 지나면 접근 불가였던 공백 봉합) · 자막-전용(subs) 잡 = 자막 탭 전담이라 제외 ──
(async function(){
  try{
    const r=await fetch('ly_out/index.json?t='+Date.now()); if(!r.ok) return;
    const ct=(r.headers.get('content-type')||'').toLowerCase(); const tx=await r.text();
    if(ct.includes('text/html')||/^\s*</.test(tx)) return;   // SPA 폴백(HTML 200) 무시 = poll 동일 가드
    const jobs=JSON.parse(tx); if(!Array.isArray(jobs)) return;
    const vids=jobs.filter(j=>j&&j.st!=='subs');   // 영상 산출·클립 후보·실패·진행만(자막-전용 잡 제외)
    if(!vids.length) return;   // 빈 목록 = 조용한 공백(§디자인 빈 상태)
    const box=$('#lyJobs'), list=$('#lyJobList'); if(!box||!list) return;
    const ST={done:'완료',clip:'클립 후보',fail:'실패',gen:'진행중'};
    vids.slice(0,60).forEach(j=>{   // 캡 20→60(전체 보관 취지 정합 · 운영자 260712 "항상 기존 작업분" — 인덱스 자체는 만료 없음)
      if(!/^[A-Za-z0-9_-]+$/.test(j.id||'')) return;   // 경로 화이트리스트(복원 정규식과 동일 정신)
      const b=document.createElement('button'); b.type='button'; b.className='lyjob';
      const ts=String(j.ts||'');
      b.innerHTML='<span class="jts"></span><span class="jt"></span><span class="jts jdur"></span><span class="jst"></span>';
      b.querySelector('.jts').textContent=ts.length>=16? ts.slice(5,10)+' '+ts.slice(11,16):'';   // KST 도장 ISO를 문자열 절단 = 'MM-DD HH:MM'(TZ 재해석 함정 0 · §📐 KST)
      b.querySelector('.jt').textContent=j.t||'편집 영상';
      b.querySelector('.jdur').textContent=j.d? mmss(j.d):'';   // 길이 = 시각과 동급 보조정보(.jts 스타일 재사용 = 신규 CSS 0)
      const stEl=b.querySelector('.jst'); stEl.textContent=ST[j.st]||'진행중'; if(ST[j.st]) stEl.classList.add(j.st);
      b.onclick=async()=>{
        if(_polling) return;   // 생성 진행 중 = 진행 UI 보호(자막 탭 LY_GEN 게이트 계승)
        USER_ACT=true;
        if(await openJob(j.id)){   // 결과는 게시판보다 위(vwrap·cliplist)에 그려짐 — 열린 곳으로 시선 이동
          const tgt=(!$('#vwrap').hidden && $('#vwrap'))||(!$('#cliplist').hidden && $('#cliplist'))||null;
          if(tgt) tgt.scrollIntoView({behavior:matchMedia('(prefers-reduced-motion:reduce)').matches?'auto':'smooth',block:'center'});
        }
      };
      list.appendChild(b);
    });
    if(list.children.length){
      box.hidden=false;
      $('#lyJobsCnt').textContent='('+list.children.length+')';
      // 접기 토글 — thumb '이전 제작' histH 로직 계승(기본 접힘 · 펼침 = 스태거 촤르륵 + 섹션 랜딩 · 닫힘 = histOut 후 hidden · 운영자 260712). 닫힘 시 상단 복귀는 미계승(편집 폼 맥락 = 제자리 유지 · 의도 divergence)
      let closeT=null;
      $('#lyJobsH').onclick=()=>{
        const open=list.hidden;
        clearTimeout(closeT); list.classList.remove('closing');   // 닫힘 중 재클릭 = 취소(다시 펼침)
        $('#lyJobsH').setAttribute('aria-expanded',String(open)); box.classList.toggle('open',open);
        const rm=matchMedia('(prefers-reduced-motion:reduce)').matches;
        if(open){ list.hidden=false; requestAnimationFrame(()=>box.scrollIntoView({behavior:rm?'auto':'smooth',block:'start'})); }
        else if(rm){ list.hidden=true; }
        else { list.classList.add('closing'); closeT=setTimeout(()=>{ list.hidden=true; list.classList.remove('closing'); },270); }   // .26s 애니 + 여유(thumb 동값)
      };
    }
  }catch(e){}
})();
</script>
