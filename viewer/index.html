<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c130e">
<title>노뮤트 뉴스 큐레이션</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  :root {
    --bg:#0c130e; --bg2:#0f1812;
    --card:#132017; --card2:#0f1a13;
    --line:rgba(15,253,2,.10); --line2:rgba(234,245,236,.07);
    --fg:#eaf5ec; --mut:#8fa697;
    --accent:#0FFD02; --accent-dim:rgba(15,253,2,.14); --on-accent:#062108;
    --r:18px;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { scrollbar-color:#22332a var(--bg); }
  body {
    margin:0; background:radial-gradient(1200px 500px at 80% -10%, #14241a 0%, var(--bg) 55%);
    color:var(--fg); font:15px/1.6 "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
    "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; letter-spacing:-.2px;
    padding-bottom:env(safe-area-inset-bottom);
  }
  /* ── 헤더 ── */
  header { position:sticky; top:0; z-index:5; background:rgba(12,19,14,.82); backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px); border-bottom:1px solid var(--line2); padding:12px 16px calc(10px); }
  h1 { font-size:17px; font-weight:800; margin:0 0 2px; letter-spacing:-.4px; display:flex; align-items:center; gap:8px; }
  h1 b { color:var(--accent); }
  h1 .dot { width:10px; height:10px; border-radius:3px; background:linear-gradient(135deg,#d8ff3d,var(--accent)); box-shadow:0 0 10px rgba(15,253,2,.5); }
  .wrap { max-width:860px; margin:0 auto; padding:14px 16px 40px; }
  .bar { display:flex; gap:8px; align-items:center; margin-top:10px; flex-wrap:wrap; }
  .bar input, .bar select {
    background:var(--card); color:var(--fg); border:1px solid var(--line2); border-radius:999px;
    padding:9px 16px; font-size:13px; font-family:inherit; outline:none; min-height:38px;
  }
  .bar input { flex:1; min-width:130px; }
  .bar input:focus, .bar select:focus { border-color:var(--accent-dim); box-shadow:0 0 0 3px rgba(15,253,2,.08); }
  .bar select { appearance:none; -webkit-appearance:none; padding-right:14px; }
  .mkall {
    background:linear-gradient(135deg,#3ef777,var(--accent)); color:var(--on-accent); font-weight:800;
    border:none; border-radius:999px; padding:9px 16px; font-size:13px; cursor:pointer; min-height:38px;
    font-family:inherit; box-shadow:0 4px 18px rgba(15,253,2,.22);
  }
  .mkall:active { transform:scale(.97); }
  .meta { color:var(--mut); font-size:12px; margin-left:auto; }

  /* ── 기사 카드 (첨부 디자인 모티브: 다크 그린 패널 + 3열 메타 + 필) ── */
  .card {
    background:linear-gradient(165deg,var(--card) 0%,var(--card2) 100%);
    border:1px solid var(--line); border-radius:var(--r); padding:16px; margin:12px 0;
    cursor:pointer; transition:border-color .15s, transform .1s;
    box-shadow:0 8px 24px rgba(0,0,0,.28), inset 0 1px 0 rgba(234,245,236,.04);
  }
  .card:hover { border-color:rgba(15,253,2,.32); }
  .card:active { transform:scale(.99); }
  .row1 { display:flex; align-items:flex-start; gap:10px; }
  .card .t { font-weight:700; font-size:15px; line-height:1.45; flex:1; }
  .go {
    flex:none; width:32px; height:32px; border-radius:50%; display:grid; place-items:center;
    background:var(--accent-dim); color:var(--accent); font-size:14px; border:1px solid var(--line);
  }
  .card .s { color:var(--mut); font-size:13px; line-height:1.55; margin-top:6px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .kv { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
  .kv div { min-width:0; }
  .kv span { display:block; font-size:11px; color:var(--mut); margin-bottom:2px; }
  .kv b { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; }
  .chips { display:flex; gap:6px; margin-top:12px; flex-wrap:wrap; align-items:center; }
  .chip { font-size:11px; color:var(--mut); border:1px solid var(--line2); border-radius:999px; padding:3px 10px; }
  .pill { font-size:11px; font-weight:800; border-radius:999px; padding:4px 11px; }
  .pill.ok { background:linear-gradient(90deg,#d8ff3d,var(--accent)); color:var(--on-accent); }
  .pill.gen { color:var(--accent); border:1px solid rgba(15,253,2,.4); animation:pulse 1.6s ease-in-out infinite; }
  .pill.bad { color:#ff7b72; border:1px solid rgba(255,123,114,.4); }
  @keyframes pulse { 50% { opacity:.45; } }
  .empty { color:var(--mut); text-align:center; padding:56px 0; }

  /* ── 다이얼로그 (모바일 = 풀스크린 시트) ── */
  dialog {
    width:min(820px,94vw); max-height:88vh; background:var(--bg2); color:var(--fg);
    border:1px solid var(--line); border-radius:20px; padding:0;
  }
  dialog::backdrop { background:rgba(0,0,0,.65); backdrop-filter:blur(2px); }
  .dlg-h { position:sticky; top:0; z-index:2; background:rgba(15,24,18,.92); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line2); padding:12px 16px; display:flex; gap:10px; align-items:center; }
  .dlg-h a { color:var(--accent); font-size:12px; font-weight:700; text-decoration:none;
    border:1px solid var(--line); border-radius:999px; padding:6px 12px; }
  .dlg-h button { margin-left:auto; background:var(--card); color:var(--fg); border:1px solid var(--line2);
    border-radius:999px; padding:6px 14px; font-size:13px; font-family:inherit; cursor:pointer; min-height:34px; }
  .md { padding:8px 18px 26px; }
  .md h1 { font-size:19px; line-height:1.4; letter-spacing:-.4px; }
  .md h2 { font-size:14px; color:var(--accent); border-bottom:1px solid var(--line2); padding-bottom:5px; margin-top:24px; letter-spacing:-.2px; }
  .md h3 { font-size:13px; color:var(--mut); margin:18px 0 6px; font-weight:700; }
  .md a { color:var(--accent); } .md ul { padding-left:18px; }
  .md code { background:#0a110c; padding:1px 5px; border-radius:5px; }
  .md pre { position:relative; background:#0a110c; border:1px solid var(--line); border-radius:14px; padding:13px 14px; margin:10px 0; }
  .md pre code { background:none; padding:0; display:block; white-space:pre-wrap; word-break:break-word;
    font-family:inherit; font-size:14px; line-height:1.7; }
  .copy { position:absolute; top:9px; right:9px; font-size:11px; font-weight:700; background:var(--card);
    color:var(--mut); border:1px solid var(--line2); border-radius:999px; padding:5px 12px; cursor:pointer; font-family:inherit; }
  .copy:hover, .copy.ok { color:var(--accent); border-color:rgba(15,253,2,.4); }

  /* ── 카드뉴스 섹션 ── */
  .mkbtn {
    display:block; width:100%; margin:14px 0 4px; padding:13px; font-size:14px; font-weight:800; font-family:inherit;
    background:linear-gradient(135deg,#3ef777,var(--accent)); color:var(--on-accent);
    border:none; border-radius:999px; cursor:pointer; box-shadow:0 4px 20px rgba(15,253,2,.22);
  }
  .mkbtn:active { transform:scale(.98); }
  .genstat { margin:14px 0 4px; padding:12px 14px; border:1px solid var(--line); border-radius:14px;
    color:var(--mut); font-size:13px; background:var(--card2); }
  .genstat.live { color:var(--accent); border-color:rgba(15,253,2,.3); animation:pulse 1.6s ease-in-out infinite; }
  .cardnote { margin:16px 0 6px; font-size:13px; color:var(--accent); font-weight:700; }
  .gal { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin:8px 0; }
  .gal figure { margin:0; }
  .gal img { width:100%; border-radius:12px; border:1px solid var(--line); display:block; }
  .gal .dl { display:block; text-align:center; font-size:11px; font-weight:700; color:var(--mut);
    text-decoration:none; padding:5px 0; }
  .gal .dl:hover { color:var(--accent); }

  /* ── 모바일 ── */
  @media (max-width:640px) {
    .wrap { padding:10px 12px 40px; }
    header { padding:10px 12px 8px; }
    dialog { width:100vw; max-width:100vw; height:100dvh; max-height:100dvh; margin:0; border-radius:0; border:none; }
    .md { padding:6px 14px 40px; }
    .kv { grid-template-columns:repeat(3,minmax(0,1fr)); }
    .gal { grid-template-columns:repeat(2,1fr); }
  }
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding:0">
    <h1><span class="dot"></span>노<b>뮤트</b> 뉴스 큐레이션</h1>
    <div class="bar">
      <input id="q" type="search" placeholder="제목·매체 검색">
      <select id="day"><option value="">전체 날짜</option></select>
      <button id="mkall" class="mkall" title="카드 미제작 기사 전체 일괄 생성(유료)">🎴 일괄</button>
      <span class="meta" id="meta"></span>
    </div>
  </div>
</header>
<div class="wrap"><div id="list"></div></div>

<dialog id="dlg">
  <div class="dlg-h"><a id="src" target="_blank" rel="noopener">원문 ↗</a><button onclick="dlg.close()">닫기</button></div>
  <div class="md" id="cardsec"></div>
  <div class="md" id="mdbody"></div>
</dialog>

<script>
const $ = s => document.querySelector(s);
let DATA = [];
let CUR = '';   // 열려 있는 기사 file — 자동 갱신 때 다이얼로그 카드 섹션 동기화용
marked.setOptions({ breaks:true });

async function load() {
  try {
    const r = await fetch('articles.json?_=' + Date.now());
    const j = await r.json();
    DATA = j.articles || [];
    $('#meta').textContent = `${j.count}건 · ${(j.generated||'').slice(0,10)}`;
    const sel = $('#day'), keep = sel.value;
    sel.innerHTML = '<option value="">전체 날짜</option>';
    const days = [...new Set(DATA.map(a => a.date).filter(Boolean))].sort().reverse();
    for (const d of days) { const o = document.createElement('option'); o.value=d; o.textContent=d; sel.appendChild(o); }
    sel.value = keep;
  } catch(e) { DATA = []; $('#meta').textContent = 'articles.json 없음'; }
  render();
  if ($('#dlg').open && CUR) {
    const a = DATA.find(x => x.file === CUR);
    if (a) cardSec(a);
  }
}

function render() {
  const q = $('#q').value.trim().toLowerCase();
  const day = $('#day').value;
  const rows = DATA.filter(a =>
    (!day || a.date === day) &&
    (!q || (a.title+a.media).toLowerCase().includes(q)));
  const list = $('#list');
  if (!rows.length) { list.innerHTML = '<div class="empty">결과 없음</div>'; return; }
  list.innerHTML = '';
  rows.forEach(a => {
    const c = document.createElement('div'); c.className='card';
    c.innerHTML = `
      <div class="row1"><div class="t"></div><span class="go">↗</span></div>
      <div class="s"></div>
      <div class="kv">
        ${a.media?`<div><span>매체</span><b>📰 ${esc(a.media)}</b></div>`:''}
        ${a.type?`<div><span>유형</span><b>${esc(a.type)}</b></div>`:''}
        ${a.bias?`<div><span>편향</span><b>${esc(a.bias)}</b></div>`:''}
      </div>
      <div class="chips">
        ${cardChip(a)}
        ${a.date?`<span class="chip">${esc(a.date)}</span>`:''}
        ${a.tags && a.tags!=='해당 없음'?`<span class="chip">${esc(a.tags)}</span>`:''}
      </div>`;
    c.querySelector('.t').textContent = a.title;
    c.querySelector('.s').textContent = a.summary || '';
    c.onclick = () => open(a);
    list.appendChild(c);
  });
}

function open(a) {
  CUR = a.file;
  const md = $('#mdbody');
  md.innerHTML = DOMPurify.sanitize(marked.parse(a.body || ''));
  addCopyButtons(md);
  cardSec(a);
  const src = $('#src'); if (a.url){ src.href=a.url; src.style.display=''; } else src.style.display='none';
  $('#dlg').showModal();
}
// 코드블록마다 복사 버튼 — ```text 복사 박스(자유요약·IG·Thread·썸네일·카드)를 탭 한 번에 복사
function addCopyButtons(root) {
  root.querySelectorAll('pre').forEach(pre => {
    const btn = document.createElement('button');
    btn.className = 'copy'; btn.textContent = '복사';
    btn.onclick = ev => { ev.stopPropagation(); copyBlock(pre, btn); };
    pre.appendChild(btn);
  });
}

// ── 카드뉴스 섹션: 상태별 버튼/로딩/갤러리 ──────────────────────────
const CARD_LABEL = {
  generating:['⏳ 생성중','gen'], done:['🎴 카드 완성','ok'], fired_partial:['🚀 발사됨','gen'],
  text_done:['📝 텍스트','ok'], failed:['⚠️ 실패','bad'],
};
function cardChip(a) {
  const st = a.cards && a.cards.state;
  if (!st) return '';
  const [t, cls] = CARD_LABEL[st] || [st, ''];
  return `<span class="pill ${cls}">${t}</span>`;
}
function cardSec(a) {
  const sec = $('#cardsec'); sec.innerHTML = '';
  const c = a.cards || {}, st = c.state || '';
  if (!st || st === 'failed') {
    if (st === 'failed') sec.insertAdjacentHTML('beforeend',
      `<div class="genstat">⚠️ 직전 카드 제작 실패 — 레포 cards/ 의 error.log 참조</div>`);
    const b = document.createElement('button');
    b.className = 'mkbtn';
    b.textContent = st === 'failed' ? '🎴 카드뉴스 다시 생성 (유료 발사)' : '🎴 카드뉴스 일괄 생성 (유료 발사)';
    b.onclick = () => makeCards(a.file, b);
    sec.appendChild(b);
    return;
  }
  if (st === 'generating') {
    sec.innerHTML = `<div class="genstat live">⏳ 카드 생성 중… 완료되면 여기에 자동으로 뜸(1~2분 단위 갱신)</div>`;
    return;
  }
  const note = {
    done: '🎴 카드뉴스 완성 — 이미지 탭하면 원본, ⬇로 저장',
    fired_partial: '🚀 발사됨 — 이미지 일부/대기 중(Drive에서 계속 생성, 다음 갱신 때 반영)',
    text_done: '📝 카드 텍스트·프롬프트 생성 완료 (이미지 발사는 GDRIVE_SA_JSON 시크릿 등록 후)',
  }[st] || st;
  sec.insertAdjacentHTML('beforeend', `<div class="cardnote">${note}</div>`);
  if (c.images && c.images.length) {
    const gal = document.createElement('div'); gal.className = 'gal';
    gal.innerHTML = c.images.map(p =>
      `<figure><a href="${esc(p)}" target="_blank" rel="noopener"><img src="${esc(p)}" loading="lazy" alt=""></a>
       <a class="dl" href="${esc(p)}" download>⬇ 저장</a></figure>`).join('');
    sec.appendChild(gal);
  }
  if (c.md) {
    const div = document.createElement('div');
    div.innerHTML = DOMPurify.sanitize(marked.parse(c.md));
    addCopyButtons(div);
    sec.appendChild(div);
  }
}
async function makeCards(target, btn) {
  const n = target === 'all'
    ? DATA.filter(a => !a.cards || !a.cards.state || a.cards.state === 'failed').length
    : 1;
  if (target === 'all' && !n) { alert('미제작 기사 없음'); return; }
  if (!confirm(`카드뉴스 ${n}건 일괄 생성 — 유료 발사야(Opus + Gemini·Cloud Run). 진행?`)) return;
  let pass = localStorage.getItem('cardpass') || prompt('카드 생성 암호');
  if (!pass) return;
  try {
    const r = await fetch('api/make-cards', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ article: target === 'all' ? 'all' : target, pass }),
    });
    const j = await r.json().catch(() => ({}));
    if (r.ok && j.ok) {
      localStorage.setItem('cardpass', pass);
      if (btn) btn.outerHTML = `<div class="genstat live">🚀 발사됨 — 워크플로 시작, 1~2분 내 ⏳로 바뀜</div>`;
      else alert(`발사됨 — ${n}건 순차 생성 시작`);
    } else {
      if (r.status === 401) localStorage.removeItem('cardpass');
      alert(j.error || `실패 (${r.status})`);
    }
  } catch (e) { alert('요청 실패: ' + e.message); }
}
async function copyBlock(pre, btn) {
  const code = pre.querySelector('code');
  const text = (code ? code.innerText : pre.innerText).replace(/\n+$/, '');
  try { await navigator.clipboard.writeText(text); }
  catch {
    // 폴백 — dialog가 top layer라 textarea도 dialog 안에 넣어야 선택·복사가 된다
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    $('#dlg').appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
  }
  btn.textContent = '✅ 복사됨'; btn.classList.add('ok');
  setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('ok'); }, 1500);
}
const esc = s => (s||'').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
$('#q').addEventListener('input', render);
$('#day').addEventListener('change', render);
$('#mkall').addEventListener('click', () => makeCards('all', null));
// 자동 갱신 — 생성 중 상태가 커밋→Pages 재배포로 바뀌는 걸 새로고침 없이 반영
setInterval(() => { if (document.visibilityState === 'visible') load(); }, 60000);
load();
</script>
</body>
</html>
