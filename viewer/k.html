<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>영상 프롬프트</title>
<link rel="stylesheet" href="tokens.css">   <!-- 공유 구조토큰(§🎨 STAGE3·index :root 파생·색 제외). 인라인 :root가 팔레트 오버라이드 -->
<style>
  :root { --bg:#121212;   /* 스포티파이 블랙(중립)·운영자 260623 */ --pan:#16171a; --line:#2a2c31; --fg:#e9eaec; --mut:#8b8f98; --accent:#0FFD02; --accent-rgb:15,253,2;   /* index :root 동기 — raw rgba(15,253,2) 박기 차단(분신술 4·8) */ --accent-dim:rgba(var(--accent-rgb),.13); --on-accent:#062108; --press-pico:.55; --press-xs:.82; --press-s:.85; --press-m:.9; --press-l:.95; }
  @media (prefers-reduced-motion:reduce){ :root{ --press-pico:1; --press-xs:1; --press-s:1; --press-m:1; --press-l:1; } }   /* 눌림 토큰 사다리+무효화(index 통일·운영자 260628·분신술10) */
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }   /* 모바일 기본 하늘색 탭 하이라이트 박스 제거 = index:78·thumb:15 전역 계승(체크박스 라벨 등 탭 시 시안 박스 차단·운영자 260629) */
  /* 키보드 포커스 링 — 도구앱 접근성 P0(분신술 10·규약 §8 "2px accent 링") · :focus-visible라 마우스엔 안 뜸 */
  button:focus-visible, a:focus-visible, [tabindex]:focus-visible, [role=button]:focus-visible, label.file:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  /* 스크롤바 = 반투명 검정(중립) — 뉴스 뷰어 통일(index 계승 · 운영자 260626) */
  html { scrollbar-width:thin; scrollbar-color:rgba(0,0,0,.45) transparent; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(0,0,0,.42); border-radius:999px;
    border:2px solid var(--bg); background-clip:padding-box; }
  ::-webkit-scrollbar-thumb:hover { background:rgba(0,0,0,.6); background-clip:padding-box; }
  body { margin:0; background:radial-gradient(125% 70% at 50% -8%, rgba(var(--accent-rgb),.06), transparent 55%) fixed, var(--bg); color:var(--fg); font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:600px; margin:0 auto; padding:18px 16px 70px; }
  h1 { font-size:18px; margin:6px 0 4px; } h1 b { color:var(--accent); }
  .sub { color:var(--mut); font-size:13px; margin:0 0 16px; }
  .sub b { color:var(--accent); font-weight:700; }   /* 비디오 엔진명 = 강조색 */
  label { display:block; font-size:13px; color:var(--mut); margin:14px 0 6px; }
  label:first-of-type { margin-top:0; }
  textarea { width:100%; min-height:150px; padding:12px; background:#0e0f11; border:1px solid var(--line); border-radius:var(--r-s); color:var(--fg); font:inherit; resize:vertical; }
  textarea:focus, input:focus { border-color:rgba(var(--accent-rgb),.35); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.08); outline:none; }
  textarea::placeholder, input::placeholder { color:var(--mut); }
  /* 붙여넣기 = 2A 동그라미, 입력칸 상단 우측 테두리에 중앙정렬 걸침(뉴스요약·썸네일과 통일 · 운영자 260625) */
  .scnwrap { position:relative; }
  .scnclip { position:absolute; top:0; right:14px; transform:translateY(-50%); display:grid; place-items:center; width:26px; height:26px; padding:0; z-index:5; opacity:.6;   /* 스토리 구성 복사/붙여넣기 = opacity 60%(운영자 260625) */
    border-radius:50%; border:1px solid rgba(255,255,255,.17); background:rgba(26,28,26,.3); color:var(--mut); cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
    -webkit-backdrop-filter:blur(13px) saturate(1.3); backdrop-filter:blur(13px) saturate(1.3); -webkit-tap-highlight-color:transparent; transition:transform .12s, color .15s, border-color .15s; }   /* G1 글래스모피즘(260625) */
  .scnclip svg { display:block; width:13px; height:13px; }
  .scnclip::before { content:""; position:absolute; inset:-8px; }
  .scnclip:hover { color:var(--fg); border-color:rgba(255,255,255,.27); }
  .scnclip:active { transform:translateY(-50%) scale(var(--press-s,.85)); color:var(--accent); border-color:rgba(var(--accent-rgb),.6); }
  .scnclip.ok { color:var(--accent); border-color:rgba(255,255,255,.14); }
  .scnclip.scn-pp { right:46px; }                       /* 붙여넣기 = 지우개 좌측·항상 노출(복사로 안 바뀜) · 운영자 260627 */
  .scn-copy { right:78px; }                             /* 복사 = 내용 있을 때만 붙여넣기 좌측에 별도 노출 (운영자 260628 3버튼 분리) */
  .scn-hide { display:none; }                           /* 내용 비면 복사 숨김(붙여넣기·지우개는 유지) */
  .scn-erase { right:14px; }                            /* 지우개 = 최우측 · 누르면 입력 비움→~10초 되돌리기 */
  .scn-erase.scn-off { opacity:.3; pointer-events:none; }   /* 빈칸 = 흐리게·비활성 */
  .scn-erase.scn-undo { color:var(--fg); border-color:rgba(255,255,255,.34); }   /* 지움 직후 ~10초 = 되돌리기(흰 픽토그램·또렷한 링) */
  /* 생성 버튼 = 카드/썸네일 생성 버튼과 통일 = 글래스 고스트(.mkbtn 정합·운영자 260622) */
  .go { width:100%; margin-top:16px; padding:14px; background:rgba(255,255,255,.05); color:var(--accent); border:1px solid var(--line); border-radius:999px; font-weight:800; font-size:14px; font-family:inherit; cursor:pointer; position:relative; overflow:hidden; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; transition:transform .12s ease, background .15s ease, border-color .15s ease; }
  .go:hover { background:rgba(255,255,255,.08); border-color:rgba(var(--accent-rgb),.3); }
  .go:active { transform:scale(.955); background:rgba(var(--accent-rgb),.08); border-color:rgba(var(--accent-rgb),.35); }
  .go:disabled { opacity:.5; cursor:default; transform:none; }
  .go.shake { animation:edshake .42s; }   /* 내용 미입력 = 좌우 흔들림(thumb .go 통일·운영자 260622) */
  @media (prefers-reduced-motion:reduce) { .go.shake { animation:none; } }
  .go.err { background:rgba(255,77,77,.14); color:#ff7a7a; border-color:#ff5d5d; }   /* 미입력 메시지를 버튼 안에 빨강 액티브로 표시(thumb .go.err 통일·운영자 260622) */
  @keyframes edshake { 0%,100%{transform:translateX(0)} 18%{transform:translateX(-4px)} 38%{transform:translateX(4px)} 58%{transform:translateX(-3px)} 78%{transform:translateX(2px)} }
  .go.firing { color:var(--on-accent); pointer-events:none; opacity:1;
    background:linear-gradient(var(--accent),var(--accent)) left/0% 100% no-repeat, linear-gradient(var(--accent-dim),var(--accent-dim));
    animation:goFill .72s linear forwards; }   /* 누르면 버튼 전체를 초록이 좌→우로 채움(구성도 .send.is-fire 정본·260622) */
  @keyframes goFill { from { background-size:0% 100%, 100% 100%; } to { background-size:100% 100%, 100% 100%; } }   /* 0%(퍼센트)+명시 from = 부드러운 보간(0 길이면 끝에서 툭 튐) */
  @media (prefers-reduced-motion:reduce) { .go.firing { animation-duration:.2s; } }
  .chk { display:flex; align-items:center; gap:9px; margin-top:12px; font-size:14px; color:var(--fg); cursor:pointer; }
  /* 레퍼런스 체크 = 수집함 확인 토글(.sc-tg.ack) 체크표시 그대로 계승 — 안 누름 −(회색) → 누름 ✓(초록·한 획 드로우-인) + 글래스 박스 초록 틴트 + 눌림 scale(운영자 260622) */
  .chk input { position:absolute; left:0; width:18px; height:18px; margin:0; opacity:0; cursor:pointer; }
  .chk .cbox { flex:none; width:24px; height:24px; display:grid; place-items:center; border-radius:var(--r-s);
    border:1px solid rgba(255,255,255,.14); background:rgba(8,15,11,.34); color:rgba(255,255,255,.5);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:background .14s, transform .1s, color .14s, border-color .14s; }
  .chk .cbox .ackm { width:15px; height:15px; display:block; }
  .chk .cbox .ackm path { transition:opacity .16s ease, stroke-dashoffset .42s .08s cubic-bezier(.6,0,.2,1); }
  .chk .cbox .sc-dash { stroke:var(--mut); opacity:1; }                                   /* 안 누름 = −(회색·트리아지 .sc-tg.ack 그대로) */
  .chk .cbox .sc-chk { stroke:var(--accent); opacity:0; stroke-dasharray:24; stroke-dashoffset:24; }   /* 누름 = ✓ 한 획 드로우-인(강조 stroke) */
  .chk input:checked + .cbox { border-color:rgba(var(--accent-rgb),.5); background:rgba(var(--accent-rgb),.14); color:var(--accent); }   /* 체크 = 강조 틴트 박스(− → ✓ · 트리아지 통일·운영자 260622) */
  .chk input:checked + .cbox .sc-dash { opacity:0; }
  .chk input:checked + .cbox .sc-chk { opacity:1; stroke-dashoffset:0; }
  .chk:has(input:checked) { color:var(--accent); }   /* 체크 시 라벨도 강조색 */
  .chk:active .cbox { transform:scale(var(--press-m,.9)); }
  .chk input:focus-visible + .cbox { box-shadow:0 0 0 2px rgba(var(--accent-rgb),.45); }
  @media (prefers-reduced-motion:reduce) { .chk .cbox .ackm path { transition:none; } }
  .paid { color:var(--mut); font-size:11px; font-weight:400; }
  .ref { margin:0 0 16px; }
  .ref img { width:100%; border:1px solid var(--line); border-radius:10px; display:block; }
  .ref .cap { color:var(--mut); font-size:12px; margin-top:5px; }
  .status { margin-top:16px; font-size:13px; color:var(--mut); white-space:pre-wrap; }
  .status.err { color:#ff8a8a; }
  .out { margin-top:18px; }
  .out h1.t { font-size:20px; color:var(--fg); margin:18px 0 6px; }
  .out h2 { font-size:16px; color:var(--accent); margin:18px 0 6px; }
  .out h3 { font-size:14px; color:var(--fg); margin:16px 0 6px; }
  .out p { margin:6px 0; color:#cfd2d7; }
  .code { position:relative; background:#0e0f11; border:1px solid var(--line); border-radius:10px; margin:8px 0 14px; }
  .code pre { margin:0; padding:13px; white-space:pre-wrap; word-break:break-word; font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; color:#e9eaec; }
  .code button { position:absolute; top:8px; right:8px; display:grid; place-items:center; width:30px; height:30px; padding:0;
    color:rgba(255,255,255,.92); background:rgba(8,15,11,.4); border:1px solid rgba(255,255,255,.14); border-radius:var(--r-s); cursor:pointer;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:transform .12s, background .15s, color .15s, border-color .15s; }   /* 캐러셀 .sbtn 글래스 아이콘 계승(§📋) */
  .code button svg { display:block; }
  .code button:hover { background:rgba(255,255,255,.16); }
  .code button:active { transform:scale(var(--press-s,.85)); }
  .code button.done { background:var(--accent); color:var(--on-accent); border-color:var(--accent); }
  html.inmodal, html.inmodal body { background:transparent; }   /* 모달(iframe) 안에선 투명 → tooldlg 반투명 글래스 비침 */
  /* 빠른메뉴 = 이미지/자막 도구(#rfab) 계승 — 영상 프롬프트에도: 코어(+) 펼치면 웹 렌더 생성 · 코어 위 '-' 최소화(엄지존·iframe→부모 minimizeTool) · 운영자 260628 */
  #rfab { position:fixed; right:18px; bottom:34%; z-index:70; width:0; height:0; }
  #rfab .rc { position:absolute; right:0; bottom:0; width:54px; height:54px; border-radius:50%; cursor:pointer;
    background:rgba(0,0,0,.34); color:var(--accent); border:1px solid rgba(var(--accent-rgb),.4); display:grid; place-items:center;
    backdrop-filter:blur(14px) saturate(1.3); -webkit-backdrop-filter:blur(14px) saturate(1.3);
    box-shadow:0 10px 26px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.12);
    transition:transform .25s; -webkit-tap-highlight-color:transparent; }
  #rfab.open .rc { transform:rotate(135deg); }
  #rfab .rc svg { width:26px; height:26px; stroke:currentColor; stroke-width:2.6; fill:none; stroke-linecap:round; }
  #rfab .ro { position:absolute; right:7px; bottom:7px; width:35px; height:35px; border-radius:50%; cursor:pointer; color:var(--accent);
    background:rgba(0,0,0,.34); border:1px solid rgba(var(--accent-rgb),.4); backdrop-filter:blur(14px) saturate(1.3); -webkit-backdrop-filter:blur(14px) saturate(1.3);
    display:grid; place-items:center; box-shadow:0 6px 16px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.1);
    opacity:0; transform:translate(0,0) scale(.3); pointer-events:none;
    transition:transform .32s cubic-bezier(.2,.9,.3,1.25), opacity .22s; -webkit-tap-highlight-color:transparent; }
  #rfab .ro svg { width:18px; height:18px; stroke:currentColor; stroke-width:1.9; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  #rfab .ro[hidden] { display:none; }   /* ⚠️ hidden 봉합 — #rfab .ro{display:grid}가 UA [hidden]{display:none}을 명시도로 이겨 무력화 → kGenFab 등 hidden 토글 정합(명시도 1,2,0>1,1,0·!important 불요·평의회 260628·thumb/ly 통일) */
  /* 3버튼 반원 아크(이미지 메뉴 thumb #rfab 동일) — 9시=입력포커스 · 10:30=생성 · 12시=탭전환(운영자 260628) */
  #rfab #kFocusFab { --rp:translate(-66px,-2.5px); }
  #rfab #kGenFab   { --rp:translate(-47.4px,-47.4px); }
  #rfab #kTabFab   { --rp:translate(-2.5px,-66px); }
  #rfab.open .ro { opacity:1; pointer-events:auto; transform:var(--rp,translate(0,-66px)) scale(1); }
  #rfab.open #kGenFab { transition-delay:.06s; }
  #rfab.open #kTabFab { transition-delay:.12s; }
  #rfab .ro:active { transform:var(--rp,translate(0,-66px)) scale(var(--press-m,.9)); }
  #rfab .rmin { position:absolute; right:13px; bottom:62px; width:28px; height:28px; border-radius:50%; cursor:pointer; color:var(--accent);
    background:rgba(0,0,0,.34); border:0; display:grid; place-items:center;
    backdrop-filter:blur(14px) saturate(1.3); -webkit-backdrop-filter:blur(14px) saturate(1.3);
    transition:transform .32s cubic-bezier(.2,.9,.3,1.25), opacity .22s; -webkit-tap-highlight-color:transparent; }   /* 테두리·box-shadow 제거 + 누름=픽토그램 축소(thumb/ly 260628 패턴 동기화 · 분신술 8) */
  #rfab .rmin svg { width:15px; height:15px; stroke:currentColor; stroke-width:2.6; fill:none; stroke-linecap:round; transition:transform .14s cubic-bezier(.2,.9,.3,1.25); }
  #rfab .rmin:active svg { transform:scale(var(--press-pico,.55)); }
  #rfab.open .rmin { opacity:0; transform:translateY(8px) scale(.3); pointer-events:none; }
  @media (prefers-reduced-motion:reduce){ #rfab .rc,#rfab .ro,#rfab .rmin { transition:opacity .15s; } #rfab.open .ro{ transform:var(--rp,translate(0,-66px)); } #rfab.open .rmin{ transform:none; } #rfab .rmin:active svg{ transition:transform .09s; } }
  @media (hover:hover) and (pointer:fine) { #rfab { display:none; } }   /* PC(마우스) = 엄지 빠른메뉴 불필요 → 숨김 */
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('inmodal');</script>
</head>
<body>
<div class="wrap">
  <p class="sub">비디오 엔진: <b>Kling 3.0 Omni</b></p>

  <label>스토리 구성</label>
  <div class="scnwrap"><textarea id="scene" placeholder="내용을 입력해주세요"></textarea><button class="scnclip" id="sceneClip" type="button" aria-label="붙여넣기"></button></div>
  <label class="chk"><input type="checkbox" id="refimage"><span class="cbox" aria-hidden="true"><svg class="ackm" viewBox="0 0 24 24" fill="none" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path class="sc-dash" d="M6 12h12"/><path class="sc-chk" d="M5 13l4 4L19 7"/></svg></span> 레퍼런스 이미지 동시 생성 <span class="paid">· Gemini (최대 15분)</span></label>
  <button class="go" id="go">웹 렌더 생성</button>

  <div class="status" id="status"></div>
  <div class="out" id="out"></div>
</div>

<!-- 빠른메뉴(이미지/자막 도구 #rfab 계승) — 코어(+) 펼치면 웹 렌더 생성 · 코어 위 '-' 최소화 -->
<div id="rfab" aria-label="빠른 메뉴">
  <button class="ro" id="kFocusFab" type="button" title="입력칸으로 (커서 활성화)"><svg viewBox="0 0 24 24"><path d="M7 10l5-5 5 5M7 14l5 5 5-5"/></svg></button>
  <button class="ro" id="kGenFab" type="button" title="웹 렌더 생성"><svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9z"/></svg></button>
  <button class="ro" id="kTabFab" type="button" title="자막 생성기로 전환"><svg viewBox="0 0 24 24"><path d="M4 8h13l-3-3M20 16H7l3 3"/></svg></button>
  <button class="rc" id="rfabCore" type="button" aria-label="빠른 메뉴 열기"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
  <button class="rmin" id="rfabMin" type="button" aria-label="최소화" title="최소화 (창 접기)"><svg viewBox="0 0 24 24"><path d="M6 12h12"/></svg></button>
</div>

<script src="nm-svg.js"></script><!-- 공유 아이콘 SSOT(§🎨 CII P1·운영자 260628) — 인라인 복제 폐지·단일정본 -->
<script>
const $ = s => document.querySelector(s);
const esc = s => s.replace(/[&<>]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[c]));
// 상태문구 픽토그램(§🎨 이모지 금지 · 인라인 vertical-align) — 동적문자열은 esc() 동반 innerHTML만(XSS 가드·운영자 260628)
const PHOTO_SVG = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="M21 16l-5-5L5 20"/></svg>';
// 스토리 구성 칸 = [복사][붙여넣기][지우개] 3버튼 분리 (썸네일 attachCopyPaste 동작 통일·운영자 260628 · 복사=내용시 / 붙여넣기=항상 / 지우개=비움→~10초 되돌리기)
(function () {
  const ta = $('#scene'), b = $('#sceneClip'); if (!ta || !b) return;
  b.classList.add('scn-pp');   // 붙여넣기 = 지우개 좌측(46)·항상 붙여넣기(복사로 안 바뀜)
  const cp = document.createElement('button'); cp.type = 'button'; cp.className = 'scnclip scn-copy scn-hide';   // 복사 = 내용 있을 때만 좌측(78) 별도 노출
  cp.setAttribute('aria-label', '복사'); cp.title = '복사'; b.parentNode.appendChild(cp);
  const er = document.createElement('button'); er.type = 'button'; er.className = 'scnclip scn-erase'; er.setAttribute('aria-label', '입력 지우기'); er.title = '입력 지우기';
  b.parentNode.appendChild(er);
  let undoTimer = null, undoVal = '', prog = false;   // prog = 프로그램적 변경(지움/복원) = 되돌리기창 종료 트리거 아님
  const setIcon = (el, svg, key) => { if (el._icon !== key) { el.innerHTML = svg; el._icon = key; } };   // 동일 아이콘 재대입 안 함 = 타이핑마다 SVG 재생성(번쩍) 차단(분신술 A4·운영자 260628)
  const upd = () => {
    const f = (ta.value || '').trim().length > 0;
    if (!b.classList.contains('ok')) { setIcon(b, PASTE_SVG, 'paste'); b.setAttribute('aria-label', '붙여넣기'); b.title = '붙여넣기'; }   // 붙여넣기 항상
    if (!cp.classList.contains('ok')) { setIcon(cp, COPY_SVG, 'copy'); cp.classList.toggle('scn-hide', !f); }   // 복사 = 내용 있을 때만 노출
    if (!er.classList.contains('scn-undo')) { setIcon(er, ERASE_SVG, 'erase'); er.classList.toggle('scn-off', !f); }
  };
  const exitUndo = () => { if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; } er.classList.remove('scn-undo'); er.innerHTML = ERASE_SVG; er.setAttribute('aria-label', '입력 지우기'); er.title = '입력 지우기'; upd(); };
  er.addEventListener('click', e => { e.preventDefault();
    if (er.classList.contains('scn-undo')) { prog = true; ta.value = undoVal; ta.dispatchEvent(new Event('input', { bubbles: true })); prog = false; try { ta.focus(); } catch {} exitUndo(); return; }
    if (!(ta.value || '').length) return;
    undoVal = ta.value; prog = true; ta.value = ''; ta.dispatchEvent(new Event('input', { bubbles: true })); prog = false; try { ta.focus(); } catch {}
    er.classList.remove('scn-off'); er.classList.add('scn-undo'); er.innerHTML = UNDO_SVG; er.setAttribute('aria-label', '되돌리기'); er.title = '되돌리기 (직전 입력 복원)';
    if (undoTimer) clearTimeout(undoTimer); undoTimer = setTimeout(exitUndo, 10000);
  });
  cp.addEventListener('click', async e => { e.preventDefault();   // 복사 전용(붙여넣기 안 건드림)
    try { await navigator.clipboard.writeText(ta.value); cp.innerHTML = CHECK_SVG; cp._icon = 'check'; cp.classList.add('ok'); setTimeout(() => { cp.classList.remove('ok'); upd(); }, 1200); } catch {}
  });
  b.addEventListener('click', async e => { e.preventDefault();   // 붙여넣기 전용(기존: 교체)
    try { const t = await navigator.clipboard.readText(); if (t) { ta.value = t; ta.dispatchEvent(new Event('input', { bubbles: true })); } } catch {} upd();
  });
  ta.addEventListener('input', () => { if (!prog && undoTimer) exitUndo(); upd(); }); upd();
})();

// 최소 마크다운 렌더: ``` 펜스 = 코드블록(복사 버튼), 그 외 #/##/### 헤딩 + 문단.
function renderMd(md) {
  const parts = md.split('```');
  let html = '';
  parts.forEach((part, i) => {
    if (i % 2 === 1) {                    // 코드블록
      let code = part;
      const nl = code.indexOf('\n');
      const first = nl >= 0 ? code.slice(0, nl).trim() : '';
      if (/^[a-zA-Z]+$/.test(first)) code = code.slice(nl + 1);   // 언어 태그 줄 제거(```text 등)
      code = code.replace(/\s+$/, '');
      const enc = encodeURIComponent(code);
      html += `<div class="code"><button data-c="${enc}" aria-label="복사" title="복사">${COPY_SVG}</button><pre>${esc(code)}</pre></div>`;
    } else {
      part.split('\n').forEach(line => {
        const t = line.trim();
        if (!t) return;
        if (t.startsWith('### ')) html += `<h3>${esc(t.slice(4))}</h3>`;
        else if (t.startsWith('## ')) html += `<h2>${esc(t.slice(3))}</h2>`;
        else if (t.startsWith('# ')) html += `<h1 class="t">${esc(t.slice(2))}</h1>`;
        else html += `<p>${esc(t)}</p>`;
      });
    }
  });
  return html;
}

function wireCopy() {
  document.querySelectorAll('.code button').forEach(b => b.onclick = () => {
    navigator.clipboard.writeText(decodeURIComponent(b.dataset.c)).then(() => {
      b.innerHTML = CHECK_SVG; b.classList.add('done');
      setTimeout(() => { b.innerHTML = COPY_SVG; b.classList.remove('done'); }, 1500);
    });
  });
}

let _curStop = null;   // 현재 진행 폴 중단 핸들 — 재시도(재클릭)로 새 폴 시작 시 옛 폴 멈춰 상태표시 충돌·중복 폴 차단
function poll(outPath, refPath) {
  if (_curStop) _curStop();   // 재시도: 이전 폴 중단
  const t0 = Date.now(), status = $('#status'), out = $('#out');
  const budget = refPath ? 900 : 600;   // 컴팩트 백스톱 — 생성 보통 1~5분, 실패·타임아웃은 error.log로 즉시(아래) → budget은 '워크플로 증발'만 대비. ref有=이미지생성 포함 여유(260619)
  const errPath = outPath.replace(/[^/]+$/, 'error.log');   // 같은 폴더 error.log = kmake 실패 메시지(있으면 즉시 표시 — budget 다 안 기다림·260619)
  let live = true; const stop = () => { live = false; clearInterval(disp); }; _curStop = stop;
  const draw = () => {   // 1초 벽시계 티커 — 표시 초가 실제 시간과 일치(네트워크 폴 5s와 분리·260619)
    if (!live) return;
    const sec = Math.round((Date.now() - t0) / 1000);
    if (sec > budget) { stop(); status.textContent = '시간 초과 — 위 버튼으로 다시 시도해줘(또는 Actions 로그 확인)'; status.classList.add('err'); return; }
    status.innerHTML = WAIT_SVG + ' /k 생성 중… ' + sec + 's' + (refPath ? ' (레퍼런스 이미지 포함 — 최대 ~15분)' : ' (보통 1–3분)');
  };
  const disp = setInterval(draw, 1000); draw();
  const tick = async () => {
    if (!live) return;
    // 1) 실패 먼저 — error.log 뜨면 즉시 에러 표시(budget 다 안 기다림). SPA 폴백(index.html) HTML은 무시.
    try {
      const er = await fetch(errPath + '?t=' + Date.now());
      if (er.ok) {
        const ect = (er.headers.get('content-type') || '').toLowerCase();
        const em = await er.text();
        const eHtml = ect.includes('text/html') || /^\s*<!doctype/i.test(em) || /<html[\s>]/i.test(em.slice(0, 300));
        if (em && em.trim() && !eHtml) { stop(); status.innerHTML = ERR_SVG + ' ' + esc(em.trim()); status.classList.add('err'); out.innerHTML = ''; return; }
      }
    } catch (e) { /* 재시도 */ }
    // 2) 결과 확인
    try {
      const r = await fetch(outPath + '?t=' + Date.now());
      if (r.ok) {
        const ct = (r.headers.get('content-type') || '').toLowerCase();
        const md = await r.text();
        // 결과 md가 아직 없으면 Pages가 index.html(SPA 폴백·200)을 줌 → 결과로 오인 시 '완료 (0s)'에
        // 페이지 HTML 덤프됨. HTML 응답은 무시하고 진짜 마크다운만 통과.
        const isHtml = ct.includes('text/html') || /^\s*<!doctype/i.test(md) || /<html[\s>]/i.test(md.slice(0, 300));
        if (md && md.trim() && !isHtml) {
          stop();
          status.innerHTML = OK_SVG + ' 완료 (' + Math.round((Date.now() - t0) / 1000) + 's)';
          let html = renderMd(md);
          if (refPath) {
            // 직영 레퍼런스: R2 URL(ref.json) 우선 · 없으면 git 폴백(ref.jpg). (Apps Script/Drive 제거·260621)
            let rsrc = refPath;
            try { const jr = await fetch(refPath.replace(/ref\.jpg$/, 'ref.json') + '?t=' + Date.now()); if (jr.ok) { const j = await jr.json(); if (j && j.url) rsrc = j.url; } } catch (e) { /* 폴백 */ }
            const bust = rsrc.includes('?') ? '' : '?t=' + Date.now();
            html = '<div class="ref"><img src="' + rsrc + bust + '" onerror="this.parentElement.style.display=\'none\'"><div class="cap">' + PHOTO_SVG + ' 레퍼런스 이미지</div></div>' + html;
          }
          out.innerHTML = html;
          wireCopy();
          return;
        }
      }
    } catch (e) { /* 아직 — 재시도 */ }
    if (live) setTimeout(tick, 5000);
  };
  tick();
}

function errStatus(m) {   // 전송 막힘 = 메시지를 버튼 안에 빨강 액티브로 띄우며 흔들고 1.7s 뒤 원복(thumb errStatus 통일·운영자 260622)
  const s = $('#status'); if (s) { s.textContent = ''; s.classList.remove('err'); }   // 버튼 밑 별도 메시지 폐지 — 버튼 안에 표시
  const g = document.getElementById('go'); if (!g) return;
  if (!g.dataset.label) g.dataset.label = g.textContent;   // 원래 라벨 보존
  clearTimeout(g._errT); g.classList.remove('firing'); g.removeAttribute('aria-busy');
  g.textContent = m; g.setAttribute('aria-live', 'assertive');   // 메시지 = 버튼 안에
  g.classList.add('err'); g.classList.remove('shake'); void g.offsetWidth; g.classList.add('shake');
  g._errT = setTimeout(() => { g.classList.remove('err', 'shake'); g.textContent = g.dataset.label; }, 1700);
}
$('#go').onclick = async () => {
  const status = $('#status'); status.classList.remove('err'); $('#out').innerHTML = '';
  const scene = $('#scene').value.trim();
  if (!scene) return errStatus('내용을 입력해주세요');   // 빈 입력 = 버튼 안 빨강+흔들림(thumb 통일·운영자 문구)
  { const gb = document.getElementById('go'); gb.classList.remove('firing'); void gb.offsetWidth; gb.classList.add('firing'); setTimeout(() => gb.classList.remove('firing'), 760); }   // 누름 게이지 = 검증 통과 후(헛발사 방지·thumb 통일)
  $('#go').disabled = true; status.textContent = '생성 중…';
  try {
    const refimage = $('#refimage').checked;
    const res = await fetch('/api/k', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ scene, refimage }) });
    const j = await res.json();
    if (!res.ok || j.error) { status.innerHTML = WARN_SVG + ' ' + esc(String(j.error || res.status)); status.classList.add('err'); return; }
    poll(j.out, j.refimage ? j.ref : null);
  } catch (e) {
    status.innerHTML = WARN_SVG + ' 요청 실패: ' + esc(e.message); status.classList.add('err');
  } finally { $('#go').disabled = false; }
};
// 빠른메뉴(thumb/ly #rfab 계승): 코어(+) 토글 · 생성 = 웹 렌더 생성(#go) · '-' = iframe→부모 minimizeTool(동일출처)
(function(){
  const rfab = $('#rfab'), core = $('#rfabCore'), gen = $('#kGenFab'), focusFab = $('#kFocusFab'), tabFab = $('#kTabFab'), rmin = $('#rfabMin');
  if (!rfab || !core) return;
  core.addEventListener('click', e => { e.stopPropagation(); rfab.classList.toggle('open'); });
  document.addEventListener('click', e => { if (!rfab.contains(e.target)) rfab.classList.remove('open'); });
  if (focusFab) focusFab.addEventListener('click', e => { e.stopPropagation(); rfab.classList.remove('open'); const s = $('#scene'); if (s) { try { s.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch (_) {} try { s.focus(); } catch (_) {} } });   // 입력칸 커서 활성화(thumb #rfab2 계승)
  if (gen) gen.addEventListener('click', e => { e.stopPropagation(); rfab.classList.remove('open'); const g = $('#go'); if (g) g.click(); });   // 생성 = 화면 주요 액션(웹 렌더)
  if (tabFab) { if (window.parent === window) { tabFab.style.display = 'none'; }   // 단독(모달 아님) = 탭 없음 → 숨김
    else tabFab.addEventListener('click', e => { e.stopPropagation(); rfab.classList.remove('open'); try { const tabs = parent.document.querySelectorAll('#toolTabs .tooltab'); const other = [...tabs].find(t => !t.classList.contains('on')); if (other) other.click(); } catch (_) {} }); }   // 탭전환 = 부모 비활성 탭 클릭 재사용(영상프롬프트↔자막)
  if (rmin) { if (window.parent === window) { rmin.style.display = 'none'; }   // 단독(모달 아님) = 최소화 무의미 → 숨김
    else rmin.addEventListener('click', e => { e.stopPropagation(); try { if (parent.minimizeTool) parent.minimizeTool(); } catch (_) {} }); }
})();
