<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<!-- 전역 버튼 탭 햅틱 = 폐지(운영자 260706 5차 "PIN 입력 빼고는 진동 넣지 마" — 진동은 index PIN 키패드만) --><!-- 부모(index)와 color-scheme 일치 필수 — 불일치면 크로미움이 투명 iframe에 불투명 흰 캔버스 강제 → 글래스 전부 회색 파손(운영자 260705 실측 · index color-scheme dark 도입과 한 쌍) -->
<title>영상 프롬프트</title>
<link rel="stylesheet" href="tokens.css">   <!-- 공유 구조토큰(§🎨 STAGE3·index :root 파생·색 제외). 인라인 :root가 팔레트 오버라이드 -->
<style>
  :root { --well:#0e0f11;   /* 인셋 웰(입력·코드박스 배경 — 7뷰어 공유 raw 추출 = 동값·픽셀 0 · 평의회 260713 ⑨) */ --bg:#121212;   /* 스포티파이 블랙(중립)·운영자 260623 */ --pan:#16171a; --line:#2a2c31; --fg:#eef7f0; --mut:#8fa697; --accent:#00EED2; --accent-rgb:0,238,210;
    --danger:#e23b2a; --danger-rgb:226,59,42;   /* 역할색 danger = 브랜드 유일 레드(index 동일·감사 260704) */ --warn:#FFE13D;   /* 역할색 warn = 골드레몬(=index accent-4 값 · thumb:15 선례 계승 — 뷰어별 인라인 팔레트 방식·tokens.css 색 제외 · 검증9 260708) */   /* index :root 동기 — raw rgba(0,238,210) 박기 차단(분신술 4·8) */ --accent-dim:rgba(var(--accent-rgb),.13); --on-accent:#032322; }   /* --press-* = tokens.css 상속(인라인 이중정의 제거·감사 260704·comp 기준·회귀0) */
  @media (prefers-reduced-motion:reduce){ :root{ --press-pico:1; --press-xs:1; --press-s:1; --press-m:1; --press-l:1; } }   /* 눌림 토큰 무효화 = 로컬(tokens.css엔 없음·comp 기준) */
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }   /* 모바일 기본 하늘색 탭 하이라이트 박스 제거 = index:78·thumb:15 전역 계승(체크박스 라벨 등 탭 시 시안 박스 차단·운영자 260629) */
  [hidden] { display:none !important; }   /* hidden 속성 = 무조건 승(기저 가드) — 클래스 display(flex/grid/block)가 UA hidden을 이겨 유령 노출되던 계열(#carDl·#carbar·#pushrow·ly 버튼 3종 실측 260710) 원천 종식 · 퇴장 애니는 hidden을 애니 종료 후 부여라 무영향 */
  /* 키보드 포커스 링 — 도구앱 접근성 P0(분신술 10·규약 §8 "2px accent 링") · :focus-visible라 마우스엔 안 뜸 */
  button:focus-visible, a:focus-visible, [tabindex]:focus-visible, [role=button]:focus-visible, label.file:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  /* 스크롤바 = 반투명 검정(중립) — 뉴스 뷰어 통일(index 계승 · 운영자 260626) */
  html { scrollbar-width:thin; scrollbar-color:rgba(0,0,0,.45) transparent; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(0,0,0,.42); border-radius:999px;
    border:2px solid var(--bg); background-clip:padding-box; }
  ::-webkit-scrollbar-thumb:hover { background:rgba(0,0,0,.6); background-clip:padding-box; }
  body { margin:0; background:radial-gradient(125% 70% at 50% -8%, rgba(var(--accent-rgb),.06), transparent 55%) fixed, var(--bg); color:var(--fg); font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:600px; margin:0 auto; padding:18px 16px 70px; }
  h1 { font-size:18px; margin:6px 0 4px; } h1 b { color:var(--accent); }
  .eng { color:var(--accent); font-weight:600; font-size:var(--fs-label); margin-left:9px; }   /* 엔진명 형광 인라인 태그 — 현행 사용처 = 참조 이미지 행(Gemini)뿐(스토리 구성의 비디오 엔진 태그는 개편 P1에서 모델 선택기로 승격 이동 · 재감사10) */
  label { display:block; font-size:var(--fs-label); color:var(--fg); margin:14px 0 6px; }   /* 비-소머리 라벨 베이스(.chk 등) · 소머리는 .fl(흰색800+형광블릿) */
  label.fl { font-weight:var(--fw-x); color:var(--fg); }   /* 소머리 = 흰색(--fg)·800(--fw-x) = 뉴스 .cref-lbl 표준 형광통일(운영자 260629) */
  label.fl::before { content:'• '; color:var(--accent); font-weight:var(--fw-b); }   /* 블릿 = 형광(--accent)·700(--fw-b) · 뉴스 정본 content:'• ' 동일 */
  label:first-of-type { margin-top:0; }
  textarea { width:100%; min-height:96px; padding:12px; background:var(--well); border:1px solid var(--line); border-radius:var(--r-s); color:var(--fg); font:inherit; resize:none; }   /* 리사이즈 핸들 제거(운영자 260629 · 전역) */
  textarea:focus, input:focus { border-color:rgba(var(--accent-rgb),.35); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.08); outline:none; }
  textarea::placeholder, input::placeholder { color:var(--mut); }
  /* 붙여넣기 = 2A 동그라미, 입력칸 상단 우측 테두리에 중앙정렬 걸침(뉴스요약·썸네일과 통일 · 운영자 260625) */
  .scnwrap { position:relative; }
  .scnclip { position:absolute; top:0; right:14px; transform:translateY(-50%); display:grid; place-items:center; width:26px; height:26px; padding:0; z-index:5; opacity:.6;   /* 스토리 구성 복사/붙여넣기 = opacity 60%(운영자 260625) */
    border-radius:50%; border:1px solid rgba(255,255,255,.17); background:rgba(26,28,26,.3); color:var(--mut); cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
    -webkit-backdrop-filter:blur(13px) saturate(1.3); backdrop-filter:blur(13px) saturate(1.3); -webkit-tap-highlight-color:transparent; transition:transform .12s, color .15s, border-color .15s; }   /* G1 글래스모피즘(260625) */
  .scnclip svg { display:block; width:13px; height:13px; }
  .scnclip::before { content:""; position:absolute; inset:-8px; }
  .scnclip:hover { color:var(--fg); border-color:rgba(255,255,255,.27); }
  .scnclip:active { transform:translateY(-50%) scale(var(--press-s,.85)); color:var(--accent); border-color:rgba(var(--accent-rgb),.6); }
  .scnclip.ok { color:var(--accent); border-color:rgba(255,255,255,.14); }
  .scnclip.scn-pp { right:46px; }                       /* 붙여넣기 = 지우개 좌측·항상 노출(복사로 안 바뀜) · 운영자 260627 */
  .scn-copy { right:78px; }                             /* 복사 = 내용 있을 때만 붙여넣기 좌측에 별도 노출 (운영자 260628 3버튼 분리) */
  .scn-hide { display:none; }                           /* 내용 비면 복사 숨김(붙여넣기·지우개는 유지) */
  .scn-erase { right:14px; }                            /* 지우개 = 최우측 · 누르면 입력 비움→~10초 되돌리기 */
  .scn-erase.scn-off { opacity:.3; pointer-events:none; }   /* 빈칸 = 흐리게·비활성 */
  .scn-erase.scn-undo { color:var(--fg); border-color:rgba(255,255,255,.34); }   /* 지움 직후 ~10초 = 되돌리기(흰 픽토그램·또렷한 링) */
  /* 생성 버튼 = 카드/썸네일 생성 버튼과 통일 = 글래스 고스트(.mkbtn 정합·운영자 260622) */
  .go { width:100%; margin-top:16px; padding:12px; background:rgba(255,255,255,.02); color:var(--accent); border:1px solid var(--line); border-radius:999px; font-weight:800; font-size:14px; font-family:inherit; line-height:1; cursor:pointer; position:relative; overflow:hidden; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; transition:transform .12s ease, background .15s ease, border-color .15s ease; }   /* 배경 .05→.02(운영자 260713 B) · padding 18→12 = "9→6 줄어든 만큼"(⅔·33%↓ · 운영자 260713 2차 · 높이 52→40 · 18→12=sp-3→sp-2) + line-height:1 = thumb .go 발사 게이지바 정본 계승(글자 정중앙 dy0 · 8뷰어 통일) */
  /* .go:hover 제거 — 메인 버튼(index .mkbtn) 계승: hover 전경 fill 없음·:active만 피드백(운영자 260629 "마우스 올리면 버튼 전경 뜸" 차단 + 터치 stuck-hover 동시 차단) */
  .go:active { transform:scale(.955); background:rgba(var(--accent-rgb),.08); border-color:rgba(var(--accent-rgb),.35); }
  .go:disabled { opacity:.5; cursor:default; transform:none; }
  .go.shake { animation:edshake .42s; }   /* 내용 미입력 = 좌우 흔들림(thumb .go 통일·운영자 260622) */
  @media (prefers-reduced-motion:reduce) { .go.shake { animation:none; } }
  .go.err { background:rgba(var(--danger-rgb),.14); color:var(--danger); border-color:var(--danger); }   /* 미입력 메시지를 버튼 안에 빨강 액티브로 표시(thumb .go.err 통일·운영자 260622) */
  @keyframes edshake { 0%,100%{transform:translateX(0)} 18%{transform:translateX(-4px)} 38%{transform:translateX(4px)} 58%{transform:translateX(-3px)} 78%{transform:translateX(2px)} }
  .go.firing { color:var(--on-accent); pointer-events:none; opacity:1;
    background:linear-gradient(var(--accent),var(--accent)) left/0% 100% no-repeat, linear-gradient(var(--accent-dim),var(--accent-dim));
    animation:goFill .72s var(--gauge-ease) forwards; }   /* 누르면 버튼 전체를 초록이 좌→우로 채움(구성도 .send.is-fire 정본·260622) */
  @keyframes goFill { from { background-size:0% 100%, 100% 100%; } to { background-size:100% 100%, 100% 100%; } }   /* 0%(퍼센트)+명시 from = 부드러운 보간(0 길이면 끝에서 툭 튐) */
  @media (prefers-reduced-motion:reduce) { .go.firing { animation-duration:.2s; } }
  .chk { display:flex; align-items:center; gap:9px; margin-top:12px; font-size:14px; font-weight:400; color:var(--mut); cursor:pointer; }   /* 옵션 토글 라벨 = 미선택 MUT(섹션 소머리 아님 → 600 아닌 400 · 선택 시 .chk:has(:checked)로 accent · 운영자 260629) */
  /* 레퍼런스 체크 = 수집함 확인 토글(.sc-tg.ack) 체크표시 그대로 계승 — 안 누름 −(회색) → 누름 ✓(초록·한 획 드로우-인) + 글래스 박스 초록 틴트 + 눌림 scale(운영자 260622) */
  .chk input { position:absolute; left:0; width:18px; height:18px; margin:0; opacity:0; cursor:pointer; }
  .chk .cbox { flex:none; width:24px; height:24px; display:grid; place-items:center; border-radius:var(--r-s);
    border:1px solid rgba(255,255,255,.14); background:rgba(8,15,11,.34); color:rgba(255,255,255,.5);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:background .14s, transform .1s, color .14s, border-color .14s; }
  .chk .cbox .ackm { width:15px; height:15px; display:block; }
  .chk .cbox .ackm path { transition:opacity .16s ease, stroke-dashoffset .42s .08s cubic-bezier(.6,0,.2,1); }
  .chk .cbox .sc-dash { stroke:var(--mut); opacity:1; }                                   /* 안 누름 = −(회색·트리아지 .sc-tg.ack 그대로) */
  .chk .cbox .sc-chk { stroke:var(--accent); opacity:0; stroke-dasharray:24; stroke-dashoffset:24; }   /* 누름 = ✓ 한 획 드로우-인(강조 stroke) */
  .chk input:checked + .cbox { border-color:rgba(var(--accent-rgb),.5); background:rgba(var(--accent-rgb),.14); color:var(--accent); }   /* 체크 = 강조 틴트 박스(− → ✓ · 트리아지 통일·운영자 260622) */
  .chk input:checked + .cbox .sc-dash { opacity:0; }
  .chk input:checked + .cbox .sc-chk { opacity:1; stroke-dashoffset:0; }
  .chk:has(input:checked) { color:var(--accent); }   /* 체크 시 라벨도 강조색 */
  .chk:active .cbox { transform:scale(var(--press-m,.9)); }
  .chk input:focus-visible + .cbox { box-shadow:0 0 0 2px rgba(var(--accent-rgb),.45); }
  @media (prefers-reduced-motion:reduce) { .chk .cbox .ackm path { transition:none; } }
  /* 예시 칩(탭-투-필) — 수집함 .sc-tg 글래스 필 계승(배치 승인 · 운영자 260708): 탭 = 빈 입력칸에 예문 채움(발사 없음·편집 전제) / 내용 있으면 흔들림만(덮어쓰기 방지) */
  .seedrow { display:flex; gap:6px; margin-top:8px; }
  .seed { flex:1; min-width:0; display:grid; place-items:center; height:24px; padding:0 8px; font-size:12px; font-weight:600; cursor:pointer;
    border-radius:9px; border:1px solid rgba(255,255,255,.14); background:rgba(8,15,11,.34); color:rgba(255,255,255,.78);
    backdrop-filter:blur(var(--blur-s)) ; -webkit-backdrop-filter:blur(var(--blur-s)); transition:background .14s, transform .1s, color .14s, border-color .14s;   /* blur = 구조토큰(--blur-s 8px — .sc-tg 원본 blur8과 동값 계승·raw 증가 0) */
    font-family:inherit; -webkit-tap-highlight-color:transparent; }
  .seed:active { transform:scale(var(--press-m,.9)); color:var(--accent); border-color:rgba(var(--accent-rgb),.5); }
  .seed.shake { animation:edshake .42s; }
  @media (prefers-reduced-motion:reduce){ .seed.shake { animation:none; } }
  /* 모델 선택기 + 설정 축(개편 P1 · 운영자 260710 상세 스펙) — .seed(.sc-tg 글래스 필) 패밀리 계승·on=강조 틴트(신규 색 0)
     축 순서 = 비율→화질→프레임→길이(+직접 게이지·장면 분막)→표현1→표현2(+한국웹툰)→표현3 네거티브→오디오(+대사) · 구도/카메라/조명/환경 = AI 전담(축 없음)
     행간 = var(--sp-4)(운영자 "블릿 선택자끼리 간격 더 벌려" — 구 14px→24px) · 값 칩 = 필 / 표현 계열 = 네모 .sq(운영자 "동그라미 말고 네모") */
  .axrow .opt { color:var(--mut); font-weight:400; font-size:var(--fs-sm); margin-left:7px; }   /* 보조 단위 정보(§🎨 e 예외 · '나머지 자동') — .fl .opt 데드 절 제거·11→12px 가독 상향(재감사6·7) */
  .mgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .mchip { position:relative; display:grid; place-items:center; height:var(--btn); padding:0 6px; font-size:12px; font-weight:var(--fw-b); cursor:pointer;
    border-radius:var(--r-s); border:1px solid rgba(255,255,255,.14); background:rgba(8,15,11,.34); color:rgba(255,255,255,.78); font-family:inherit;
    -webkit-tap-highlight-color:transparent; transition:transform .1s, color .14s, border-color .14s, background .14s; }   /* 높이 = var(--btn)(모델 = 1차 결정 · 감사5 토큰화) · 평면 반투명 필 = 다수 칩 blur 리페인트 절감 의도(.seed 글래스와 구분·감사5 F4) */
  .mchip::before { content:""; position:absolute; inset:-3px 0; }   /* 세로 히트 34→40px(규약 §16 · 모델 1행뿐이라 겹침 0 · 재감사7 F7-3) */
  .mchip:active { transform:scale(var(--press-m,.9)); }
  .mchip.on { color:var(--accent); border-color:rgba(var(--accent-rgb),.5); background:rgba(var(--accent-rgb),.14); }
  .axrow, .axmodel { margin-top:var(--sp-4); }   /* 선택자 행간 확대(운영자 260710 1번 — 모델 라벨 포함 동일 리듬) */
  .axrow label.fl { margin:0 0 7px; }
  .axrow .chk { margin-top:0; }   /* 분막 토글 = 행 리듬은 .axrow가 담당(.chk 기본 12px 상쇄) */
  .axchips { display:flex; flex-wrap:wrap; column-gap:6px; row-gap:10px; }   /* row-gap 10 = ::before ±5px 확장 정확 상쇄(행간 히트 겹침 0 · 재감사7 F7-2) */
  .axchip { position:relative; display:grid; place-items:center; height:var(--btn-sm); padding:0 11px; font-size:12px; font-weight:600; cursor:pointer;
    border-radius:var(--r-pill); border:1px solid rgba(255,255,255,.14); background:rgba(8,15,11,.34); color:rgba(255,255,255,.78); font-family:inherit;
    -webkit-tap-highlight-color:transparent; transition:transform .1s, color .14s, border-color .14s, background .14s; }   /* var(--btn-sm) 30px(감사5·6 토큰화) */
  .axchip::before { content:""; position:absolute; inset:-5px 0; }   /* 세로 히트 확장 = 40px(규약 §16) */
  .axchip:active { transform:scale(var(--press-m,.9)); }
  .axchip.on { color:var(--accent); border-color:rgba(var(--accent-rgb),.5); background:rgba(var(--accent-rgb),.14); }
  .axchip.sq { border-radius:var(--r-s); }   /* 표현 계열 = 네모(더 많이 들어감 · 운영자 260710 2번) */
  /* 길이 = 게이지 상시 + 레일 위 프리셋 라벨 · 직접 = 값 골드레몬(운영자 260710) */
  .lenslide { display:none; align-items:center; gap:10px; margin:10px 2px 0; }
  .lenslide.show { display:flex; }
  .lenslide b.direct { color:var(--warn); }   /* 직접(비프리셋) 값 = 골드레몬 강조 */
  .lmarks { position:relative; height:24px; margin:12px 44px 0 2px; }   /* 우측 44 = 값표시(b 32)+gap 근사 = 레일 폭 정렬 */
  .lmark { position:absolute; top:0; transform:translateX(-50%); padding:2px 9px; border-radius:var(--r-pill); border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--mut); font-size:11px; font-weight:var(--fw-x); font-family:inherit; cursor:pointer; transition:color .15s, border-color .15s, background .15s; }

// 최소 마크다운 렌더: ``` 펜스 = 코드블록(복사 버튼), 그 외 #/##/### 헤딩 + 문단.
function renderMd(md) {
  const parts = md.split('```');
  const unbal = parts.length % 2 === 0;   // 펜스 홀수(닫힘 누락·산문 속 리터럴 ```) = 마지막 세그먼트를 코드 취급하면 이후 문서 전체가 pre로 붕괴 → 텍스트로 강등(260707 2차)
  let html = '';
  parts.forEach((part, i) => {
    if (i % 2 === 1 && !(unbal && i === parts.length - 1)) {                    // 코드블록
      let code = part;
      const nl = code.indexOf('\n');
      const first = nl >= 0 ? code.slice(0, nl).trim() : '';
      if (nl >= 0 && (first === '' || (first.length <= 24 && /^[a-zA-Z][a-zA-Z0-9 .:+_-]*$/.test(first)))) code = code.slice(nl + 1);   // 인포스트링 줄 제거 — ```text 외에 ```text 9:16(태그 잔여 복사 누출)·``` 단독(선행 빈 줄)까지 방어(260707 2차 · 실프롬프트 첫 줄은 한국어/@라 오탐 없음, 24자 상한 = 영문 테일 문장 보호)
      code = code.replace(/\s+$/, '');
      const enc = encodeURIComponent(code);
      html += `<div class="code"><button data-c="${enc}" aria-label="복사" title="복사">${COPY_SVG}</button><pre>${esc(code)}</pre></div>`;
    } else {
      part.split('\n').forEach(line => {
        const t = line.trim();
        if (!t) return;
        if (t.startsWith('### ')) html += `<h3>${esc(t.slice(4))}</h3>`;
        else if (t.startsWith('## ')) html += `<h2>${esc(t.slice(3))}</h2>`;
        else if (t.startsWith('# ')) html += `<h1 class="t">${esc(t.slice(2))}</h1>`;
        else if (t.startsWith('@ 순서')) html += `<p class="legend">${esc(t)}</p>`;   // @ 범례 = 본문 mut보다 또렷하게(--fg · k-make.md @절과 짝 · 260707 2차)
        else {

          let txt = t;
          if (/^\|.*\|$/.test(txt)) txt = txt.replace(/^\||\|$/g, '').split('|').map(s => s.trim()).filter(Boolean).join(' · ');
          txt = txt.replace(/\*\*([^*]+)\*\*/g, '$1');
          html += `<p>${esc(txt)}</p>`;
        }
      });
    }
  });
  return html;
}

  ri.addEventListener('change', () => { rm.hidden = !ri.checked || kModel !== 'kling'; if (rm.hidden) { rm.classList.remove('on'); rm.setAttribute('aria-pressed', 'false'); }
    try { localStorage.setItem('k_refimg', ri.checked ? '1' : '0'); } catch (e) {} });   // 체크 영속 = 별도 키(k_form2는 render마다 save()가 새 객체로 재작성 = 편승 시 씻김)   // 참조 생성 꺼지면 다장도 접힘·해제 + 다장 = kling 전용(감사7 F2) · 체크상태 영속(운영자 OFF가 재오픈에 유지 — 기본 ON 불변 · 과금 함정 봉합 · 배선평의회4 ④)
  rm.addEventListener('click', () => { const on = rm.classList.toggle('on'); rm.setAttribute('aria-pressed', String(on)); });
  ri.dispatchEvent(new Event('change'));   // 부팅 동기 — 참조 생성 기본 ON(운영자 260711 refimgDef=on · 세션 단위)이라 다장 노출을 모델에 맞춰 정렬
})();
$('#go').onclick = async () => {
  const status = $('#status'); const g = document.getElementById('go');
  // 폴 진행 중 재클릭 = 재확인 암(260707 2차 · armCancelThumb 재확인 계승): 1탭 = 경고 라벨 4s, 그 안 2탭 = 진짜 재발사(옛 잡은 서버서 계속 돌아 이중 산출 가능 — 오타 수정 재발사 탈출구는 유지)
  if (_curStop && !g._arm) { if (!g.dataset.label) g.dataset.label = g.textContent; g.textContent = '생성 중 — 다시 누르면 재발사'; g._arm = setTimeout(() => { g._arm = null; g.textContent = g.dataset.label; }, 4000); return; }
  if (g._arm) { clearTimeout(g._arm); g._arm = null; g.textContent = g.dataset.label || g.textContent; }
  status.classList.remove('err'); $('#out').innerHTML = '';
  const reroll = _reroll; _reroll = '';   // 읽는 즉시 비움 — 검증 실패·다음 일반 발사에 축 마커 잔류 오염 방지(260708)
  const scene = $('#scene').value.trim();
  if (!scene) return errStatus('내용을 입력해주세요');   // 빈 입력 = 버튼 안 빨강+흔들림(thumb 통일·운영자 문구)
  { const gb = document.getElementById('go'); gb.classList.remove('firing'); void gb.offsetWidth; gb.classList.add('firing'); setTimeout(() => gb.classList.remove('firing'), 760); }   // 누름 게이지 = 검증 통과 후(헛발사 방지·thumb 통일)
  $('#go').disabled = true; status.textContent = '생성 중…'; _fired = true;   // await 전 동기 세팅(재열람 레이스 가드 · 최종감사2 #2)
  try {
    const isReroll = !!reroll;
    const refimage = !isReroll && $('#refimage').checked;   // 리롤 = 참조 재생성 강제 off(Gemini 재과금 + 재생성 = 다른 얼굴 → 정체성 앵커 파괴 — §9-9 ⓒ 정신 · 검증5 F1)
    const refmulti = refimage && $('#refmulti').classList.contains('on');   // 다장 = 참조 생성 on일 때만 유효(api가 마커 부착)
    const res = await fetch('/api/k', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(Object.assign({ scene, refimage, refmulti, reroll }, kPayload())) });   // 모델·설정·대사·분막(개편 P1) — 서버가 화이트리스트 재검증 후 마커 부착
    const j = await res.json();
    if (!res.ok || j.error) { status.innerHTML = WARN_SVG + ' ' + esc(String(j.error || res.status)); status.classList.add('err'); return; }
    poll(j.out, isReroll ? _lastRef : (j.refimage ? j.ref : null));   // 리롤 결과엔 직전 참조를 이월 표시(첫 생성분 재사용 — R2 URL 안정 · 검증5 F1 스펙A)
  } catch (e) {
    status.innerHTML = WARN_SVG + ' 요청 실패: ' + esc(e.message); status.classList.add('err');
  } finally { $('#go').disabled = false; }
};
// 재열람(260707 2차): 닫기·새로고침 = iframe 파기로 결과 증발 → 마지막 결과(TTL 24h)를 재진입 시 복원(index REVISING/loadRevising 선례 · 새 생성 시작 전까지만 — 화면 요소 신설 0·기존 #out/#status 재사용)
(async function restoreLast() {
  try {
    const s = JSON.parse(localStorage.getItem(LKEY) || 'null');
    if (!s || !s.out || Date.now() - (s.ts || 0) > 86400e3) return;
    const r = await fetch(s.out + '?t=' + Date.now()); if (!r.ok) return;
    const ct = (r.headers.get('content-type') || '').toLowerCase(); const md = await r.text();
    const isHtml = ct.includes('text/html') || /^\s*<!doctype/i.test(md) || /<html[\s>]/i.test(md.slice(0, 300));   // SPA 폴백(index.html) 오인 차단 = poll과 동일 가드
    if (!md || !md.trim() || isHtml) return;
    if (_fired || _curStop || $('#out').innerHTML) return;   // 새 생성이 이미 시작·표시됐으면 양보(레이스 가드 — _fired = 발사 await 창 커버·최종감사2 #2)
    const d = new Date(s.ts), p2 = n => String(n).padStart(2, '0');
    $('#status').innerHTML = OK_SVG + ' 지난 결과 · ' + p2(d.getHours()) + ':' + p2(d.getMinutes()) + ' (새로 생성하면 대체)';
    if (s.ref) _lastRef = s.ref;   // 재열람 참조도 이월 슬롯에(리롤 재사용 · 검증5 F1)
    await renderOut(md, s.ref, $('#out'));
  } catch (e) { /* 재열람은 보조 — 실패 무시(다음 생성에 영향 0) */ }
})();
// 빠른메뉴(thumb/ly #rfab 계승): 코어(+) 토글 · 생성 = 웹 렌더 생성(#go) · '-' = iframe→부모 minimizeTool(동일출처)
(function(){
  const rfab = $('#rfab'), core = $('#rfabCore'), gen = $('#kGenFab'), focusFab = $('#kFocusFab'), tabFab = $('#kTabFab'), rmin = $('#rfabMin');
  if (!rfab || !core) return;
  core.addEventListener('click', e => { e.stopPropagation(); rfab.classList.toggle('open'); });
  document.addEventListener('click', e => { if (!rfab.contains(e.target)) rfab.classList.remove('open'); });
  if (focusFab) focusFab.addEventListener('click', e => { e.stopPropagation(); rfab.classList.remove('open'); const s = $('#scene'); if (s) { try { s.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch (_) {} try { s.focus(); } catch (_) {} } });   // 입력칸 커서 활성화(thumb #rfab2 계승)
  if (gen) gen.addEventListener('click', e => { e.stopPropagation(); rfab.classList.remove('open'); const g = $('#go'); if (g) g.click(); });   // 생성 = 화면 주요 액션(웹 렌더)
  if (tabFab) { if (window.parent === window) { tabFab.style.display = 'none'; }   // 단독(모달 아님) = 탭 없음 → 숨김
    else tabFab.addEventListener('click', e => { e.stopPropagation(); rfab.classList.remove('open'); try { const tabs = [...parent.document.querySelectorAll('#toolTabs .tooltab')]; const i = tabs.findIndex(t => t.classList.contains('on')); const next = tabs[(i + 1) % tabs.length]; if (next) next.click(); } catch (_) {} }); }   // 탭전환 = 다음 탭 순환(구 find 첫-비활성은 3탭 체제서 track 도달 불가 — B2 #9 · 260707 2차)
  if (rmin) { if (window.parent === window) { rmin.style.display = 'none'; }   // 단독(모달 아님) = 최소화 무의미 → 숨김
    else rmin.addEventListener('click', e => { e.stopPropagation(); try { if (parent.minimizeTool) parent.minimizeTool(); } catch (_) {} }); }
})();
