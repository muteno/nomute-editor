<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>노뮤트 릴스 자막 — 웹</title>
<style>
  :root { --bg:#0b0b0c; --pan:#16171a; --line:#2a2c31; --fg:#e9eaec; --mut:#8b8f98; --grn:#0FFD02; }
  * { box-sizing:border-box; }
  body { margin:0; background:radial-gradient(125% 70% at 50% -8%, rgba(15,253,2,.06), transparent 55%) fixed, var(--bg); color:var(--fg); font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:600px; margin:0 auto; padding:18px 16px 70px; }
  h1 { font-size:18px; margin:6px 0 4px; } h1 b { color:var(--grn); }
  .sub { color:var(--mut); font-size:13px; margin:0 0 16px; }
  label { display:block; font-size:13px; color:var(--mut); margin:0 0 6px; }
  textarea { width:100%; min-height:150px; padding:12px; background:#0e0f11; border:1px solid var(--line); border-radius:10px; color:var(--fg); font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; resize:vertical; }
  input[type=text] { width:100%; padding:11px; background:#0e0f11; border:1px solid var(--line); border-radius:9px; color:var(--fg); font:inherit; }
  .paid { color:var(--mut); font-size:11px; font-weight:400; }
  .orsep { text-align:center; color:var(--mut); font-size:12px; margin:13px 0; }
  .divider { border:none; border-top:1px solid var(--line); margin:20px 0 6px; }
  .file { display:block; padding:12px; border:1px dashed var(--line); border-radius:9px; text-align:center; color:var(--mut); cursor:pointer; }
  .file.has { color:var(--grn); border-color:var(--grn); border-style:solid; }
  /* 파일타입 색배지 = 카테고리(경제·사회) 칩 계승: 검정 반투명 글래스 + 타입별 글 색만 바꿈 */
  .ftype { display:inline-block; font-size:11px; font-weight:800; letter-spacing:-.2px; line-height:1; vertical-align:middle;
    padding:4px 9px; border-radius:999px; margin-right:7px; background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.1);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
  /* 업로드 게이지 = 뉴스요약 진행바(.prog .seg.cur)의 움직이는 shine 계승(실패 빗금 X) */
  .lybar { height:7px; border-radius:999px; background:rgba(15,253,2,.16); position:relative; overflow:hidden; margin:10px 0 2px; }
  .lybar::after { content:''; position:absolute; top:0; bottom:0; left:0; width:45%; border-radius:999px;
    background:linear-gradient(90deg,transparent,rgba(15,253,2,.85),transparent);
    transform:translateX(-120%); animation:lyshine 1.35s linear infinite; will-change:transform; }
  @keyframes lyshine { to { transform:translateX(360%); } }
  @media (prefers-reduced-motion:reduce){ .lybar::after { animation:none; } }
  .go { width:100%; margin-top:14px; padding:13px; background:linear-gradient(135deg,#d8ff3d,var(--grn)); color:#07210a; border:none; border-radius:11px; font-weight:800; font-size:15px; cursor:pointer; box-shadow:0 8px 24px rgba(15,253,2,.26), inset 0 1px 0 rgba(255,255,255,.45); transition:transform .12s, box-shadow .15s; }
  .go:hover { transform:translateY(-1px); box-shadow:0 12px 30px rgba(15,253,2,.34), inset 0 1px 0 rgba(255,255,255,.45); }
  .go:active { transform:translateY(0); }
  .go:disabled { opacity:.5; cursor:default; }
  .status { margin-top:16px; font-size:13px; color:var(--mut); white-space:pre-wrap; } .status.err { color:#ff8a8a; }
  .out { margin-top:18px; }
  .out h1.t { font-size:20px; color:var(--fg); margin:18px 0 6px; }
  .out h2 { font-size:16px; color:var(--grn); margin:18px 0 6px; }
  .out h3 { font-size:14px; color:var(--fg); margin:16px 0 6px; }
  .out p { margin:5px 0; color:#cfd2d7; word-break:break-word; }
  .out table { width:100%; border-collapse:collapse; margin:8px 0; font-size:13px; }
  .out td, .out th { border:1px solid var(--line); padding:6px 8px; text-align:left; color:#cfd2d7; }
  .code { position:relative; background:#0e0f11; border:1px solid var(--line); border-radius:10px; margin:8px 0 12px; }
  .code pre { margin:0; padding:13px; white-space:pre-wrap; word-break:break-word; font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; color:#e9eaec; }
  .code button { position:absolute; top:8px; right:8px; display:grid; place-items:center; width:30px; height:30px; padding:0;
    color:rgba(255,255,255,.92); background:rgba(8,15,11,.4); border:1px solid rgba(255,255,255,.14); border-radius:9px; cursor:pointer;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:transform .12s, background .15s, color .15s, border-color .15s; }   /* 캐러셀 .sbtn 글래스 아이콘 계승(§📋) */
  .code button svg { display:block; }
  .code button:hover { background:rgba(255,255,255,.16); }
  .code button:active { transform:scale(.85); }
  .code button.done { background:var(--grn); color:#07210a; border-color:var(--grn); }
  html.inmodal, html.inmodal body { background:transparent; }   /* 모달(iframe) 안에선 투명 → tooldlg 반투명 글래스 비침 */
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('inmodal');</script>
</head>
<body>
<div class="wrap">
  <h1>노뮤트 <b>릴스 자막</b> · 웹</h1>
  <p class="sub">영상 URL 또는 SRT/자막 텍스트 → 짧은 조각 + SNS 감성 의역 → 조각별 복사. 원샷.</p>

  <label>📍 URL <span class="paid">(인스타·틱톡)</span></label>
  <input type="text" id="url" placeholder="https://…  (넣으면 파일 무시)">
  <div class="orsep">— 또는 —</div>
  <label>📍 파일 <span class="paid">(영상·음성·TXT·SRT)</span></label>
  <label class="file" id="fileLab"><span id="fileTxt">탭해서 파일 선택 (영상·음성·TXT·SRT)</span>
    <input type="file" accept="video/*,audio/*,.txt,.srt,.vtt,text/plain" id="file" style="display:none">
  </label>
  <div class="lybar" id="uprog" hidden></div>
  <button class="go" id="go">웹 자막 생성</button>

  <div class="status" id="status"></div>
  <hr class="divider">
  <div class="out" id="out"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const esc = s => s.replace(/[&<>]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[c]));
// 복사 버튼 = 캐러셀 .sbtn 글래스 아이콘 계승(§📋 · 이모지 X · SVG만)
const COPY_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>';
const CHECK_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
// 파일타입 색배지 색(카테고리 팔레트 계승: 테크 시안·경제 노랑·국제 보라·사회 초록)
const FTYPE_COLOR = { '영상':'#7fc8d8', '음성':'#e7c977', 'SRT':'#b79be8', 'TXT':'#7fd0a0' };
function setUploading(msg) {   // 업로드/추출 중 = 게이지 + '업로드 중입니다…'
  $('#fileTxt').textContent = msg || '업로드 중입니다…'; $('#fileLab').classList.remove('has'); $('#uprog').hidden = false;
}
function setBadge(type, name) {   // 업로드 완료 = 타입 색배지 + 파일명 ✓
  $('#uprog').hidden = true;
  $('#fileTxt').innerHTML = `<span class="ftype" style="color:${FTYPE_COLOR[type]}">${type}</span>${esc(name)} ✓`;
  $('#fileLab').classList.add('has');
}

let FILE_B64 = '', FILE_NAME = '', SRT_TEXT = '';   // SRT_TEXT = TXT/SRT 파일 텍스트(STT 건너뜀)
const FILE_MAX = 20 * 1024 * 1024;     // 이하 = 직접 업로드 / 초과 = 브라우저서 음성만 추출
const FILE_HARD = 400 * 1024 * 1024;   // 이 이상은 브라우저 추출도 거부(URL로)

function readB64(blob, name) {   // Blob/File → data URL(base64) 저장
  FILE_NAME = name;
  return new Promise(res => { const r = new FileReader(); r.onload = () => { FILE_B64 = r.result; res(); }; r.readAsDataURL(blob); });
}
function clearFile(msg, isErr) {
  FILE_B64 = ''; FILE_NAME = ''; SRT_TEXT = ''; $('#file').value = ''; $('#uprog').hidden = true;
  $('#fileTxt').textContent = '탭해서 파일 선택 (영상·음성·TXT·SRT)'; $('#fileLab').classList.remove('has');
  if (msg) { const st = $('#status'); st.textContent = msg; st.classList.toggle('err', !!isErr); }
}

// ffmpeg.wasm(싱글스레드) — 20MB↑ 영상에서 음성만 추출(압축). 첫 호출 시에만 CDN 로드. CSP/COEP 불필요.
let FF = null;
async function ffExtractAudio(file, onMsg) {
  if (!FF) {
    onMsg('🎧 ffmpeg 로딩 중… (첫 회 ~25MB · 잠시)');
    const ffBase = 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm';
    const coreBase = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm';   // 모듈 워커는 importScripts 불가 → import() → ESM 코어 필요(UMD✗)
    const { FFmpeg } = await import(`${ffBase}/index.js`);
    const { fetchFile, toBlobURL } = await import('https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js');
    const ff = new FFmpeg();
    // 교차출처(CDN) Worker 생성은 브라우저가 차단 → 같은-출처 blob 워커가 CDN worker.js를 import(그 안 상대 import는 CDN 기준 해석). classWorkerURL 미지정이 'Failed to construct Worker' 원인이었음.
    const classWorkerURL = URL.createObjectURL(new Blob([`import ${JSON.stringify(ffBase + '/worker.js')};`], { type: 'text/javascript' }));
    await ff.load({
      classWorkerURL,
      coreURL: await toBlobURL(`${coreBase}/ffmpeg-core.js`, 'text/javascript'),
      wasmURL: await toBlobURL(`${coreBase}/ffmpeg-core.wasm`, 'application/wasm'),
    });
    FF = { ff, fetchFile };
  }
  const { ff, fetchFile } = FF;
  ff.on('progress', ({ progress }) => onMsg(`🎧 음성 추출 중… ${Math.max(0, Math.min(99, Math.round((progress || 0) * 100)))}%`));
  const ext = (file.name.match(/\.[a-z0-9]+$/i) || ['.mp4'])[0].toLowerCase();
  await ff.writeFile('in' + ext, await fetchFile(file));
  await ff.exec(['-i', 'in' + ext, '-vn', '-ac', '1', '-ar', '16000', '-b:a', '48k', '-y', 'out.mp3']);   // 모노 16k 48kbps mp3(Whisper용·작음)
  const data = await ff.readFile('out.mp3');
  ff.deleteFile('in' + ext).catch(() => {});
  return new Blob([data.buffer], { type: 'audio/mpeg' });
}

$('#file').onchange = async e => {
  const f = e.target.files[0]; if (!f) return;
  FILE_B64 = ''; FILE_NAME = ''; SRT_TEXT = '';   // 새 선택 = 이전 입력 초기화
  const st = $('#status'); st.classList.remove('err'); st.textContent = ''; $('#out').innerHTML = '';
  setUploading();   // 게이지 + '업로드 중입니다…'
  // TXT/SRT/VTT = 텍스트로 읽어 자막 입력(STT 건너뜀) + 아래 내용 출력
  if (/\.(txt|srt|vtt)$/i.test(f.name) || /^text\//.test(f.type)) {
    if (f.size > 2 * 1024 * 1024) { clearFile('텍스트 파일이 너무 큼(2MB↑)', true); return; }
    const text = await f.text();
    SRT_TEXT = text.trim(); FILE_NAME = f.name;
    setBadge(/\.srt$/i.test(f.name) ? 'SRT' : 'TXT', f.name);
    $('#out').innerHTML = '<h3>업로드 내용</h3><div class="code"><pre>' + esc(text) + '</pre></div>';
    st.textContent = '✅ 텍스트(TXT/SRT) — 자막 생성 가능';
    return;
  }
  const isVideo = /^video\//.test(f.type) || /\.(mp4|mov|m4v|webm|mkv|avi|3gp)$/i.test(f.name);
  if (!isVideo) {                                        // 오디오 = 그대로(이미 작음)
    if (f.size > FILE_MAX) { clearFile(`오디오가 커 — ${(f.size / 1048576).toFixed(1)}MB (최대 20MB). URL로.`, true); return; }
    await readB64(f, f.name); setBadge('음성', f.name); return;
  }
  if (f.size > FILE_HARD) { clearFile(`영상이 너무 큼 — ${(f.size / 1048576).toFixed(0)}MB (한계 ${Math.round(FILE_HARD / 1048576)}MB). URL로 시도해줘.`, true); return; }
  // 영상 = 무조건 음성만 추출(길이·용량 무관)
  setUploading('업로드 중입니다… (음성 추출)');
  try {
    const blob = await ffExtractAudio(f, m => { st.textContent = m; });
    if (blob.size > FILE_MAX) { clearFile(`추출 음성도 커(${(blob.size / 1048576).toFixed(1)}MB) — URL로.`, true); return; }
    await readB64(blob, f.name.replace(/\.[^.]+$/, '') + '.mp3');
    setBadge('영상', f.name);
    st.textContent = `✅ 음성 추출 완료 (${(blob.size / 1048576).toFixed(1)}MB) — 자막 생성 가능`;
  } catch (err) {
    if (f.size <= FILE_MAX) {                            // 추출 실패 + 작은 영상 → 그대로 업로드(러너가 추출)
      await readB64(f, f.name); setBadge('영상', f.name);
      st.textContent = '음성 추출 건너뜀 → 영상 그대로 업로드(러너가 추출).';
    } else {
      clearFile('음성 추출 실패 — 영상 URL로 시도해줘 (' + ((err && err.message) ? err.message.slice(0, 40) : 'error') + ')', true);
    }
  }
};

// 최소 마크다운: ``` 코드블록(복사 버튼) · #/##/### 헤딩 · | 표 · 문단.
function renderMd(md) {
  const parts = md.split('```');
  let html = '';
  parts.forEach((part, i) => {
    if (i % 2 === 1) {
      let code = part; const nl = code.indexOf('\n');
      const first = nl >= 0 ? code.slice(0, nl).trim() : '';
      if (/^[a-zA-Z]+$/.test(first)) code = code.slice(nl + 1);
      code = code.replace(/\s+$/, '');
      html += `<div class="code"><button data-c="${encodeURIComponent(code)}" aria-label="복사" title="복사">${COPY_SVG}</button><pre>${esc(code)}</pre></div>`;
    } else {
      const lines = part.split('\n'); let tbl = [];
      const flush = () => {
        if (!tbl.length) return;
        const rows = tbl.filter(r => !/^\s*\|?\s*[-:|\s]+\|?\s*$/.test(r));   // 구분줄 제거
        html += '<table>' + rows.map(r => {
          const cells = r.replace(/^\s*\||\|\s*$/g, '').split('|').map(c => c.trim());
          return '<tr>' + cells.map(c => `<td>${esc(c)}</td>`).join('') + '</tr>';
        }).join('') + '</table>';
        tbl = [];
      };
      lines.forEach(line => {
        const t = line.trim();
        if (t.startsWith('|')) { tbl.push(t); return; }
        flush();
        if (!t) return;
        if (t.startsWith('### ')) html += `<h3>${esc(t.slice(4))}</h3>`;
        else if (t.startsWith('## ')) html += `<h2>${esc(t.slice(3))}</h2>`;
        else if (t.startsWith('# ')) html += `<h1 class="t">${esc(t.slice(2))}</h1>`;
        else if (t === '---') html += '<hr style="border-color:#2a2c31">';
        else html += `<p>${esc(t)}</p>`;
      });
      flush();
    }
  });
  return html;
}

function wireCopy() {
  document.querySelectorAll('.code button').forEach(b => b.onclick = () => {
    navigator.clipboard.writeText(decodeURIComponent(b.dataset.c)).then(() => {
      b.innerHTML = CHECK_SVG; b.classList.add('done');
      setTimeout(() => { b.innerHTML = COPY_SVG; b.classList.remove('done'); }, 1500);
    });
  });
}

function poll(outPath, isUrl) {
  const t0 = Date.now(), status = $('#status'), out = $('#out');
  const budget = isUrl ? 1500 : 600;
  const errPath = outPath.replace(/[^/]+$/, 'error.log');   // 같은 폴더 error.log = 워크플로 실패 메시지(있으면 즉시 표시)
  const tick = async () => {
    const sec = Math.round((Date.now() - t0) / 1000);
    if (sec > budget) { status.textContent = '시간 초과 — Actions 로그 확인 필요'; status.classList.add('err'); out.innerHTML = ''; return; }
    status.textContent = '⏳ 자막 생성 중… ' + sec + 's' + (isUrl ? ' (영상 다운+Whisper STT 포함 — 첫 회 길 수 있음)' : ' (보통 1–3분)');
    // 1) 실패 먼저 — error.log 뜨면 즉시 에러 표시(무한 폴링·'시간 초과' 방지). SPA 폴백(index.html) HTML은 무시.
    try {
      const er = await fetch(errPath + '?t=' + Date.now());
      if (er.ok) {
        const ect = (er.headers.get('content-type') || '').toLowerCase();
        const em = await er.text();
        const eHtml = ect.includes('text/html') || /^\s*<!doctype/i.test(em) || /<html[\s>]/i.test(em.slice(0, 300));
        if (em && em.trim() && !eHtml) { status.textContent = '❌ ' + em.trim(); status.classList.add('err'); out.innerHTML = ''; return; }
      }
    } catch (e) { /* 재시도 */ }
    // 2) 결과(subs.md) 확인
    try {
      const r = await fetch(outPath + '?t=' + Date.now());
      if (r.ok) {
        const ct = (r.headers.get('content-type') || '').toLowerCase();
        const md = await r.text();
        // 결과(subs.md)가 아직 없으면 Pages가 index.html(SPA 폴백·200)을 준다 → 그걸 결과로 오인하면
        // '완료 (0s)'에 페이지 HTML이 통째로 덤프됨. HTML 응답은 무시하고 진짜 마크다운만 통과시킨다.
        const isHtml = ct.includes('text/html') || /^\s*<!doctype/i.test(md) || /<html[\s>]/i.test(md.slice(0, 300));
        if (md && md.trim() && !isHtml) { status.textContent = '✅ 완료 (' + sec + 's)'; out.innerHTML = renderMd(md); wireCopy(); return; }
      }
    } catch (e) { /* 재시도 */ }
    setTimeout(tick, 5000);
  };
  tick();
}

$('#go').onclick = async () => {
  const status = $('#status'); status.classList.remove('err'); $('#out').innerHTML = '';
  const url = $('#url').value.trim();
  if (!url && !FILE_B64 && !SRT_TEXT) { status.textContent = '📍 URL 또는 📍 파일(영상·음성·TXT·SRT) 중 하나는 넣어줘'; status.classList.add('err'); return; }
  $('#go').disabled = true; status.textContent = '생성 중…'; $('#out').innerHTML = '<div class="lybar"></div>';   // 생성 중에도 같은 움직이는 게이지
  try {
    const payload = url ? { url } : SRT_TEXT ? { subs: SRT_TEXT } : { fileB64: FILE_B64, name: FILE_NAME };   // 우선순위 url > 텍스트파일(SRT) > 영상·음성
    const res = await fetch('/api/ly', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(payload) });
    const j = await res.json();
    if (!res.ok || j.error) { status.textContent = '⚠️ ' + (j.error || res.status); status.classList.add('err'); $('#out').innerHTML = ''; return; }
    poll(j.out, j.url || j.file);
  } catch (e) {
    status.textContent = '⚠️ 요청 실패: ' + e.message; status.classList.add('err'); $('#out').innerHTML = '';
  } finally { $('#go').disabled = false; }
};
</script>
</body>
</html>
