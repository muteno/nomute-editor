<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<!-- 부모(index)와 color-scheme 일치 필수 — k.html:7 계승 -->
<title>번역카드</title>
<link rel="stylesheet" href="tokens.css">   <!-- 공유 구조토큰(§🎨 STAGE3·index :root 파생·색 제외). 인라인 :root가 팔레트 오버라이드 -->
<style>
  /* ⚠️ 기틀 계승 원본 = viewer/sb.html(콘티 · 그 원본 = k.html) — 공유 블록은 바이트 동일 유지(운영자 260714 "그대로 기틀 참고·맘대로 생성 금지"). 공용 수정은 k/sb와 동시. */
  :root { --well:#0e0f11;   /* 인셋 웰(입력·코드박스 배경 — 7뷰어 공유 raw 추출 = 동값·픽셀 0 · 평의회 260713 ⑨) */ --bg:#121212;   /* 스포티파이 블랙(중립)·운영자 260623 */ --pan:#16171a; --line:#2a2c31; --fg:#eef7f0; --mut:#8fa697; --accent:#00EED2; --accent-rgb:0,238,210;
    --danger:#e23b2a; --danger-rgb:226,59,42;   /* 역할색 danger = 브랜드 유일 레드(index 동일·감사 260704) */ --warn:#FFE13D;   /* 역할색 warn = 골드레몬(k:12 계승) */ --accent-dim:rgba(var(--accent-rgb),.13); --on-accent:#032322; --line2:rgba(255,255,255,.06); }   /* --press-* = tokens.css 상속(k:12 계승) */
  @media (prefers-reduced-motion:reduce){ :root{ --press-pico:1; --press-xs:1; --press-s:1; --press-m:1; --press-l:1; } }   /* 눌림 토큰 무효화 = 로컬(k:13 계승) */
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }   /* k:14 계승 */
  [hidden] { display:none !important; }   /* hidden 기저 가드(k:15 계승) */
  button:focus-visible, a:focus-visible, [tabindex]:focus-visible, [role=button]:focus-visible, label.file:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }   /* 포커스 링(k:17 계승) */
  html { scrollbar-width:thin; scrollbar-color:rgba(0,0,0,.45) transparent; }   /* 스크롤바 = 반투명 검정(k:19 계승) */
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(0,0,0,.42); border-radius:var(--r-pill);
    border:2px solid var(--bg); background-clip:padding-box; }
  ::-webkit-scrollbar-thumb:hover { background:rgba(0,0,0,.6); background-clip:padding-box; }
  @font-face{font-family:'Pretendard Variable';font-weight:45 920;font-style:normal;font-display:swap;src:local('Pretendard Variable'),url(assets/fonts/pretendard.woff2) format('woff2-variations')}   /* 본문 폰트 = index 정본 이식(sb:26 계승) */
  body { margin:0; background:radial-gradient(125% 70% at 50% -8%, rgba(var(--accent-rgb),.06), transparent 55%) fixed, var(--bg); color:var(--fg); font:15px/1.6 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; letter-spacing:-.2px /* raw-ok: 자간 = index body 정본 exact 계승 */; -webkit-font-smoothing:antialiased; }
  .wrap { max-width:600px; margin:0 auto; padding:var(--sp-3) 16px 70px; }   /* raw-ok: k.html .wrap 동일값 계승 */
  label { display:block; font-size:var(--fs-label); color:var(--fg); margin:14px 0 var(--sp-1); }   /* raw-ok: k.html label 동일값 계승 */
  label.fl { font-weight:var(--fw-x); color:var(--fg); }   /* 소머리 = 흰색·800(k:30 계승) */
  label.fl::before { content:'• '; color:var(--accent); font-weight:var(--fw-b); }   /* 블릿 = 형광(k:31 계승) */
  label:first-of-type { margin-top:0; }
  textarea { width:100%; min-height:96px; padding:var(--sp-2); background:var(--well); border:1px solid var(--line); border-radius:var(--r-s); color:var(--fg); font:inherit; font-size:16px; resize:none; }   /* k:33 계승 · raw-ok: 16px = iOS 자동줌 방지 하한 */
  textarea:focus, input:focus { border-color:rgba(var(--accent-rgb),.35); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.08); outline:none; }
  textarea::placeholder, input::placeholder { color:var(--mut); }
  /* 입력칸 [복사][붙여넣기][지우개] 3버튼 = k.html .scnclip 블록 계승(운영자 260714 "텍스트 입력창엔 항상 토글 버튼 3개") */
  .scnwrap { position:relative; }
  .scnclip { position:absolute; top:0; right:14px; transform:translateY(-50%); display:grid; place-items:center; width:26px; height:26px; padding:0; z-index:5; opacity:.6;
    border-radius:50%; border:1px solid rgba(255,255,255,.17); background:rgba(26,28,26,.3); color:var(--mut); cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
    -webkit-backdrop-filter:blur(var(--blur-m)) saturate(1.3); backdrop-filter:blur(var(--blur-m)) saturate(1.3); -webkit-tap-highlight-color:transparent; transition:transform var(--dur-fast), color var(--dur), border-color var(--dur); }   /* G1 글래스모피즘 · raw-ok: k.html .scnclip 동일값 계승(blur13 — 픽셀 패리티) */
  .scnclip svg { display:block; width:13px; height:13px; }
  .scnclip::before { content:""; position:absolute; inset:-8px; }
  .scnclip:hover { color:var(--fg); border-color:rgba(255,255,255,.27); }
  .scnclip:active { transform:translateY(-50%) scale(var(--press-xs)); }   /* 픽토 소형 버튼 눌림 = press-xs 티어 계승 */
  .scnclip.scn-pp { right:46px; }
  .scn-copy { right:78px; }
  .scn-hide { display:none; }
  .scn-erase { right:14px; }
  .scn-erase.scn-off { opacity:.3; pointer-events:none; }
  .scn-erase.scn-undo { color:var(--fg); border-color:rgba(255,255,255,.34); }
  /* ── 상단 도크 = thumb 카드 생성 정본 이식(운영자 260721 "미리보기 화면·생성 버튼까지 그대로 가져와" — 미리보기+발사 한 블록 상단 고정) ── */
  .topdock { position:sticky; top:0; z-index:6; margin:0 -16px; padding:16px 16px var(--sp-2); background:#121212; }   /* raw-ok: thumb .topdock 정본 exact(mat 액자 16/16/sp-2 · 좌우 -16 브레이크아웃 · 스포티파이 블랙 · z6) */
  .topdock::after { content:''; position:absolute; top:100%; left:0; right:0; height:14px; pointer-events:none; background:linear-gradient(180deg, rgba(18,18,18,.7), rgba(18,18,18,0)); }   /* raw-ok: 하단 페이드 스커트 = thumb .topdock::after exact(h14 · mat RGB 알파변주) */
  .topdock .makerow { margin-top:0; }   /* 미리보기↔발사버튼 gap = .cpprev margin-bottom(sp-2) 전담(thumb 정본) */
  .cpprev { margin:0 0 var(--sp-2); }   /* thumb .cpprev 정본(하단 sp-2 = 발사버튼과 gap) */
  .cpprev-box { position:relative; height:min(29vh,300px); height:min(29svh,300px); width:100%; background:#121212; border:1px solid var(--line); border-radius:var(--r-s); overflow:hidden; }   /* raw-ok: thumb .cpprev-box 정본 exact(CII 「합성 미리보기 쉘」 · 높이캡 29svh/300 · 필러 스포티파이 블랙) */
  #pv { position:absolute; top:0; bottom:0; left:50%; transform:translateX(-50%); height:100%; width:auto; max-width:100%; background:#000; }   /* 산출비 유지 중앙 = thumb .cpprev-stage.post 문법 계승(-50% 기하값 · 스테이지 전경 순수 흑 = 산출 배경 관례) */
  .cpv-empty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--mut); font-size:var(--fs-label); font-weight:var(--fw-b); text-align:center; padding:0 var(--sp-3); }   /* thumb .cpv-empty 정본(빈 상태 정중앙 플렉스) */
  .cpv-photobtn { display:grid; place-items:center; width:var(--btn); height:var(--btn); padding:0; background:none; border:0; cursor:pointer; color:var(--accent); -webkit-tap-highlight-color:transparent; }   /* reuse-ok: thumb .cpv-photobtn 정본 계승(빈 상태 사진 진입점 — 강조색 픽토그램만·플레이트 없음 · 신설 아님) */
  .cpv-photobtn svg { width:26px; height:26px; display:block; transition:transform var(--dur-fast) cubic-bezier(.2,.9,.3,1.25); }   /* raw-ok: 26px·탄성 커브 = thumb .cpv-photobtn svg 정본값 그대로 */
  .cpv-photobtn:active svg { transform:scale(var(--press-xs,.8)); }   /* 누름 = 픽토그램만 축소(thumb 정본) */
  .cpprev-box .cpv-tool { position:absolute; top:6px; width:30px; height:30px; display:grid; place-items:center; padding:0; color:var(--accent); background:var(--bg); border:0; border-radius:var(--r-s); cursor:pointer; z-index:2; filter:drop-shadow(0 1px 3px rgba(0,0,0,.6)); -webkit-tap-highlight-color:transparent; transition:transform var(--dur-fast); }   /* thumb .cpv-tool 정본(이미지 위 불투명 var(--bg) 플레이트 · §디자인 n) */
  .cpprev-box .cpv-tool[hidden] { display:none; }   /* 숨김 재승리(thumb 정본 — display:grid가 UA [hidden]을 이김) */
  .cpprev-box .cpv-tool:active { transform:scale(var(--press-xs,.82)); }
  .cpprev-box .cpv-tool svg { width:15px; height:15px; display:block; }
  #dlBtn { right:6px; }   /* 저장 = 우상단(thumb 도구 우변 정렬 계승) */
  .cpprev-wait { position:absolute; inset:0; z-index:3; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.26); font-size:var(--fs-body); font-weight:var(--fw-x); color:var(--accent); }   /* thumb .cpprev-wait 정본(정중앙·딤 .26) */
  .cpprev-wait .cpw-sec { color:var(--mut); font-weight:var(--fw-b); font-variant-numeric:tabular-nums; margin-left:5px; }   /* raw-ok: thumb .cpw-sec 정본 exact */
  .makerow { display:flex; flex-wrap:wrap; gap:10px; align-items:stretch; margin-top:9px; }   /* raw-ok: thumb .makerow 정본 exact(gap10·mt9 = 발사행 리듬) */
  .makerow > .gowrap { flex:1 1 0; min-width:140px; }   /* 발사 버튼 슬롯(thumb 정본) */
  .makerow > .gowrap .go { margin-top:0; }
  /* ── 생성 버튼 = thumb #go 정본 통이식(발사 게이지바 · 운영자 260721 "생성 버튼까지 그거 그대로") ── */
  .go { width:100%; margin-top:16px; padding:12px; background:rgba(255,255,255,.02); color:var(--accent); border:1px solid var(--line); border-radius:var(--r-pill); font-weight:800; font-size:14px; font-family:inherit; line-height:1; cursor:pointer; position:relative; overflow:hidden; transition:transform var(--dur-fast) ease, background var(--dur) ease, border-color var(--dur) ease; }   /* raw-ok: thumb .go 정본 exact(⭐발사 게이지바 전 뷰어 SSOT) */
  .go:active { transform:scale(.955); background:rgba(var(--accent-rgb),.08); border-color:rgba(var(--accent-rgb),.35); }   /* raw-ok: 발사 버튼 눌림 = 5뷰어 정본 통일 */
  .go:disabled { opacity:.5; cursor:default; transform:none; }
  #go { border-radius:var(--r-m); padding:var(--sp-1); font-size:var(--fs-label); overflow:visible; }   /* 생성 규격 3속성(r-m·sp-1·fs-label) = 발사버튼 게이트 정본(thumb #go 오버라이드 exact · check_refs _LAUNCH_BTNS 등재) */
  #go::before { content:''; position:absolute; left:0; right:0; top:-9px; bottom:-9px; }   /* 탭존 45px(시각 불변) = thumb #go 히트슬롭 정본 exact */
  .go.glive.firing { animation:none;
    background-image:linear-gradient(90deg, rgba(var(--accent-rgb),.34), rgba(var(--accent-rgb),.34)), linear-gradient(90deg, var(--accent-dim), var(--accent-dim));
    background-size:0% 100%, 100% 100%; background-repeat:no-repeat;
    transition:background-size 3.6s var(--gauge-ease); }   /* raw-ok: 발사 게이지 = conv/track .go glive 정본 verbatim(3.6s = 게이지 점근 전용 축 · --gauge-ease SSOT · 2번 레이어 크기 명시 함정 포함) */
  .go.glive.firing.grun { background-size:90% 100%, 100% 100%; }
  .go.glive.firing.gdone { background-size:100% 100%, 100% 100%; transition:background-size .3s linear; }   /* raw-ok: conv gdone 정본 exact(.3s 마감 채움) */
  @media (prefers-reduced-motion:reduce) { .go.glive.firing, .go.glive.firing.gdone { transition-duration:var(--dur-fast); } }
  .go .gtime { margin-left:7px; color:var(--mut); font-weight:var(--fw-b); font-variant-numeric:tabular-nums; }   /* raw-ok: 경과 표기 = conv .gtime 정본 exact */
  .gdots { display:inline-block; width:1.1em; text-align:left; }   /* 처리중 점모션(§디자인 g · index 정본 계승 사본) */
  .gdots i { font-style:normal; opacity:0; animation:gdots 1.4s infinite; }
  .gdots i:nth-child(2) { animation-delay:.22s; } .gdots i:nth-child(3) { animation-delay:.44s; }
  @keyframes gdots { 0% { opacity:0; } 25%,70% { opacity:1; } 95%,100% { opacity:0; } }
  @media (prefers-reduced-motion:reduce) { .gdots i { animation:none; opacity:1; } }
  .geni-sum { color:var(--mut); font-size:var(--fs-label); font-weight:var(--fw-b); line-height:1.5; padding:8px 2px; text-align:right; font-variant-numeric:tabular-nums; }   /* raw-ok: index .geni-sum 동일값 계승(상태줄) */
  .geni-sum b { color:var(--fg); font-weight:var(--fw-b); }
  /* ── 옵션 = thumb 카드 생성 레이아웃 계승(운영자 260721 "옵션 선택도 카드 생성 레이아웃·마진까지") ── */
  .seg { display:flex; gap:6px; }   /* raw-ok: thumb .seg 정본 exact(OPA 세그 — 바이트 계승) */
  .seg button { flex:1; padding:8px; background:linear-gradient(165deg, rgba(44,46,50,.42), rgba(16,17,19,.52)); backdrop-filter:blur(var(--blur-s)) saturate(1.2); -webkit-backdrop-filter:blur(var(--blur-s)) saturate(1.2); border:1px solid rgba(255,255,255,.09); border-radius:var(--r-s); color:var(--fg); cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,.07); transition:border-color var(--dur), background var(--dur); font-family:inherit; }   /* raw-ok: thumb .seg button 정본 exact(글래스 세그) */
  .seg button.on { border-color:rgba(var(--accent-rgb),.5); color:var(--accent); background:linear-gradient(165deg, rgba(var(--accent-rgb),.16), rgba(var(--accent-rgb),.05)); box-shadow:inset 0 1px 0 rgba(255,255,255,.1); }
  .csec { display:flex; align-items:center; gap:6px; font-size:var(--fs-label); font-weight:var(--fw-x); color:var(--fg); margin:16px 0 9px; }   /* raw-ok: thumb .csec 정본 exact(소머리+인라인 컨트롤 한 줄 · 마진 16/9) */
  .csec::before { content:'•'; color:var(--accent); font-weight:var(--fw-b); }
  .csec-d { font-size:12px; font-weight:400; color:var(--mut); }   /* raw-ok: thumb .csec-d 정본(보조 표기) */
  /* 연속값(글자 크기) = 네이티브 range + accent-color(CII 「단극 연속축 = 네이티브 accent-color 정본」) */
  input[type=range] { accent-color:var(--accent); width:130px; margin:0; }
  /* ── 기사 불러오기 = ly 「편집 제작본 불러오기」 피커 정본 계승 ── */
  .lypickrow { display:flex; gap:8px; align-items:center; margin:0 0 10px; }   /* raw-ok: ly .lypickrow 정본 exact */
  .lypick-t { color:var(--mut); font-size:var(--fs-xs); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lypicklist .opt { width:100%; text-align:left; height:auto; padding:8px 11px; line-height:1.4; }   /* raw-ok: ly .lypicklist .opt 정본 exact(목록 행) */
  .opt { flex:none; padding:0 11px; height:30px; border-radius:var(--r-pill); border:1px solid var(--line); background:rgba(255,255,255,.05); color:var(--mut); font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; -webkit-tap-highlight-color:transparent; touch-action:manipulation; transition:transform var(--dur-fast), color var(--dur), border-color var(--dur), background var(--dur); }   /* raw-ok: ly .opt 정본 exact */
  .opt:active { transform:scale(var(--press-l,.95)); }
  @media (hover:hover){ .opt:hover { color:var(--fg); } }
  .opt.on { color:var(--accent); border-color:rgba(var(--accent-rgb),.4); background:rgba(var(--accent-rgb),.08); }
  /* ── 원본 이미지 박스(사진 불러오기 — 발췌 드래그 폐지 = 운영자 260721 재편) ── */
  .srcbox { position:relative; background:var(--well); border:1px dashed var(--line); border-radius:var(--r-s); overflow:hidden; cursor:pointer; }
  .srcbox.hasimg { border-style:solid; }
  .srcbox .empt { display:grid; place-items:center; min-height:110px; color:var(--mut); font-size:var(--fs-label); text-align:center; padding:var(--sp-2); }
  .srcbox img { display:block; width:100%; -webkit-user-select:none; user-select:none; pointer-events:none; }
</style>
</head>
<body>
<div class="wrap">

  <!-- 상단 도크 = 미리보기(번역 결과)+생성 버튼 한 블록 상단 고정(thumb 카드 생성 정본 이식 · 운영자 260721) -->
  <div class="topdock" id="topDock">
    <div class="cpprev">
      <div class="cpprev-box" id="prevBox">
        <canvas id="pv" hidden aria-label="번역 미리보기"></canvas>
        <div class="cpv-empty" id="pvEmpty"><button class="cpv-photobtn" id="pvPhoto" type="button" aria-label="사진 넣기 — 탭=파일 선택" title="사진 넣기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="M21 16l-5-5L5 20"/></svg></button></div>
        <button class="cpv-tool" id="dlBtn" type="button" aria-label="PNG 저장" title="PNG 저장" hidden></button>
        <div class="cpprev-wait" id="pvWait" hidden>번역 중<span class="gdots"><i>.</i><i>.</i><i>.</i></span><span class="cpw-sec" id="pvSec"></span></div>
      </div>
    </div>
    <div class="makerow" id="makeRow"><div class="gowrap"><button type="button" class="go" id="go" disabled>생성</button></div></div>
  </div>
  <div class="geni-sum" id="autoSum" hidden></div>

  <label class="fl">기사 불러오기</label>
  <div class="lypickrow"><button class="opt" type="button" id="artBtn">기사 불러오기</button><span class="lypick-t" id="artT">참고 기사 = 번역 스탠스 근거 (선택 안 해도 됨)</span></div>
  <div class="lypicklist" id="artList" hidden></div>

  <label class="fl">사진 불러오기</label>
  <div class="srcbox" id="srcbox" role="button" tabindex="0" aria-label="원본 이미지 넣기 — 탭=파일 선택, 붙여넣기·드래그 가능">

<script src="nm-svg.js"></script><!-- 공유 아이콘 SSOT(§🎨 CII P1) — 인라인 복제 폐지·단일정본 -->
<script>
'use strict';
/* 번역카드(TR) v2 — 운영자 260721 재편: 강조 문구 선별·번역 = AI(러너 claude·OPUS) 몫 = 수동 밴드 입력 폐지.
   구성 = 기사 불러오기(스탠스 참고) · 사진 불러오기 · 번역 미리보기(thumb 카드 생성 도크 정본) ·
   생성 → 재생성(+재생성 메시지) · 옵션 = 밴드 스타일·글자 크기·폰트(한글/영문 — 클라 렌더 축).
   콘텐츠 산출물 색·서체 상수(발행 콘텐츠 색 축 = UI 팔레트 별개 · CLAUDE.md [16] 팔레트 예외 · track PALETTE 선례):
   캔버스 렌더 전용이라 var() 불가 = 정당 raw. */
const TR_BLACK = '#000';            /* 순수 흑(§🎨 순수 흑/백 정당 raw) */
const TR_WHITE = '#fff';
const TR_GREEN = '#2ee65c';         /* 디스패치풍 형광 초록(발행 콘텐츠 색 — UI 재유입 금지) */
const TR_W = 1080;                  /* 발행 기준 폭 */
const PADX = 64;                    /* 밴드 좌우 여백(1080 기준) */
const FONT_KO = "'Pretendard Variable', Pretendard, -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif";   /* 한글 = 기존 밴드 서체 그대로 */
const FONT_EN = "'Helvetica Neue', Helvetica, Arial, sans-serif";   /* 영문 서체(운영자 260721 폰트 옵션 — 콘텐츠 축 raw · FONT_KO 선례) */

const $ = id => document.getElementById(id);
const srcbox = $('srcbox'), srcImg = $('srcImg'), srcEmpty = $('srcEmpty'), pv = $('pv');

let img = null;                     // HTMLImageElement (natural size)
let RESULT = null;                  // { cut:canvas(오버레이 합성본), band:string(AI 밴드 문구) }
let ART = null;                     // 참고 기사 { t, m, b }
let fired = false;                  // 최초 생성 완료 = 이후 버튼 라벨 '재생성' + 재생성 메시지 노출
let styleV = 'dark', fsV = 40, fontV = 'ko';

/* ── 원본 이미지 로드 ── */
function setImage(file){
  if (!file || !file.type || !file.type.startsWith('image/')) return;
  const url = URL.createObjectURL(file);
  const im = new Image();
  im.onload = () => { img = im; srcImg.src = url; srcImg.hidden = false; srcEmpty.hidden = true;
    srcbox.classList.add('hasimg'); upd(); };
  im.src = url;
}
$('srcFile').addEventListener('change', e => setImage(e.target.files[0]));
srcbox.addEventListener('click', () => $('srcFile').click());
srcbox.addEventListener('keydown', e => { if (e.key === 'Enter') $('srcFile').click(); });
$('pvPhoto').addEventListener('click', () => $('srcFile').click());   // 빈 미리보기 사진 픽토 = 파일 입구 위임(thumb cpv-photobtn 문법)
document.addEventListener('paste', e => {
  const it = [...(e.clipboardData?.items || [])].find(i => i.type.startsWith('image/'));
  if (it) { setImage(it.getAsFile()); e.preventDefault(); }
});
srcbox.addEventListener('dragover', e => e.preventDefault());
srcbox.addEventListener('drop', e => { e.preventDefault(); setImage(e.dataTransfer.files[0]); });

/* ── 옵션(밴드 스타일·글자 크기·폰트) — thumb .seg 문법 · 변경 = 즉시 재합성 ── */
function seg(host, fn){
  host.addEventListener('click', e => {
    const b = e.target.closest('button[data-v]'); if (!b) return;
    host.querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
    fn(b.dataset.v);
  });
}
seg($('styleSeg'), v => { styleV = v; compose(); });
seg($('fontSeg'), v => { fontV = v; compose(); });
$('bandFs').addEventListener('input', e => { fsV = +e.target.value; $('bandFsV').textContent = e.target.value; compose(); });

/* ── 재생성 메시지 3버튼(k 문법: 붙여넣기·복사·지우개+되돌리기 — 구 밴드 입력 블록 계승) ── */
const noteTx = $('noteTx'), noteErase = $('noteErase'), noteCopy = $('noteCopy');
$('notePaste').innerHTML = PASTE_SVG; noteCopy.innerHTML = COPY_SVG; noteErase.innerHTML = ERASE_SVG;
let eraseBak = null, eraseTm = 0;
$('notePaste').addEventListener('click', async () => {
  try { const t = await navigator.clipboard.readText(); if (t) { noteTx.value = t; noteTx.dispatchEvent(new Event('input')); } } catch (_) { noteTx.focus(); }
});
noteCopy.addEventListener('click', () => { try { navigator.clipboard.writeText(noteTx.value); } catch (_) {} });
noteErase.addEventListener('click', () => {
  if (noteErase.classList.contains('scn-undo')) {
    noteTx.value = eraseBak || ''; noteErase.classList.remove('scn-undo'); noteErase.innerHTML = ERASE_SVG; clearTimeout(eraseTm);
  } else {
    eraseBak = noteTx.value; noteTx.value = '';
    noteErase.classList.add('scn-undo'); noteErase.innerHTML = UNDO_SVG;
    eraseTm = setTimeout(() => { noteErase.classList.remove('scn-undo'); noteErase.innerHTML = ERASE_SVG; noteTx.dispatchEvent(new Event('input')); }, 10000);
  }
  noteTx.dispatchEvent(new Event('input'));
});
noteTx.addEventListener('input', () => {
  const has = !!noteTx.value.trim();
  noteCopy.classList.toggle('scn-hide', !has);
  if (!noteErase.classList.contains('scn-undo')) noteErase.classList.toggle('scn-off', !has);
});

/* ── 기사 불러오기 — ly 「편집 제작본 불러오기」 피커 문법 계승 · 목록 = articles.json(뉴스 요약) · 본문 = detail/<file>.json 지연 로드(index 관례) ── */
const artBtn = $('artBtn'), artList = $('artList'), artT = $('artT');
const esc = s => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
const plain = s => String(s || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
artBtn.addEventListener('click', async () => {
  if (!artList.hidden) { artList.hidden = true; return; }
  artBtn.disabled = true;
  try {
    const r = await fetch('articles.json?_=' + Date.now());
    const raw = r.ok ? await r.text() : '[]';
    if (/^\s*</.test(raw)) throw new Error('spa');   // SPA 폴백 HTML 가드(ly lyPick 규약 계승)
    const j = JSON.parse(raw);
    const arts = (Array.isArray(j) ? j : (j.articles || [])).filter(a => a && a.title).slice(0, 8);
    artList.innerHTML = arts.length
      ? arts.map((a, i) => '<button class="opt" type="button" data-art="' + i + '">' + esc(String(a.media || '').slice(0, 14)) + ' · ' + esc(String(a.title).slice(0, 60)) + '</button>').join('')
      : '<span class="lypick-t">불러올 요약이 아직 없어</span>';
    artList._arts = arts; artList.hidden = false;
  } catch (e) { artT.textContent = '목록을 못 불러왔어 — 다시'; }
  artBtn.disabled = false;
});
artList.addEventListener('click', async e => {
  const b = e.target.closest('[data-art]'); if (!b) return;
  const a = (artList._arts || [])[+b.dataset.art]; if (!a) return;
  b.disabled = true;
  let body = '';
  try { const r = await fetch('detail/' + encodeURIComponent(a.file) + '.json?_=' + Date.now()); if (r.ok) { const d = await r.json(); body = plain(d.body).slice(0, 900); } } catch (_) {}
  ART = { t: String(a.title).slice(0, 200), m: String(a.media || '').slice(0, 40), b: body };
  artT.textContent = '참고 — ' + ART.t;
  artList.hidden = true; b.disabled = false;
});

/* ── 밴드 텍스트 파서: *초록* [박스] (기존 그대로) ── */
function parseRuns(line){
  const runs = []; let m = 'n', buf = '';
  const flush = () => { if (buf) { runs.push({ tx: buf, m }); buf = ''; } };
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '*') { flush(); m = (m === 'g') ? 'n' : 'g'; }
    else if (ch === '[' && m === 'n') { flush(); m = 'b'; }
    else if (ch === ']' && m === 'b') { flush(); m = 'n'; }
    else buf += ch;
  }
  flush(); return runs;
}
function tokens(runs){
  const out = [];
  runs.forEach(r => {
    if (r.m !== 'n') { out.push({ tx: r.tx, m: r.m }); return; }   /* 강조 구간 = 통짜 토큰(줄바꿈으로 박스 두 동강 방지 — 운영자 260720 "결과물 이상" 보정) */
    let cur = '';
    const flush = () => { if (cur) { out.push({ tx: cur, m: r.m }); cur = ''; } };
    for (const ch of r.tx) {
      if (ch === ' ') { flush(); out.push({ tx: ' ', m: r.m }); }
      else if (ch.charCodeAt(0) > 0x2E7F) { flush(); out.push({ tx: ch, m: r.m }); }   /* CJK = 글자 단위 줄바꿈 */
      else cur += ch;
    }
    flush();
  });
  return out;
}

/* ── 밴드 합성(기존 레이아웃 엔진 그대로 — 폰트만 옵션 축) ── */
function bandFont(fs){ return `800 ${fs}px ${fontV === 'en' ? FONT_EN : FONT_KO}`; }
function layoutBand(b){
  const mx = TR_W - PADX * 2, lh = Math.round(b.fs * 1.55);
  const mc = document.createElement('canvas').getContext('2d');
  mc.font = bandFont(b.fs);
  const lines = [];
  b.tx.split('\n').forEach(raw => {
    let line = [], w = 0;
    const put = tk => {
      const tw = mc.measureText(tk.tx).width;
      if (w + tw > mx && line.length) { lines.push(line); line = []; w = 0; if (tk.tx === ' ') return; }
      if (tw > mx && tk.tx.length > 1) {   /* 한 줄보다 긴 통짜 강조 = 글자 단위 폴백(스타일 유지) */
        [...tk.tx].forEach(ch => put({ tx: ch, m: tk.m }));
        return;
      }
      line.push({ ...tk, w: tw }); w += tw;
    };
    tokens(parseRuns(raw)).forEach(put);
    lines.push(line);
  });
  const padY = Math.round(b.fs * 1.05);
  return { lines, lh, padY, h: padY * 2 + lines.length * lh };
}
function drawBand(ctx, b, y){
  const L = layoutBand(b);
  const dark = b.style === 'dark';
  ctx.fillStyle = dark ? TR_BLACK : TR_WHITE;
  ctx.fillRect(0, y, TR_W, L.h);
  ctx.font = bandFont(b.fs); ctx.textBaseline = 'alphabetic';
  let ly = y + L.padY + Math.round(b.fs * 0.92);
  L.lines.forEach(line => {
    let x = PADX;
    line.forEach(tk => {   /* 강조 배경(박스·초록)부터 */
      if (tk.m === 'b') { ctx.fillStyle = dark ? TR_WHITE : TR_BLACK; ctx.fillRect(x - 2, ly - b.fs * 0.92, tk.w + 4, b.fs * 1.22); }
      else if (tk.m === 'g' && !dark) { ctx.fillStyle = TR_GREEN; ctx.fillRect(x - 2, ly - b.fs * 0.92, tk.w + 4, b.fs * 1.22); }
      x += tk.w;
    });
    x = PADX;
    line.forEach(tk => {
      ctx.fillStyle = tk.m === 'b' ? (dark ? TR_BLACK : TR_WHITE)
        : tk.m === 'g' ? (dark ? TR_GREEN : TR_BLACK)
        : (dark ? TR_WHITE : TR_BLACK);
      ctx.fillText(tk.tx, x, ly);
      x += tk.w;
    });
    ly += L.lh;
  });
  return L.h;
}
function compose(){
  const has = !!RESULT;
  pv.hidden = !has; $('pvEmpty').hidden = has; $('dlBtn').hidden = !has;
  if (!has) return;
  const bandIt = RESULT.band ? { tx: RESULT.band, style: styleV, fs: fsV } : null;
  const cutH = Math.round(TR_W * RESULT.cut.height / RESULT.cut.width);
  const bH = bandIt ? layoutBand(bandIt).h : 0;
  pv.width = TR_W; pv.height = cutH + bH;
  const ctx = pv.getContext('2d');
  ctx.drawImage(RESULT.cut, 0, 0, TR_W, cutH);
  if (bandIt) drawBand(ctx, bandIt, cutH);
}

/* ── 자동 마커 번역 엔진(운영자 260720 Q274 → 260721 v2: 참고 기사 스탠스 + 재생성 메시지 + AI 밴드) ──
   브라우저 OCR(tesseract.js 지연 로드 · 이미지·좌표는 서버로 안 감) → /api/tr(러너 claude = 강조 선정+한글 번역+밴드 문구)
   → tr_out/<id>/plan.json 폴링 → 형광펜(multiply 50%)+검정 각칩 오버레이 합성(운영자 승인 시안 dsp_ov3 '그대로') + 밴드.
   콘텐츠 산출물 색 상수(캔버스 전용 raw — TR_GREEN 선례·발행 콘텐츠 색 축): */
const OV_MARK = 'rgba(120,240,90,.5)';   /* 형광펜 = 50% 반투명(multiply = 진짜 형광펜 질감) */
const OV_CHIP = 'rgba(18,18,18,.9)';     /* 칩 = 스포티파이 블랙 90%(반전) */
const OV_LINE = 'rgba(255,255,255,.13)';
const OV_TEXT = '#f4f7f4';
const OV_EMPH = '#8dff6a';               /* 칩 안 강조(형광펜 동계열 초록) */
let ocrLines = null;                     // [{i,t,b:{x,y,w,h}}] natural 좌표(브라우저 보관)
let ocrFor = null;                       // OCR 캐시 키(같은 이미지 재생성 = 재판독 생략)
let busy = false;

function loadTess(){   /* OCR 라이브러리 = 누를 때만 지연 로드(평시 페이지 무게 0) */
  if (window.Tesseract) return Promise.resolve();
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload = res; s.onerror = () => rej(new Error('OCR 라이브러리 로드 실패 — 네트워크 확인'));
    document.head.appendChild(s);
  });
}
async function runOcr(){
  await loadTess();
  const w = await Tesseract.createWorker('eng');
  const { data } = await w.recognize(img);
  await w.terminate();
  return (data.lines || [])
    .map((l, i) => ({ i, t: (l.text || '').trim(), b: { x: l.bbox.x0, y: l.bbox.y0, w: l.bbox.x1 - l.bbox.x0, h: l.bbox.y1 - l.bbox.y0 } }))
    .filter(l => l.t.length > 1 && l.b.w > 8 && l.b.h > 6);
}
function chipLayout(ctx, t, fs, maxW){   /* 칩 줄배치 — *별표* 강조 = parseRuns 재사용(초록만) · 단어 단위 줄바꿈 */
  const toks = [];
  parseRuns(t).forEach(r => { r.tx.split(/(\s+)/).forEach(p => { if (p) toks.push({ tx: p, m: r.m === 'g' ? 'g' : 'n' }); }); });
  const lines = [[]]; let w = 0;
  toks.forEach(tk => {
    const tw = ctx.measureText(tk.tx).width;
    if (w + tw > maxW && lines[lines.length - 1].length) { lines.push([]); w = 0; if (/^\s+$/.test(tk.tx)) return; }
    lines[lines.length - 1].push({ ...tk, w: tw }); w += tw;
  });
  const lw = Math.max(...lines.map(l => l.reduce((a, x) => a + x.w, 0)), 1);
  return { lines, w: lw, lh: Math.round(fs * 1.38) };
}
function composeOverlay(plan){
  const s = TR_W / img.naturalWidth;
  const H = Math.round(img.naturalHeight * s);
  const cv = document.createElement('canvas'); cv.width = TR_W; cv.height = H;
  const ctx = cv.getContext('2d');
  ctx.drawImage(img, 0, 0, TR_W, H);
  const bmap = new Map(ocrLines.map(l => [l.i, l.b]));
  ctx.globalCompositeOperation = 'multiply';   /* 형광펜 = 글자 박스에 딱(줄간격 제외 — 승인 시안 260720) */
  ctx.fillStyle = OV_MARK;
  (plan.hl || []).forEach(i => { const b = bmap.get(i); if (!b) return;
    ctx.fillRect(Math.round(b.x * s) - 3, Math.round(b.y * s) - 2, Math.round(b.w * s) + 6, Math.round(b.h * s) + 4); });
  ctx.globalCompositeOperation = 'source-over';
  const fs = 28, padX = 11, padY = 6, maxW = 880;   /* 칩 = 각지게·내용폭·마진 절반(형사사건 조사 뉴스 결 — 승인 시안 값) */
  ctx.font = `800 ${fs}px 'Pretendard Variable', Pretendard, -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif`;
  ctx.textBaseline = 'alphabetic';
  const placed = [];
  (plan.chips || []).forEach(c => {
    const b = bmap.get(c.a);
    const L = chipLayout(ctx, String(c.t || ''), fs, maxW);
    const bw = Math.min(L.w, maxW) + padX * 2, bh = L.lines.length * L.lh + padY * 2;
    let x = b ? Math.max(24, Math.min(Math.round(b.x * s), TR_W - bw - 24)) : 30;
    let y = b ? Math.round((b.y + b.h) * s) + 10 : 30;
    placed.forEach(r => { if (x < r.x + r.w && x + bw > r.x && y < r.y + r.h && y + bh > r.y) y = r.y + r.h + 8; });   /* 겹침 = 아래로 밀기(중요 내용 가림 회피 v1) */
    if (y + bh > H - 8) y = Math.max(8, (b ? Math.round(b.y * s) : H) - bh - 10);   /* 바닥 넘침 = 앵커 위로 */
    placed.push({ x, y, w: bw, h: bh });
    ctx.fillStyle = OV_CHIP; ctx.fillRect(x, y, bw, bh);
    ctx.strokeStyle = OV_LINE; ctx.lineWidth = 1; ctx.strokeRect(x + .5, y + .5, bw - 1, bh - 1);
    let ty = y + padY + Math.round(fs * .82);
    L.lines.forEach(ln => { let tx2 = x + padX;
      ln.forEach(tk => { ctx.fillStyle = tk.m === 'g' ? OV_EMPH : OV_TEXT; ctx.fillText(tk.tx, tx2, ty); tx2 += tk.w; });
      ty += L.lh; });
  });
  return cv;
}
async function pollPlan(id){   /* k_out 폴링 문법 계승 — 커밋→Pages 배포 지연 포함 6분 캡 */
  for (let k = 0; k < 60; k++) {
    await new Promise(r => setTimeout(r, 6000));
    try { const r = await fetch(`tr_out/${id}/plan.json?t=${Date.now()}`, { cache: 'no-store' });
      if (r.ok) return await r.json(); } catch (_) {}
    try { const e = await fetch(`tr_out/${id}/error.log?t=${Date.now()}`, { cache: 'no-store' });
      if (e.ok) throw new Error('AI 생성 실패 — 잠시 후 다시 시도해줘'); } catch (er) { if (String(er.message).startsWith('AI')) throw er; }
  }
  throw new Error('대기 시간 초과(6분) — 잠시 후 다시');
}

/* ── 생성/재생성 발사 — 버튼 = thumb #go 정본 · 게이지 = conv/track glive 정본(gaugeStart/Done/Clear verbatim) ── */
const go = $('go'), autoSum = $('autoSum'), pvWait = $('pvWait'), pvSec = $('pvSec');
function gaugeStart(btn){ if (!btn) return; btn.classList.add('glive', 'firing'); requestAnimationFrame(() => requestAnimationFrame(() => btn.classList.add('grun'))); }
function gaugeDone(btn){ if (btn) btn.classList.add('gdone'); }
function gaugeClear(btn){ if (btn) btn.classList.remove('glive', 'firing', 'grun', 'gdone'); }
function aStat(t){ autoSum.hidden = !t; autoSum.textContent = t || ''; }
let goT0 = 0, goTick = 0;
const fmtT = s => { s = Math.max(0, Math.floor(s)); return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); };
function goBusy(on){
  busy = on;
  if (on) {
    goT0 = Date.now();
    const paint = () => { const t = fmtT((Date.now() - goT0) / 1000);
      go.innerHTML = '번역 중<span class="gdots"><i>.</i><i>.</i><i>.</i></span><span class="gtime">' + t + '</span>';   /* 진행 표기 = conv 발사 문법(라벨+gdots+경과) */
      pvSec.textContent = t; };
    paint(); goTick = setInterval(paint, 1000);
    gaugeStart(go); pvWait.hidden = false;
  } else {
    clearInterval(goTick); goTick = 0;
    go.textContent = fired ? '재생성' : '생성';   /* 2회차부터 = 재생성(운영자 260721 · thumb 문맥 라벨 전환 선례) */
    gaugeClear(go); pvWait.hidden = true;
  }
  upd();
}
go.addEventListener('click', async () => {
  if (!img || busy) return;
  goBusy(true); aStat('');
  try {
    if (ocrFor !== img) { ocrLines = await runOcr(); ocrFor = img; }   /* 같은 이미지 재생성 = OCR 재판독 생략 */
    if (ocrLines.length < 3) throw new Error('글자를 못 읽었어 — 더 선명한 문서 이미지로 시도해줘');
    const ctxPay = {};
    if (ART) ctxPay.art = ART;
    const note = noteTx.value.trim().slice(0, 500);
    if (fired) { ctxPay.redo = 1; if (note) ctxPay.note = note; }
    const r = await fetch('/api/tr', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ lines: ocrLines.map(l => ({ i: l.i, t: l.t })), ctx: ctxPay }) });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || j.error) throw new Error(j.error || ('서버 오류 ' + r.status));
    const plan = j.plan ? j.plan : await pollPlan(j.id);   // 즉답 경로(유료 API 직결 · 운영자 260721 승인 — 수신 즉시 합성) · 없으면 워크플로 폴링 폴백(구독 무료)
    RESULT = { cut: composeOverlay(plan), band: String(plan.band || '').trim() };
    fired = true; $('redoBox').hidden = false;
    gaugeDone(go);
    (document.fonts?.ready || Promise.resolve()).then(compose);
    aStat('✓ 완성 — 미리보기 확인 · 우상단 버튼 = PNG 저장');
  } catch (e) { aStat('✗ ' + e.message); }
  goBusy(false);
});

/* ── 저장(파일명 = KST 강제 · CLAUDE.md [12] — naive 로컬시각 금지) — 미리보기 우상단 도구(thumb .cpv-tool 문법) ── */
const dlBtn = $('dlBtn'); dlBtn.innerHTML = DOWNLOAD_SVG;
dlBtn.addEventListener('click', () => {
  if (!RESULT) return;
  const k = new Date().toLocaleString('sv-SE', { timeZone: 'Asia/Seoul' });   /* KST 강제 포맷 */
  const name = k.slice(0, 10).replace(/-/g, '') + '_' + k.slice(11, 19).replace(/:/g, '') + '_번역카드_v1.png';
  pv.toBlob(bl => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(bl); a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  }, 'image/png');
});

/* ── 갱신 ── */
function upd(){
  go.disabled = !img || busy;
  compose();
}
upd();
</script>
