<title>번역카드</title>

<style>
  /* ⚠️ 기틀 계승 원본 = viewer/sb.html(콘티 · 그 원본 = k.html) — 공유 블록은 바이트 동일 유지(운영자 260714 "그대로 기틀 참고·맘대로 생성 금지"). 공용 수정은 k/sb와 동시. */
  :root { --well:#0e0f11;   /* 인셋 웰(입력·코드박스 배경 — 7뷰어 공유 raw 추출 = 동값·픽셀 0 · 평의회 260713 ⑨) */ --bg:#121212;   /* 스포티파이 블랙(중립)·운영자 260623 */ --pan:#16171a; --line:#2a2c31; --fg:#eef7f0; --mut:#8fa697; --accent:#00EED2; --accent-rgb:0,238,210;
    --danger:#e23b2a; --danger-rgb:226,59,42;   /* 역할색 danger = 브랜드 유일 레드(index 동일·감사 260704) */ --warn:#FFE13D;   /* 역할색 warn = 골드레몬(k:12 계승) */ --accent-dim:rgba(var(--accent-rgb),.13); --on-accent:#032322; --line2:rgba(255,255,255,.06); }   /* --press-* = tokens.css 상속(k:12 계승) */

  body { margin:0; background:radial-gradient(125% 70% at 50% -8%, rgba(var(--accent-rgb),.06), transparent 55%) fixed, var(--bg); color:var(--fg); font:15px/1.6 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; letter-spacing:-.2px /* raw-ok: 자간 = index body 정본 exact 계승 */; -webkit-font-smoothing:antialiased; }
  .wrap { max-width:600px; margin:0 auto; padding:var(--sp-3) 16px 70px; }   /* raw-ok: k.html .wrap 동일값 계승 */

  textarea:focus, input:focus { border-color:rgba(var(--accent-rgb),.35); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.08); outline:none; }

  /* 입력칸 [복사][붙여넣기][지우개] 3버튼 = k.html .scnclip 블록 계승(운영자 260714 "텍스트 입력창엔 항상 토글 버튼 3개") */

    -webkit-backdrop-filter:blur(var(--blur-m)) saturate(1.3); backdrop-filter:blur(var(--blur-m)) saturate(1.3); -webkit-tap-highlight-color:transparent; transition:transform var(--dur-fast), color var(--dur), border-color var(--dur); }   /* G1 글래스모피즘 · raw-ok: k.html .scnclip 동일값 계승(blur13 — 픽셀 패리티) */

  .topdock::after { content:''; position:absolute; top:100%; left:0; right:0; height:14px; pointer-events:none; background:linear-gradient(180deg, rgba(18,18,18,.7), rgba(18,18,18,0)); }   /* raw-ok: 하단 페이드 스커트 = thumb .topdock::after exact(h14 · mat RGB 알파변주) */
  .topdock .makerow { margin-top:0; }   /* 미리보기↔발사버튼 gap = .cpprev margin-bottom(sp-2) 전담(thumb 정본) */
  .cpprev { margin:0 0 var(--sp-2); }   /* thumb .cpprev 정본(하단 sp-2 = 발사버튼과 gap) */

  .cpv-empty { position:absolute; top:0; bottom:0; left:50%; transform:translateX(-50%); aspect-ratio:4/5; height:100%; width:auto; background:#000 /* raw-ok: 순수 흑 무대 = thumb .cpprev-stage 정본 동일 raw(§🎨 순수 흑/백 정당) */; display:flex; align-items:center; justify-content:center; color:var(--mut); font-size:var(--fs-label); font-weight:var(--fw-b); text-align:center; padding:0 var(--sp-3); }   /* 빈 상태 = 4:5 검정 무대(thumb .cpprev-stage.post 정본 계승 · 운영자 260723 "번역만 튄다" 교정 — 카드 생성·편집 탭과 동일 세로 액자·양옆 스포티파이 블랙 레터박스 · 내용 있을 땐 pv 캔버스가 같은 4:5로 덮음) */
  .cpv-photobtn { display:grid; place-items:center; width:var(--btn); height:var(--btn); padding:0; background:none; border:0; cursor:pointer; color:var(--accent); -webkit-tap-highlight-color:transparent; }   /* reuse-ok: thumb .cpv-photobtn 정본 계승(빈 상태 사진 진입점 — 강조색 픽토그램만·플레이트 없음 · 신설 아님) */
  .cpv-photobtn svg { width:26px; height:26px; display:block; transition:transform var(--dur-fast) cubic-bezier(.2,.9,.3,1.25); }   /* raw-ok: 26px·탄성 커브 = thumb .cpv-photobtn svg 정본값 그대로 */

  .cpprev-box .cpv-tool { position:absolute; top:6px; width:30px; height:30px; display:grid; place-items:center; padding:0; color:var(--accent); background:var(--bg); border:0; border-radius:var(--r-s); cursor:pointer; z-index:2; filter:drop-shadow(0 1px 3px rgba(0,0,0,.6)); -webkit-tap-highlight-color:transparent; transition:transform var(--dur-fast); }   /* thumb .cpv-tool 정본(이미지 위 불투명 var(--bg) 플레이트 · §디자인 n) */
  .cpprev-box .cpv-tool[hidden] { display:none; }   /* 숨김 재승리(thumb 정본 — display:grid가 UA [hidden]을 이김) */

  .go { width:100%; margin-top:16px; padding:12px; background:rgba(255,255,255,.02); color:var(--accent); border:1px solid var(--line); border-radius:var(--r-pill); font-weight:800; font-size:14px; font-family:inherit; line-height:1; cursor:pointer; position:relative; overflow:hidden; transition:transform var(--dur-fast) ease, background var(--dur) ease, border-color var(--dur) ease; }   /* raw-ok: thumb .go 정본 exact(⭐발사 게이지바 전 뷰어 SSOT) */

  #go::before { content:''; position:absolute; left:0; right:0; top:-9px; bottom:-9px; }   /* 탭존 45px(시각 불변) = thumb #go 히트슬롭 정본 exact */
  .go.glive.firing { animation:none;

<script>
'use strict';
/* 번역카드(TR) v2 — 운영자 260721 재편: 강조 문구 선별·번역 = AI(러너 claude·OPUS) 몫 = 수동 밴드 입력 폐지.
   구성 = 기사 불러오기(스탠스 참고) · 사진 불러오기 · 번역 미리보기(thumb 카드 생성 도크 정본) ·
   생성 → 재생성(+재생성 메시지) · 옵션 = 밴드 스타일·글자 크기·폰트(한글/영문 — 클라 렌더 축).
   콘텐츠 산출물 색·서체 상수(발행 콘텐츠 색 축 = UI 팔레트 별개 · CLAUDE.md [16] 팔레트 예외 · track PALETTE 선례):
   캔버스 렌더 전용이라 var() 불가 = 정당 raw. */
const TR_BLACK = '#000';            /* 순수 흑(§🎨 순수 흑/백 정당 raw) */
const TR_WHITE = '#fff';
const TR_GREEN = '#2ee65c';         /* 디스패치풍 형광 초록(발행 콘텐츠 색 — UI 재유입 금지) */
const TR_W = 1080;                  /* 발행 기준 폭 */
const CARD_RATIO = 5 / 4;           /* 발행 카드 = 4:5 세로(1080×1350) 기본 — 운영자 260721 확정("특별한 말 없으면 항상 4:5") */
const PADX = 64;                    /* 밴드 좌우 여백(1080 기준) */
const TRACK = '-0.01em';            /* 카드 자간 = -10‰(운영자 260721 "노토산스 -10 자간 기본" · thumb 카드 트래킹 모델 계승) */
const FONT_KO = "'Noto Sans KR', 'Noto Sans', -apple-system, sans-serif";   /* 카드 본문 = 노토산스(운영자 260721 확정 · 발행 콘텐츠 서체축 raw · 자간 -10) */
const FONT_EN = "'Helvetica Neue', Helvetica, Arial, sans-serif";   /* 영문 서체(운영자 260721 폰트 옵션 — 콘텐츠 축 raw · FONT_KO 선례) */

const $ = id => document.getElementById(id);
const pv = $('pv'), prevBox = $('prevBox');

let img = null;                     // HTMLImageElement (natural size)
let RESULT = null;                  // { cut:canvas(오버레이 합성본), band:string(AI 밴드 문구) }
let ART = null;                     // 참고 기사 { t, m, b }
let fired = false;                  // 최초 생성 완료 = 이후 버튼 라벨 '재생성' + 재생성 메시지 노출
let styleV = 'dark', fsV = 40, fontV = 'ko';

/* ── 원본 이미지 로드 — 입구 = 미리보기 쉘 단일화(thumb 편집 탭 문법: 빈 상태 픽토·교체·삭제·드롭·붙여넣기 · 운영자 260721 "1·2번 메뉴와 일맥상통") ── */
function setImage(file){
  if (!file || !file.type || !file.type.startsWith('image/')) return;
  const url = URL.createObjectURL(file);
  const im = new Image();
  im.onload = () => { img = im; upd(); };
  im.src = url;
}
$('srcFile').addEventListener('change', e => { setImage(e.target.files[0]); e.target.value = ''; });   // value 비움 = 같은 파일 재선택도 change 재발화(교체 문법)
$('pvPhoto').addEventListener('click', () => $('srcFile').click());   // 빈 미리보기 사진 픽토 = 파일 입구 위임(thumb cpv-photobtn 문법)
$('swapBtn').addEventListener('click', () => $('srcFile').click());   // 교체 = 파일 입구 위임(thumb cpImgSwap 문법)
$('delBtn').addEventListener('click', () => {   // 삭제 = 원점 리셋(thumb cpImgDel 문법 — 사진 제거 = 결과·사이클 동반 초기화)
  img = null; RESULT = null; ocrLines = null; ocrFor = null; fired = false;
  $('redoBox').hidden = true; go.textContent = '생성'; aStat(''); upd();
});
document.addEventListener('paste', e => {
  const it = [...(e.clipboardData?.items || [])].find(i => i.type.startsWith('image/'));
  if (it) { setImage(it.getAsFile()); e.preventDefault(); }
});
prevBox.addEventListener('dragover', e => { e.preventDefault(); prevBox.classList.add('dropping'); });   // 미리보기 드롭 = 첨부/교체(thumb .cpprev-box 드롭 정본 · 운영자 260716 "드롭 ㄱ")
prevBox.addEventListener('dragleave', () => prevBox.classList.remove('dropping'));
prevBox.addEventListener('drop', e => { e.preventDefault(); prevBox.classList.remove('dropping'); setImage(e.dataTransfer.files[0]); });

/* ── 옵션(밴드 스타일·글자 크기·폰트) — 편집 탭 .scard 워드칩 문법(운영자 260721) · 위임 핸들러 유지 · 변경 = 즉시 재합성 + 도크 요약 스트립 동기(thumb #editSpec 미러 문법) ── */
function updSpec(){   // 스트립 값 = 기본값이면 mut·비기본값(변경)이면 accent 강조(thumb #editSpec updateGoSpec 정본 문법 계승 · 기본 = dark·40·ko) — 부팅 무강조 = 첨부1 편집 탭 정합
  const st = $('tsStyle'); st.textContent = $('styleSeg').querySelector('.on')?.textContent || ''; st.classList.toggle('on', styleV !== 'dark');
  const fs = $('tsFs'); fs.textContent = String(fsV); fs.classList.toggle('on', fsV !== 40);
  const ft = $('tsFont'); ft.textContent = $('fontSeg').querySelector('.on')?.textContent || ''; ft.classList.toggle('on', fontV !== 'ko');
}
function seg(host, fn){
  host.addEventListener('click', e => {
    const b = e.target.closest('button[data-v]'); if (!b) return;
    host.querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
    fn(b.dataset.v);
  });
}
seg($('styleSeg'), v => { styleV = v; updSpec(); compose(); });
seg($('fontSeg'), v => { fontV = v; updSpec(); compose(); });
$('bandFs').addEventListener('input', e => { fsV = +e.target.value; $('bandFsV').textContent = e.target.value; updSpec(); compose(); });

/* ── 밴드 텍스트 파서: *초록* [박스] (기존 그대로) ── */
function parseRuns(line){
  const runs = []; let m = 'n', buf = '';
  const flush = () => { if (buf) { runs.push({ tx: buf, m }); buf = ''; } };
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '*') { flush(); m = (m === 'g') ? 'n' : 'g'; }
    else if (ch === '[' && m === 'n') { flush(); m = 'b'; }
    else if (ch === ']' && m === 'b') { flush(); m = 'n'; }
    else buf += ch;
  }
  flush(); return runs;
}
function tokens(runs){
  const out = [];
  runs.forEach(r => {
    if (r.m !== 'n') { out.push({ tx: r.tx, m: r.m }); return; }   /* 강조 구간 = 통짜 토큰(줄바꿈으로 박스 두 동강 방지 — 운영자 260720 "결과물 이상" 보정) */
    let cur = '';
    const flush = () => { if (cur) { out.push({ tx: cur, m: r.m }); cur = ''; } };
    for (const ch of r.tx) {
      if (ch === ' ') { flush(); out.push({ tx: ' ', m: r.m }); }
      else if (ch.charCodeAt(0) > 0x2E7F) { flush(); out.push({ tx: ch, m: r.m }); }   /* CJK = 글자 단위 줄바꿈 */
      else cur += ch;
    }
    flush();
  });
  return out;
}

/* ── 밴드 합성(기존 레이아웃 엔진 그대로 — 폰트만 옵션 축) ── */
function bandFont(fs){ return `700 ${fs}px ${fontV === 'en' ? FONT_EN : FONT_KO}`; }   /* 700 = 노토 Bold 번들 정합(thumb 정본 동일 · faux-bold 방지) */
function layoutBand(b){
  const mx = TR_W - PADX * 2, lh = Math.round(b.fs * 1.55);
  const mc = document.createElement('canvas').getContext('2d');
  mc.font = bandFont(b.fs); mc.letterSpacing = TRACK;   /* 자간 -10 = 측정·그림 동일(운영자 260721) */
  const lines = [];
  b.tx.split('\n').forEach(raw => {
    let line = [], w = 0;
    const put = tk => {
      const tw = mc.measureText(tk.tx).width;
      if (w + tw > mx && line.length) { lines.push(line); line = []; w = 0; if (tk.tx === ' ') return; }
      if (tw > mx && tk.tx.length > 1) {   /* 한 줄보다 긴 통짜 강조 = 글자 단위 폴백(스타일 유지) */
        [...tk.tx].forEach(ch => put({ tx: ch, m: tk.m }));
        return;
      }
      line.push({ ...tk, w: tw }); w += tw;
    };
    tokens(parseRuns(raw)).forEach(put);
    lines.push(line);
  });
  const padY = Math.round(b.fs * 1.05);
  return { lines, lh, padY, h: padY * 2 + lines.length * lh };
}
function drawBand(ctx, b, y){
  const L = layoutBand(b);
  const dark = b.style === 'dark';
  ctx.fillStyle = dark ? TR_BLACK : TR_WHITE;
  ctx.fillRect(0, y, TR_W, L.h);
  ctx.font = bandFont(b.fs); ctx.letterSpacing = TRACK; ctx.textBaseline = 'alphabetic';   /* 자간 -10 = 측정폭(mc)과 동일 */
  let ly = y + L.padY + Math.round(b.fs * 0.92);
  L.lines.forEach(line => {
    let x = PADX;
    line.forEach(tk => {   /* 강조 배경(박스·초록)부터 */
      if (tk.m === 'b') { ctx.fillStyle = dark ? TR_WHITE : TR_BLACK; ctx.fillRect(x - 2, ly - b.fs * 0.92, tk.w + 4, b.fs * 1.22); }
      else if (tk.m === 'g' && !dark) { ctx.fillStyle = TR_GREEN; ctx.fillRect(x - 2, ly - b.fs * 0.92, tk.w + 4, b.fs * 1.22); }
      x += tk.w;
    });
    x = PADX;
    line.forEach(tk => {
      ctx.fillStyle = tk.m === 'b' ? (dark ? TR_BLACK : TR_WHITE)
        : tk.m === 'g' ? (dark ? TR_GREEN : TR_BLACK)
        : (dark ? TR_WHITE : TR_BLACK);
      ctx.fillText(tk.tx, x, ly);
      x += tk.w;
    });
    ly += L.lh;
  });
  return L.h;
}
function compose(){
  const show = !!(RESULT || img);
  pv.hidden = !show; $('pvEmpty').hidden = show;
  $('dlBtn').hidden = !RESULT; $('swapBtn').hidden = !img; $('delBtn').hidden = !img;   // 도구 노출 = thumb renderCpPrev 문법(교체·삭제 = 사진 있을 때 · 저장 = 결과 있을 때)
  if (!show) return;
  if (!RESULT) {   // 결과 전 = 원본 스테이지(thumb 편집 탭 문법 — 쉘이 사진 홈 · 생성 후 결과로 교체)
    const h = Math.round(TR_W * img.naturalHeight / img.naturalWidth);
    pv.width = TR_W; pv.height = h;
    pv.getContext('2d').drawImage(img, 0, 0, TR_W, h);
    return;
  }
  /* 4:5 기본(운영자 260721 "특별한 말 없으면 항상 4:5") — 문서 전체 보이게 contain, 칩은 상단에 확대 합성 */
  const bandIt = RESULT.band ? { tx: RESULT.band, style: styleV, fs: fsV } : null;
  const cut = RESULT.cut;
  const bH = bandIt ? layoutBand(bandIt).h : 0;
  const RATIO_W = TR_W, RATIO_H = Math.round(TR_W * CARD_RATIO);   /* 1080×1350 */
  const regionH = RATIO_H - bH;
  pv.width = RATIO_W; pv.height = RATIO_H;
  const ctx = pv.getContext('2d');
  ctx.fillStyle = TR_WHITE; ctx.fillRect(0, 0, RATIO_W, RATIO_H);
  const sf = Math.min(RATIO_W / cut.width, regionH / cut.height);   /* 문서 contain(다 보이게) */
  const dw = Math.round(cut.width * sf), dh = Math.round(cut.height * sf);
  const ox = Math.round((RATIO_W - dw) / 2), oy = Math.round((regionH - dh) / 2);
  ctx.drawImage(cut, ox, oy, dw, dh);
  ctx.fillStyle = 'rgba(255,255,255,.22)'; ctx.fillRect(ox, oy, dw, dh);   /* 본문 딤 = 발췌 리프트 대비(운영자 260721 "발췌해 볼록 튀어나온 느낌") */
  const g = (TR_W / img.naturalWidth) * sf;   /* natural→final 스케일(cut=naturalWidth→TR_W 후 sf) */
  if (RESULT.plan) { const exData = drawExcerpts(ctx, RESULT.plan, ox, oy, g, regionH); drawChips(ctx, RESULT.plan, regionH, exData); }   /* 형광펜 런 = 확대 발췌 리프트 → 칩은 그 아래 */
  if (bandIt) drawBand(ctx, bandIt, regionH);
}

/* ── 자동 마커 번역 엔진(운영자 260720 Q274 → 260721 v2: 참고 기사 스탠스 + 재생성 메시지 + AI 밴드) ──
   브라우저 OCR(tesseract.js 지연 로드 · 이미지·좌표는 서버로 안 감) → /api/tr(러너 claude = 강조 선정+한글 번역+밴드 문구)
   → tr_out/<id>/plan.json 폴링 → 형광펜(multiply 50%)+검정 각칩 오버레이 합성(운영자 승인 시안 dsp_ov3 '그대로') + 밴드.
   콘텐츠 산출물 색 상수(캔버스 전용 raw — TR_GREEN 선례·발행 콘텐츠 색 축): */
const OV_MARK = 'rgba(120,240,90,.5)';   /* 형광펜 = 50% 반투명(multiply = 진짜 형광펜 질감) · 해석 라인 전역 칠(운영자 260721) */
const OV_CHIP = 'rgba(18,18,18,.85)';    /* 칩 = 스포티파이 블랙 85%(운영자 260721 확정 · 반전) */
const OV_LINE = 'rgba(255,255,255,.13)';
const OV_TEXT = '#f4f7f4';
const OV_EMPH = '#8dff6a';               /* 칩 안 강조(형광펜 동계열 초록) */
let ocrLines = null;                     // [{i,t,b:{x,y,w,h}}] natural 좌표(브라우저 보관)
let ocrFor = null;                       // OCR 캐시 키(같은 이미지 재생성 = 재판독 생략)
let busy = false;

function loadTess(){   /* OCR 라이브러리 = 누를 때만 지연 로드(평시 페이지 무게 0) */
  if (window.Tesseract) return Promise.resolve();
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload = res; s.onerror = () => rej(new Error('OCR 라이브러리 로드 실패 — 네트워크 확인'));
    document.head.appendChild(s);
  });
}
async function runOcr(){
  await loadTess();
  const w = await Tesseract.createWorker('eng');
  const { data } = await w.recognize(img);
  await w.terminate();
  return (data.lines || [])
    .map((l, i) => ({ i, t: (l.text || '').trim(), b: { x: l.bbox.x0, y: l.bbox.y0, w: l.bbox.x1 - l.bbox.x0, h: l.bbox.y1 - l.bbox.y0 } }))
    .filter(l => l.t.length > 1 && l.b.w > 8 && l.b.h > 6);
}
function chipLayout(ctx, t, fs, maxW){   /* 칩 줄배치 — *별표* 강조 = parseRuns 재사용(초록만) · 단어 단위 줄바꿈 */
  const toks = [];
  parseRuns(t).forEach(r => { r.tx.split(/(\s+)/).forEach(p => { if (p) toks.push({ tx: p, m: r.m === 'g' ? 'g' : 'n' }); }); });
  const lines = [[]]; let w = 0;
  toks.forEach(tk => {
    const tw = ctx.measureText(tk.tx).width;
    if (w + tw > maxW && lines[lines.length - 1].length) { lines.push([]); w = 0; if (/^\s+$/.test(tk.tx)) return; }
    lines[lines.length - 1].push({ ...tk, w: tw }); w += tw;
  });
  const lw = Math.max(...lines.map(l => l.reduce((a, x) => a + x.w, 0)), 1);
  return { lines, w: lw, lh: Math.round(fs * 1.38) };
}
function hlRuns(hl){   /* hl → 연속 라인 런([{s,e}]) : 형광펜 해석 span = 칩 앵커(단일 라인도 런 1개 · 하위호환) */
  const arr = [...new Set((hl || []).filter(i => Number.isInteger(i)))].sort((a, b) => a - b);
  const runs = []; let cur = null;
  arr.forEach(i => { if (cur && i === cur.e + 1) cur.e = i; else { cur = { s: i, e: i }; runs.push(cur); } });
  return runs;
}
function composeOverlay(plan){   /* 원문 문서만 — 형광펜·칩은 compose에서 발췌 리프트(팝아웃)로 합성(운영자 260721 "130% 확대·볼록 발췌") */
  const s = TR_W / img.naturalWidth;
  const H = Math.round(img.naturalHeight * s);
  const cv = document.createElement('canvas'); cv.width = TR_W; cv.height = H;
  cv.getContext('2d').drawImage(img, 0, 0, TR_W, H);
  return cv;
}
function popScale(run){ const n = run.e - run.s + 1; return Math.max(1.16, Math.min(1.36, 1.40 - (n - 1) * 0.05)); }   /* 팝아웃 배율 = 상황(문장 길이) 가변 — 짧을수록 크게(운영자 260721 "꼭 같은 크기일 필요 없음·임의") */
function runNatRect(run, bmap){   /* 런의 자연좌표 bbox */
  let x0 = 1e9, y0 = 1e9, x1 = -1e9, y1 = -1e9;
  for (let i = run.s; i <= run.e; i++) { const b = bmap.get(i); if (!b) continue; x0 = Math.min(x0, b.x); y0 = Math.min(y0, b.y); x1 = Math.max(x1, b.x + b.w); y1 = Math.max(y1, b.y + b.h); }
  return x0 > x1 ? null : { x0, y0, x1, y1 };
}
function drawExcerpts(ctx, plan, ox, oy, g, regionH){   /* 형광펜 런 = 확대 발췌 리프트(흰 받침+그림자+형광펜) = 문서서 오려낸 볼록 느낌(뉴스 기법 · 운영자 260721) */
  const bmap = new Map(ocrLines.map(l => [l.i, l.b]));
  const runs = hlRuns(plan.hl);
  const ex = new Map();
  runs.forEach((run, ri) => {
    const R = runNatRect(run, bmap); if (!R) return;
    const pad = 8 / g;
    const sx = R.x0 - pad, sy = R.y0 - pad, sw = (R.x1 - R.x0) + pad * 2, sh = (R.y1 - R.y0) + pad * 2;
    const fw = sw * g, fh = sh * g;
    const cx = ox + (R.x0 + R.x1) / 2 * g, cy = oy + (R.y0 + R.y1) / 2 * g;
    const P = popScale(run), dwp = fw * P, dhp = fh * P;
    let dx = cx - dwp / 2; const dy = cy - dhp / 2;
    dx = Math.max(10, Math.min(dx, TR_W - dwp - 10));   /* 카드 밖 이탈 방지 */
    ctx.save(); ctx.shadowColor = 'rgba(0,0,0,.28)'; ctx.shadowBlur = 22; ctx.shadowOffsetY = 7;   /* 볼록 튀어나온 그림자 */
    ctx.fillStyle = TR_WHITE; ctx.fillRect(dx - 6, dy - 4, dwp + 12, dhp + 8); ctx.restore();   /* 흰 받침(발췌 카드) */
    ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dwp, dhp);   /* 확대 슬라이스(원본 크롭) */
    ctx.save(); ctx.globalCompositeOperation = 'multiply'; ctx.fillStyle = OV_MARK;   /* 형광펜 = 확대 슬라이스 안 각 라인 */
    for (let i = run.s; i <= run.e; i++) { const b = bmap.get(i); if (!b) continue;
      const lx = dx + (b.x - sx) * g * P, ly = dy + (b.y - sy) * g * P;
      ctx.fillRect(lx - 3, ly - 2, b.w * g * P + 6, b.h * g * P + 4); }
    ctx.restore();
    ex.set(ri, { left: dx, right: dx + dwp, top: dy, bottom: dy + dhp });
  });
  return { runs, ex };
}
function drawChips(ctx, plan, regionH, exData){   /* 칩 = 발췌 리프트 아래 앵커 : .85 검정 · 자간 · 4분할 중앙정렬 · x=발췌 좌단 추종(운영자 260721) */
  const runs = exData.runs, ex = exData.ex;
  const CHIP_FS = 30, padX = 12, padY = 9, maxW = 900;
  ctx.font = `700 ${CHIP_FS}px ${FONT_KO}`; ctx.letterSpacing = TRACK; ctx.textBaseline = 'middle';   /* 700 = 노토 Bold 번들 정합 */
  const placed = [];
  (plan.chips || []).forEach(c => {
    let ri = runs.findIndex(r => c.a >= r.s && c.a <= r.e);
    if (ri < 0 && runs.length) ri = runs.reduce((bi, r, i) => Math.abs((r.s + r.e) / 2 - c.a) < Math.abs((runs[bi].s + runs[bi].e) / 2 - c.a) ? i : bi, 0);
    const e = ex.get(ri);
    const L = chipLayout(ctx, String(c.t || ''), CHIP_FS, maxW);
    const bw = Math.min(L.w, maxW) + padX * 2, bh = L.lines.length * L.lh + padY * 2;
    let x = e ? Math.max(16, Math.min(Math.round(e.left), TR_W - bw - 16)) : 20;   /* 발췌 좌단 추종 */
    let y = e ? Math.round(e.bottom) + 10 : 24;   /* 발췌 리프트 바로 아래 */
    placed.forEach(r => { if (x < r.x + r.w && x + bw > r.x && y < r.y + r.h && y + bh > r.y) y = r.y + r.h + 7; });   /* 겹침 = 아래로 */
    if (y + bh > regionH - 6) y = Math.max(6, (e ? Math.round(e.top) : regionH) - bh - 10);   /* 바닥 넘침 = 발췌 위로 */
    placed.push({ x, y, w: bw, h: bh });
    ctx.fillStyle = OV_CHIP; ctx.fillRect(x, y, bw, bh);
    ctx.strokeStyle = OV_LINE; ctx.lineWidth = 1; ctx.strokeRect(x + .5, y + .5, bw - 1, bh - 1);
    L.lines.forEach((ln, k) => { let tx2 = x + padX; const cy = y + padY + L.lh * (k + 0.5);   /* 4분할 중앙(높이) = middle 베이스라인 · lh 밴드 정중앙 */
      ln.forEach(tk => { ctx.fillStyle = tk.m === 'g' ? OV_EMPH : OV_TEXT; ctx.fillText(tk.tx, tx2, cy); tx2 += ctx.measureText(tk.tx).width; }); });
  });
  ctx.letterSpacing = '0px';
}
async function pollPlan(id){   /* k_out 폴링 문법 계승 — 커밋→Pages 배포 지연 포함 6분 캡 */
  for (let k = 0; k < 60; k++) {
    await new Promise(r => setTimeout(r, 6000));
    try { const r = await fetch(`tr_out/${id}/plan.json?t=${Date.now()}`, { cache: 'no-store' });
      if (r.ok) return await r.json(); } catch (_) {}
    try { const e = await fetch(`tr_out/${id}/error.log?t=${Date.now()}`, { cache: 'no-store' });
      if (e.ok) throw new Error('AI 생성 실패 — 잠시 후 다시 시도해줘'); } catch (er) { if (String(er.message).startsWith('AI')) throw er; }
  }
  throw new Error('대기 시간 초과(6분) — 잠시 후 다시');
}

/* ── 생성/재생성 발사 — 버튼 = thumb #go 정본 · 게이지 = conv/track glive 정본(gaugeStart/Done/Clear verbatim) ── */
const go = $('go'), autoSum = $('autoSum'), pvWait = $('pvWait'), pvSec = $('pvSec');
function gaugeStart(btn){ if (!btn) return; btn.classList.add('glive', 'firing'); requestAnimationFrame(() => requestAnimationFrame(() => btn.classList.add('grun'))); }
function gaugeDone(btn){ if (btn) btn.classList.add('gdone'); }
function gaugeClear(btn){ if (btn) btn.classList.remove('glive', 'firing', 'grun', 'gdone'); }
function aStat(t){ autoSum.hidden = !t; autoSum.textContent = t || ''; }
let goT0 = 0, goTick = 0;
const fmtT = s => { s = Math.max(0, Math.floor(s)); return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); };
function goBusy(on){
  busy = on;
  if (on) {
    goT0 = Date.now();
    if (window.nmLoader) { go.innerHTML = nmLoader('solving','Solving…',{size:15,gap:7,fs:12.5}) + '<span class="gtime"></span>'; }   // orb 1회 생성(매틱 재빌드 = 애니 리셋 방지 · 운영자 260723 Q463)
    const paint = () => { const t = fmtT((Date.now() - goT0) / 1000);
      if (window.nmLoader) { const gt = go.querySelector('.gtime'); if (gt) gt.textContent = t; }   // orb 유지·시간만
      else go.innerHTML = '번역 중…<span class="gtime">' + t + '</span>';   /* 폴백(nmLoader 미로드 시만 — 상시 로드라 사문화) = 평문 · gdots 제거(로딩 SSOT 게이트) */
      pvSec.textContent = t; };
    paint(); goTick = setInterval(paint, 1000);
    gaugeStart(go); pvWait.hidden = false;
  } else {
    clearInterval(goTick); goTick = 0;
    go.textContent = fired ? '재생성' : '생성';   /* 2회차부터 = 재생성(운영자 260721 · thumb 문맥 라벨 전환 선례) */
    gaugeClear(go); pvWait.hidden = true;
  }
  upd();
}
go.addEventListener('click', async () => {
  if (busy) return;
  if (!img) { $('srcFile').click(); return; }   // 사진 없음 = 첨부 진입(thumb 편집 탭 #go !CIMG.b64→cFile.click 정본 문법 계승 · 버튼 상시 활성)
  goBusy(true); aStat('');
  try {
    if (ocrFor !== img) { ocrLines = await runOcr(); ocrFor = img; }   /* 같은 이미지 재생성 = OCR 재판독 생략 */
    if (ocrLines.length < 3) throw new Error('글자를 못 읽었어 — 더 선명한 문서 이미지로 시도해줘');
    const ctxPay = {};
    if (ART) ctxPay.art = ART;
    const note = noteTx.value.trim().slice(0, 500);
    if (fired) { ctxPay.redo = 1; if (note) ctxPay.note = note; }
    const r = await fetch('/api/tr', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ lines: ocrLines.map(l => ({ i: l.i, t: l.t })), ctx: ctxPay }) });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || j.error) throw new Error(j.error || ('서버 오류 ' + r.status));
    const plan = j.plan ? j.plan : await pollPlan(j.id);   // 즉답 경로(유료 API 직결 · 운영자 260721 승인 — 수신 즉시 합성) · 없으면 워크플로 폴링 폴백(구독 무료)
    RESULT = { cut: composeOverlay(plan), band: String(plan.band || '').trim(), plan };   /* plan 보관 = compose에서 4:5 스케일로 칩 재합성 */
    fired = true; $('redoBox').hidden = false;
    gaugeDone(go);
    (document.fonts?.ready || Promise.resolve()).then(compose);
    aStat('✓ 완성 — 미리보기 확인 · 우상단 버튼 = PNG 저장');
  } catch (e) { aStat('✗ ' + e.message); }
  goBusy(false);
});

/* ── 저장(파일명 = KST 강제 · CLAUDE.md [12] — naive 로컬시각 금지) — 미리보기 우상단 도구(thumb .cpv-tool 문법) ── */
const dlBtn = $('dlBtn'); dlBtn.innerHTML = DOWNLOAD_SVG;
dlBtn.addEventListener('click', () => {
  if (!RESULT) return;
  const k = new Date().toLocaleString('sv-SE', { timeZone: 'Asia/Seoul' });   /* KST 강제 포맷 */
  const name = k.slice(0, 10).replace(/-/g, '') + '_' + k.slice(11, 19).replace(/:/g, '') + '_번역카드_v1.png';
  pv.toBlob(bl => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(bl); a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  }, 'image/png');
});

/* ── 갱신 ── */
function upd(){
  go.disabled = busy;   // 사진 유무로 비활성화 안 함 = thumb 편집 탭 정본(버튼 상시 활성·빈 상태 클릭=첨부) · busy(발사 중)만 잠금
  compose();
}
upd();
</script>
