<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>썸네일 생성기</title>
<style>
  :root { --bg:#121212;   /* 스포티파이 블랙(중립)·운영자 260623 */ --pan:#16171a; --line:#2a2c31; --fg:#e9eaec; --mut:#8b8f98;
          --accent:#0FFD02; --accent-rgb:15,253,2; --accent-dim:rgba(var(--accent-rgb),.13); --on-accent:#062108; --line2:#2a2c31;
          --amber:#ff9614; --amber-rgb:255,150,20;
          --warn:#ffd24a; --warn-rgb:255,210,74; --arm:#ffd93d; --arm-rgb:255,217,61; --on-arm:#1a1205; }   /* 의미색(앰버=강조누락 / 노랑warn·arm=맞춤법 교정) · index.html SSOT 값 복사(§🎨) */
  * { box-sizing:border-box; }
  /* 스크롤바 톤앤톤(초록 글래스) — 뉴스 요약기(viewer/index.html) 계승 · 전 페이지 공통 */
  html { scrollbar-width:thin; scrollbar-color:rgba(var(--accent-rgb),.30) transparent; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(var(--accent-rgb),.26); border-radius:999px;
    border:2px solid var(--bg); background-clip:padding-box; }
  ::-webkit-scrollbar-thumb:hover { background:rgba(var(--accent-rgb),.45); background-clip:padding-box; }
  body { margin:0; background:radial-gradient(125% 70% at 50% -8%, rgba(var(--accent-rgb),.06), transparent 55%) fixed, var(--bg); color:var(--fg); font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:600px; margin:0 auto; padding:18px 16px 70px; }
  h1 { font-size:18px; margin:6px 0 18px; }
  h1 b { color:var(--accent); }
  .tabs { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-bottom:16px; }
  .tab { padding:11px 3px; text-align:center; background:linear-gradient(165deg, rgba(34,56,41,.5), rgba(14,26,18,.6)); backdrop-filter:blur(12px) saturate(1.2); -webkit-backdrop-filter:blur(12px) saturate(1.2); border:1px solid rgba(255,255,255,.1); border-radius:12px; cursor:pointer; font-weight:600; font-size:12.5px; box-shadow:inset 0 1px 0 rgba(255,255,255,.08); transition:transform .12s, border-color .15s, box-shadow .15s; }
  .tab:hover { transform:translateY(-1px); }
  .tab small { display:block; color:var(--mut); font-weight:400; font-size:11px; margin-top:2px; }
  .tab.on { border-color:rgba(var(--accent-rgb),.5); color:var(--accent); background:linear-gradient(165deg, rgba(var(--accent-rgb),.16), rgba(var(--accent-rgb),.05)); box-shadow:inset 0 1px 0 rgba(255,255,255,.1), 0 0 16px rgba(var(--accent-rgb),.14); }
  .tab.on small { color:#bfeeb6; }
  .panel { background:linear-gradient(150deg, rgba(38,64,46,.42) 0%, rgba(14,26,18,.55) 58%, rgba(11,21,15,.62) 100%); backdrop-filter:blur(16px) saturate(1.2); -webkit-backdrop-filter:blur(16px) saturate(1.2); border:1px solid rgba(255,255,255,.1); border-radius:16px; padding:14px; box-shadow:0 16px 36px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.1); }
  label { display:block; font-size:13px; color:var(--mut); margin:14px 0 8px; }   /* 소제목 위아래 마진 통일·확보 = 각 칸 분리감(운영자 260617). first-of-type 예외·인라인 없음 → 전부 동일. */
  input[type=text], input[type=number], textarea, select {
    width:100%; padding:12px; background:#0e0f11; border:1px solid var(--line); border-radius:9px; color:var(--fg); font:inherit;
  }
  input:focus, textarea:focus, select:focus { border-color:rgba(var(--accent-rgb),.35); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.08); outline:none; }
  input::placeholder, textarea::placeholder { color:var(--mut); }
  #cname::placeholder { font-style:italic; }   /* 이름 예시 '계정명' = 기울임꼴 */
  textarea { min-height:96px; resize:vertical; }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .hint { font-size:12px; color:var(--mut); margin-top:5px; }
  .hint b { color:var(--accent); }
  .seg { display:flex; gap:6px; }
  .seg button { flex:1; padding:8px; background:linear-gradient(165deg, rgba(34,56,41,.42), rgba(14,26,18,.52)); backdrop-filter:blur(10px) saturate(1.2); -webkit-backdrop-filter:blur(10px) saturate(1.2); border:1px solid rgba(255,255,255,.09); border-radius:9px; color:var(--fg); cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,.07); transition:border-color .15s, background .15s; }
  .seg button.on { border-color:rgba(var(--accent-rgb),.5); color:var(--accent); background:linear-gradient(165deg, rgba(var(--accent-rgb),.16), rgba(var(--accent-rgb),.05)); box-shadow:inset 0 1px 0 rgba(255,255,255,.1); }
  .seg button.fixed { cursor:default; }   /* 60·30 = 항상 출력(고정 표시) — 누름 동작 없음 */
  /* 직접입력 = 버튼 자체가 입력창 (선택 시 라벨 숨고 안에 커서) */
  #opaCustom { padding:0; overflow:hidden; }
  #opaCustom .lab { display:block; padding:8px 2px; }
  /* ID 스코프 = .lab과 대칭(특정성 0,1,1 전역 input[type=text] 패딩/테두리에 안 짐) → 입력 모드에서도 버튼 높이 라벨과 동일 */
  #opaCustom .opa-in { display:none; box-sizing:border-box; width:100%; padding:8px 2px; border:none; background:transparent; color:var(--accent); text-align:center; font:inherit; outline:none; }
  #opaCustom.on .lab { display:none; }
  #opaCustom.on .opa-in { display:block; }
  /* 플랫폼 로고 선택 (2:1 박스 가로 한 줄) */
  .pseg { display:flex; gap:6px; flex-wrap:nowrap; }
  .pbtn { flex:1 1 0; min-width:0; aspect-ratio:2/1; display:flex; align-items:center; justify-content:center; background:linear-gradient(165deg, rgba(34,56,41,.42), rgba(14,26,18,.52)); backdrop-filter:blur(10px) saturate(1.2); -webkit-backdrop-filter:blur(10px) saturate(1.2); border:1px solid rgba(255,255,255,.09); border-radius:9px; color:var(--mut); cursor:pointer; padding:0; font-weight:600; font-size:11px; box-shadow:inset 0 1px 0 rgba(255,255,255,.07); }   /* 두글자 라벨 = 직접 칩과 동급(11px·600)으로 축소·볼드 완화 */
  .pbtn.on { border-color:rgba(var(--accent-rgb),.5); color:var(--accent); background:linear-gradient(165deg, rgba(var(--accent-rgb),.16), rgba(var(--accent-rgb),.05)); box-shadow:inset 0 1px 0 rgba(255,255,255,.1); }
  .pbtn .plab { font-size:11px; font-weight:600; }
  /* 경고문 프리셋 = 줄바꿈 허용 세그 */
  .wseg { flex-wrap:wrap; }
  .wseg button { min-width:62px; }
  /* 실시간 자간(tracking) 표시 — 줄어들기 시작하면 노랑, 한도 초과 빨강 */
  .trk { font-size:12px; font-weight:800; }
  .trk.on { color:#ffd84d; }
  .trk.over { color:#ff7a7a; }
  /* ── 기본(통합) 모드 — 섹션머리(•) + 부제 흰색/제목 강조색 + 자막 2/3 + 이미지 슬롯 1/3 ── */
  .csec { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--fg); margin:16px 0 9px; }   /* '• 헤더' ↔ 배경 = align-items center 수직중앙(line-height 1.3 제거 = 텍스트 박스가 cbox와 비슷 → 정렬 안정) */
  .csec-d { font-size:12px; font-weight:400; color:var(--mut); }
  .csec-chk { margin:0 0 0 auto; font-size:12.5px; font-weight:400; }   /* 배경 체크 = '• 헤더' 행 우측(margin-left auto)·별도 행 제거 */
  .csec-chk .cbox { width:17px; height:17px; }   /* 글자 높이로 축소 = '• 헤더'↔배경 정렬 기준 일치 */
  .csec-chk .ackm { width:11px; height:11px; }
  #rCombo .cf { margin-top:8px; }            /* label 없앤 입력칸 간격(헤더 부제/제목 연속) */
  #rCombo .cf-sub { color:#fff; }        /* 부제 입력 = 흰색(결과물 흰색 미러) */
  #rCombo .cf-title { color:var(--accent); }   /* 제목 입력 = 강조색(결과물 초록 미러) */
  #rCombo .cf-title::placeholder { color:var(--accent); opacity:.5; }   /* 제목 예시도 강조색(부제 예시는 전역 mut) */
  .covrow { display:flex; gap:8px; align-items:stretch; margin-top:8px; }
  .covta { flex:2 1 0; min-width:0; }                      /* 자막 = 2/3(텍스트 짧음) */
  .covimg { flex:1 1 0; min-width:0; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    min-height:96px; border:1px dashed rgba(var(--accent-rgb),.5); border-radius:9px; color:var(--mut); cursor:pointer; overflow:hidden;
    background:rgba(var(--accent-rgb),.04); transition:border-color .15s, background .15s, color .15s; -webkit-tap-highlight-color:transparent; }   /* 이미지 슬롯 = 1/3(.file 점선 계승) */
  .covimg:hover { border-color:var(--accent); color:var(--accent); background:rgba(var(--accent-rgb),.08); }
  .covimg:active { transform:scale(.97); }                 /* 큰 면 = 1에 근접(§🎨 누름 scale 계승) */
  .covimg.has { border-style:solid; border-color:var(--accent); cursor:default; background:var(--bg); }
  .covimg.has:hover { background:var(--bg); }
  .covimg .covimg-ic svg { width:26px; height:26px; display:block; }
  .covimg .covimg-t { font-size:11px; }
  .covimg img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; }
  .covimg .covimg-x { position:absolute; top:6px; right:6px; width:30px; height:30px; display:grid; place-items:center; padding:0;
    color:var(--accent); background:rgba(0,0,0,.20); border:0; border-radius:9px; cursor:pointer; z-index:2;
    filter:drop-shadow(0 1px 3px rgba(0,0,0,.6)); -webkit-tap-highlight-color:transparent; transition:transform .12s, background .15s; }   /* .fileprev .filerm 계승 */
  .covimg .covimg-x:active { transform:scale(.82); background:rgba(0,0,0,.32); }
  .covimg .covimg-x svg { width:15px; height:15px; display:block; }
  .covimg .covimg-kb { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,.55); color:var(--fg); font-size:9px; text-align:center; padding:1px 0; z-index:2; }   /* .askimg-kb 계승 */
  /* 모바일 = 입력칸 글자 85%(15→12.75px) + 이미지 슬롯 너비 75%(33%→25%·확보분 텍스트로) → 이미지 옆 둘 때 우측 넘침 방지(운영자 260624). 데스크톱은 불변. */
  @media (max-width:480px) {
    input[type=text], input[type=number], textarea, select { font-size:12.75px; }   /* 입력 *안의 글자*만(결과물 무관) · .abrow input(0,1,1)은 14px 유지 */
    .covta { flex:3 1 0; }   /* 텍스트 67%→75% · 이미지 슬롯(.covimg flex:1) 33%→25% = 현 너비의 75% */
  }
  .file { display:block; padding:12px; border:1px dashed rgba(var(--accent-rgb),.5); border-radius:9px; text-align:center; color:#cfd2d7; cursor:pointer; transition:color .18s, border-color .18s, background .18s; }   /* 이미지 선택칸 통일 = ly 초록 강조 */
  .file.has { color:var(--accent); border-color:var(--accent); border-style:solid; }
  .file.picking { color:var(--accent); border-color:var(--accent); background:rgba(var(--accent-rgb),.09); }   /* 누름→업로드창 열린 동안 강조(자연 전환) · 창 닫히면 해제(운영자 260622) */
  /* 미리보기 = 4:5 컴팩트(업로드 보통 1080×1350) · 파일명은 칸 안 차지 말고 우하단 50% 반투명 오버레이(우측정렬) */
  .fileprev { position:relative; display:inline-block; margin-top:8px; max-width:100%; }
  .fileprev img { display:block; aspect-ratio:4/5; height:230px; max-width:100%; width:auto; object-fit:cover; border-radius:7px; }
  .fileprev .fn { position:absolute; right:0; bottom:0; max-width:100%; box-sizing:border-box; margin:0;
    background:rgba(0,0,0,.5); color:#fff; font-size:10.5px; line-height:1.3; padding:3px 8px; border-radius:7px 0 7px 0;
    text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); }
  /* 업로드 이미지 삭제(휴지통) = 다운로드 버튼(.imgdl) 결 계승 — 이미지 위라 플레이트 검정 20%(아이콘 그린 유지·.imgdl/.imgedit과 통일 · 운영자 260624) */
  .fileprev .filerm { position:absolute; top:8px; right:8px; width:34px; height:34px; display:grid; place-items:center; padding:0; color:var(--accent); background:rgba(0,0,0,.20); border:0; border-radius:10px; cursor:pointer; z-index:2; filter:drop-shadow(0 1px 3px rgba(0,0,0,.6)); -webkit-tap-highlight-color:transparent; transition:transform .12s, background .15s, color .15s; }
  .fileprev .filerm:hover { background:rgba(0,0,0,.24); }
  .fileprev .filerm:active { transform:scale(.82); background:rgba(0,0,0,.32); }
  .fileprev .filerm svg { display:block; width:15px; height:15px; }
  /* 생성 버튼 = 카드 '카드 이미지 생성'(.mkbtn)과 통일 = 글래스 고스트(accent-dim+테두리+네온 글자·pill·하단 게이지 · 운영자 260621) */
  .go { width:100%; margin-top:16px; padding:14px; background:var(--accent-dim); color:var(--accent); border:1px solid rgba(var(--accent-rgb),.36); border-radius:999px; font-weight:800; font-size:14px; font-family:inherit; cursor:pointer; position:relative; overflow:hidden; transition:transform .12s ease, background .15s ease, border-color .15s ease; }
  .go:hover { background:rgba(var(--accent-rgb),.18); border-color:rgba(var(--accent-rgb),.5); }
  .go:active { transform:scale(.955); background:rgba(var(--accent-rgb),.2); }
  .go:disabled { opacity:.5; cursor:default; transform:none; }
  .go.shake { animation:edshake .42s; }   /* 내용 미입력 등 전송 막힘 = 좌우 흔들림(edshake 재사용·운영자 260622) */
  @media (prefers-reduced-motion:reduce) { .go.shake { animation:none; } }
  .go.err { background:rgba(255,77,77,.14); color:#ff7a7a; border-color:#ff5d5d; }   /* 미입력 메시지를 버튼 안에 빨강 액티브로 표시(.ed-chip.reject 빨강 계승 · 운영자 260622) */
  .go.warn { background:rgba(var(--amber-rgb),.16); color:var(--amber); border-color:var(--amber); }   /* 강조(*별표*) 누락 = 앰버 액티브(빨강 미입력과 색만 구분 · 진행 불가 · 운영자 260622) */
  .go.firing { color:var(--on-accent); pointer-events:none; opacity:1;
    background:linear-gradient(var(--accent),var(--accent)) left/0% 100% no-repeat, linear-gradient(var(--accent-dim),var(--accent-dim));
    animation:goFill .72s linear forwards; }   /* 누르면 버튼 전체를 초록이 좌→우로 채움(구성도 .send.is-fire 정본·260622) */
  @keyframes goFill { from { background-size:0% 100%, 100% 100%; } to { background-size:100% 100%, 100% 100%; } }   /* 0%(퍼센트)+명시 from = 부드러운 보간(0 길이면 끝에서 툭 튐) */
  @media (prefers-reduced-motion:reduce) { .go.firing { animation-duration:.2s; } }
  .go.okdone { background:var(--accent); color:var(--on-accent); border-color:var(--accent); }   /* 전송됨 = 초록 채움(.iobtn.ok 계승 · 완료비트) */
  .go.checking { display:grid; place-items:center; }   /* 체크 그리는 동안 SVG 중앙정렬 */
  .go .gck { width:26px; height:26px; }
  .go .gck path { fill:none; stroke:var(--on-accent); stroke-width:2.7; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:24; stroke-dashoffset:24; animation:goTick .38s .04s ease forwards; }   /* 시안1 = 스트로크 드로우(완료 체크) */
  @keyframes goTick { to { stroke-dashoffset:0; } }
  @media (prefers-reduced-motion:reduce) { .go .gck path { animation:none; stroke-dashoffset:0; } }
  .go.spelling { animation:goSpell 1s ease-in-out infinite; }   /* 맞춤법 확인 중 = 부정형 펄스(게이지 아님 — 소요시간 불확정) */
  @keyframes goSpell { 0%,100% { opacity:.6; } 50% { opacity:1; } }
  @media (prefers-reduced-motion:reduce) { .go.spelling { animation:none; opacity:.8; } }
  /* 맞춤법 교정 = 노랑 재확인(리뷰) + 노랑 게이지/체크(게이지바 유지, 색만 노랑) */
  .go.spell-arm { background:rgba(var(--arm-rgb),.16); color:var(--arm); border-color:rgba(var(--arm-rgb),.55); }
  .go.firing.fy { background:linear-gradient(var(--warn),var(--warn)) left/0% 100% no-repeat, linear-gradient(rgba(var(--warn-rgb),.16),rgba(var(--warn-rgb),.16)); }
  .go.okdone.fy { background:var(--warn); color:var(--on-arm); border-color:var(--warn); }
  .go.okdone.fy .gck path { stroke:var(--on-arm); }
  /* 축약 = 제작 버튼 안 좌측 오버레이(별도 행 제거·행 절약 · /1·/2만 표시) — 버튼 형제라 클릭 충돌 0·textContent 상태머신 무영향 */
  .gowrap { position:relative; }
  .go-abbr { position:absolute; left:calc(100% / 5); top:50%; transform:translate(-50%, -50%); z-index:2; margin:0; gap:6px; font-size:14px; font-weight:600; line-height:1; color:var(--accent); -webkit-tap-highlight-color:transparent; }   /* 배경 없음·버튼 가로 1/5·수직 중앙·글자크기=버튼 텍스트(14px) */
  .go-abbr .cbox, .go-abbr .ackm { flex:none; }   /* 체크박스 찌그러짐 방지 */
  .go-abbr .cbox { width:14px; height:14px; border-radius:5px; }   /* 축약 글자(14px) 높이와 동일·수직중앙 */
  .go-abbr .ackm { width:10px; height:10px; }
  /* 제작 직전 결과물 명세(통합 모드 — 체크 많아 한눈 요약) · 블릿 말머리·좌측정렬 · 활성=노랑/비활성=회색 */
  .gospec { margin:16px 2px 0; font-size:12.5px; color:var(--mut); text-align:left; line-height:1.8; }
  .gospec .gs-bul { color:var(--mut); font-weight:700; margin-right:4px; }
  .gospec .gs-lbl { color:var(--mut); font-weight:700; }   /* 라벨(헤더/오버레이/축약) = mut 통일(운영자 260624) */
  .gospec .gs-v { color:var(--mut); }
  .gospec .gs-v.on { color:var(--accent); font-weight:700; }   /* 활성값 = 네온그린 강조(노랑→accent 통일·운영자 260624) */

<!-- OPA 조절 = 섹션 헤더 '• 오버레이 (OPA 60)'의 60에 인라인 휠/드래그(별도 팝업 없음) -->

<script>
const $ = s => document.querySelector(s);
// 네이티브 confirm 대체 — 앱 글래스 모달(뉴스 요약기 UI 계승). 진행=true / 취소·바깥·ESC=false.
function askConfirm(msg) {
  return new Promise(resolve => {
    const dlg = $('#cfmdlg'); $('#cfmMsg').textContent = msg;
    const done = v => { dlg.close(); cleanup(); resolve(v); };
    const onYes = () => done(true), onNo = () => done(false);
    const onBackdrop = e => { if (e.target === dlg) done(false); };   // 바깥 클릭 = 취소
    const onCancel = e => { e.preventDefault(); done(false); };       // ESC(native)
    // ⚠️ iframe(도구 모달) 안에서 뜰 때: 캡처단계로 ESC 자체처리 + stopPropagation → 부모 #tooldlg가 먼저 닫혀 프로미스 고아되는 레이스 차단
    const onKey = e => { if (e.key === 'Escape') { e.preventDefault(); e.stopPropagation(); done(false); } };
    function cleanup() {
      $('#cfmYes').removeEventListener('click', onYes); $('#cfmNo').removeEventListener('click', onNo);
      dlg.removeEventListener('click', onBackdrop); dlg.removeEventListener('cancel', onCancel);
      document.removeEventListener('keydown', onKey, true);
    }
    $('#cfmYes').addEventListener('click', onYes); $('#cfmNo').addEventListener('click', onNo);
    dlg.addEventListener('click', onBackdrop); dlg.addEventListener('cancel', onCancel);
    document.addEventListener('keydown', onKey, true);
    dlg.showModal();
  });
}
let APP = '1', FMT = 'post';
let cOpa1on = true, cOpa2on = false, cOpa2val = 30;   // 릴스 자막 OPA: 60(고정값·토글) + 보조(기본30·스크롤 조절·토글) · 최소 1개 (운영자 260624)
let _spellReview = null, _spellApplied = false, _applyingSpell = false;   // 맞춤법 교정 리뷰 상태(칩 개별선택)
const IMG = { b64: '', name: '' };    // /1·/5 배경
const CIMG = { b64: '', name: '' };   // /2 릴스 자막 배경(옵션)
const PIMG = { b64: '', name: '' };   // /1 포스트 배경(옵션·슬롯) — 카드뉴스 IMG와 분리(위젯 desync 방지·260624)

// ---- 탭 ----
function selApp(a) {
  APP = a;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.app === a));
  // 표시 토글
  $('#imgBox').classList.toggle('none', a !== '5');   // 배경 = /5 카드뉴스만(포스트는 텍스트 covrow 슬롯·260624)
  $('#linesBox').classList.toggle('none', a !== '1');   // 텍스트 = /1 포스트만 (/5는 칩 에디터)
  $('#warnBox').classList.toggle('none', a !== '4');                    // 경고문 = /4 (프리셋)
  $('#cardBox').classList.toggle('none', a !== '5');                    // 카드뉴스 = /5 인라인 칩 에디터
  $('#reelsBox').classList.toggle('none', a !== '2');
  $('#copyBox').classList.toggle('none', a !== '3');
  $('#fmtBox').classList.toggle('none', a === '1' || a === '2' || a === '5');   // 1·2·5 포맷 고정
  $('#abbrBox').classList.add('none');   // 축약 = 전 탭 goSpec 명세 ON 토글로 이동(버튼 안 체크박스 폐지)
  if (a === '4' || a === '3') document.querySelectorAll('#fmtSeg button').forEach(b => b.classList.add('on'));                  // 경고문·저작권 = 포스트+릴스 둘 다 기본(멀티·둘 다 출력·최소1)
  $('#opaBox').classList.toggle('none', a !== '1');   // OPA = /1 포스트만
  // (linesMax 폐지 — 포스트 설명줄을 postSpec 축약 명세로 대체)
  if (a === '5') { if (!edLines.length) edLines = [[]]; renderEditChips(); }   // 인라인 칩 에디터 init/refresh
  if (a === '1') updateTrkHint('lines', 'linesTrk', 'post');                   // 실시간 자간
  if (a === '2') updateComboTrk();                                             // 릴스 단일 폼 자간 안내(부제/제목·자막)
  if (a === '3') updateCopyHint();                                             // 저작권 미리보기 즉시 갱신(예시 nomute 회색 반영)
  clearSpellReview();                                                          // 앱 바뀌면 진행 중이던 교정 리뷰 폐기
  const gb = $('#go');                                                         // 버튼 문구 = 맞춤법 대상 앱(1·2·4)만 '및 맞춤법 교정'
  if (gb) { const lbl = (a === '1' || a === '2' || a === '4') ? '이미지 제작 및 맞춤법 교정' : '이미지 제작'; gb.dataset.label = lbl;
    if (!gb.classList.contains('firing') && !gb.classList.contains('okdone') && !gb.classList.contains('spell-arm')) gb.textContent = lbl; }
  updateGoSpec();
}
document.querySelectorAll('.tab').forEach(t => t.onclick = () => selApp(t.dataset.app));

// ---- 줄 수 하드캡 (포스트3·카드뉴스4·릴스자막3·경고문2 — 넘는 줄 못 쓰게) ----
function maxLinesFor(ta) {
  if (ta.id === 'lines') return APP === '1' ? 3 : APP === '5' ? 4 : 0;
  if (ta.id === 'cLines') return 3;
  if (ta.id === 'warnLines') return 2;
  return 0;
}
['lines', 'cLines', 'warnLines'].forEach(id => {
  const ta = document.getElementById(id);
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter') { const m = maxLinesFor(ta); if (m && ta.value.split('\n').length >= m) e.preventDefault(); }
  });
  ta.addEventListener('input', () => {
    const m = maxLinesFor(ta); if (!m) return;
    const ls = ta.value.split('\n'); if (ls.length > m) ta.value = ls.slice(0, m).join('\n');   // 붙여넣기 등 초과분 잘라냄
  });
});

// ---- /3 플랫폼 로고 선택 (직접입력 = 하단 입력창 포커스) ----
function getPlatform() {
  const sel = document.querySelector('#pseg .on');
  if (!sel) return '';
  return sel.dataset.plat === 'custom' ? $('#cplat').value.trim() : sel.dataset.plat;
}
function updateCopyHint() {
  const y = $('#cyear').value.trim() || '2026', nRaw = $('#cname').value.trim(), p = getPlatform();
  const n = nRaw ? esc(nRaw) : '<span class="cph-eg">nomute</span>';   // 이름 미입력 = 예시(옅은 회색) · 입력하면 일반색(운영자 260624)
  $('#copyHint').innerHTML = 'ⓒ ' + esc(y) + '. ' + n + (p ? '(' + esc(p) + ')' : '') + '. all rights reserved.';   // 사용자 입력은 esc(저장형 XSS 방지)·예시만 raw span
}
// 저작권 미리보기 = 탭하면 복사(뉴스 요약 키워드칩 .cref-kw 의 복사-액티브 계승: 초록 눌림 플래시 · '→ ' 화살표는 UI 표식이라 복사 제외)
(function () {
  const ch = $('#copyHint'); if (!ch) return;
  ch.addEventListener('animationend', () => ch.classList.remove('copied'));
  const doCopy = async () => { try { await navigator.clipboard.writeText((ch.textContent || '').replace(/^→\s*/, '')); } catch {} ch.classList.remove('copied'); void ch.offsetWidth; ch.classList.add('copied'); };
  ch.addEventListener('click', doCopy);
  ch.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); doCopy(); } });
})();
document.querySelectorAll('#pseg button').forEach(b => b.onclick = () => {
  document.querySelectorAll('#pseg button').forEach(x => x.classList.toggle('on', x === b));
  const custom = b.dataset.plat === 'custom';
  $('#cplat').classList.toggle('none', !custom);
  if (custom) $('#cplat').focus();
  updateCopyHint();
});
['cplat', 'cyear', 'cname'].forEach(id => $('#' + id).addEventListener('input', updateCopyHint));

// ---- /4 경고문 프리셋 (Opus 5인 만장일치 검토 — AI=AI기본법 §31② 표시의무, 나머지=자율 안내) ----
const WARN_PRESETS = {
  ai: '본 이미지는 생성형 AI로 제작·합성되었습니다.',
  caution: '민감하거나 충격적인 내용이 포함될 수 있으니 시청에 주의 바랍니다.',
};
// 점등된 프리셋(AI·경고)을 순서대로 합성 → 제작은 이 텍스트(=점등분) 기준. 텍스트는 직접 수정 가능.
function composeWarn() {
  const lit = [...document.querySelectorAll('#warnPreset button.on')].map(b => b.dataset.wp);
  $('#warnLines').value = ['ai', 'caution'].filter(k => lit.includes(k)).map(k => WARN_PRESETS[k]).join('\n');
  $('#warnLines').dispatchEvent(new Event('input', { bubbles: true }));   // io 버튼·자간 트래커 갱신
}
// 단일선택(하나만) · 기본 경고. 클릭 = 그 프리셋만 점등(나머지 끔) → 텍스트 교체(직접 수정 가능).
document.querySelectorAll('#warnPreset button').forEach(b => b.onclick = () => {
  document.querySelectorAll('#warnPreset button').forEach(x => x.classList.toggle('on', x === b));
  composeWarn();
});

// ---- 포맷 세그 ---- (/4 경고문·/3 저작권 = 포스트·릴스 멀티토글[최소1·둘 다 출력] / 그 외 = 단일선택 FMT)
document.querySelectorAll('#fmtSeg button').forEach(b => b.onclick = () => {
  if (APP === '4' || APP === '3') {
    const litN = document.querySelectorAll('#fmtSeg button.on').length;
    if (b.classList.contains('on') && litN === 1) return;   // 마지막 1개는 못 끔(0 방지)
    b.classList.toggle('on');
  } else {
    FMT = b.dataset.fmt;
    document.querySelectorAll('#fmtSeg button').forEach(x => x.classList.toggle('on', x === b));
  }
});

// ---- OPA 세그 (58 기본 / 30 / 직접입력 = 버튼 안 입력창 · 2자리 자동 이탈) ----
const opaNum = $('#opaNum');
// OPA = 다중선택 토글(기본 58만 ON → 1장 · 30은 탭하면 추가 = 둘 다 생성). 선택된 것들이 곧 생성 장수.
// 최소 1개 유지 = 마지막 1개는 못 끔(0개 미선택 불가). custom = 추가 opa 토글.
document.querySelectorAll('#opaSeg button').forEach(b => b.onclick = () => {
  if (b.dataset.opa === 'custom') { b.classList.add('on'); opaNum.focus(); opaNum.select(); return; }   // 직접입력 = 값 기반: 펼쳐서 포커스만(끄지 않음)·끄기는 값 비우고 벗어남(/2와 통일)
  const onCnt = document.querySelectorAll('#opaSeg button.on').length;
  if (b.classList.contains('on') && onCnt <= 1) return;   // 마지막 1개 해제 금지(0개 불가)
  b.classList.toggle('on');
});
opaNum.addEventListener('input', () => {   // 숫자만·1~99(0 불가·2자리 상한), 2자리 차면 자동 blur
  let v = opaNum.value.replace(/[^0-9]/g, '').slice(0, 2);   // 2자리 상한 — 3자리 키보드 퀴크 제거(최대 99)
  if (v !== '') v = String(Math.min(99, parseInt(v, 10)));
  if (v === '0') v = '';   // opa 값 0 차단
  opaNum.value = v;
  if (v.length >= 2) opaNum.blur();
});
opaNum.addEventListener('blur', () => {   // 값 없이 벗어나면 직접입력 끔(라벨 복귀) = '끄려면 값 비우기'
  if (!opaNum.value) $('#opaCustom').classList.remove('on');
});
function getOpas() {   // 선택된(.on) opa 전부 = 생성할 장수. custom은 값(1~99) 있을 때만 추가. 빈배열 폴백 [58].
  const out = [];
  document.querySelectorAll('#opaSeg button.on').forEach(b => {
    if (b.dataset.opa === 'custom') { const n = parseInt(opaNum.value, 10); if (Number.isFinite(n) && n >= 1) out.push(Math.min(99, n)); }
    else { const n = parseInt(b.dataset.opa, 10); if (Number.isFinite(n)) out.push(n); }
  });
  return out.length ? out : [58];
}

// ---- 릴스 = 단일 폼(포맷 분기 폐지 · 260624). selRmode/RMODE 제거 — selApp(2)이 폼 표시·자간 init 담당. ----
// 제작 직전 결과물 명세(릴스 옵션줄) — 배경/OPA30/이미지/축약 상태 실시간 반영(활성=accent). show=APP 2만.
function syncOnOff(id, on) { const e = $(id); if (e) { e.textContent = on ? 'ON' : 'OFF'; e.classList.toggle('on', !!on); } }   // OFF/ON 토글 표시(축약·배경 공용·260624)
function syncAbbrSpec(id) { syncOnOff(id, $('#abbr').checked); }
function updateGoSpec() {
  // 릴스 단일 폼 옵션줄 (배경 / OPA 60[+30] / 합성본 / 축약)
  const spec = $('#goSpec'), head = $('#rOptHead');
  const show2 = (APP === '2');
  if (head) head.classList.toggle('none', !show2);
  if (spec) {
    spec.classList.toggle('none', !show2);
    if (show2) {
      syncOnOff('#gsBg', $('#cBg').checked);            // 배경(nobg 헤더) OFF/ON — 흰칸 고정, 배경 추가 여부
      const o1 = $('#gsOpa1'); if (o1) o1.classList.toggle('on', cOpa1on);                    // 60 토글
      const o2 = $('#gsOpa2'); if (o2) { o2.classList.toggle('on', cOpa2on); o2.textContent = cOpa2on ? String(cOpa2val) : '+30'; }   // 보조(30·조절) 토글
      $('#gsImg').classList.toggle('on', !!CIMG.b64);   // 이미지 첨부 → 합성본 자동
      syncAbbrSpec('#gsAbbr');
    }
  }
  // 포스트(/1) 명세 — 축약만(OPA 세그·이미지·텍스트는 유지). postSpec은 linesBox 안이라 show는 linesBox 종속.
  if (APP === '1') syncAbbrSpec('#psAbbr');
}

const IDB_NAME = 'nomute_thumb_img', IDB_STORE = 'imgs';
function idbOpen() { return new Promise((res, rej) => { let r; try { r = indexedDB.open(IDB_NAME, 1); } catch (e) { return rej(e); } r.onupgradeneeded = () => { const db = r.result; if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE); }; r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }
async function idbPut(key, b64) { try { const db = await idbOpen(); await new Promise((res, rej) => { const tx = db.transaction(IDB_STORE, 'readwrite'); tx.objectStore(IDB_STORE).put({ b64, ts: Date.now() }, key); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); }); return true; } catch { return false; } }
async function idbGet(key) { try { const db = await idbOpen(); return await new Promise(res => { const tx = db.transaction(IDB_STORE, 'readonly'); const rq = tx.objectStore(IDB_STORE).get(key); rq.onsuccess = () => res(rq.result || null); rq.onerror = () => res(null); }); } catch { return null; } }
function idbPrune(cut) { idbOpen().then(db => { const tx = db.transaction(IDB_STORE, 'readwrite'); const st = tx.objectStore(IDB_STORE); const rq = st.openCursor(); rq.onsuccess = e => { const c = e.target.result; if (!c) return; if (!c.value || (c.value.ts || 0) < cut) st.delete(c.key); c.continue(); }; }).catch(() => {}); }   // 12h 경과분 정리(이력 보관과 동기)
function idbClear() { idbOpen().then(db => { db.transaction(IDB_STORE, 'readwrite').objectStore(IDB_STORE).clear(); }).catch(() => {}); }

function renderJob(job) {   // 잡 로그 행 갱신(없으면 생성, 최신이 위)
  let row = document.getElementById('job-' + job.n);

  else { ic = SPIN_SVG; tx = '제작 중 ' + sec + 's · ' + dn + '/' + tot + '장'; }

    sv.innerHTML = DLSEQ_IC + '<span class="jslbl">전체</span>';
    sv.onclick = () => jSaveSeq(job);
    if (job._dlSt) { sv.classList.add(job._dlSt.cls); sv.style.setProperty('--p', job._dlSt.p); const _l = sv.querySelector('.jslbl'); if (_l) _l.textContent = job._dlSt.txt; if (job._dlSt.cls === 'dlseq-busy') sv.style.pointerEvents = 'none'; }   // 다운 진행 중 재렌더돼도 상태 복원(✓ 유지·운영자 260623)

function pollJob(job) {   // 각 잡 독립 폴링(5s) — 완성 슬롯은 캐러셀에 추가. 180s(3분) 타임아웃(운영자 260618: 무한대기 차단).
  const JOB_TIMEOUT_S = 180;   // 정상 렌더+커밋 = ~70s. 3분 넘으면 렌더 워크플로 실패(PIL 에러·push 경합 유실·20분 행) 추정 → FAIL.
  const tick = () => {
    if (job.done.every(Boolean)) { job.status = 'done'; renderJob(job); return; }
    if (Math.round((Date.now() - job.t0) / 1000) > JOB_TIMEOUT_S) { job.status = 'err'; job.msg = '시간 초과(3분) — 렌더 실패 추정, 다시 시도'; renderJob(job); return; }
    renderJob(job);
    job.outs.forEach((o, i) => {
      if (job.done[i]) return;
      const url = o.path + '?t=' + Date.now();
      const img = new Image();
      img.onload = () => {
        if (job.done[i]) return; job.done[i] = true;
        // 변형 순서(0,1,2…)대로만 캐러셀에 추가 = 로드 완료 순서 무관 '1번부터' 노출. 먼저 로드된 뒷 변형은 앞 변형 도착까지 버퍼 대기.
        (job._ready || (job._ready = {}))[i] = [url, dlStamp(job.t0) + '_' + dlSlug(job.label) + '_' + pad3(job.n) + (o.label ? '_' + o.label : '') + '.' + (o.path.split('.').pop() || 'png'), job.label + ' #' + job.n, job, o.label ? ' · ' + o.label : '', o];
        if (job._next == null) job._next = 0;
        while (job._ready[job._next]) { carAppend(...job._ready[job._next]); delete job._ready[job._next]; job._next++; }
        if (job.done.every(Boolean)) job.status = 'done';   // 마지막 장 로드 즉시 완료 표시(5s tick 안 기다림)
        renderJob(job);
      };
      img.src = url;   // 아직 없으면 무시 → 다음 tick 재시도
    });
    setTimeout(tick, 5000);
  };
  tick();
}
function dlStamp(ts) {   // 다운로드 파일명 시각 프리픽스 yymmdd_hhmm — 제작(job.t0) 기준. 시스템 전 다운로드 일관(index.html dlStamp과 동일 포맷).
  const n = new Date(ts || Date.now()), p = x => String(x).padStart(2, '0');
  return `${String(n.getFullYear()).slice(2)}${p(n.getMonth() + 1)}${p(n.getDate())}_${p(n.getHours())}${p(n.getMinutes())}`;
}

// ---- 릴스 헤더(부제/제목) 실시간 자간 — reels2 _fit_tr 추정(getlength 기준 · AVAIL 960) ----
const HDR = {
  sub:   { H: 60.72, S: 14.98, N: 38.94, fs: 66, avail: 960, floor: -45 },
  title: { H: 82.80, S: 20.44, N: 53.09, fs: 90, avail: 960, floor: -45 },
};
function estHeaderTr(text, cfg) {   // reels2 _fit_tr(0→-45) 추정
  if (!text) return { tr: 0, over: false };
  const w = tr => { let s = 0; for (const ch of text) s += /[가-힣ㄱ-ㅎㅏ-ㅣ]/.test(ch) ? cfg.H : ch === ' ' ? cfg.S : cfg.N; return s + (tr / 1000 * cfg.fs) * Math.max(text.length - 1, 0); };
  if (w(0) <= cfg.avail) return { tr: 0, over: false };
  for (let x = -1; x >= cfg.floor; x--) if (w(x) <= cfg.avail) return { tr: x, over: false };
  return { tr: cfg.floor, over: true };
}
function renderHdrTrk(elSel, subSel, titleSel) {   // 헤더(부제/제목) reels2 자간 추정 → elSel 표시(헤더 탭·기본 탭 공용) · classList 토글로 base 클래스(cmtrk 등) 보존
  const el = $(elSel); if (!el) return;
  const s = estHeaderTr($(subSel).value.trim(), HDR.sub), t = estHeaderTr($(titleSel).value.trim(), HDR.title);
  const parts = [];
  if (s.over) parts.push('부제 축약필요'); else if (s.tr < 0) parts.push(`부제 자간${s.tr} 적용`);
  if (t.over) parts.push('제목 축약필요'); else if (t.tr < 0) parts.push(`제목 자간${t.tr} 적용`);
  el.textContent = parts.length ? '· ' + parts.join(' · ') : '';
  el.classList.remove('on', 'over');
  if (s.over || t.over) el.classList.add('over'); else if (parts.length) el.classList.add('on');
}

  renderHdrTrk('#cHdrTrk', '#cSub', '#cTitle');
  updateTrkHint('cLines', 'cLinesTrk', 'reels');
}

let _goLock = false;   // 더블탭 오발사만 방지(짧은 디바운스) — 큐잉 자체는 막지 않음
// 축약 = 기본 4종(정본·절대규칙5·불변) + 사용자 커스텀 쌍(축약 토글 롱프레스 등록·localStorage). 리터럴 치환(split/join = 정규식 이스케이프 불요).
const ABBR_BUILTIN = [['...', '⋯'], ['•', '·'], ['이,', '李,'], ['윤,', '尹,']];   // 정본 4종 — 절대규칙(불변)
const ABBR_KEY = 'nomute_thumb_abbr';   // 사용자 커스텀 [{from,to},…]
function abbrCustom() { try { const a = JSON.parse(localStorage.getItem(ABBR_KEY) || '[]'); return Array.isArray(a) ? a.filter(p => p && p.from) : []; } catch { return []; } }
function abbr(s) {
  let out = String(s);
  for (const [from, to] of ABBR_BUILTIN) out = out.split(from).join(to);            // 기본 4종 먼저
  for (const p of abbrCustom()) out = out.split(String(p.from)).join(String(p.to == null ? '' : p.to));   // 커스텀(앞뒤 글자까지 from에 넣어 스코프)
  return out;
}

function goFire(yellow) {   // yellow=맞춤법 교정 적용 생성 → 게이지·체크 노랑(게이지바 동작은 동일)
  const gb = document.getElementById('go'); if (!gb) return;
  if (!gb.dataset.label) gb.dataset.label = gb.textContent;        // 원래 라벨 보존(재진입 시 덮어쓰기 방지)
  clearTimeout(gb._fT1); clearTimeout(gb._fT2); clearTimeout(gb._fT3); clearTimeout(gb._errT);
  gb.classList.remove('firing', 'okdone', 'checking', 'err', 'warn', 'shake', 'spelling', 'fy', 'spell-arm'); void gb.offsetWidth;    // 리플로우 = 게이지 재시작
  gb.classList.add('firing'); if (yellow) gb.classList.add('fy'); gb.textContent = '전송 중…'; gb.setAttribute('aria-busy', 'true');
  gb._fT1 = setTimeout(() => {                                     // 게이지 완료 → ✓ 체크가 그려짐(시안1)
    gb.classList.remove('firing'); gb.classList.add('okdone', 'checking');   // 'fy'는 유지(노랑 체크)
    gb.innerHTML = '<svg class="gck" viewBox="0 0 24 24" role="img" aria-label="전송됨"><path d="M5 13l4 4L19 7"/></svg>';
    gb.removeAttribute('aria-busy');
    gb._fT2 = setTimeout(() => {                                   // 체크 후 → '전송됨'(이미지 완료 아님 = 진행은 작업카드가 표시)
      gb.classList.remove('checking'); gb.textContent = '전송됨';
      gb._fT3 = setTimeout(() => { gb.classList.remove('okdone', 'fy'); gb.textContent = gb.dataset.label || '이미지 제작'; }, 850);
    }, 560);
  }, 900);
}
function dispatchJob(endpoint, payload, label, src) {
  goFire(_spellApplied);   // 전송 피드백 = 실제 전송 시점에만(검증 통과·재발사 포함) · 맞춤법 적용 시 노랑 게이지
  clearRestored();   // 새 제작 = 복원된 최근 결과 고스트 치움(새 결과가 맨 위·운영자 260622)
  const job = { n: ++JOBSEQ, label, t0: Date.now(), outs: [], done: [], status: 'run', msg: '', endpoint, payload, src };   // endpoint·payload 보관 = 실패 시 같은 설정 재발사 · src = 제작 조건 스냅샷(수정 복원·운영자 260624)
  JOBS.unshift(job); renderJob(job);
  (async () => {
    try {
      const res = await fetch(endpoint, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(payload) });
      const j = await res.json();
      if (!res.ok || j.error) { job.status = 'err'; job.msg = (j.error || ('서버 ' + res.status)); renderJob(job); return; }
      job.outs = j.outs || (j.out ? [{ path: j.out, label: '' }] : []);
      job.thid = j.id || thIdOf((job.outs[0] || {}).path) || '';   // 작업 id = 알림 #done=<id> 랜딩 매칭키(api/thumb 반환 id, 없으면 출력경로서 추출)
      job.done = job.outs.map(() => false);
      if (!job.outs.length) { job.status = 'err'; job.msg = '출력 경로 없음'; renderJob(job); return; }
      pollJob(job);
    } catch (e) { job.status = 'err'; job.msg = '요청 실패: ' + e.message; renderJob(job); }
  })();
}
// ── 맞춤법 자동교정 — 제작(글자 카운트/검증) 전에 부산대 검사기로 자유 텍스트 교정(비-LLM·토큰 0) ──

}

function paintGoReview() {   // 리뷰 중 버튼: 점등 있으면 노랑(재확인) / 다 풀면 초록(맞춤법 안 함)

async function runSpellCheck() {   // 1차 누름 = 검사 → _spellReview 구성. 교정 있으면 true(리뷰 진입), 없으면 false(바로 생성).
  const els = spellTargets().filter(Boolean);
  const texts = els.map(el => el.value || '');
  if (!texts.some(t => t.trim())) return false;
  const gb = $('#go');
  if (gb) { if (!gb.dataset.label) gb.dataset.label = gb.textContent; gb.classList.add('spelling'); gb.setAttribute('aria-busy', 'true'); gb.textContent = '맞춤법 확인 중…'; }
  let res;
  try {
    const ctrl = new AbortController(); const to = setTimeout(() => ctrl.abort(), 12000);
    try { const r = await fetch('/api/spellcheck', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ texts }), signal: ctrl.signal }); if (r.ok) res = await r.json(); } finally { clearTimeout(to); }
  } catch {}   // 미도달=모호 → 무보정 생성(건강 안 건드림)
  finally { if (gb) { gb.classList.remove('spelling'); gb.removeAttribute('aria-busy'); gb.textContent = gb.dataset.label || '이미지 제작'; } }
  if (!res) return false;
  if (res.ok === false) { setSHC(false, res.error || 'backend'); return false; }   // 검사기 명시 실패 = 불건강(노란 링)
  if (!res.ok || !Array.isArray(res.corrected)) return false;
  setSHC(true);
  const fields = [];
  els.forEach((el, i) => {
    const orig = texts[i];
    const corrected = (typeof res.corrected[i] === 'string') ? res.corrected[i] : orig;
    const corr = (res.corrections && res.corrections[i]) || [];
    if (corr.length) fields.push({ el, original: orig, corrected, corrections: corr.map(c => ({ from: c.from, to: c.to, lit: true })) });
    else if (corrected !== orig) fields.push({ el, original: orig, corrected, corrections: [{ from: orig, to: corrected, lit: true }] });   // 쌍 못 뽑았지만 교정됨 → 통째 칩(조용한 유실 방지)
  });
  if (!fields.length) return false;   // 진짜 오타 0(원본=교정) → 리뷰 없이 바로 생성
  _spellReview = { fields };
  return true;
}
function applySpellReview() {   // 2차 누름 = 점등된 교정만 적용. _spellApplied=적용 여부(게이지 색).
  _spellApplied = false;
  if (!_spellReview) return;
  _applyingSpell = true;
  _spellReview.fields.forEach(f => {
    const lits = f.corrections.filter(c => c.lit);
    let val;
    if (!lits.length) val = f.original;                                   // 다 해제 = 원문(맞춤법 안 함)
    else if (lits.length === f.corrections.length) val = f.corrected;     // 다 점등 = 통째 교정(정확)
    else { val = f.original; lits.forEach(c => { val = val.replace(c.from, c.to); }); }   // 일부 = 순차 치환(첫 일치)
    if (lits.length) _spellApplied = true;
    if (val !== f.el.value) { f.el.value = val; f.el.dispatchEvent(new Event('input', { bubbles: true })); }   // 자간 트래커·줄 클램프 갱신
  });
  _applyingSpell = false;
  clearSpellReview();
}

  // /1 포스트 = /api/thumb (릴스·저작권·경고문·카드는 위에서 처리·return)
  const params = buildParams();
  if (APP === '1' && !(Array.isArray(params.lines) && params.lines.length)) return errStatus('텍스트를 넣어주세요');   // 포스트 = 텍스트 필수 — 빈 채 발사 차단 + 제작 버튼 흔들림(운영자 260622)
  if (APP === '1' && $('#abbr').checked && Array.isArray(params.lines)) params.lines = params.lines.map(abbr);   // 축약 = 포스트(정본 화이트리스트)
  if (APP === '1' && !/\*[^*\n]+\*/.test($('#lines').value)) return errStatus('강조를 넣어주세요', 'warn');   // 강조(*별표*) 필수 — 앰버 버튼 흔들림(운영자 260622)
  const payload = { app: APP, params };
  if (APP === '1' && PIMG.b64) { payload.imageB64 = PIMG.b64; payload.name = PIMG.name; }       // 포스트 배경 = 옵션(슬롯·PIMG)
  dispatchJob('/api/thumb', payload, jobLabel(), SRC);
  } finally { _goLock = false; }   // 동기 종료(검증 return·디스패치) 직후 해제 = 연속 제작 큐잉은 그대로 허용
};
function errStatus(m, cls) {   // 전송 막힘 = 메시지를 버튼 *안에* 액티브로 띄우며 흔들고 1.7s 뒤 원복(운영자 260622). cls 기본 'err'(빨강·미입력) / 'warn'(앰버·강조 누락)
  cls = cls || 'err';
  const s = $('#status'); s.textContent = ''; s.classList.remove('err', 'ok');   // 버튼 밑 별도 메시지 폐지 — 버튼 안에 표시(맞춤법 ok 잔존 클래스도 정리)
  const g = document.getElementById('go'); if (!g) return;
  if (!g.dataset.label) g.dataset.label = g.textContent;        // 원래 라벨 보존(재진입 시 덮어쓰기 방지)
  clearTimeout(g._fT1); clearTimeout(g._fT2); clearTimeout(g._fT3); clearTimeout(g._errT);
  g.classList.remove('firing', 'okdone', 'checking', 'err', 'warn', 'fy', 'spell-arm', 'spelling'); g.removeAttribute('aria-busy');
  g.textContent = m; g.setAttribute('aria-live', 'assertive');  // 메시지 = 버튼 안에
  g.classList.add(cls); g.classList.remove('shake'); void g.offsetWidth; g.classList.add('shake');
  g._errT = setTimeout(() => { g.classList.remove('err', 'warn', 'shake'); g.textContent = g.dataset.label || '이미지 제작'; }, 1700); }

// 다운로드 버튼 표준 클릭효과 = ✓ 팝 + 링 리플(.dlbtn 전 앱 공통 · 위임·캡처 · 운영자 260622)
document.addEventListener('click', e => {
  const b = e.target.closest('.dlbtn'); if (!b) return;
  const o = document.createElement('span'); o.className = 'dl-ack';
  o.innerHTML = '<span class="dl-ring"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
  if (getComputedStyle(b).position === 'static') b.style.position = 'relative';
  b.appendChild(o); setTimeout(() => o.remove(), 700);
}, true);

// 맞춤법 대상 입력 편집 시 진행 중이던 리뷰 폐기(stale 교정 적용 방지) — 프로그램 적용(applySpellReview) 중엔 무시
['#lines', '#warnLines', '#cSub', '#cTitle', '#cLines'].forEach(id => { const el = $(id); if (el) el.addEventListener('input', () => { if (!_applyingSpell && _spellReview) clearSpellReview(); }); });
selApp('1');
renderHist();        // 로컬(이 기기) 즉시 표시
// 자동 맨 위 복원 폐지(운영자 260624) — 평소엔 결과 비움(폼+이력만), 완성 알림 #done=<id> 탭 때만 그 결과를 맨 위로(maybeOpenHist→restoreById)
idbPrune(Date.now() - THUMB_HMS);   // 보관 이미지(IDB) 12h 경과분 정리(이력 보관과 동기 · 운영자 260624)
maybeOpenHist();     // #done=<id>(제작완료 알림) 진입이면 그 결과를 맨 위 큰 결과로 복원·랜딩(서버 병합 후 loadServerHist서 재확인)
loadServerHist();    // 전 기기 제작분(thumb-hist.json) 병합 — 기기간 공유
</script>
<script src="cscroll.js"></script>

<!-- 빠른 메뉴 FAB (우하단·오른엄지) — 중앙 토글 → 9시·10:30·12시 아치 와이프. 2번=컨텍스트 / 3번=이미지 / 4번=도구전환. 운영자 260621. -->
<style>
  #rfab { position:fixed; right:18px; bottom:34%; z-index:70; width:0; height:0; }   /* 위치 = 우측 엄지존. bottom 30%→34% 조금 위로(운영자 260621) */
  /* 코어 = 뉴스 요약 '수정' 연필 FAB(.rev-fab) 외형 계승 — 글래스(반투명+blur+초록 테두리+글로우)·초록 아이콘(운영자 260622) */
  #rfab .rc { position:absolute; right:0; bottom:0; width:54px; height:54px; border-radius:50%; cursor:pointer;
    background:var(--accent-dim); color:var(--accent); border:1px solid rgba(var(--accent-rgb),.42); display:grid; place-items:center;
    backdrop-filter:blur(14px) saturate(1.3); -webkit-backdrop-filter:blur(14px) saturate(1.3);
    box-shadow:0 10px 26px rgba(0,0,0,.42), 0 0 0 1px rgba(var(--accent-rgb),.14), 0 0 20px rgba(var(--accent-rgb),.26);
    transition:transform .25s; -webkit-tap-highlight-color:transparent; }
  #rfab.open .rc { transform:rotate(135deg); }
  #rfab .rc svg { width:26px; height:26px; stroke:currentColor; stroke-width:2.6; fill:none; stroke-linecap:round; }
  /* 세부 버튼도 코어와 동일 글래스 계승(.rev-fab 외형) — 글로우만 작게(운영자 260622) */
  #rfab .ro { position:absolute; right:7px; bottom:7px; border-radius:50%; cursor:pointer; color:var(--accent);
    background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),.42); backdrop-filter:blur(14px) saturate(1.3); -webkit-backdrop-filter:blur(14px) saturate(1.3);
    display:grid; place-items:center; box-shadow:0 6px 16px rgba(0,0,0,.42), 0 0 0 1px rgba(var(--accent-rgb),.14), 0 0 14px rgba(var(--accent-rgb),.22);
    opacity:0; transform:translate(0,0) scale(.3); pointer-events:none;
    transition:transform .32s cubic-bezier(.2,.9,.3,1.25), opacity .22s; -webkit-tap-highlight-color:transparent; }
  #rfab .ro svg { width:19px; height:19px; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  #rfab.open .ro { opacity:1; pointer-events:auto; }
  #rfab .ro.off { opacity:.32 !important; pointer-events:none; }
  #rfab2 { width:46px; height:46px; }  #rfab3 { width:40px; height:40px; }  #rfab4 { width:35px; height:35px; }
  #rfab.open #rfab2 { transform:translate(-88px,0) scale(1); transition-delay:0s; }
  #rfab.open #rfab3 { transform:translate(-64px,-64px) scale(1); transition-delay:.06s; }
  #rfab.open #rfab4 { transform:translate(0,-88px) scale(1); transition-delay:.12s; }
  @media (hover:hover) and (pointer:fine) { #rfab { display:none; } }   /* PC(마우스) = 엄지 빠른메뉴 불필요 → 숨김(.cartrack PC 분기와 동일 컨벤션·운영자 260620) */
  @media (prefers-reduced-motion:reduce){ #rfab .rc, #rfab .ro { transition:opacity .15s; } }
</style>
<div id="rfab" aria-label="빠른 메뉴">
  <button class="ro" id="rfab2" type="button" title="전환/이동"><svg viewBox="0 0 24 24"><path d="M7 10l5-5 5 5M7 14l5 5 5-5"/></svg></button>
  <button class="ro" id="rfab3" type="button" title="이미지 선택"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="M21 16l-5-5L5 20"/></svg></button>
  <button class="ro" id="rfab4" type="button" title="도구 전환"><svg viewBox="0 0 24 24"><path d="M4 8h13l-3-3M20 16H7l3 3"/></svg></button>
  <button class="rc" id="rfabCore" type="button" aria-label="빠른 메뉴 열기"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
</div>
<script>
(function(){
  var rfab = document.getElementById('rfab'); if (!rfab) return;
  var core = document.getElementById('rfabCore'), b2 = document.getElementById('rfab2'),
      b3 = document.getElementById('rfab3'), b4 = document.getElementById('rfab4');
  function imgInput(){ if (APP === '1') return document.getElementById('pFile');
                       if (APP === '2') return document.getElementById('cFile'); return null; }
  function refresh(){ b3.classList.toggle('off', !imgInput()); }   // 이미지 없는 모드 = 3번 비활성
  core.addEventListener('click', function(e){ e.stopPropagation(); rfab.classList.toggle('open'); refresh(); });
  var _rfabKeep = false;   // 세부버튼이 트리거한 합성 click(.click())이 document로 버블 → 메뉴가 닫히던 것 차단(운영자 260621: 전환해도 세부버튼 유지)
  function keepFab(){ _rfabKeep = true; setTimeout(function(){ _rfabKeep = false; }, 0); }
  document.addEventListener('click', function(e){ if (!rfab.contains(e.target) && !_rfabKeep) rfab.classList.remove('open'); });
  function cyc(sel, filt){ var bs = [].slice.call(document.querySelectorAll(sel)); if (filt) bs = bs.filter(filt);
    if (!bs.length) return; var i = bs.findIndex(function(b){ return b.classList.contains('on'); });
    bs[(i + 1 + bs.length) % bs.length].click(); }                 // 기존 버튼 .click() 재사용 = 핸들러 그대로
  b2.addEventListener('click', function(e){ e.stopPropagation(); keepFab();
    if (APP === '2') { var c = document.getElementById('cSub'); if (c) { c.scrollIntoView({ behavior: 'smooth', block: 'center' }); try { c.focus(); } catch (_) {} } }   // 릴스 = 단일 폼(모드 순환 폐지) → 첫 입력칸으로
    else if (APP === '3') cyc('.pbtn', function(b){ return b.dataset.plat !== 'custom'; });  // 저작권 플랫폼(직접 제외)
    else if (APP === '4') cyc('#warnPreset button');                                // 경고문 경고↔AI
    else { var t = (APP === '5') ? (document.getElementById('cardBox') || document.getElementById('lines')) : document.getElementById('lines');
           if (t) { t.scrollIntoView({ behavior: 'smooth', block: 'center' }); try { t.focus(); } catch (_) {} } }  // 포스트/카드 = 입력칸으로
  });
  b3.addEventListener('click', function(e){ e.stopPropagation(); keepFab(); var f = imgInput(); if (f) f.click(); });
  b4.addEventListener('click', function(e){ e.stopPropagation(); keepFab(); var o = ['1','2','3','4','5'], i = o.indexOf(APP); selApp(o[(i + 1) % o.length]); refresh(); });
  document.querySelectorAll('.tab').forEach(function(t){ t.addEventListener('click', function(){ setTimeout(refresh, 0); }); });
  refresh();
})();
</script>
</body>
</html>
