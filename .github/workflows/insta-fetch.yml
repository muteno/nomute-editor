# 인스타 직결 수집 — Meta Instagram API(Instagram Login) · LLM 0콜 · 시크릿 미등록 = no-op 스캐폴드
# 정본 = apps/insta/00_지침_컨설턴트_인스타_v1.md §1-2 · 세팅/토큰 재발급 = docs/인스타_직결_세팅.md
# 롤백 = schedule 블록 제거(수동 전용) 또는 파일 삭제 · 수집분(apps/insta/data/)은 잔존.
name: insta-fetch
on:
  schedule:
    - cron: '25 */3 * * *'   # AI 브리프 캐던스 = 3시간마다(:25 오프셋 · UTC 0/3/…/21시 → KST 09/12/…/06시 :25) — 운영자 260718 "채널 요약 AI요약 3시간마다 갱신". ⚠️ GitHub schedule = best-effort라 이것 단독이면 드롭됨(실측 260720: 09:25 KST 슬롯 통째 드롭 07:11→13:02 KST 갭 6h·17:41 KST run 실패 = 채널요약 종일 공백 근본원인). 데이터 숫자 신선도는 아래 push 하트비트가 담당 · 브리프는 여기(schedule) + 다이제스트 동일 시 스킵(토큰 0)으로 3h 유지.
  push:
    branches: [main]
    paths:
      - 'viewer/sns_subs_phone.json'   # 폰(muteno-phone·실기기 PAT) 구독수집 커밋 = 실측 ~30분 규칙 하트비트 편승 — 실기기 cron이라 GitHub schedule 드롭과 무관 → 채널요약(팔로워·조회수) 수집이 편승(지연·수동발사 근본해소 260720 · sns-trends/social-scan 동형 이식). 폰 전용 파일만 감시 = 자기 산출(insta_data/fb_data/chan_brief) 재트리거 0(무한루프 없음). ⚠️ push(하트비트) 런은 데이터 수집만 = 브리프(LLM) OFF(아래 브리프 스텝 github.event_name != 'push' 게이트) → 숫자는 ~30분 신선, 비싼 AI 브리프는 3h schedule 캐던스 그대로 보존(운영자 260718 토큰 절약 의도 불변).
  workflow_dispatch:
    inputs:
      backfill:
        description: '전 게시물 백필(페이지네이션+인사이트 확장 · 약 20~40콜)'
        type: boolean
        default: false
      brief:
        description: '채널 AI 브리프(chan_brief.sh · 1=생성) — §📰-e 카나리아: 기본 OFF 머지 → dispatch 실측 → 승격'
        type: string
        default: '0'
permissions:
  contents: write
concurrency:
  group: insta-fetch
  cancel-in-progress: false
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 35   # 20→35(260717): 브리프 정상 생성 실측 ~9분 = 종전 시도당 600s 무여유 → 타임아웃 재시도가 잡 20분 하드킬(cancelled 3연속 = 브리프 정지 사고) — 시도당 900s + 풀 재시도 1회(최악 ~31분) 수용. 브리프 OFF 시 종전과 동일 소요
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: 수집(시크릿 게이트 · stdlib only = 설치 0)
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ vars.IG_USER_ID }}
        run: python3 .github/scripts/insta_fetch.py
      - name: 전 게시물 백필(수동 발사 전용 · 운영자 260713 "기존꺼 파악")
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.backfill }}
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ vars.IG_USER_ID }}
        run: python3 .github/scripts/insta_backfill.py
      - name: 페이스북 페이지 수집(채널 요약 1-2 · 시크릿 게이트 = 미등록 no-op · 운영자 260718 Q155 — 세팅 = docs/페이스북_직결_세팅.md)
        env:
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ vars.FB_PAGE_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}   # 겸용 프로브(운영자 260718 · fb-fetch.yml 동조 — FB 토큰 부재 시 IG 토큰 페이지 자동 연동 시도)
        run: python3 .github/scripts/fb_fetch.py || true
      - name: 신호 계산(뷰어 소비본 포함 · fail-soft)
        run: python3 apps/insta/insta_signals.py || true
      # ── 수집·신호분 즉시 커밋(1차) — 뒤 채널 브리프(chan_brief.sh · LLM 1콜 timeout 600s) 스텝이 job timeout/하드킬로 죽어도 insta_data·신호(메뉴4 데이터)는 이미 라이브 확보(운영자 260714 "데이터 잘 받아오게" 인스타 점검 = sns-trends.yml 1차 커밋 미러). 근본원인 = 맨끝 단일 커밋이라 LLM 단계 사망 시 하루치 수집분 동반 유실 · insta는 cron 1일 1회라 유실 = 종일 공백(트렌드보다 타격 큼 · Q11 벽시계 캡은 부분 봉합이었음). insta-fetch는 push 트리거 없음(cron만) = 재트리거 0. 브리프분(chan_brief.json)은 맨끝 커밋이 2차로 마저 커밋.
      - name: 커밋 수집분(1차 · 유실 방지)
        # git_land = 최신 main 재기점 재적층(구 `pull --rebase -X ours`+4회 재시도의 리베이스 꼬임·경쟁 소진 → 산출물 no-op 유실 봉합 · 260716 브리프 3일 정지 사고 근본교정). insta 산출물 단독 소유라 재적층 안전.
        run: |
          bash .github/scripts/git_land.sh "insta: 계정 인사이트 스냅샷 (bot)" apps/insta/data viewer/insta_data.json viewer/fb_data.json
      - name: Install Claude Code CLI (채널 브리프 스텝용 — LLM 0콜 수집 레인이라 브리프 게이트와 동기 · sns-trends.yml 관용구)
        if: ${{ github.event_name != 'push' && (inputs.brief || '1') == '1' }}   # 기본 ON 승격(§📰-e 이행 — 카나리아 run 29263671640 실측 260714: rc=0·브리프 1,355자 생성) · push(하트비트) 런 = 브리프 install 스킵(데이터 수집만 · 3h schedule 캐던스 보존 260720) · 롤백 = || '0'
        run: npm install -g @anthropic-ai/claude-code
      - name: 채널 AI 브리프(메뉴4 · 성장 서사+전략 · 운영자 260714) — 입력 동일 = 스킵(토큰 0) · 실패 = 직전 유지(fail-soft) · SNS 트렌드 브리프와 별개 축
        env:
          CHAN_BRIEF: ${{ github.event_name == 'push' && '0' || (inputs.brief || '1') }}   # 기본 ON(§📰-e 이행 — 카나리아 run 29263671640 실측 260714: 성장 서사+전략 4줄 정상 · schedule = inputs 없음 → '1') · dispatch brief='0' = 일시 OFF · push(하트비트) = '0' 강제(데이터 수집만 · 비싼 AI 브리프는 3h schedule 전용 · 260720) · 롤백 = inputs.brief || '1'
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT: ${{ (vars.ACTIVE_ACCOUNT || 'MUTENO') == 'NOMUTEFB' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_NOMUTEFB }}   # 서브1 폴오버(체인 MUTENO→NOMUTEFB→EMS1130G→MUTENONA · sns-trends 관용구)
          CLAUDE_CODE_OAUTH_TOKEN_ALT2: ${{ (vars.ACTIVE_ACCOUNT || 'MUTENO') == 'MUTENO' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENO }}   # 서브2 폴오버(체인 3번째)
          CLAUDE_CODE_OAUTH_TOKEN_ALT3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENONA }}   # 서브3 폴오버(실꼬리 = 항상 MUTENONA)
        run: bash .github/scripts/chan_brief.sh   # 게이트·스킵·fail-soft 전부 스크립트 내(rc 항상 0 = 수집 커밋 비차단)
      - name: 커밋(브리프 포함 · 맨끝 2차)
        # 브리프분(chan_brief.json·아카이브 로그)까지 최신 main 재기점 재적층으로 착지. 종전 관용구는 같은 파일을 다른 봇이 먼저 밀면 꼬인 리베이스로 브리프가 증발(→ 화면 정지)하던 자리 = git_land가 원천 봉합. chan_brief_log.jsonl도 add 대상 편입(종전 누락).
        run: |
          bash .github/scripts/git_land.sh "insta: 계정 인사이트 스냅샷 (bot)" apps/insta/data viewer/insta_data.json viewer/fb_data.json viewer/chan_brief.json viewer/chan_brief_log.jsonl
