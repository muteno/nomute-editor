name: news-analyze

# pending/ 에 URL(.txt)이 들어오면 Claude Code 헤드리스로 큐레이션 다이제스트를 만들어 queue/ 에 커밋.
# - queue/ 커밋이 다시 트리거하지 않도록 paths 필터는 pending/** 만.
# - GITHUB_TOKEN 푸시는 기본적으로 워크플로를 재트리거하지 않음(이중 안전).
on:
  push:
    branches: [main]
    paths:
      - 'pending/**'
  workflow_dispatch: {}   # 수동 실행(테스트용)

# 동시 실행 충돌 방지 — 순차 처리(진행 중 작업 취소 안 함).
concurrency:
  group: news-analyze
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Analyze pending articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash .github/scripts/analyze.sh

      - name: Build viewer data
        run: node build-viewer.mjs

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add queue pending viewer
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
            exit 0
          fi
          TITLES=$(cat /tmp/analyzed_titles.txt 2>/dev/null | paste -sd'; ' - || echo "기사")
          git commit -m "analyze: ${TITLES:-기사}"
          # 동시 푸시 경합 대비 rebase 재시도
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            sleep $((2**i))
          done
          echo "push 실패"; exit 1
