name: social-scan

# 소셜 버스트(커뮤니티 RSS 교차소스 → 비정치 공론화 이슈) 검출 → 뷰어 SNS 탭(메뉴2) 레인 갱신.
# 무인·무료(RSS만이면 0원). 결과 = viewer/social_candidates.json 커밋(라이브 서빙) + 아티팩트.
# 정본 = scraper/social_burst.py · 설계 = docs/social-burst.md §35.3. (매시 정각 자동 스케줄 + 수동 dispatch.)
on:
  workflow_dispatch:
    inputs:
      min_sources:
        description: '교차소스 최소 수(공론화 컷)'
        default: '2'
      naver:
        description: '네이버 검색 API 소스 포함(기본 1=ON · 0 넣으면 끄기)'
        default: '1'
  schedule:
    - cron: '*/30 * * * *'   # 백스톱 전용 — GitHub schedule = best-effort(피크시 1~4h 드롭 · 실측 260713 야간 갭 2~3h = SNS 탭 "지연" 원인). 주 하트비트는 아래 push(폰 편승 · sns-trends 260713 동형 이식). schedule엔 inputs 없음 → min_sources 기본 2.
  push:
    branches: [main]
    paths:
      - 'viewer/sns_subs_phone.json'   # 폰(muteno-phone·실기기 PAT) 구독수집 커밋 = 실측 ~30분 규칙 하트비트 편승(sns-trends 지연 근본해소 260713과 동일 축 · 260714). 폰 전용 파일만 감시 = 자기 산출(social_candidates) 재트리거 0. 신선도 게이트 없음 = 의도(RSS만·LLM 0·무료·commit은 무변동 스킵이라 근접 중복 발사 비용 0 — sns-trends는 과금·IP차단 때문에 게이트 필요했던 것과 대비).

concurrency:
  group: social-scan
  cancel-in-progress: false

permissions:
  contents: write   # viewer/social_candidates.json 커밋(SNS 레인 갱신)

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install feedparser requests pycryptodome   # pycryptodome = 이슈링크 cupid.js(SlowAES) 봇월 우회(260625)
      - name: Run social burst scan (live)
        env:
          SOCIAL_MIN_SOURCES: ${{ inputs.min_sources || '2' }}
          SOCIAL_TOPIC_GATE: '0'   # 포지티브 공론화 게이트 롤백(운영자) — 첫날 진짜 이슈(웹툰 작가 폭로 = 뉴스화)를 오컷한 위양성 확인 → 설계된 롤백 손잡이로 OFF(옛 네거티브 컷만 복귀). 재도전 = 신호어 보강(실체·논란 등) + 카나리아 후 승격(curation §8).
          # ── 네이버 검색 OpenAPI (자동 ON · 카나리아 검증 후 승격 260704) ──
          # 기본 '1' = schedule·dispatch 모두 ON → 자동스캔도 네이버 포함(플립플롭 해소: OFF 스캔이 ON 결과 덮어쓰던 것 종식·9번/Fable). dispatch naver='0'으로 끌 수 있음.
          # 발급·엔드포인트 = docs/social-burst.md. 무료 한도 내(검색 API 일 25,000콜·실측 5쿼리×48run=240콜/일≈1%). 배점=수집량 정규화(네이버 단독 하단 생존).
          SOCIAL_NAVER: ${{ inputs.naver || '1' }}                # 기본 ON(§📰 카나리아 run 28692492458 통과 후 승격) · Secret NAVER_CLIENT_ID/SECRET 필요(없으면 skip)
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}         # 미등록이면 빈값 → skip
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python3 scraper/social_burst.py || echo "::warning::라이브 소스 일부 막힘 — docs/social-burst.md 소스 교체 참고"
      - name: Publish to viewer SNS lane
        run: |
          mkdir -p viewer
          cp scraper/out/social_candidates.json viewer/social_candidates.json 2>/dev/null || echo '[]' > viewer/social_candidates.json
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add viewer/social_candidates.json
          if git diff --cached --quiet; then echo "변경 없음 — 커밋 생략"; exit 0; fi
          git commit -m "social-scan: SNS 레인 갱신"
          for i in 0 1 2 3; do
            [ "$i" -gt 0 ] && sleep $((2**i))
            git pull --rebase -X ours origin main && git push origin HEAD:main && break
            git rebase --abort 2>/dev/null || true
          done
      - name: Upload results (live)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: social_candidates
          path: scraper/out/social_candidates.json
          if-no-files-found: warn
      - name: Core self-check (sample · 마지막 — out 덮어써도 발행 후라 무관)
        run: python3 scraper/social_burst.py --sample
