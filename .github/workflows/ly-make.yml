name: ly-make

# 뷰어 ly 폼(Pages Function /api/ly)이 발사 → SRT/STT 텍스트로 claude -p(/ly 지침 런타임 Read)
#   → 릴스 자막 md → viewer/ly_out/<id>/subs.md 커밋(폼이 폴링).
# 인증 = CLAUDE_CODE_OAUTH_TOKEN(구독 OAuth·무료). v1 = 텍스트/SRT만(영상+Whisper는 v2).
on:
  workflow_dispatch:
    inputs:
      id:
        description: '출력 id(타임스탬프)'
        type: string
      subs:
        description: 'SRT 또는 STT/자막 텍스트(URL 없을 때)'
        type: string
      url:
        description: '영상 URL(yt-dlp+Whisper STT) — 있으면 subs 무시'
        type: string
      account:
        description: '이 실행에 쓸 계정(구독 OAuth)'
        type: choice
        default: MUTENO
        options:
          - MUTENO
          - EMS1130G

concurrency:
  group: ly-make-${{ inputs.id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ly:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # 영상 URL 경로 Whisper 첫 다운(1.6GB)+STT 대비
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install claude-code
        run: npm install -g @anthropic-ai/claude-code

      # 영상 URL일 때만 — ffmpeg+faster-whisper+yt-dlp(apps/ly/setup.sh 단일출처) + 모델 캐시
      - name: STT 환경 (영상 URL)
        if: ${{ inputs.url != '' }}
        uses: ./.github/actions/runner-setup
        with:
          setup: apps/ly/setup.sh
          whisper: 'true'

      - name: STT (영상 URL → Whisper 트랜스크립트)
        if: ${{ inputs.url != '' }}
        env:
          URL: ${{ inputs.url }}
        run: |
          set -e
          yt-dlp -x --audio-format mp3 --no-playlist -o /tmp/audio.%(ext)s "$URL" \
            || { echo "::error::yt-dlp 다운로드 실패: $URL"; exit 1; }
          python3 .github/scripts/ly_stt.py /tmp/audio.mp3 > /tmp/transcript.txt \
            || { echo "::error::Whisper STT 실패"; exit 1; }
          echo "LY_TRANSCRIPT=/tmp/transcript.txt" >> "$GITHUB_ENV"
          echo "STT 완료 — $(wc -l < /tmp/transcript.txt)줄"

      - name: Make ly subtitles
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', inputs.account || 'MUTENO')] }}
          SUBS: ${{ inputs.subs }}
          IN_ID: ${{ inputs.id }}
        run: |
          [ -n "$IN_ID" ] || { echo "::error::id 없음"; exit 1; }
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN_<계정> 시크릿이 비어있음"; exit 1
          fi
          # 영상 URL 경로면 STT 트랜스크립트를 입력(SUBS)으로 덮어씀
          if [ -n "${LY_TRANSCRIPT:-}" ] && [ -s "${LY_TRANSCRIPT}" ]; then
            SUBS="$(cat "${LY_TRANSCRIPT}")"; export SUBS
          fi
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          bash .github/scripts/lymake.sh "$IN_ID"

      - name: Commit output
        if: always()
        env:
          IN_ID: ${{ inputs.id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "nomute-bot"
          git config user.email "bot@nomute.local"
          git add "viewer/ly_out/${IN_ID}" 2>/dev/null || true
          git commit -m "ly: ${IN_ID} 자막 출력" || { echo "커밋할 것 없음"; exit 0; }
          pushed=0
          for i in 1 2 3 4 5; do
            if git fetch origin "$BRANCH" && git rebase "origin/$BRANCH" && git push origin "HEAD:$BRANCH"; then pushed=1; break; fi
            git rebase --abort 2>/dev/null || true; sleep $((i*3))
          done
          [ "$pushed" = 1 ] || { echo "::error::push ${BRANCH} 5회 실패 — 출력 유실"; exit 1; }
