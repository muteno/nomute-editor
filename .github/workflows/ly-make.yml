name: ly-make

# 뷰어 ly 폼(Pages Function /api/ly)이 발사 → SRT/STT 텍스트로 claude -p(/ly 지침 런타임 Read)
#   → 릴스 자막 md → viewer/ly_out/<id>/subs.md 커밋(폼이 폴링).
# 인증 = CLAUDE_CODE_OAUTH_TOKEN(구독 OAuth·무료). 입력 = SRT/STT 텍스트 또는 영상 URL/업로드 파일(yt-dlp/ffmpeg → Whisper large-v3-turbo STT).
on:
  workflow_dispatch:
    inputs:
      id:
        description: '출력 id(타임스탬프)'
        type: string
      subs:
        description: 'SRT 또는 STT/자막 텍스트(URL 없을 때) · reburn=1이면 = 편집 자막 JSON(subs.json 대체) 또는 RESTORE(원본 스냅샷 복원) · 빈값 = 현행 subs.json 재사용(편집 반영 뒤엔 편집본 — 운영자 260710)'
        type: string
      url:
        description: '영상 URL(yt-dlp+Whisper STT) — 있으면 subs 무시'
        type: string
      file:
        description: '업로드 영상/오디오 파일 경로(uploads/<id>/src.*) — ffmpeg 오디오추출+Whisper'
        type: string
      early_segs:
        description: '조기 segments.json 푸시(전사 즉시 편집기 선행 · 1=ON) — 기본 OFF(fail-closed) · 라이브 ON = functions/api/ly.js가 문자열 ''1''을 명시 전달(숫자/불리언 금지 = GH 강제변환으로 조용히 OFF · 롤백 = ly.js 한 줄)'
        type: string
        default: '0'
      opts:
        description: '뷰어 버튼 설정 JSON(자막 옵션+번인 스타일 · 빈값=종전 동작) — {"lang","tone","filler","burn","style","pos"(세로 위치 % 0=하단 100=상단 · 구 문자열 하위호환),"bg"(배경 불투명도 % 0=없음),"size","karaoke","keyword","cut"(무음 갭 자동 컷 · 발화 기준),"cutlv"(컷 세기 soft/std/hard · 미지=std),"bgm"(배경음 제거 = Demucs 보컬 분리 · 둘 다 켜면 배경음부터) — cut·bgm은 burn=true일 때만 실행 = 번인 하위 축}'
        type: string
        default: ''
      up_branch:
        description: '업로드 일회용 브랜치(up-<id> · 빈값=종전 main 커밋 경로) — ly.js가 업로드를 여기 커밋 → 러너가 회수 → 잡 끝에 삭제 = main 히스토리 비대 0'
        type: string
        default: ''
      reburn:
        description: '재합성 모드(1=ON) — 기존 ly_out/<id>/subs.json 의역 + video.json src(R2 원본 보관본)로 번인만 재실행(STT·claude 스킵 = LLM 0콜·1분급)'
        type: string
        default: '0'
      account:
        description: '이 실행에 쓸 계정(구독 OAuth)'
        type: choice
        default: MUTENO
        options:
          - NOMUTEFB
          - MUTENO
          - EMS1130G

concurrency:
  group: ly-make-${{ inputs.id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ly:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 콜드캐시(STT 환경 15)+STT(25)+claude+Demucs(12)+번인(35) 최악 겹침이 45를 넘던 구멍 봉합(평의회9 260709 — 구 45는 Demucs·claude 재시도 미계상). 개별 폭주는 스텝 백스톱이 먼저 끊고 잡 캡 = 최후 보루
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install claude-code
        run: npm install -g @anthropic-ai/claude-code

      # STT 경로(영상 URL/파일)에서만 — 파이썬 고정(site-packages 캐시 경로 안정화) + 설치분 캐시
      - name: Setup Python (STT)
        if: ${{ inputs.url != '' || inputs.file != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # site-packages 캐시 — setup.sh 의 faster-whisper(ctranslate2·onnxruntime 등) 재설치 회피.
      # 실측(파일 런): STT 환경 318s 중 faster-whisper 설치가 큰 몫(Whisper 모델 1.6GB 복원은 별도·바닥).
      # 워밍런 = 복원 → setup.sh `import faster_whisper` 통과 → pip 스킵. 무해(미적중이면 기존대로 재설치=회귀 0).
      - name: Restore python deps (site-packages 캐시)
        if: ${{ inputs.url != '' || inputs.file != '' }}
        uses: actions/cache@v4
        with:
          path: ${{ env.pythonLocation }}/lib/python3.12/site-packages
          key: nomute-ly-pydeps-${{ runner.os }}-py312-${{ hashFiles('apps/ly/setup.sh') }}-v1   # setup.sh 해시 키(track 정본 계승 · 평의회9) — 핀/패키지 변경 시 자동 재빌드(구 정적 키 = 변경분 미설치 드리프트) · -v1 = 수동 버스트 레버(track 동형 · 재평의회9)

      # 재합성(reburn) 전용 경량 준비 — ffmpeg + 한글 폰트(whisper·yt-dlp 불요). ⚠️ fonts-noto-cjk 없으면 libass가
      #   에러 없이 두부(□)로 조용히 렌더 → 정상본을 깨진 영상으로 덮어씀(평의회 불가 적발) = 폰트 확인까지 하드게이트.
      - name: ffmpeg+한글폰트 (재합성)
        if: ${{ inputs.reburn == '1' }}
        run: |
          timeout 300 sudo apt-get update -qq || true
          timeout 300 sudo apt-get install -y -qq ffmpeg fonts-noto-cjk || { echo "::error::ffmpeg/폰트 설치 실패"; exit 1; }
          fc-list | grep -qi "noto sans cjk" || { echo "::error::Noto Sans CJK 미탐지 — 두부 번인 차단"; exit 1; }

      # 재합성 소스 회수 — 기존 video.json의 src(R2 원본 보관본) → /tmp (subs.json 의역은 checkout에 이미 포함)
      - name: 재합성 소스 회수 (reburn)
        if: ${{ inputs.reburn == '1' }}
        env:
          IN_ID: ${{ inputs.id }}
        run: |
          set -e
          SRC="$(python3 -c "import json;print(json.load(open('viewer/ly_out/${IN_ID}/video.json')).get('src') or '')" 2>/dev/null || true)"
          case "$SRC" in https://*) ;; *) echo "재합성 원본 보관본이 없어 — 새로 생성해줘." > /tmp/ly_err.txt; echo "::error::src 없음/비https: $SRC"; exit 1;; esac
          EXT="${SRC##*.}"; case "$EXT" in mp4|webm|mov|mkv|m4v) ;; *) EXT=mp4;; esac
          curl -fsSL --max-time 300 "$SRC" -o "/tmp/upsrc.$EXT" || { echo "원본 다운로드 실패 — 새로 생성해줘." > /tmp/ly_err.txt; echo "::error::src 다운 실패"; exit 1; }
          echo "LY_VIDEO=/tmp/upsrc.$EXT" >> "$GITHUB_ENV"
          echo "REBURN=1" >> "$GITHUB_ENV"

      # 편집분 번인(운영자 260710) — 뷰어 상세 편집기 수정(단어 빼기·조각 삭제·타이밍·텍스트)을 반영해 다시 입히기.
      #   subs(디스패치 입력·reburn 전용 재사용) = 편집 조각 JSON → subs.json 대체(커밋 = 이후 reburn 정본도 편집본) / 'RESTORE' 센티널 = 첫 편집 때
      #   보존한 subs.orig.json 스냅샷으로 원복(초기화→다시 입히기 · 기능평의회2). fail-soft: 검증 실패 = 현행 subs.json 그대로(::warning:: 카나리아).
      #   개요(subs.md)는 불변(원본 의역 표시 = 의도적 분기). 반영/실패/복원은 LY_EDITED env → ly_burn note로 표면화(침묵 금지 · 기능평의회9).
      - name: 편집 자막 반영 (reburn)
        if: ${{ inputs.reburn == '1' && inputs.subs != '' }}
        env:
          IN_ID: ${{ inputs.id }}
          SUBS: ${{ inputs.subs }}
        run: |
          [ -n "$IN_ID" ] || exit 0
          if [ "$SUBS" = "RESTORE" ]; then
            O="viewer/ly_out/${IN_ID}/subs.orig.json"
            if [ -s "$O" ]; then cp "$O" "viewer/ly_out/${IN_ID}/subs.json"; echo "LY_EDITED=restore" >> "$GITHUB_ENV"; echo "원본 의역 복원";
            else echo "원본 스냅샷 없음 — 현행 subs.json 그대로(편집 반영 이력 없음 = 이미 원본)"; fi
            exit 0
          fi
          if python3 - "$IN_ID" <<'PY'
          import json, os, re, shutil, sys
          from math import isfinite
          vid = sys.argv[1]
          assert re.fullmatch(r"[0-9]{12}-[0-9a-f]{6}", vid), "id 형식"   # 소비자(ly_burn)와 검증 대칭 — 수동 dispatch 방어심층(기능평의회4·5)
          j = json.loads(os.environ.get("SUBS") or "")
          segs = []
          for s in (j.get("segs") or [])[:700]:   # 700 = ly.js 상한 미러(초과는 API가 이미 소리나게 거절 · 기능평의회8)
              try:
                  ss, ee = float(s["s"]), float(s["e"])
              except Exception:
                  continue
              ko = str(s.get("ko") or "").strip()[:200]
              if not (isfinite(ss) and isfinite(ee)) or ss < 0 or ee <= ss or not ko:   # isfinite = NaN/Inf가 subs.json 오염 못 하게(기능평의회5)
                  continue
              segs.append({"s": round(ss, 2), "e": round(ee, 2), "ko": ko})
          assert segs, "유효 조각 0"
          d = os.path.join("viewer", "ly_out", vid)
          os.makedirs(d, exist_ok=True)
          p = os.path.join(d, "subs.json")
          orig = os.path.join(d, "subs.orig.json")
          if os.path.isfile(p) and not os.path.isfile(orig):
              shutil.copyfile(p, orig)   # 첫 편집 반영 때 원본 의역 1회 보존 = 초기화 복원 소스(기능평의회2·3)
          tmp = p + ".tmp"
          with open(tmp, "w", encoding="utf-8") as f:
              json.dump({"v": 1, "segs": segs}, f, ensure_ascii=False, separators=(",", ":"))
          os.replace(tmp, p)   # 원자 교체 — truncate-쓰기 금지: 중간 실패(디스크·SIGKILL)에도 원본 무손상(기능평의회3 P2)
          print("편집 자막 반영: {}조각".format(len(segs)))
          PY
          then echo "LY_EDITED=1" >> "$GITHUB_ENV"
          else
            echo "::warning::편집 자막 반영 실패 — 현행 subs.json으로 진행"
            echo "LY_EDITED=fail" >> "$GITHUB_ENV"
          fi

      # 영상 URL/파일일 때만 — ffmpeg+faster-whisper+yt-dlp(apps/ly/setup.sh 단일출처) + 모델 캐시
      - name: STT 환경 (영상 URL/파일)
        if: ${{ inputs.url != '' || inputs.file != '' }}
        timeout-minutes: 15   # 백스톱 — 첫 런 Whisper 1.6GB 다운 감안 여유(이후 캐시히트 즉시). 무한 행만 차단.
        uses: ./.github/actions/runner-setup
        with:
          setup: apps/ly/setup.sh
          whisper: 'true'
          apt: ffmpeg fonts-noto-cjk   # ffmpeg+한글폰트(자막 번인 libass용) .deb 7일 캐시 → 매 런 재다운·미러행 차단

      - name: STT (영상 URL → Whisper 트랜스크립트)
        if: ${{ inputs.url != '' }}
        timeout-minutes: 25   # 다운로드+Whisper 백스톱(평의회9 260709) — 스톨 링크·초장영상 무한 행이 잡 캡까지 먹던 구멍 차단
        env:
          URL: ${{ inputs.url }}
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
          IN_ID: ${{ inputs.id }}
          OPTS: ${{ inputs.opts }}
        run: |
          set -e
          # YouTube/IG 봇차단 우회 — YT_COOKIES 시크릿(쿠키 Netscape txt 본문) 있으면 사용
          COOKIES=""
          if [ -n "$YT_COOKIES" ]; then printf '%s\n' "$YT_COOKIES" > /tmp/ck.txt; COOKIES="--cookies /tmp/ck.txt"; fi
          # 번인 ON = 영상까지 다운(자막 합성용 · 실패 = 오디오-온리 폴백 → 자막 텍스트만 = 회귀 0)
          BURN="$(printf '%s' "${OPTS:-}" | jq -r 'try .burn catch empty' 2>/dev/null || true)"
          if [ "$BURN" = "true" ]; then
            yt-dlp -f "bv*[height<=1920]+ba/b" --merge-output-format mp4 --no-playlist --socket-timeout 30 $COOKIES -o "/tmp/src.%(ext)s" "$URL" || true   # --socket-timeout = 스톨 링크 무한 행 차단(track-make 관례 · 평의회9)
            SRC="$(ls /tmp/src.* 2>/dev/null | head -1 || true)"
            if [ -n "$SRC" ]; then
              # 길이 선게이트(평의회9 260709) — 10분(MAX_DUR) 초과는 어차피 번인 거절 → 제일 비싼 스텝(STT·claude) *앞*에서 번인만 스킵 확정(자막 텍스트는 계속 · 사유 = video.json 선기록)
              DUR="$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 "$SRC" 2>/dev/null | cut -d. -f1 || true)"
              if [ -n "$IN_ID" ] && [ -n "$DUR" ] && [ "$DUR" -gt 600 ] 2>/dev/null; then   # IN_ID 가드 = 수동 dispatch id 공백 시 부유 video.json 차단(재평의회10 · 형제 스텝 동형)
                mkdir -p "viewer/ly_out/${IN_ID}"
                printf '{"skip":"영상 %s분 — 10분 이하만 합성(릴스/쇼츠용) · 자막 텍스트만"}' "$((DUR/60))" > "viewer/ly_out/${IN_ID}/video.json"
                echo "LY_NOBURN=1" >> "$GITHUB_ENV"
                ffmpeg -y -i "$SRC" -vn -ar 16000 -ac 1 -b:a 48k /tmp/audio.mp3 || rm -f /tmp/audio.mp3   # 오디오는 받은 영상서 추출(재다운 회피)
                rm -f "$SRC"; SRC=""
              else
                ffmpeg -y -i "$SRC" -vn -ar 16000 -ac 1 -b:a 48k /tmp/audio.mp3 || rm -f /tmp/audio.mp3
                if [ -s /tmp/audio.mp3 ]; then echo "LY_VIDEO=$SRC" >> "$GITHUB_ENV"; echo "번인용 영상 확보: $SRC"; fi
              fi
            fi
          fi
          [ -s /tmp/audio.mp3 ] || yt-dlp -x --audio-format mp3 --postprocessor-args "ffmpeg:-ar 16000 -ac 1 -b:a 48k" --no-playlist --socket-timeout 30 $COOKIES -o "/tmp/audio.%(ext)s" "$URL" \
            || { echo "유튜브 다운로드 실패 — YouTube가 봇 인증(로그인·쿠키)을 요구해. 파일 업로드나 SRT 텍스트로 해줘. (운영자: YT_COOKIES 시크릿 등록 시 URL 가능)" > /tmp/ly_err.txt; echo "::error::yt-dlp 다운로드 실패: $URL"; exit 1; }
          SEGJSON=""; [ -n "$IN_ID" ] && SEGJSON="viewer/ly_out/${IN_ID}/segments.json"   # word 타임스탬프 사이드카(상세 편집기) — 트랜스크립트 포맷 불변·타임코드/경계는 word 정렬로 미세 변동 가능(ly_stt.py 헤더 참조·위험 수용 기록)
          python3 .github/scripts/ly_stt.py /tmp/audio.mp3 "$SEGJSON" > /tmp/transcript.txt \
            || { echo "Whisper STT 실패 — 오디오 인식 불가. 다른 링크·파일이나 SRT 텍스트로 해줘." > /tmp/ly_err.txt; echo "::error::Whisper STT 실패"; exit 1; }
          echo "LY_TRANSCRIPT=/tmp/transcript.txt" >> "$GITHUB_ENV"
          echo "STT 완료 — $(wc -l < /tmp/transcript.txt)줄"

      - name: STT (업로드 파일 → ffmpeg 오디오추출 → Whisper)
        if: ${{ inputs.file != '' }}
        timeout-minutes: 25   # Whisper 백스톱(평의회9 260709) — URL 스텝과 동일 원칙
        env:
          FILE: ${{ inputs.file }}
          IN_ID: ${{ inputs.id }}
          UP_BRANCH: ${{ inputs.up_branch }}
        run: |
          set -e
          # 일회용 업로드 브랜치(up-<id>) 경로 = 파일을 브랜치에서 /tmp로 회수(main 워킹트리엔 없음 · 잡 끝에 브랜치 삭제)
          if [ -n "$UP_BRANCH" ]; then
            case "$UP_BRANCH" in up-*) ;; *) echo "::error::up_branch는 up-* 만 허용: $UP_BRANCH"; exit 1;; esac
            git fetch origin "$UP_BRANCH" --depth=1 || { echo "업로드 파일이 유실됐어 — 다시 올려줘." > /tmp/ly_err.txt; echo "::error::업로드 브랜치 fetch 실패: $UP_BRANCH"; exit 1; }
            EXT="${FILE##*.}"
            git show "FETCH_HEAD:$FILE" > "/tmp/upsrc.$EXT" || { echo "업로드 파일 회수 실패 — 다시 올려줘." > /tmp/ly_err.txt; echo "::error::브랜치서 파일 회수 실패: $FILE"; exit 1; }
            FILE="/tmp/upsrc.$EXT"
          fi
          [ -f "$FILE" ] || { echo "::error::업로드 파일 없음: $FILE"; exit 1; }
          VID=""
          case "$FILE" in
            *.mp4|*.mov|*.m4v|*.webm|*.mkv|*.avi) VID="$FILE";;
          esac
          if [ -n "$VID" ]; then
            # 길이 선게이트(평의회9 260709) — URL 경로와 동일: 10분 초과는 번인만 스킵(자막 텍스트 계속·사유 선기록)
            DUR="$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 "$VID" 2>/dev/null | cut -d. -f1 || true)"
            if [ -n "$IN_ID" ] && [ -n "$DUR" ] && [ "$DUR" -gt 600 ] 2>/dev/null; then   # IN_ID 가드 = URL 경로와 동형(재평의회10)
              mkdir -p "viewer/ly_out/${IN_ID}"
              printf '{"skip":"영상 %s분 — 10분 이하만 합성(릴스/쇼츠용) · 자막 텍스트만"}' "$((DUR/60))" > "viewer/ly_out/${IN_ID}/video.json"
              echo "LY_NOBURN=1" >> "$GITHUB_ENV"
            else
              echo "LY_VIDEO=$VID" >> "$GITHUB_ENV"; echo "번인용 영상 확보(업로드): $VID"
            fi
          fi
          ffmpeg -y -i "$FILE" -vn -ar 16000 -ac 1 -b:a 48k /tmp/audio.mp3 \
            || { echo "오디오 추출 실패 — 지원 안 되는 형식일 수 있어. 다른 파일이나 SRT 텍스트로 해줘." > /tmp/ly_err.txt; echo "::error::ffmpeg 오디오 추출 실패: $FILE"; exit 1; }
          SEGJSON=""; [ -n "$IN_ID" ] && SEGJSON="viewer/ly_out/${IN_ID}/segments.json"   # word 타임스탬프 사이드카(상세 편집기) — 트랜스크립트 포맷 불변·타임코드/경계는 word 정렬로 미세 변동 가능(ly_stt.py 헤더 참조·위험 수용 기록)
          python3 .github/scripts/ly_stt.py /tmp/audio.mp3 "$SEGJSON" > /tmp/transcript.txt \
            || { echo "Whisper STT 실패 — 오디오 인식 불가. 다른 링크·파일이나 SRT 텍스트로 해줘." > /tmp/ly_err.txt; echo "::error::Whisper STT 실패"; exit 1; }
          echo "LY_TRANSCRIPT=/tmp/transcript.txt" >> "$GITHUB_ENV"
          echo "STT(파일) 완료 — $(wc -l < /tmp/transcript.txt)줄"

      # 조기 segments.json 푸시(LY-EARLY) — STT가 끝나는 즉시 전사 사이드카만 먼저 커밋
      #   → 뷰어 편집기가 의역(claude 1~5분)을 안 기다리고 바로 뜸(260706 평의회R2 E7 배점미달 후속 = 별도 카나리아 트랙 · 카나리아 e2etest-early 실측 = 전사 89초 선행).
      #   best-effort: 어떤 실패든 exit 0(마지막 Commit output이 어차피 포함 = 회귀 0) · push 경쟁만 짧게 재시도.
      #   ⚠️ 이 if는 암묵 success() 게이트 필수 — always()/failure() 추가 금지(STT 실패 시 부분 segments.json 조기 push 방지 · 평의회8).
      - name: 조기 segments.json 커밋 (전사 즉시 편집기 선행)
        if: ${{ inputs.early_segs == '1' && (inputs.url != '' || inputs.file != '') }}
        env:
          IN_ID: ${{ inputs.id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          SEG="viewer/ly_out/${IN_ID}/segments.json"
          [ -s "$SEG" ] || { echo "segments.json 없음 — 조기 푸시 스킵"; exit 0; }
          git config user.name "nomute-bot"
          git config user.email "bot@nomute.local"
          git add "$SEG"
          git commit -m "ly: ${IN_ID} 전사 조기 커밋 (편집기 선행)" || exit 0
          for i in 1 2 3; do
            if git fetch origin "$BRANCH" && git rebase "origin/$BRANCH" && git push origin "HEAD:$BRANCH"; then
              echo "조기 푸시 완료 → 뷰어 편집기 선행 표시"; exit 0
            fi
            git rebase --abort 2>/dev/null || true; sleep $((i*2))
          done
          echo "조기 푸시 실패(push 경쟁) — 최종 Commit output에 포함 예정(무해)"; exit 0

      - name: Make ly subtitles
        if: ${{ inputs.reburn != '1' }}
        timeout-minutes: 35   # claude 백스톱(평의회9 260709) — 폴오버 4계정 × 콜당 timeout 900s 최악 스택(60분)이 잡을 다 먹기 전 차단(실측 정상 1~5분 · 킬 시 failure() 실패 기록이 표면화)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'NOMUTEFB' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_NOMUTEFB }}   # 서브1 폴오버(활성 다음 우선순위 · 체인 MUTENO→NOMUTEFB→EMS1130G→MUTENONA)
          CLAUDE_CODE_OAUTH_TOKEN_ALT2: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'MUTENO' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENO }}   # 서브2 폴오버(체인 3번째)
          CLAUDE_CODE_OAUTH_TOKEN_ALT3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENONA }}   # 서브3 폴오버(체인 실꼬리 = 항상 MUTENONA · 앞 3계정 소진 후)
          ACTIVE_ACCOUNT: ${{ inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO' }}
          SUBS: ${{ inputs.subs }}
          IN_ID: ${{ inputs.id }}
          OPTS: ${{ inputs.opts }}   # 뷰어 버튼 설정 → lymake.sh가 [옵션] 지시줄로 치환(빈값 = 종전 프롬프트)
        run: |
          [ -n "$IN_ID" ] || { echo "::error::id 없음"; exit 1; }
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN_<계정> 시크릿이 비어있음"; exit 1
          fi
          # 영상 URL 경로면 STT 트랜스크립트를 입력(SUBS)으로 덮어씀
          if [ -n "${LY_TRANSCRIPT:-}" ] && [ -s "${LY_TRANSCRIPT}" ]; then
            SUBS="$(cat "${LY_TRANSCRIPT}")"; export SUBS
          fi
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          bash .github/scripts/lymake.sh "$IN_ID"

      # 자막 텍스트 선공개(번인 전 조기 커밋) — 번인(인코딩 1~3분)을 안 기다리고 자막부터 표시(LY-EARLY 패턴 계승 · best-effort exit 0).
      #   ⚠️ 암묵 success() 게이트 유지 — lymake 실패 시 부분 산출 조기 push 방지(early_segs와 동일 원칙).
      - name: 조기 subs 커밋 (번인 전 자막 선공개)
        if: ${{ env.LY_VIDEO != '' && inputs.reburn != '1' }}
        env:
          IN_ID: ${{ inputs.id }}
          OPTS: ${{ inputs.opts }}
          BRANCH: ${{ github.ref_name }}
        run: |
          BURN="$(printf '%s' "${OPTS:-}" | jq -r 'try .burn catch empty' 2>/dev/null || true)"
          [ "$BURN" = "true" ] || { echo "번인 OFF — 조기 커밋 불필요(최종 커밋이 바로)"; exit 0; }
          git config user.name "nomute-bot"
          git config user.email "bot@nomute.local"
          git add "viewer/ly_out/${IN_ID}" 2>/dev/null || true
          git commit -m "ly: ${IN_ID} 자막 조기 커밋 (번인 전 선공개)" || exit 0
          for i in 1 2 3; do
            if git fetch origin "$BRANCH" && git rebase "origin/$BRANCH" && git push origin "HEAD:$BRANCH"; then
              echo "조기 푸시 완료 → 자막 먼저 표시"; exit 0
            fi
            git rebase --abort 2>/dev/null || true; sleep $((i*2))
          done
          echo "조기 푸시 실패(push 경쟁) — 최종 Commit output에 포함(무해)"; exit 0

      # 배경음 제거(opts.bgm) 요청 런에서만 — Demucs(보컬 분리·로컬·키 불필요) 설치 + 모델·휠 7일 캐시(§9 캐시·타임아웃 원칙).
      #   실패 = 경고 후 계속(fail-soft — ly_burn.strip_bgm이 미설치를 감지해 원본 소리로 합성·잡 안 죽임). torch = CPU 휠(CUDA 대형휠 회피).
      - name: Demucs 캐시 (배경음 제거)
        if: ${{ contains(inputs.opts, '"bgm":true') && contains(inputs.opts, '"burn":true') && env.LY_NOBURN != '1' }}   # bgm은 번인 하위 축 — burn OFF·길이 선-스킵(LY_NOBURN)이면 어차피 안 쓰므로 설치도 스킵(3~7분 헛설치 차단 · 평의회9·재평의회1) · contains = 뷰어 JSON.stringify 고정 직렬화 전제(기존 bgm 게이트 동일) · env 참조 = 조기 subs 커밋 스텝의 LY_VIDEO 선례
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/torch
            ~/.cache/pip
          key: nomute-ly-demucs-${{ runner.os }}-htdemucs-torch2121-demucs401-v1   # 핀 버전을 키에 반영(핀 갱신 = 키 동행 갱신 · 평의회2)
      - name: Demucs 설치 (배경음 제거)
        if: ${{ contains(inputs.opts, '"bgm":true') && contains(inputs.opts, '"burn":true') && env.LY_NOBURN != '1' }}   # 캐시 스텝과 동일 게이트(평의회9·재평의회1)
        timeout-minutes: 12   # 설치 폭주 백스톱(재시도 포함 최악 20분 → 12분 컷 · 실측 콜드 3~7분)
        run: |
          ok=0
          # demucs = sdist 전용(휠 없음) → setup.py 빌드에 setuptools 필수인데 러너 py3.12엔 미탑재
          #   ("Can not execute setup.py since setuptools is not available" = 라이브 카나리아 #28874896795 실측) → 선설치.
          #   ⚠️ SETUPTOOLS_USE_DISTUTILS=stdlib 금지 — py3.12는 stdlib distutils 삭제라 오히려 파손(3.11 데비안 전용 우회였음).
          for i in 1 2; do
            if timeout 120 python3 -m pip install -q --upgrade setuptools wheel \
               && timeout 300 python3 -m pip install -q torch==2.12.1 torchaudio==2.11.0 torchcodec==0.14.0 --index-url https://download.pytorch.org/whl/cpu \
               && timeout 300 python3 -m pip install -q demucs==4.0.1 soundfile==0.14.0; then ok=1; break; fi   # 버전 핀 = 무핀 상류 추종의 조용한 기능 사망 차단(torchcodec↔torch ABI 강결합 · 평의회2 P1) · torchcodec = 신 torchaudio save 백엔드(로컬 실측 260707)
            sleep 5
          done
          [ "$ok" = 1 ] && python3 -c "import demucs.separate; print('demucs OK')" \
            || echo "::warning::Demucs 설치 실패 — 배경음 제거 스킵(원본 소리로 합성)"

      # 자막 번인(영상 합성) — 자막을 영상에 입혀 R2 업로드 → video.json(뷰어 폴링). fail-soft = 실패해도 자막 텍스트 산출은 유지(rc 0).
      #   영상 확보 실패(LY_VIDEO 빈값)여도 ly_burn이 video.json에 스킵 사유 기록 → 뷰어 헛폴링 종료.
      - name: 자막 번인 (영상 합성 → R2)
        if: ${{ inputs.url != '' || inputs.file != '' || inputs.reburn == '1' }}
        timeout-minutes: 35   # 내부 최악 스택(bgm 분리 ~12m + 인코딩 900s + 폴백 600s = ~37m)에 근접 확보(구 30 = 스택보다 짧아 SIGKILL이 ly_burn 자체 기록을 우회 · 평의회6 260709) — 그래도 킬리면 아래 백필 스텝이 사유 기록
        continue-on-error: true   # 번인 실패/타임아웃 = 자막 텍스트 산출은 지킨다(기록 = ly_burn fail-soft + 아래 백필)
        env:
          IN_ID: ${{ inputs.id }}
          OPTS: ${{ inputs.opts }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          [ -z "${LY_NOBURN:-}" ] || { echo "번인 선-스킵(길이 초과 · video.json 선기록 유지)"; exit 0; }
          BURN="$(printf '%s' "${OPTS:-}" | jq -r 'try .burn catch empty' 2>/dev/null || true)"
          [ "$BURN" = "true" ] || { echo "번인 OFF"; exit 0; }
          python3 .github/scripts/ly_burn.py "$IN_ID" "${LY_VIDEO:-}" || echo "::warning::번인 실패 — 자막 텍스트는 정상"

      # 번인 기록 백필(평의회6 260709) — 번인 스텝 하드킬(timeout SIGKILL)은 continue-on-error라 실패 기록 스텝도 안 돎
      #   → video.json 부재면 사유를 백필해 뷰어 영구 '입히는 중' 차단. 정상 경로 = ly_burn이 항상 기록(백필 노터치).
      - name: 번인 기록 백필 (하드킬 대비)
        if: ${{ always() && (inputs.url != '' || inputs.file != '' || inputs.reburn == '1') }}
        env:
          IN_ID: ${{ inputs.id }}
          OPTS: ${{ inputs.opts }}
        run: |
          [ -n "$IN_ID" ] || exit 0
          BURN="$(printf '%s' "${OPTS:-}" | jq -r 'try .burn catch empty' 2>/dev/null || true)"
          { [ "$BURN" = "true" ] || [ "${REBURN:-}" = "1" ]; } || exit 0
          [ -s "viewer/ly_out/${IN_ID}/subs.md" ] || exit 0   # 자막 산출 자체가 없으면(STT·claude 단계 실패) 백필 부적절 — '자막 텍스트는 정상' 오기록 차단(재평의회6 잔여 의문 봉합 · 그 경로는 실패 기록 스텝이 error.log로 표면화)
          VJ="viewer/ly_out/${IN_ID}/video.json"
          [ -s "$VJ" ] || { mkdir -p "viewer/ly_out/${IN_ID}"; printf '{"error":"번인 중단(시간 초과 추정) — 자막 텍스트는 정상"}' > "$VJ"; echo "백필: $VJ"; }

      - name: 실패 기록(error.log) — 프론트가 폴링해 즉시 표시
        if: failure()
        env:
          IN_ID: ${{ inputs.id }}
        run: |
          [ -n "$IN_ID" ] || exit 0
          mkdir -p "viewer/ly_out/${IN_ID}"
          if [ -s /tmp/ly_err.txt ]; then cp /tmp/ly_err.txt "viewer/ly_out/${IN_ID}/error.log";
          elif [ ! -s "viewer/ly_out/${IN_ID}/error.log" ]; then echo "자막 생성 실패 — Actions 로그를 확인해줘." > "viewer/ly_out/${IN_ID}/error.log"; fi
          # ↑ elif = lymake.sh가 남긴 상세 error.log(exit_code·stderr·stdout head) 보존 — 일반 문구로 덮지 않음(평의회6 260709)
          echo "error.log: $(cat viewer/ly_out/${IN_ID}/error.log)"

      - name: Commit output
        if: always()
        env:
          IN_ID: ${{ inputs.id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "nomute-bot"
          git config user.email "bot@nomute.local"
          git rm -r "uploads/${IN_ID}" 2>/dev/null || true   # 업로드 영상/오디오 = 오디오 추출 후 불필요(git 비대화 방지)
          git add "viewer/ly_out/${IN_ID}" 2>/dev/null || true
          git add metrics 2>/dev/null || true   # 토큰 계측 shard(claude_meter) 동반 커밋 — 있을 때만
          git commit -m "ly: ${IN_ID} 자막 출력" \
            || { [ -z "$(git log --oneline "origin/${BRANCH}..HEAD" 2>/dev/null | head -1)" ] && { echo "커밋할 것 없음"; exit 0; }; echo "신규 커밋 없음 — 미푸시 선행 커밋(조기 subs) push 진행"; }   # 조기 커밋 push 경쟁 실패 잔존분 유실 방지
          pushed=0
          for i in 1 2 3 4 5; do
            if git fetch origin "$BRANCH" && git rebase "origin/$BRANCH" && git push origin "HEAD:$BRANCH"; then pushed=1; break; fi
            git rebase --abort 2>/dev/null || true; sleep $((i*3))
          done
          [ "$pushed" = 1 ] || { echo "::error::push ${BRANCH} 5회 실패 — 출력 유실"; exit 1; }

      # 업로드 일회용 브랜치 삭제(성공·실패 무관) — 삭제되면 업로드 블롭이 unreachable = 클론·main 히스토리에 안 남음(비대 0).
      #   가드 = up-* 만(임의 브랜치·main 오삭제 차단). 실패해도 무해(고아 브랜치 잔존일 뿐 — 발견 시 수동 정리).
      - name: 업로드 브랜치 정리
        if: ${{ always() && inputs.up_branch != '' }}
        env:
          UP_BRANCH: ${{ inputs.up_branch }}
        run: |
          case "$UP_BRANCH" in up-*) ;; *) echo "up-* 아님 — 스킵"; exit 0;; esac
          git push origin --delete "$UP_BRANCH" || echo "브랜치 정리 실패(무해 — 수동 정리 대상): $UP_BRANCH"
