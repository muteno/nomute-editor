name: imgedit-make

# 뷰어 편집 탭(Pages Function /api/imgedit)이 발사 — 2모드 단일 워크플로:
#   analyze = 이미지(업로드) → 피사체 검출 → viewer/imgedit_out/<id>/boxes.json 커밋(폼이 폴링)
#   render  = boxes.json + 선택 targets/opts → 모자이크 번인 → R2 → result.json 커밋
# LLM 0콜(순수 OpenCV·PIL) · 과금 = Actions 분 + R2. 골격 = track-make 미러(영상 전용 축 제거).
on:
  workflow_dispatch:
    inputs:
      id:
        description: '작업 id(타임스탬프) — analyze가 발급, render는 같은 id 재사용(분석 1회=렌더 N회)'
        type: string
      mode:
        description: 'analyze | render'
        type: string
        default: 'analyze'
      file:
        description: '업로드 이미지 경로(uploads/<id>/src.*) — analyze 전용'
        type: string
        default: ''
      up_branch:
        description: '업로드 일회용 브랜치(up-<id> · 빈값=main 경로)'
        type: string
        default: ''
      render:
        description: '렌더 페이로드 JSON {"targets":[id],"opts":{pxw,pxh,size,feather,shape},"precise":bool} — render 전용'
        type: string
        default: ''

concurrency:
  group: imgedit-make-${{ inputs.id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  imgedit:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # 검출 = 이미지 1장 초 단위 · 박스 모자이크 = 초 단위 · 정밀(SAM2) = 이미지당 1~2초 + 콜드 deps(torch 설치) 여유 — 무한 행만 차단
    env:
      IMG_MODE: ${{ inputs.mode }}   # 셸엔 env로만(run 블록 ${{ }} 생보간 금지 = 인젝션 차단 · track 관례)
      # 정밀(SAM2 실루엣) = 헤비 스택(torch+ultralytics) 신호 — render 페이로드에 "precise":true 포함 시.
      IMG_HEAVY: ${{ (inputs.mode == 'render' && contains(inputs.render, '"precise":true')) && '1' || '' }}
    steps:
      - name: mode 가드
        run: |
          case "$IMG_MODE" in analyze|render) ;; *) echo "::error::잘못된 mode: $IMG_MODE"; exit 1;; esac

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # site-packages 캐시 — 경량(opencv)/헤비(torch+ultralytics ~1.6GB) 키 분리(h 접미) = 상호 복원 비용 0
      - name: Restore python deps (site-packages 캐시)
        uses: actions/cache@v4
        with:
          path: ${{ env.pythonLocation }}/lib/python3.12/site-packages
          key: nomute-imgedit-pydeps-${{ runner.os }}-py312-${{ hashFiles('apps/imgedit/setup.sh') }}-h${{ env.IMG_HEAVY }}-v1

      # 모델 캐시 — YuNet(검출) + 정밀=SAM2.1 tiny(헤비 키 분리 · track과 동일 캐시 디렉터리)
      - name: 모델 캐시
        if: ${{ inputs.mode == 'analyze' || env.IMG_HEAVY == '1' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/nomute-track
          key: nomute-imgedit-models-${{ hashFiles('apps/imgedit/setup.sh') }}-h${{ env.IMG_HEAVY }}-v1

      - name: 편집 환경 (opencv+모델)
        timeout-minutes: 12   # 백스톱 — 콜드런 pip+모델 다운 여유(이후 캐시히트 즉시)
        uses: ./.github/actions/runner-setup
        with:
          setup: apps/imgedit/setup.sh

      - name: 소스 확보 (analyze · 업로드 이미지)
        if: ${{ inputs.mode == 'analyze' }}
        env:
          FILE: ${{ inputs.file }}
          UP_BRANCH: ${{ inputs.up_branch }}
        run: |
          set -e
          [ -n "$FILE" ] || { echo "이미지 입력이 없어 — 다시 올려줘." > /tmp/imgedit_err.txt; echo "::error::file 빈값"; exit 1; }
          # 일회용 업로드 브랜치(up-<id>)서 /tmp로 회수(main 워킹트리엔 없음 · 잡 끝에 삭제 · track 동일)
          if [ -n "$UP_BRANCH" ]; then
            case "$UP_BRANCH" in up-*) ;; *) echo "::error::up_branch는 up-* 만: $UP_BRANCH"; exit 1;; esac
            git fetch origin "$UP_BRANCH" --depth=1 || { echo "업로드 이미지가 유실됐어 — 다시 올려줘." > /tmp/imgedit_err.txt; echo "::error::업로드 브랜치 fetch 실패"; exit 1; }
            EXT="${FILE##*.}"
            git show "FETCH_HEAD:$FILE" > "/tmp/upsrc.$EXT" || { echo "업로드 이미지 회수 실패 — 다시 올려줘." > /tmp/imgedit_err.txt; echo "::error::파일 회수 실패"; exit 1; }
            FILE="/tmp/upsrc.$EXT"
          fi
          [ -f "$FILE" ] || { echo "업로드 이미지가 없어 — 다시 올려줘." > /tmp/imgedit_err.txt; echo "::error::파일 없음: $FILE"; exit 1; }
          echo "IMG_SRC=$FILE" >> "$GITHUB_ENV"

      - name: 피사체 검출 (→ boxes.json)
        if: ${{ inputs.mode == 'analyze' }}
        env:
          IN_ID: ${{ inputs.id }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -e
          [ -n "$IN_ID" ] || { echo "::error::id 없음"; exit 1; }
          case "$IN_ID" in *[!0-9a-f-]*) echo "::error::잘못된 id"; exit 1;; esac
          [ -n "${IMG_SRC:-}" ] || { echo "이미지 입력이 없어 — 다시 올려줘." > /tmp/imgedit_err.txt; echo "::error::IMG_SRC 빈값"; exit 1; }
          python3 apps/imgedit/img_detect.py "$IN_ID" "$IMG_SRC"

      - name: 모자이크 렌더 (→ R2 → result.json)
        if: ${{ inputs.mode == 'render' }}
        timeout-minutes: 20
        env:
          IN_ID: ${{ inputs.id }}
          RENDER: ${{ inputs.render }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -e
          [ -n "$IN_ID" ] || { echo "::error::id 없음"; exit 1; }
          case "$IN_ID" in *[!0-9a-f-]*) echo "::error::잘못된 id"; exit 1;; esac
          # img_mosaic는 실패도 result.json{error} 기록 후 rc0(fail-soft). 네이티브 크래시만 스텝 실패 → 아래 failure()가 잡음.
          python3 apps/imgedit/img_mosaic.py "$IN_ID"

      - name: 실패 기록(error.log) — 프론트가 폴링해 즉시 표시
        if: failure()
        env:
          IN_ID: ${{ inputs.id }}
          IMG_MODE: ${{ inputs.mode }}
        run: |
          [ -n "$IN_ID" ] || exit 0
          case "$IN_ID" in *[!0-9a-f-]*) exit 0;; esac
          mkdir -p "viewer/imgedit_out/${IN_ID}"
          if [ -s /tmp/imgedit_err.txt ]; then cp /tmp/imgedit_err.txt "viewer/imgedit_out/${IN_ID}/error.log";
          else echo "편집 작업 실패 — Actions 로그를 확인해줘." > "viewer/imgedit_out/${IN_ID}/error.log"; fi
          echo "error.log: $(cat viewer/imgedit_out/${IN_ID}/error.log)"
          # 렌더 하드크래시(SIGKILL·OOM = fail-soft 우회)면 result.json도 error로 덮음(스테일 성공본 오표시 차단 · track 봉합 계승)
          if [ "$IMG_MODE" = "render" ]; then
            python3 -c "import json,os; d=os.path.join('viewer/imgedit_out',os.environ['IN_ID']); err=open(os.path.join(d,'error.log'),encoding='utf-8').read().strip()[:200]; json.dump({'error': err or '렌더 실패'}, open(os.path.join(d,'result.json'),'w',encoding='utf-8'), ensure_ascii=False)" \
              || echo "::warning::result.json 덮기 실패(비치명)"
          fi

      - name: Commit output
        if: always()
        env:
          IN_ID: ${{ inputs.id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          [ -n "$IN_ID" ] || { echo "id 없음 — 커밋 스킵"; exit 0; }
          case "$IN_ID" in *[!0-9a-f-]*) echo "잘못된 id — 커밋 스킵"; exit 0;; esac
          git config user.name "nomute-bot"
          git config user.email "bot@nomute.local"
          git rm -r "uploads/${IN_ID}" 2>/dev/null || true   # 업로드 원본 = R2 보관 후 불필요(git 비대 방지 · track 동일)
          git add "viewer/imgedit_out/${IN_ID}" 2>/dev/null || true
          git commit -m "imgedit: ${IN_ID} ${IMG_MODE} 출력" || { echo "커밋할 것 없음"; exit 0; }
          pushed=0
          for i in 1 2 3 4 5; do
            if git fetch origin "$BRANCH" && git rebase "origin/$BRANCH" && git push origin "HEAD:$BRANCH"; then pushed=1; break; fi
            git rebase --abort 2>/dev/null || true; sleep $((i*3))
          done
          [ "$pushed" = 1 ] || { echo "::error::push ${BRANCH} 5회 실패 — 출력 유실"; exit 1; }

      - name: 업로드 브랜치 정리
        if: ${{ always() && inputs.up_branch != '' }}
        env:
          UP_BRANCH: ${{ inputs.up_branch }}
        run: |
          case "$UP_BRANCH" in up-*) ;; *) echo "up-* 아님 — 스킵"; exit 0;; esac
          git push origin --delete "$UP_BRANCH" || echo "브랜치 정리 실패(무해): $UP_BRANCH"
