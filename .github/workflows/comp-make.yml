name: comp-make

# 뷰어 comp 시트(Pages Function /api/compose)가 발사 → 업로드 이미지 + 텍스트로
# 카드뉴스 합성(1080×1350) → viewer/comp_out/<id>/card.jpg 커밋(뷰어가 폴링해 표시).
# 무료: 파이썬 + Noto 폰트만(유료 API 무관). apps/comp/card_news.py 무수정 import.
# ⚠️ workflow_dispatch는 워크플로 파일이 기본 브랜치(main)에 있어야 파일명으로 발사됨 —
#    사본(작업 브랜치) 단계에선 통합 후 라이브. 스크립트 핵심은 로컬 실측 통과.
on:
  workflow_dispatch:
    inputs:
      id:
        description: '출력 id(타임스탬프)'
        type: string
      image:
        description: '업로드 이미지 레포 경로(uploads/<id>/src.*)'
        type: string
      image_sha:
        description: '업로드 src 커밋 SHA — dispatch 레이스 가드(src PUT 전 HEAD 체크아웃 시 이 커밋 직접 체크아웃)'
        type: string
      lines:
        description: '텍스트 줄 — JSON 배열 문자열'
        type: string
      src_json:
        description: '제작 조건 스냅샷(snapForm) JSON — 기기 간 카드뉴스 수정 복원용(_src.json). 빈=미보존'
        type: string

concurrency:
  group: comp-make-${{ inputs.id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  comp:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.image_sha || 'main' }}   # 업로드 src 커밋 직접 체크아웃 = dispatch 레이스 원천 차단(thumb-make와 동일). 미지정이면 main.

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # site-packages 캐시 — setup.sh 의 pip install(mediapipe·opencv·numpy·pillow, 썸네일과 동일 세트) 재설치 회피.
      # 썸네일 실측과 동일 병목(매 런 pip install 수십~수백초 · STAMP 러너간 비영속). 워밍런 = 복원 → setup.sh
      # import 체크 통과 → pip 스킵 → setup 수초. 무해(미적중이면 setup.sh 가 기존대로 재설치 = 회귀 0). (정본 = thumb-make 동일 패턴)
      - name: Restore python deps (site-packages 캐시)
        uses: actions/cache@v4
        with:
          path: ${{ env.pythonLocation }}/lib/python3.12/site-packages
          key: nomute-comp-pydeps-${{ runner.os }}-py312-pillow-numpy-cv2-mediapipe-v1

      - name: Setup comp env (setup.sh 단일출처 + 캐시)
        timeout-minutes: 8   # 백스톱 — 셋업 행(apt/pip/캐시)이 잡 한도까지 끌어 cancel 차단(260618)
        uses: ./.github/actions/runner-setup
        with:
          setup: apps/comp/setup.sh
          apt: fonts-noto-cjk   # 폰트 .deb 7일 캐시 → 매 런 재다운·미러행 차단

      - name: Compose card
        env:
          IN_IMAGE: ${{ inputs.image }}
          IN_LINES: ${{ inputs.lines }}
          IN_ID: ${{ inputs.id }}
          IN_SRC: ${{ inputs.src_json }}
        run: |
          set -e
          if [ -z "${IN_ID}" ] || [ -z "${IN_IMAGE}" ] || [ -z "${IN_LINES}" ]; then
            echo "::error::id/image/lines 입력 누락"; exit 1
          fi
          if [ ! -f "${IN_IMAGE}" ]; then echo "::error::이미지 없음: ${IN_IMAGE}"; exit 1; fi
          mkdir -p "viewer/comp_out/${IN_ID}"
          OUT="viewer/comp_out/${IN_ID}/card.jpg"
          # 배치 import 방식(지침 정본) — 로컬 실측 통과한 호출
          python3 -c "import sys,json; sys.path.insert(0,'apps/comp'); from card_news import generate; sys.exit(0 if generate(sys.argv[1], json.loads(sys.argv[2]), sys.argv[3]) else 2)" \
            "${IN_IMAGE}" "${IN_LINES}" "${OUT}"
          # 제작 조건 스냅샷(_src.json) = 기기 간 카드뉴스 '수정'(연필) 복원 · thumb-make 패턴 · 빈/깨진 JSON 생략(호환)
          if [ -n "${IN_SRC}" ]; then python3 -c "import os,json; raw=os.environ.get('IN_SRC','').strip(); open('viewer/comp_out/${IN_ID}/_src.json','w').write(json.dumps(json.loads(raw),ensure_ascii=False)) if raw else None" 2>/dev/null || echo "::warning::_src.json 생략(파싱 실패)"; fi

      - name: Commit output
        if: always()
        env:
          IN_ID: ${{ inputs.id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "nomute-bot"
          git config user.email "bot@nomute.local"
          git add "viewer/comp_out/${IN_ID}" 2>/dev/null || true
          git add "uploads/${IN_ID}" 2>/dev/null || true
          git commit -m "comp: ${IN_ID} 합성 출력" || { echo "커밋할 것 없음"; exit 0; }
          # 동시 렌더 push 레이스 대비 — 매 시도 origin 흡수 후 push(naive 재push는 non-ff로 무한실패)
          pushed=0
          for i in 1 2 3 4 5; do
            if git fetch origin "$BRANCH" && git rebase "origin/$BRANCH" && git push origin "HEAD:$BRANCH"; then pushed=1; break; fi
            git rebase --abort 2>/dev/null || true; sleep $((i*3))
          done
          [ "$pushed" = 1 ] || { echo "::error::push ${BRANCH} 5회 실패 — 출력 유실"; exit 1; }
