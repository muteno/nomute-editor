name: cluster-scan
# 진단 전용(오병합): RSS 수집 → 현재 클러스터링 + 수정안들 비교를 로그에 출력.
# 읽기 전용 — 커밋/푸시 없음. 수동(workflow_dispatch)만. 과금 0(public Actions).

on:
  workflow_dispatch:
    inputs:
      hours:
        description: '최근 N시간 기사 수집'
        default: '24'

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet feedparser requests

      - name: Collect (RSS → articles.json)
        run: python3 scraper/knews_scraper.py --out scraper/out --hours "${{ inputs.hours || '24' }}"

      - name: Cluster scan (오병합 진단 + 수정안 비교)
        run: python3 scraper/cluster_scan.py scraper/out/articles.json
