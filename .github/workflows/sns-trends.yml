# SNS 트렌드 수집 — 유튜브 인기 급상승(공식 API·키 게이트) + 구글 트렌드 실시간 검색어(무키) + 틱톡 인기(tikwm 무키)
# 운영자 260710 "틱톡·유튜브 끌어오기 ㄱㄱ 다" · 260711 tikwm 이식(외부 도구) · 조사 정본 = docs/curation-algorithm.md §7 메이저 SNS 항목.
# LLM 0콜·과금 0(유튜브 무료 쿼터 ~1%) · 큐레이션 신호·임계 0 접촉(표시 전용 신규 레인 · §1 보수성).
# 틱톡 주 경로 = sns_trends.py tiktok()(tikwm·stdlib) — 구 Playwright 카나리아(tiktok-canary.yml)는 도먼트 대안 축.
name: sns-trends
on:
  schedule:
    - cron: '17,47 * * * *'   # 백스톱 전용 — GitHub schedule = best-effort(피크시 1~4h 드롭·실측 260713: run 간격 09:13→13:04=3h51m·13:04→16:42=3h38m = "지연" 배지 근본원인). 주 하트비트는 아래 push(폰). :30 봇 혼잡 회피 오프셋 유지.
  push:
    branches: [main]
    paths:
      - 'viewer/sns_subs_phone.json'   # 폰(muteno-phone·실기기 PAT) 구독수집 커밋 = 실측 ~30분 규칙 하트비트 — 실기기 cron이라 GitHub schedule 드롭과 무관 → 트렌드 수집이 편승(지연 근본해소 260713). 폰 전용 파일만 감시 = 봇 GITHUB_TOKEN 커밋·자기 산출(sns_trends/brief) 재트리거 0(무한루프 없음). 근접 중복 발사는 Collect 선두 신선도 게이트가 차단.
  workflow_dispatch:
    inputs:
      subs:
        description: '구독 축(X·틱톡·릴스·유튜브 계정) 수집 — 1=ON (§📰-e 카나리아 · 러너 실측 승격 전 cron은 OFF)'
        default: '1'
        required: false
      brief:
        description: 'AI 브리프(비서 페르소나 1콜·opus 4.8 max·입력 동일 = 스킵) — 1=ON (§📰-e 카나리아 · 실측 승격 전 cron은 OFF)'
        default: '0'
        required: false
      reddit:
        description: '레딧 핫(⑥ 무키 .json · 운영자 260712) — 1=ON (§📰-e 카나리아 · 러너 IP 403/429 실측 승격 전 cron은 OFF)'
        default: '1'
        required: false
      bsky:
        description: '블루스카이 인기(⑦ 무키 공개 AppView · 운영자 260712) — 1=ON (§📰-e 카나리아 · 실측 승격 전 cron은 OFF)'
        default: '1'
        required: false
      signal:
        description: '시그널 실검(⑨ 무키 JSON · 운영자 260712) — 1=ON (§📰-e 카나리아 · 실측 승격 전 cron은 OFF)'
        default: '1'
        required: false
      xtrends:
        description: 'X 실시간 트렌드(⑩ trends24·getdaytrends 파싱 · 운영자 260712) — 1=ON (동일 카나리아)'
        default: '1'
        required: false
      hn:
        description: '해커뉴스(⑫ 무키 Firebase · 운영자 260713) — 1=ON (§📰-e 카나리아)'
        default: '1'
        required: false
      fin:
        description: '금융 환율+코인(⑬ 무키 open.er-api+Upbit · 운영자 260713) — 1=ON (동일 카나리아)'
        default: '1'
        required: false
      bsky_tr:
        description: '블루스카이 인기글 자동 번역(⑦ topic·ko · opus high 1콜 · 증분 carry · 운영자 260713) — 1=ON (§📰-e 카나리아 · dispatch 실측 승격 전 cron은 OFF)'
        default: '0'
        required: false

permissions:
  contents: write

concurrency:
  group: sns-trends
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # 수집 840s(14분) + 브리프/번역 LLM 스텝 여유(운영자 260714 "데이터 잘 받아오게" — 16분은 수집 성공 후 LLM 단계서 job timeout→cancelled 상습·실측 12:38 run 정확히 16분 사망 → 수집분까지 유실). 구독 2군 확장분(예산 480s) 수용(260712)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Collect (stdlib만 — deps 0)
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}   # 미설정 = 유튜브 skip(no-op 스캐폴드·gtrends만 수집)
          SNS_SUBS: ${{ inputs.subs || '1' }}   # 구독 축 = 기본 ON 승격(§📰-e 이행 완료 — 카나리아 run 29153925931 실측 260711: rc=0·65s·틱톡10·유튜브10·레거시 무손상·커밋 eab3bc5). schedule = inputs 없음 → '1'(social-scan 관용구) · dispatch subs='0'=일시 OFF. X·인스타 = 러너 IP 429 실측(런마다 IP 로터리 = 확률 수집·빈 런 = 직전분 보존 fail-soft) — 지속 0건이면 폰 수집 경로 후속. 롤백 = || '' 복귀
          SNS_SUBS_BUDGET: '480'   # 한국/세계 2군 확장분(구 기본 240 · 지역별 상한 x20·tk15·ig10·yt15 = 최악 직렬 ≈460s 커버 · 운영자 260712)
          SNS_REDDIT: ${{ inputs.reddit || '0' }}   # ⑥ 레딧 = 러너 승격 안 함(카나리아 run 29197039475 실측 260713: 3서브레딧 전부 HTTP 403 Blocked = 데이터센터 IP 차단 확정) — 주 공급 = 폰/맥 phone_subs 채택(sns_trends.py main) · 이 게이트는 러너 재시도용으로만 잔존
          SNS_BSKY: ${{ inputs.bsky || '1' }}       # ⑦ 블루스카이 = 기본 ON 승격(§📰-e 이행 — 카나리아 run 29197039475 실측 260713: rc=0·12건 수집·What's Hot 정상) · 롤백 = || '0'
          SNS_SIGNAL: ${{ inputs.signal || '1' }}   # ⑨ 시그널 실검 = 기본 ON 승격(§📰-e 이행 — 러너 카나리아 실측 260712) · 롤백 = || '0'
          SNS_XTRENDS: ${{ inputs.xtrends || '1' }} # ⑩ X 실시간 트렌드 = 기본 ON 승격(동일 실측) · 롤백 = || '0'
          SNS_HN: ${{ inputs.hn || '1' }}           # ⑫ 해커뉴스 = 기본 ON 승격(§📰-e 이행 — 카나리아 run 29201946896 실측 260713: rc=0·HN 10건·Firebase 정상) · 롤백 = || '0'
          SNS_FIN: ${{ inputs.fin || '1' }}         # ⑬ 금융 = 기본 ON 승격(동일 run 실측: 환율 4·코인 4 · open.er-api+Upbit 정상) · 롤백 = || '0'
          SAFETY_KEY: ${{ secrets.KOFIC_NOMUTE_JAENAN || secrets.SAFETY_KEY }}   # ⑭ 재난문자 = 공공데이터포털 키 — 운영자 시크릿명 = KOFIC_nomute_jaenan(260713 발급·등록 실측 · 구 SAFETY_KEY 스캐폴드명 폴백 유지 · GitHub 시크릿명 대소문자 무관 → 대문자 참조로 해석). KOBIS·EX와 동일 폴백 패턴
          KOBIS_KEY: ${{ secrets.KOFIC_NOMUTE_ID || secrets.KOFIC_NOMUTE }}   # ⑮ KOBIS 박스오피스 — 실측(260713): KOFIC_NOMUTE로 10건 수집 성공(run 03:20 KST)·_ID는 미존재였음 → 운영자 구두명(_ID)·실존명 양쪽 폴백(어느 이름이든 동작)
          EX_KEY: ${{ secrets.KOFIC_NOMUTE_EX }}    # ⑯ 도로공사 돌발·사고 — 운영자 시크릿명 = KOFIC_NOMUTE_EX(260713 등록 실측 · EX_URL env로 엔드포인트 교체 가능)
          # REDDIT_SUBS: 'popular,korea,worldnews'  # 서브레딧 노브(코드 기본과 동일 — 바꿀 때만 주석 해제)
        run: |
          # 신선도 게이트 — sns_trends 최근 28분 내 갱신이면 이번 트리거 수집 스킵(push·schedule 근접 발사 중복·과금·IP차단 위험 차단). exit 0(성공) → 후속 브리프/번역/커밋이 '입력 동일·무변동' 스킵으로 캐스케이드(추가 손질 0). 파일 없음·파싱 실패·미래시각(음수 el) = 수집 진행(fail-safe = 백스톱 절대 불차단). 1680s=28분 < schedule 30분 = 백스톱 발사는 항상 통과.
          FRESH=$(python3 -c "import json,datetime as dt; u=json.load(open('viewer/sns_trends.json'))['updated']; t=dt.datetime.fromisoformat(u); el=(dt.datetime.now(t.tzinfo)-t).total_seconds(); print(1 if 0<=el<1680 else 0)" 2>/dev/null || echo 0)
          if [ "$FRESH" = "1" ]; then echo "::notice::sns_trends 최근 28분 내 갱신 — 이번 트리거 수집 스킵(중복 방지)"; exit 0; fi
          timeout 840 python3 scraper/sns_trends.py   # 840 = 레거시 최악(무키 innertube ~170s) + 구독 예산 SNS_SUBS_BUDGET 480s + 여유. 구독 축은 스크립트 내부 wall-clock 예산이 상한(초과 = 잔여 계정 스킵·레거시 보존 — 평의회2·9 회계)

      # ── 수집분 즉시 커밋(1차) — 뒤 LLM 브리프/번역 스텝이 job timeout으로 죽어도 수집 데이터(TOP 10·트렌드)는 이미 라이브 확보(운영자 260714 "데이터 잘 받아오게 설계" · 근본원인 = 맨끝 단일 Commit이라 중간 LLM 단계 timeout 시 수집분 동반 유실 · 실측 12:04~13:45 = 세 run 연쇄 cancelled 102분 갭). sns_trends.json은 push paths(sns_subs_phone.json) 미감시 = 재트리거 0. 브리프/번역 갱신분은 맨끝 Commit이 2차로 마저 커밋(입력 동일 스킵 캐스케이드로 무변동 시 생략).
      - name: Commit 수집분(1차 · 유실 방지)
        run: |
          git config user.name "nomute-bot"
          git config user.email "bot@users.noreply.github.com"
          git add viewer/sns_trends.json 2>/dev/null || true
          git diff --cached --quiet && { echo "수집 변동 없음 — 1차 커밋 생략(신선도 게이트 스킵 등)"; exit 0; }
          git commit -m "sns-trends: 수집 갱신"
          for i in 1 2 3 4; do
            git pull --rebase -X ours origin main 2>/dev/null || true
            git push origin HEAD:main && exit 0 || { echo "1차 push 재시도 $i"; sleep $((2**i)); }
          done

      - name: Install Claude Code CLI (브리프 스텝용 — LLM 0콜 수집 레인이라 브리프 게이트와 동기)
        if: ${{ (inputs.brief || '1') == '1' || (inputs.bsky_tr || '0') == '1' }}   # 기본 ON 승격(§📰-e 이행 — 카나리아 run 2차 실측 260712: rc=0·브리프 626자 생성·sns_brief.json 커밋 09:44 KST · 1차 rc=127 = CLI 부재 → 이 스텝 신설로 봉합) · 롤백 = || '0' · 블루스카이 번역(bsky_tr)도 CLI 필요(운영자 260713 · 미포함 시 카나리아 rc=127)
        run: npm install -g @anthropic-ai/claude-code

      - name: AI 브리프(비서 페르소나 · 운영자 260712) — 입력 동일 = 스킵(토큰 0) · 실패 = 직전 유지(fail-soft)
        env:
          SNS_BRIEF: ${{ inputs.brief || '1' }}   # 기본 ON 승격(§📰-e 이행 완료 — 카나리아 2차 run 실측 260712: 브리프 626자·sha 8d8d8af9·fail-soft/스킵 게이트 정상 · schedule = inputs 없음 → '1') · dispatch brief='0' = 일시 OFF · 롤백 = || '0'
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT: ${{ (vars.ACTIVE_ACCOUNT || 'MUTENO') == 'NOMUTEFB' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_NOMUTEFB }}   # 서브1 폴오버(체인 MUTENO→NOMUTEFB→EMS1130G→MUTENONA · news-analyze 관용구)
          CLAUDE_CODE_OAUTH_TOKEN_ALT2: ${{ (vars.ACTIVE_ACCOUNT || 'MUTENO') == 'MUTENO' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENO }}   # 서브2 폴오버(체인 3번째)
          CLAUDE_CODE_OAUTH_TOKEN_ALT3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENONA }}   # 서브3 폴오버(실꼬리 = 항상 MUTENONA)
        run: bash .github/scripts/sns_brief.sh   # 게이트·스킵·fail-soft 전부 스크립트 내(rc 항상 0 = 수집 커밋 비차단)

      - name: 블루스카이 번역(⑦ topic·ko · 증분 carry · 번역대상 0=스킵 · 실패=carry 유지 · 운영자 260713)
        env:
          BSKY_TR: ${{ inputs.bsky_tr || '1' }}   # 기본 ON 승격(§📰-e 이행 — 카나리아 run 29222700305 실측 260713: BSKY_TR=1·번역 대상 12건 전건 병합·저장·커밋 f802b56·rc=0 · 증분 carry로 재번역 0) · schedule=inputs 없음→'1' · dispatch bsky_tr='0'=일시 OFF · 롤백 = || '0' · sns_trends.json 직접 병합(Commit git add 커버)
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT: ${{ (vars.ACTIVE_ACCOUNT || 'MUTENO') == 'NOMUTEFB' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_NOMUTEFB }}   # 서브1 폴오버(체인 MUTENO→NOMUTEFB→EMS1130G→MUTENONA)
          CLAUDE_CODE_OAUTH_TOKEN_ALT2: ${{ (vars.ACTIVE_ACCOUNT || 'MUTENO') == 'MUTENO' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENO }}   # 서브2 폴오버(체인 3번째)
          CLAUDE_CODE_OAUTH_TOKEN_ALT3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENONA }}   # 서브3 폴오버(실꼬리 = 항상 MUTENONA)
        run: bash .github/scripts/bsky_brief.sh   # 게이트·스킵·fail-soft 전부 스크립트 내(rc 항상 0 = 커밋 비차단)

      - name: Commit
        run: |
          git config user.name "nomute-bot"
          git config user.email "bot@users.noreply.github.com"
          git add viewer/sns_trends.json viewer/sns_brief.json 2>/dev/null || true
          git diff --cached --quiet && { echo "변동 없음 — 커밋 생략"; exit 0; }
          git commit -m "sns-trends: 유튜브·트렌드 갱신"
          for i in 1 2 3 4; do
            git pull --rebase -X ours origin main 2>/dev/null || true
            git push origin HEAD:main && exit 0 || { echo "push 재시도 $i"; sleep $((2**i)); }
          done
          echo "::warning::push 실패(재시도 소진) — 다음 주기 재수집"
          # push = HEAD:main — checkout ref:main이라 통상 로컬 main 존재하나 img-resize detached 사고(260710) 계승 방어.
          # 실패 = warning 종료(트렌드는 30분 뒤 재수집이라 유실 개념 없음 = resize류 exit 1 불요).
