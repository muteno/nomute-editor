# 틱톡 구독 브라우저 카나리아 — workflow_dispatch 전용(§📰-e 카나리아 룰: 실측 성공 전 cron 금지)
# 목적(운영자 260721 "무조건 최신"): tikwm /api/user/posts 러너 데센 IP 403(WAF)을 실브라우저(JS 챌린지
# 해소)로 우회해 구독 큐레이션의 폰 의존 0 러너 자립 최신 수집을 실측. 전면 fail-soft(실패 = 산출 무변·warning).
# 성공 실측되면 승격 검토(sns-trends 주기 편입 — 운영자 확인 후 · tiktok-canary 관용구 동일).
# 브랜치에서 dispatch = 측정 전용(Commit 스텝 main 한정 게이트 — 브랜치 체크아웃을 main에 푸시하는 사고 차단).
name: tiktok-subs-canary
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sns-trends   # sns_trends.json 동시 기록 직렬화(같은 파일 · sns-trends/tiktok-canary와 동일 그룹)
  cancel-in-progress: false

jobs:
  canary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4   # ref 미지정 = dispatch한 ref 그대로(브랜치 실측 가능)

      - name: Playwright(시스템 크롬 channel — 브라우저 다운로드 0 · §9 timeout 감쌈)
        run: timeout 300 pip install -q playwright || (sleep 5 && timeout 300 pip install -q playwright)

      - name: Collect
        run: timeout 420 python3 scraper/tiktok_subs_browser.py

      - name: Commit
        if: github.ref == 'refs/heads/main'   # 브랜치 dispatch = 측정 전용(데이터 착지는 main 실행만)
        run: |
          git config user.name "nomute-bot"
          git config user.email "bot@users.noreply.github.com"
          git add viewer/sns_trends.json 2>/dev/null || true
          git diff --cached --quiet && { echo "산출 없음(카나리아 실패/무변) — 커밋 생략"; exit 0; }
          git commit -m "tiktok-subs-canary: 구독 최신 수집(브라우저)"
          for i in 1 2 3 4; do
            git pull --rebase -X ours origin main 2>/dev/null || true
            git push origin HEAD:main && exit 0 || { echo "push 재시도 $i"; sleep $((2**i)); }
          done
          echo "::warning::push 실패(재시도 소진)"
