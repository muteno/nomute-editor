name: rate

# 뷰어 스크랩 관심도(★1~5)·픽 → scraper/ratings.jsonl 누적·커밋. (feedback.yml 미러)
# 트리거 = Pages Function /api/rate (GH_TOKEN dispatch). 과금 0(러너 ~10s, Gemini·Drive 무관).
on:
  workflow_dispatch:
    inputs:
      id:
        description: '후보 id(또는 url)'
        type: string
        default: ''
      url:
        description: '원문 url'
        type: string
        default: ''
      title:
        description: '제목'
        type: string
        default: ''
      score:
        description: '관심도 0~5'
        type: string
        default: '0'
      picked:
        description: 'true=고름(분석 후보)'
        type: string
        default: ''
      memo:
        description: '1·5점 주관식 메모(선택)'
        type: string
        default: ''
      dismissed:
        description: 'true=관심없음(👎·별점 1점 미만·숨김)'
        type: string
        default: ''

concurrency:
  group: rate
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - name: Record rating
        env:
          R_ID: ${{ inputs.id }}
          R_URL: ${{ inputs.url }}
          R_TITLE: ${{ inputs.title }}
          R_SCORE: ${{ inputs.score }}
          R_PICKED: ${{ inputs.picked }}
          R_MEMO: ${{ inputs.memo }}
          R_DISMISSED: ${{ inputs.dismissed }}
        run: |
          python3 .github/scripts/rate_record.py
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/ratings.jsonl
          if git diff --cached --quiet; then echo "변경 없음"; exit 0; fi
          # 제목은 셸 주입 위험 → 커밋 메시지엔 안전한 값(점수·픽)만.
          git commit -m "rate: ${R_SCORE}점 pick=${R_PICKED:-0} dismiss=${R_DISMISSED:-0}"
          for i in 0 1 2 3; do
            [ "$i" -gt 0 ] && sleep $((2**i))
            git pull --rebase -X ours origin main && git push origin HEAD:main && exit 0
            git rebase --abort 2>/dev/null || true
          done
          echo "::error::rate push 실패"; exit 1
