name: edit-make

# 뷰어 편집기 폼(Pages Function /api/edit)이 발사 — 업로드 1번·1잡: 영상(URL/업로드) → [자막·컷 ON이면 STT · 자막 ON에만 claude 의역]
#   → ly_burn.py 단일 컴포지터{자막 번인·무음 컷·배경음 제거 + 편집기 축: 트림·비율 크롭/여백·해상도·fps(60i 보간)·음량 통일}
#   → R2 ly_out/<id>/subbed.mp4 → viewer/ly_out/<id>/video.json 커밋(폼이 폴링). 골격 = ly-make 미러(스텝 게이트만 편집기화).
#   기존 ly-make·conv-make 무접촉(평의회6 점진 이관 · 운영자 2단계 확정 260710).
on:
  workflow_dispatch:
    inputs:
      id:
        description: '작업 id(타임스탬프-hex6)'
        type: string
      url:
        description: '영상 URL(yt-dlp)'
        type: string
        default: ''
      file:
        description: '업로드 영상 파일 경로(uploads/<id>/src.*)'
        type: string
        default: ''
      up_branch:
        description: '업로드 일회용 브랜치(up-<id> · 빈값=main 커밋 경로) — ly/track/conv 동일'
        type: string
        default: ''
      r2_src:
        description: 'R2 직업로드 키(up_src/<id>.<ext> · 대용량 ≤2GB — api/upload 발급 · 빈값=미사용 · 잡 끝 삭제)'
        type: string
        default: ''
      opts:
        description: '편집 옵션 JSON — ly 자막 축{burn,lang,tone,filler,style,pos,size,bg,karaoke,pop,keyword,cut,cutlv,bgm,outline,pad,oc,font} + 편집기 축{vid_ar,vid_fit(crop/pad/blur),vid_pos,vid_res,vid_fps,vid_t0,vid_t1,aud_norm} + 클리퍼{clip=배타 스캔: STT→구간픽→clips.json·컴포즈 스킵 · 260711}'
        type: string
        default: '{}'
      account:
        description: '이 실행에 쓸 계정(구독 OAuth · 자막 의역용)'
        type: choice
        default: MUTENO
        options:
          - NOMUTEFB
          - MUTENO
          - EMS1130G

concurrency:
  group: edit-make-${{ inputs.id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  edit:
    runs-on: ubuntu-latest
    timeout-minutes: 85   # 최악 스택{체크아웃·환경 ~15 + R2 소스 8 + 컴포즈 60(4K enc 2400s 포함)} + 우아한 실패·커밋 창 — 잡 캡 = 최후 보루(ly-make 문법 · 4K 재산정 평의회6 260711)
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ── 자막·클리퍼 ON 경로 전용 준비(claude 의역/구간픽) — 둘 다 아니면 Node·claude 설치 안 함(러너 분 절약)
      - name: Setup Node (자막)
        if: ${{ contains(inputs.opts, '"burn":true') || contains(inputs.opts, '"clip":true') }}
        uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Install claude-code (자막)
        if: ${{ contains(inputs.opts, '"burn":true') || contains(inputs.opts, '"clip":true') }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore python deps (site-packages 캐시 · 자막·컷·클리퍼)
        if: ${{ contains(inputs.opts, '"burn":true') || contains(inputs.opts, '"cut":true') || contains(inputs.opts, '"clip":true') }}
        uses: actions/cache@v4
        with:
          path: ${{ env.pythonLocation }}/lib/python3.12/site-packages
          key: nomute-ly-pydeps-${{ runner.os }}-py312-${{ hashFiles('apps/ly/setup.sh') }}-v1   # ly-make와 캐시 공유(동일 키 = 재설치 0)

      - name: STT 환경 (자막·컷·클리퍼 = whisper+ffmpeg+한글폰트)
        if: ${{ contains(inputs.opts, '"burn":true') || contains(inputs.opts, '"cut":true') || contains(inputs.opts, '"clip":true') }}
        timeout-minutes: 15
        uses: ./.github/actions/runner-setup
        with:
          setup: apps/ly/setup.sh
          whisper: 'true'
          apt: ffmpeg fonts-noto-cjk fonts-nanum fonts-nanum-extra   # 나눔 2종 = 자막 폰트 축(gothic/serif = noto-cjk 안 · nanum=나눔고딕 · pen=Nanum Pen Script는 -extra) — apt 캐시 키에 목록 포함 = 첫 런만 다운(260711)

      - name: 변환 환경 (자막·컷·클리퍼 없음 = ffmpeg+yt-dlp만)
        if: ${{ !contains(inputs.opts, '"burn":true') && !contains(inputs.opts, '"cut":true') && !contains(inputs.opts, '"clip":true') }}
        timeout-minutes: 10
        uses: ./.github/actions/runner-setup
        with:
          setup: apps/conv/setup.sh
          apt: ffmpeg

      - name: 소스 확보 (URL)
        if: ${{ inputs.url != '' }}
        timeout-minutes: 10
        env:
          URL: ${{ inputs.url }}
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
          YTF: ${{ contains(inputs.opts, '"vid_res":"src"') && 'bv*[height<=2160]+ba/b' || 'bv*[height<=1920]+ba/b' }}   # 해상도 '원본(4K)' 선택 시에만 4K 페치(그 외 1920 = 비용 보호)
        run: |
          set -e
          COOKIES=""
          if [ -n "$YT_COOKIES" ]; then printf '%s\n' "$YT_COOKIES" > /tmp/ck.txt; COOKIES="--cookies /tmp/ck.txt"; fi
          python3 -m yt_dlp -f "$YTF" --merge-output-format mp4 --no-playlist --socket-timeout 30 $COOKIES -o "/tmp/src.%(ext)s" "$URL" \
            || { echo "영상 다운로드 실패 — 사이트가 봇을 막았을 수 있어. 파일 업로드로 해줘." > /tmp/edit_err.txt; echo "::error::yt-dlp 실패: $URL"; exit 1; }
          SRC="$(ls /tmp/src.* 2>/dev/null | head -1 || true)"
          [ -n "$SRC" ] || { echo "영상 다운로드 실패 — 파일 업로드로 해줘." > /tmp/edit_err.txt; echo "::error::다운 산출 없음"; exit 1; }
          echo "EDIT_SRC=$SRC" >> "$GITHUB_ENV"

      - name: 소스 확보 (업로드 파일)
        if: ${{ inputs.file != '' }}
        env:
          FILE: ${{ inputs.file }}
          UP_BRANCH: ${{ inputs.up_branch }}
        run: |
          set -e
          if [ -n "$UP_BRANCH" ]; then
            case "$UP_BRANCH" in up-*) ;; *) echo "::error::up_branch는 up-* 만 허용: $UP_BRANCH"; exit 1;; esac
            git fetch origin "$UP_BRANCH" --depth=1 || { echo "업로드 파일이 유실됐어 — 다시 올려줘." > /tmp/edit_err.txt; echo "::error::업로드 브랜치 fetch 실패: $UP_BRANCH"; exit 1; }
            EXT="${FILE##*.}"
            git show "FETCH_HEAD:$FILE" > "/tmp/upsrc.$EXT" || { echo "업로드 파일 회수 실패 — 다시 올려줘." > /tmp/edit_err.txt; echo "::error::브랜치서 파일 회수 실패: $FILE"; exit 1; }
            FILE="/tmp/upsrc.$EXT"
          fi
          [ -f "$FILE" ] || { echo "업로드 파일이 없어 — 다시 올려줘." > /tmp/edit_err.txt; echo "::error::업로드 파일 없음: $FILE"; exit 1; }
          echo "EDIT_SRC=$FILE" >> "$GITHUB_ENV"

      - name: 소스 확보 (R2 직업로드 — 대용량 ≤2GB)
        if: ${{ inputs.r2_src != '' }}
        timeout-minutes: 8   # 2GB도 러너→R2 수십 MB/s면 수분 — 잡 캡 예산 압축(평의회6)
        env:
          R2_SRC: ${{ inputs.r2_src }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -e
          [ -z "${EDIT_SRC:-}" ] || { echo "이미 소스 확보 — 스킵(다중 입력 방어)"; exit 0; }
          printf '%s' "$R2_SRC" | grep -Eqx 'up_src/[0-9]{12}-[a-f0-9]{6}\.(mp4|mov|m4v|webm|mkv|avi)' \
            || { echo "::error::잘못된 r2_src: $R2_SRC"; exit 1; }   # api 정규식과 동형 자체 재검증(개행·탭·확장자·문자셋 — 상류 신뢰 대신 최후 방어선 · 평의회1)
          [ -n "$R2_BUCKET" ] || { echo "저장소(R2)가 설정 안 돼 있어 — 관리자 설정 후 다시." > /tmp/edit_err.txt; echo "::error::R2 시크릿 미설정"; exit 1; }
          EXT="${R2_SRC##*.}"
          export AWS_DEFAULT_REGION=auto AWS_REQUEST_CHECKSUM_CALCULATION=when_required AWS_RESPONSE_CHECKSUM_VALIDATION=when_required
          aws s3 cp "s3://$R2_BUCKET/$R2_SRC" "/tmp/upsrc.$EXT" --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" --only-show-errors \
            || { echo "업로드 파일 회수 실패 — 다시 올려줘." > /tmp/edit_err.txt; echo "::error::R2 소스 회수 실패: $R2_SRC"; exit 1; }
          echo "EDIT_SRC=/tmp/upsrc.$EXT" >> "$GITHUB_ENV"

      - name: 길이 선게이트 (차등 캡 — 운영자 260711 "잘라서 10분 이하로" 확정. 트림 구간≤10분+전사 없음 = 원본 60분 · 자막/컷/클리퍼 = 원본 20분{STT가 원본 전체 전사 = 비용 원본 비례·Whisper turbo ~0.2−0.5×RT 추정 = 스텝 25분 내·초과 = 정직 실패} · 그 외 통짜 = 종전 10분)
        env:
          IN_ID: ${{ inputs.id }}
          OPTS: ${{ inputs.opts }}
        run: |
          set -e
          [ -n "${EDIT_SRC:-}" ] || { echo "영상 입력이 없어 — URL이나 파일을 넣어줘." > /tmp/edit_err.txt; echo "::error::EDIT_SRC 빈값"; exit 1; }
          DUR="$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 "$EDIT_SRC" 2>/dev/null | cut -d. -f1 || true)"
          SPAN="$(python3 -c "import json,os;o=json.loads(os.environ.get('OPTS') or '{}');t1=o.get('vid_t1');print(int(float(t1)-float(o.get('vid_t0') or 0)) if t1 else -1)" 2>/dev/null || echo -1)"
          STT="$(python3 -c "import json,os;o=json.loads(os.environ.get('OPTS') or '{}');print(1 if (o.get('burn') or o.get('cut') or o.get('clip')) else 0)" 2>/dev/null || echo 9)"   # 파싱 실패 = 9(미상) → 아래 분기 전부 미적중 = 종전 10분 보수 폴백
          if [ "$STT" = "1" ]; then CAP=1200; MSG="자막·컷·클리퍼는 20분 이하만(전사가 원본 전체를 돎) — 더 길면 구간만 자르거나 20분 이하로."
          elif [ "$SPAN" -ge 0 ] && [ "$SPAN" -le 600 ] 2>/dev/null; then CAP=3600; MSG="구간 편집도 원본 60분까지야 — 더 길면 잘라서 올려줘."
          else CAP=600; MSG="편집기는 10분 이하만(릴스/쇼츠용) — 긴 영상은 구간 카드로 잘라줘."
          fi
          if [ -n "$DUR" ] && [ "$DUR" -gt "$CAP" ] 2>/dev/null; then
            echo "영상 $((DUR/60))분 — ${MSG}" > /tmp/edit_err.txt; echo "::error::길이 초과 ${DUR}s (캡 ${CAP}s)"; exit 1
          fi

      - name: STT (자막·컷·클리퍼 — 오디오 추출 → Whisper)
        if: ${{ contains(inputs.opts, '"burn":true') || contains(inputs.opts, '"cut":true') || contains(inputs.opts, '"clip":true') }}
        timeout-minutes: 25
        env:
          IN_ID: ${{ inputs.id }}
          OPTS: ${{ inputs.opts }}
        run: |
          set -e
          HARD=0; case "$OPTS" in *'"burn":true'*) HARD=1;; esac; case "$OPTS" in *'"clip":true'*) HARD=1;; esac
          # 컷 단독(STT-only 260711) = 전사 실패해도 잡 살림(fail-soft) — segments.json 없으면 ly_burn이 '무음 컷 건너뜀' note.
          #   자막·클리퍼 ON = 정직 거절(전사가 산출 원료 — 없으면 잡 의미 없음 · clip은 api 배타 정규화라 cut과 혼합 불가).
          if ! ffmpeg -y -i "$EDIT_SRC" -vn -ar 16000 -ac 1 -b:a 48k /tmp/audio.mp3; then
            [ "$HARD" = 1 ] && { echo "오디오 추출 실패 — 소리 없는 영상이면 자막·클리퍼 카드를 빼고 다시." > /tmp/edit_err.txt; echo "::error::ffmpeg 오디오 추출 실패"; exit 1; }
            echo "::warning::오디오 추출 실패 — 컷 건너뜀(소리 없는 영상?)"; exit 0
          fi
          SEGJSON="viewer/ly_out/${IN_ID}/segments.json"
          if ! python3 .github/scripts/ly_stt.py /tmp/audio.mp3 "$SEGJSON" > /tmp/transcript.txt; then
            [ "$HARD" = 1 ] && { echo "Whisper STT 실패 — 오디오 인식 불가. 자막·클리퍼 카드를 빼거나 다른 영상으로." > /tmp/edit_err.txt; echo "::error::Whisper STT 실패"; exit 1; }
            rm -f "$SEGJSON"; echo "::warning::STT 실패 — 컷 건너뜀(부분 산출 정리)"; exit 0
          fi
          echo "STT 완료 — $(wc -l < /tmp/transcript.txt)줄"

      - name: 자막 의역 (claude)
        if: ${{ contains(inputs.opts, '"burn":true') && !contains(inputs.opts, '"clip":true') }}   # clip 배타 러너 백스톱(검증⑤ — api 정규화와 이중 방어 · 수동 dispatch 혼합 opts 시 토큰 낭비 차단)
        timeout-minutes: 35
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'NOMUTEFB' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_NOMUTEFB }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT2: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'MUTENO' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENO }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENONA }}
          ACTIVE_ACCOUNT: ${{ inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO' }}
          IN_ID: ${{ inputs.id }}
          OPTS: ${{ inputs.opts }}
        run: |
          [ -n "$IN_ID" ] || { echo "::error::id 없음"; exit 1; }
          [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ] || { echo "::error::CLAUDE_CODE_OAUTH_TOKEN_<계정> 시크릿이 비어있음"; exit 1; }
          SUBS="$(cat /tmp/transcript.txt)"; export SUBS
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          bash .github/scripts/lymake.sh "$IN_ID"

      # ── 클리퍼 구간픽(claude · 260711 v0) — STT 전사 → 하이라이트 후보 3~5개 clips.json(후보 *제안*만 · 자동 발행 없음 —
      #    선택·렌더 = 뷰어 클리퍼 카드에서 운영자 확정 = track 분석→확정 미러). 의역(lymake)과 배타(clip = 배타 스캔 · api 정규화).
      - name: 클리퍼 구간픽 (claude)
        if: ${{ contains(inputs.opts, '"clip":true') }}
        timeout-minutes: 15
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'NOMUTEFB' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_NOMUTEFB }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT2: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'MUTENO' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENO }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENONA }}
          ACTIVE_ACCOUNT: ${{ inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO' }}
          IN_ID: ${{ inputs.id }}
          SRC_URL: ${{ inputs.url }}
        run: |
          [ -n "$IN_ID" ] || { echo "::error::id 없음"; exit 1; }
          case "$IN_ID" in *[!0-9a-f-]*) echo "::error::잘못된 id"; exit 1;; esac   # 문자셋 가드 = 형제 스텝(컴포즈·커밋) 동형(검증⑧ 심층방어 대칭)
          [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ] || { echo "::error::CLAUDE_CODE_OAUTH_TOKEN_<계정> 시크릿이 비어있음"; exit 1; }
          SUBS="$(cat /tmp/transcript.txt)"; export SUBS
          EDIT_DUR="$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 "$EDIT_SRC" 2>/dev/null | cut -d. -f1 || true)"; export EDIT_DUR
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          bash .github/scripts/clipmake.sh "$IN_ID"

      # 클리퍼 원본 보관(R2 ≤400MB) — 파일/R2 업로드 소스는 잡 끝에 삭제(일회용)라, 후보 확정 후 *재렌더*가 소스를 잃음 →
      #   스캔 성공 시 원본을 ly_out/<id>/src.*로 보관하고 clips.json src에 URL 기입(URL 소스는 clipmake가 원 URL 승계 = 보관 불요).
      #   전면 fail-soft: 실패 = 후보 목록은 정상·재렌더만 파일 재선택(뷰어 안내).
      - name: 클리퍼 원본 보관 (R2)
        if: ${{ contains(inputs.opts, '"clip":true') && inputs.url == '' }}
        timeout-minutes: 8   # R2 PUT 스톨 백스톱(형제 R2 스텝 동형 · 검증⑤)
        env:
          IN_ID: ${{ inputs.id }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          case "$IN_ID" in *[!0-9a-f-]*) echo "::error::잘못된 id"; exit 1;; esac   # 문자셋 가드 = 형제 스텝 동형(검증⑧)
          python3 - "$IN_ID" "$EDIT_SRC" <<'PY' || echo "::warning::클리퍼 원본 보관 실패(비치명 — 재렌더 시 파일 재선택)"
          import json
          import os
          import sys
          sys.path.insert(0, ".github/scripts")
          import thumb_gen as tg   # r2_upload·R2_ON 재사용(ly_burn 동형)
          vid, src = sys.argv[1], sys.argv[2]
          p = os.path.join("viewer", "ly_out", vid, "clips.json")
          if not (tg.R2_ON and os.path.isfile(p) and src and os.path.isfile(src)):
              print("보관 조건 미충족(R2 미설정/산출·소스 없음) — 스킵")
              raise SystemExit(0)
          if os.path.getsize(src) > 400 * 1024 * 1024:
              print("원본 400MB 초과 — 보관 생략(재렌더 = 파일 재선택)")
              raise SystemExit(0)
          ext = (os.path.splitext(src)[1] or ".mp4").lower()
          ctype = {"webm": "video/webm", "mov": "video/quicktime", "mkv": "video/x-matroska"}.get(ext.lstrip("."), "video/mp4")
          url = tg.r2_upload(open(src, "rb").read(), "ly_out/{}/src{}".format(vid, ext), ctype)
          if url:
              j = json.load(open(p, encoding="utf-8"))
              j["src"] = url
              tmp = p + ".tmp"
              with open(tmp, "w", encoding="utf-8") as f:
                  json.dump(j, f, ensure_ascii=False, separators=(",", ":"))
              os.replace(tmp, p)   # 원자 교체 = 레포 표준(truncate-쓰기 금지 · 검증⑤)
              print("원본 보관:", url)
          PY

      - name: Demucs 캐시 (배경음 제거)
        if: ${{ contains(inputs.opts, '"bgm":true') }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/torch
            ~/.cache/pip
          key: nomute-ly-demucs-${{ runner.os }}-htdemucs-torch2121-demucs401-v1   # ly-make와 캐시 공유(동일 키)
      - name: Demucs 설치 (배경음 제거)
        if: ${{ contains(inputs.opts, '"bgm":true') }}
        timeout-minutes: 12
        run: |
          ok=0
          for i in 1 2; do
            if timeout 120 python3 -m pip install -q --upgrade setuptools wheel \
               && timeout 300 python3 -m pip install -q torch==2.12.1 torchaudio==2.11.0 torchcodec==0.14.0 --index-url https://download.pytorch.org/whl/cpu \
               && timeout 300 python3 -m pip install -q demucs==4.0.1 soundfile==0.14.0; then ok=1; break; fi
            sleep 5
          done
          [ "$ok" = 1 ] && python3 -c "import demucs.separate; print('demucs OK')" \
            || echo "::warning::Demucs 설치 실패 — 배경음 제거 스킵(원본 소리로 합성)"

      - name: 컴포즈 (ly_burn 단일 컴포지터 → R2 → video.json)
        if: ${{ !contains(inputs.opts, '"clip":true') }}   # 클리퍼 = 스캔 전용(산출 = clips.json — 렌더는 후보 확정 후 별도 잡)
        timeout-minutes: 60   # 내부 백스톱 최악 스택{probe 60 + Demucs 분리 780 + 인코딩 enc_to 2400(4K)~2250(60i) + 음량 270 + R2} ≈ 59분에 정렬(4K 경로 260711) — 잡 85분 캡 전 우아한 실패 기록 창 확보
        env:
          IN_ID: ${{ inputs.id }}
          OPTS: ${{ inputs.opts }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -e
          [ -n "$IN_ID" ] || { echo "::error::id 없음"; exit 1; }
          case "$IN_ID" in *[!0-9a-f-]*) echo "::error::잘못된 id"; exit 1;; esac
          python3 .github/scripts/ly_burn.py "$IN_ID" "${EDIT_SRC:-}"

      - name: 실패 기록(error.log) — 프론트가 폴링해 즉시 표시
        if: failure()
        env:
          IN_ID: ${{ inputs.id }}
        run: |
          [ -n "$IN_ID" ] || exit 0
          case "$IN_ID" in *[!0-9a-f-]*) exit 0;; esac
          mkdir -p "viewer/ly_out/${IN_ID}"
          if [ -s /tmp/edit_err.txt ]; then cp /tmp/edit_err.txt "viewer/ly_out/${IN_ID}/error.log";
          elif [ -s /tmp/ly_err.txt ]; then cp /tmp/ly_err.txt "viewer/ly_out/${IN_ID}/error.log";
          elif [ ! -s "viewer/ly_out/${IN_ID}/error.log" ]; then echo "편집 실패 — Actions 로그를 확인해줘." > "viewer/ly_out/${IN_ID}/error.log"; fi
          echo "error.log: $(cat viewer/ly_out/${IN_ID}/error.log)"

      - name: Commit output
        if: always()
        env:
          IN_ID: ${{ inputs.id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          [ -n "$IN_ID" ] || { echo "id 없음 — 커밋 스킵"; exit 0; }
          case "$IN_ID" in *[!0-9a-f-]*) echo "잘못된 id — 커밋 스킵"; exit 0;; esac
          git config user.name "nomute-bot"
          git config user.email "bot@nomute.local"
          git rm -r "uploads/${IN_ID}" 2>/dev/null || true
          git add "viewer/ly_out/${IN_ID}" 2>/dev/null || true
          git add metrics 2>/dev/null || true
          git commit -m "edit: ${IN_ID} 편집 출력" || { echo "커밋할 것 없음"; exit 0; }
          pushed=0
          for i in 1 2 3 4 5; do
            if git fetch origin "$BRANCH" && git rebase "origin/$BRANCH" && git push origin "HEAD:$BRANCH"; then pushed=1; break; fi
            git rebase --abort 2>/dev/null || true; sleep $((i*3))
          done
          [ "$pushed" = 1 ] || { echo "::error::push ${BRANCH} 5회 실패 — 출력 유실"; exit 1; }

      # 편집 완료/실패 푸시 — 편집기 잡은 길다(60i 보간 수십 분) → 창 닫아도 완성·실패를 구독자(프로필 알림 ON)에게 통지.
      #   thumb 제작완료 푸시 문법 계승(#done=<id> 딥링크 · 잡별 고유 tag = 알림 누적) + 실패도 통지(장시간 잡 = 부재 중 실패 표면화).
      #   비치명(|| true 계열) · 운영자 260711 "웹푸시까지 해줘".
      - name: 편집 완료 푸시 (pywebpush)
        if: always()
        env:
          IN_ID: ${{ inputs.id }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          [ -n "$IN_ID" ] || exit 0
          case "$IN_ID" in *[!0-9a-f-]*) exit 0;; esac
          python3 -m pip install --quiet --break-system-packages pywebpush || { echo "::warning::pywebpush 미설치 — 푸시 생략"; exit 0; }
          CJ="viewer/ly_out/${IN_ID}/clips.json"
          if [ -s "$CJ" ]; then   # 클리퍼 스캔 = clips.json이 산출(video.json 없음) — 실패면 clips.json 부재 → 아래 error.log 경로가 받음
            N="$(python3 -c "import json;print(len(json.load(open('$CJ')).get('clips') or []))" 2>/dev/null || echo 0)"
            if [ "$N" -gt 0 ] 2>/dev/null; then BODY="클립 후보 ${N}개 — 탭해서 고르기"; else BODY="클립 후보 없음 — 다른 영상으로"; fi
            python3 .github/scripts/push_send.py --notify "알림" "$BODY" --url "/edit.html?done=${IN_ID}" --tag "nomute-make-${IN_ID}" || echo "::warning::완료 푸시 실패(비치명)"
            exit 0
          fi
          VJ="viewer/ly_out/${IN_ID}/video.json"; EL="viewer/ly_out/${IN_ID}/error.log"
          OK=0; MSG=""
          if [ -s "$VJ" ]; then
            OK="$(python3 -c "import json;print(1 if json.load(open('$VJ')).get('url') else 0)" 2>/dev/null || echo 0)"
            [ "$OK" = "1" ] || MSG="$(python3 -c "import json;d=json.load(open('$VJ'));print((d.get('error') or d.get('skip') or '')[:60])" 2>/dev/null || true)"
          fi
          if [ "$OK" != "1" ] && [ -z "$MSG" ] && [ -s "$EL" ]; then MSG="$(head -c 60 "$EL")"; fi
          if [ "$OK" = "1" ]; then
            # sub(자막 실번인) + dur(길이초)를 한 번에 읽어 알림 본문 스펙 한 줄 구성(운영자 260717 "자막 삽입 포함 · 길이")
            META="$(python3 -c "import json;d=json.load(open('$VJ'));du=d.get('dur');print(('1' if d.get('sub') else '0')+' '+(str(int(round(du))) if isinstance(du,(int,float)) and du>0 else ''))" 2>/dev/null || echo '0 ')"
            SUB="${META%% *}"; DUR="${META#* }"; SP=""; [ -n "$DUR" ] && SP=" · ${DUR}초"
            if [ "$SUB" = "1" ]; then BODY="영상 완성 · 자막 삽입 완료${SP} — 탭해서 확인"; else BODY="영상 완성${SP} — 탭해서 확인"; fi
          else BODY="편집 실패 — ${MSG:-로그 확인}"; fi
          python3 .github/scripts/push_send.py --notify "알림" "$BODY" --url "/edit.html?done=${IN_ID}" --tag "nomute-make-${IN_ID}" || echo "::warning::완료 푸시 실패(비치명)"

      - name: 업로드 브랜치 정리
        if: ${{ always() && inputs.up_branch != '' }}
        env:
          UP_BRANCH: ${{ inputs.up_branch }}
        run: |
          case "$UP_BRANCH" in up-*) ;; *) echo "up-* 아님 — 스킵"; exit 0;; esac
          git push origin --delete "$UP_BRANCH" || echo "브랜치 정리 실패(무해 — 수동 정리 대상): $UP_BRANCH"

      - name: 업로드 원본 정리 (R2 up_src — 일회용 · up-브랜치와 동일 수명)
        if: ${{ always() && inputs.r2_src != '' }}
        env:
          R2_SRC: ${{ inputs.r2_src }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          case "$R2_SRC" in up_src/*) ;; *) echo "up_src/* 아님 — 스킵"; exit 0;; esac
          case "$R2_SRC" in *..*|*' '*) exit 0;; esac
          [ -n "$R2_BUCKET" ] || exit 0
          export AWS_DEFAULT_REGION=auto AWS_REQUEST_CHECKSUM_CALCULATION=when_required AWS_RESPONSE_CHECKSUM_VALIDATION=when_required
          aws s3 rm "s3://$R2_BUCKET/$R2_SRC" --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" --only-show-errors \
            || echo "원본 정리 실패(무해 — 수동 정리 대상): $R2_SRC"
