name: news-revise

# 뷰어 ✏️요약 수정 요청(api/revise → 디스패치) → Claude 헤드리스가 queue/<file>.md 의
# IG·Thread 초안만 운영자 지시대로 재작성 → 같은 파일에 in-place 커밋(= 뉴스요약에 반영).
# ⛔ 재요약 아님: 기사 재수집·재분석 안 함(기존 요약을 입력으로 그 두 블록만 다시 씀 = 구독 쿼터 절약).
# 인증·디스패치 = news-ask 미러(구독 OAuth·무료·per-run 과금 0). 종량제 API 키 미사용.
on:
  workflow_dispatch:
    inputs:
      file:
        description: '큐 항목 id(확장자 없이 · 260616-0823-…)'
        type: string
      instruction:
        description: '재작성 지시(자연어)'
        type: string
      account:
        description: '이 실행에 쓸 계정(구독 OAuth)'
        type: choice
        default: MUTENO
        options:
          - MUTENO
          - EMS1130G

concurrency:
  group: news-revise-${{ inputs.file }}   # 같은 카드 동시 수정 직렬화
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  revise:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # 최신 main 기준(순차 큐에서 옛 커밋 체크아웃 방지)

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code   # 러너엔 claude 미설치 — news-ask와 동일하게 설치

      - name: Revise IG/Thread
        env:
          # 인증 = 구독 OAuth(API 키 미사용) — news-ask와 동일 동적 계정 선택
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
          ACTIVE_ACCOUNT: ${{ inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO' }}
          FILE: ${{ inputs.file }}
          INSTRUCTION: ${{ inputs.instruction }}
        run: |
          echo "활성 계정: ${ACTIVE_ACCOUNT} · 대상: ${FILE}"
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN_${ACTIVE_ACCOUNT} 시크릿 비어있음"; exit 1
          fi
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          bash .github/scripts/revise.sh

      - name: Commit result
        if: always()
        env:
          BRANCH: ${{ github.ref_name }}
          FILE: ${{ inputs.file }}   # 커밋 메시지용(step env는 스텝 스코프라 재주입)
        run: |
          git config user.name "nomute-bot"
          git config user.email "bot@nomute.local"
          git add queue 2>/dev/null || true
          git commit -m "revise: ${FILE:-?} IG/Thread 수정 반영" || { echo "변경 없음"; exit 0; }
          # 동시 커밋 레이스 대비 — 매 시도 origin 흡수 후 push(naive 재push는 non-ff로 무한실패)
          pushed=0
          for i in 1 2 3 4 5; do
            if git fetch origin "$BRANCH" && git rebase "origin/$BRANCH" && git push origin "HEAD:$BRANCH"; then pushed=1; break; fi
            git rebase --abort 2>/dev/null || true; sleep $((i*3))
          done
          [ "$pushed" = 1 ] || { echo "::error::push ${BRANCH} 5회 실패"; exit 1; }
