name: song-make

# 뷰어 음원 탭(Pages Function /api/song)이 발사 — 입력(장르·표현방식·스토리) → claude -p(구독 OAuth)가
#   수노(Suno) 규격 가사·스타일 프롬프트 생성 → viewer/song_out/<id>/song.json 커밋(폼이 폴링).
#   **텍스트 전용 — 오디오 생성·외부 유료 API 0**(수노 앱에 복붙 = /k 복붙 패턴 · 운영자 260712 B안).
#   골격 = edit-make 미러(업로드·STT·컴포즈·R2 스텝 전부 없음 = 최경량).
on:
  workflow_dispatch:
    inputs:
      id:
        description: '작업 id(타임스탬프-hex6)'
        type: string
      genre:
        description: '장르(칩 라벨 또는 직접 입력 · 빈값=자동)'
        type: string
        default: '자동'
      express:
        description: '표현방식(칩 라벨 또는 직접 입력 · 빈값=자동)'
        type: string
        default: '자동'
      story:
        description: '스토리(대사 또는 상황) — 가사 소재'
        type: string
      account:
        description: '이 실행에 쓸 계정(구독 OAuth)'
        type: choice
        default: MUTENO
        options:
          - NOMUTEFB
          - MUTENO
          - EMS1130G

concurrency:
  group: song-make-${{ inputs.id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  song:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # claude 1콜(가사) + 커밋 — STT·인코딩 없음 = 최경량(폴오버 4계정 백오프 여유 포함)
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 가사·스타일 생성 (claude)
        timeout-minutes: 12
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'NOMUTEFB' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_NOMUTEFB }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT2: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'MUTENO' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENO }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENONA }}
          ACTIVE_ACCOUNT: ${{ inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO' }}
          IN_ID: ${{ inputs.id }}
          GENRE: ${{ inputs.genre }}
          EXPRESS: ${{ inputs.express }}
          STORY: ${{ inputs.story }}
        run: |
          [ -n "$IN_ID" ] || { echo "::error::id 없음"; exit 1; }
          case "$IN_ID" in *[!0-9a-f-]*) echo "::error::잘못된 id"; exit 1;; esac
          [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ] || { echo "::error::CLAUDE_CODE_OAUTH_TOKEN_<계정> 시크릿이 비어있음"; exit 1; }
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          bash .github/scripts/songmake.sh "$IN_ID"

      - name: 실패 기록(error.log) — 프론트가 폴링해 즉시 표시
        if: failure()
        env:
          IN_ID: ${{ inputs.id }}
        run: |
          [ -n "$IN_ID" ] || exit 0
          case "$IN_ID" in *[!0-9a-f-]*) exit 0;; esac
          mkdir -p "viewer/song_out/${IN_ID}"
          [ -s "viewer/song_out/${IN_ID}/error.log" ] || echo "프롬프트 생성 실패 — Actions 로그를 확인해줘." > "viewer/song_out/${IN_ID}/error.log"
          echo "error.log: $(cat viewer/song_out/${IN_ID}/error.log)"

      - name: Commit output
        if: always()
        env:
          IN_ID: ${{ inputs.id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          [ -n "$IN_ID" ] || { echo "id 없음 — 커밋 스킵"; exit 0; }
          case "$IN_ID" in *[!0-9a-f-]*) echo "잘못된 id — 커밋 스킵"; exit 0;; esac
          git config user.name "nomute-bot"
          git config user.email "bot@nomute.local"
          git add "viewer/song_out/${IN_ID}" 2>/dev/null || true
          git add metrics 2>/dev/null || true
          git commit -m "song: ${IN_ID} 가사·스타일 출력" || { echo "커밋할 것 없음"; exit 0; }
          pushed=0
          for i in 1 2 3 4 5; do
            if git fetch origin "$BRANCH" && git rebase "origin/$BRANCH" && git push origin "HEAD:$BRANCH"; then pushed=1; break; fi
            git rebase --abort 2>/dev/null || true; sleep $((i*3))
          done
          [ "$pushed" = 1 ] || { echo "::error::push ${BRANCH} 5회 실패 — 출력 유실"; exit 1; }
