name: thumb-make

# 뷰어 썸네일 폼(Pages Function /api/thumb)이 발사 → 앱별 입력으로
# 썸네일/오버레이 렌더(1080×1350 또는 1080×1920) → viewer/thumb_out/<id>/out.png 커밋.
# 무료: 파이썬 + Noto 폰트만. apps/thumbnail/nomute_*.py 무수정(import 또는 subprocess).
#   app: 1=포스트(배경+오버레이 합성) · 2=릴스(형태2 헤더) · 3=저작권(투명) · 4=경고문(투명)
on:
  workflow_dispatch:
    inputs:
      app:
        description: '앱 1|2|3|4 (포스트|릴스|저작권|경고문)'
        type: string
      id:
        description: '출력 id(타임스탬프)'
        type: string
      image:
        description: '배경 이미지 레포 경로(/1만 — uploads/<id>/src.*)'
        type: string
      image_sha:
        description: '배경 src 커밋 SHA — dispatch 레이스 가드(워크플로가 src PUT 전 HEAD 체크아웃 시 이 SHA로 직접 확보)'
        type: string
      params:
        description: '앱별 파라미터 JSON 문자열'
        type: string

concurrency:
  group: thumb-make-${{ inputs.id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  thumb:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.image_sha || 'main' }}   # 배경 src 커밋을 직접 체크아웃 = dispatch 레이스 원천 차단(head_sha 추측 안 함·src 항상 워킹트리에). 이미지 없는 앱/미지정이면 main.

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # site-packages 캐시 — setup.sh 의 pip install(mediapipe·opencv·numpy·pillow) 재설치 회피.
      # 병목 실측(259s 런): 체크아웃 3s·렌더 0s 인데 setup 의 pip install 이 243s(편차 46~243s·간헐 20분 행).
      # STAMP($HOME/.cache)는 러너간 비영속 → 매 런 재설치가 원인. 설치 산출(site-packages)을 캐시하면
      # 워밍런은 복원 → setup.sh 의 `import PIL,numpy,cv2,mediapipe` 통과 → pip 스킵 → setup 수초.
      # (mediapipe 는 nomute_compose.py 가 최상단 import — 절대규칙1 불변이라 제거 불가 → 캐시로 회피.)
      - name: Restore python deps (site-packages 캐시)
        uses: actions/cache@v4
        with:
          path: ${{ env.pythonLocation }}/lib/python3.12/site-packages
          key: nomute-thumb-pydeps-${{ runner.os }}-py312-pillow-numpy-cv2-mediapipe-v1

      - name: Setup thumbnail env (setup.sh 단일출처 + 캐시)
        timeout-minutes: 8   # 백스톱 — 셋업(apt/pip/캐시) 행이 20분 잡 한도까지 끌어 cancel되던 것 차단(260618). setup.sh 내부 timeout과 이중 방어.
        uses: ./.github/actions/runner-setup
        with:
          setup: apps/thumbnail/setup.sh
          apt: fonts-noto-cjk   # 폰트 .deb 7일 캐시 → 매 런 재다운·미러행 차단(근본)

      - name: Render
        shell: python
        env:
          APP: ${{ inputs.app }}
          IN_ID: ${{ inputs.id }}
          IMAGE: ${{ inputs.image }}
          PARAMS: ${{ inputs.params }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          import os, sys, json, subprocess
          sys.path.insert(0, 'apps/thumbnail')
          app = (os.environ.get('APP') or '').strip()
          in_id = (os.environ.get('IN_ID') or '').strip()
          params = json.loads(os.environ.get('PARAMS') or '{}')
          image = (os.environ.get('IMAGE') or '').strip()
          # 배경 src는 Checkout(ref=image_sha)이 이미 워킹트리에 보장 — 레이스 가드/복구 불필요(원천 차단 · 260620).
          if not app or not in_id:
              sys.exit('::error::app/id 누락')
          outdir = f'viewer/thumb_out/{in_id}'
          os.makedirs(outdir, exist_ok=True)
          out = f'{outdir}/out.png'
          BASE = 'apps/thumbnail/assets/reels2_base.png'
          produced = []             # 출력 파일 목록 (앱 1·3·4 = 1장, 2 = 2~3장)
          # ── 출력 포맷 최소 부품(정본 = apps/thumbnail/MEMORY.md §📐) ──
          from PIL import Image as _PIM
          JPGQ = 95                                   # 합성본·헤더 JPG 품질(운영자 260621)
          def save_jpg(img, dst):                     # 합성본·헤더 = JPG q95 (해상도 유지=2K)
              img.convert('RGB').save(dst, 'JPEG', quality=JPGQ)
          def save_fhd_png(img, dst, scale=2):        # 면책 오버레이(/3·/4) = 2K→FHD PNG (투명 보존·화질 비중요)
              img.resize((img.width // scale, img.height // scale), _PIM.LANCZOS).save(dst, optimize=True)
          def fit_tracking(lines, fmt):   # §오버플로우(F06): measure(알파 실측)→자간 sweep → generate에 넘길 tr(없으면 None=기본)
              from nomute_overlay import draw_t, SPECS, FONT_PATH
              from PIL import Image as _I, ImageDraw as _D, ImageFont as _F
              spec = SPECS[fmt]
              font = _F.truetype(FONT_PATH, spec['fs'], index=1)
              limit = 920 if fmt == 'post' else 844      # §운영자 단일 진실: post lm85/rm75, reels lm101/rm135
              floor = -45 if fmt == 'post' else -30      # sweep 하한 (post 0→-45, reels -1→-30)
              def measure(text, tr):                     # §픽셀 검증: 알파 bbox (getbbox 폐기 — 부정확)
                  plain = text.replace('*', '')
                  im = _I.new('RGBA', (5000, 300), (0, 0, 0, 0))
                  draw_t(_D.Draw(im), 100, 100, plain, font, (255, 255, 255), tr / 1000 * spec['fs'], spec['stroke'])
                  bb = im.getchannel('A').getbbox()
                  return (bb[2] - 100 + 5) if bb else 0
              def widest(tr):
                  return max((measure(l, tr) for l in lines), default=0)
              start = spec['tr']
              if widest(start) <= limit:
                  return None                            # 안 넘침 → 기본 자간(스크립트 default)
              for x in range(start, floor - 1, -1):
                  if widest(x) <= limit:
                      print(f'OVERFLOW-FIT {fmt}: tr={x} (limit {limit})'); return x
              print(f'::warning::{fmt} 자간 {floor}로도 마진 초과 — 축약 권장(B안). 최대압축 렌더'); return floor
          def emit(ov, image, fmt, dst_noext, compose_flags=None):
              # 배경 있으면 합성→2K JPG q95 / 없으면 영상용 투명 오버레이→2K PNG 유지(2K~4K 영상 위 선명·투명필요라 JPG 불가). 반환=실제 경로.
              import shutil
              if image:   # 배경 의도 = API wantImg와 동치(image 경로 비어있지 않음) → 확장자(.jpg) 계약 일치. 파일 부재면 compose가 명확히 실패(조용한 불일치 방지).
                  tmp = dst_noext + '.cmp.png'
                  argv = ['python3', 'apps/thumbnail/nomute_compose.py', fmt, ov, image, tmp] + list(compose_flags or [])
                  subprocess.run(argv, check=True)
                  dst = dst_noext + '.jpg'; save_jpg(_PIM.open(tmp), dst); os.remove(tmp)
              else:
                  dst = dst_noext + '.png'; shutil.copyfile(ov, dst)           # 2K 투명 PNG 그대로(다운스케일 안 함)
              return dst
          if app == '4':            # 경고문 — copyright.py 29px(작은 글씨=마진 안 넘침). 2줄=줄별 센터 렌더 후 세로 스택
              from PIL import Image as _I
              from nomute_copyright import SCALE as _CS   # 2K 스케일(스크립트와 동기 = 캔버스·줄간 ×SCALE)
              fmt4 = params.get('fmt', 'post'); lines4 = params['lines']
              canvas = _I.new('RGBA', (1080 * _CS, (1920 if fmt4 == 'reels' else 1350) * _CS), (0, 0, 0, 0))
              for i, ln in enumerate(lines4):
                  tmp = f'/tmp/_warn{i}.png'
                  subprocess.run(['python3', 'apps/thumbnail/nomute_copyright.py', tmp, fmt4, '--raw', ln], check=True)
                  part = _I.open(tmp).convert('RGBA')
                  canvas.paste(part, (0, i * 46 * _CS), part)   # copyright Y=100 기준 줄간 46px × SCALE
              save_fhd_png(canvas, out, _CS)   # 2K→FHD(post 1080×1350/reels 1080×1920) PNG·투명 보존
              produced.append(out)
          elif app == '2':          # 릴스 — 헤더(흰칸+nobg 2장) | 오버레이(opa별 2~3장)
              mode = params.get('mode', 'header')
              if mode == 'header':  # 부제+제목 → 흰칸(render·기본 1장). bothBg=True 면 nobg(흰칸 없이 텍스트만)도(2장). import 재사용(스크립트 코드 불변)
                  from nomute_reels2 import render, _draw_line, FONT, WHITE, GREEN, SUB_FS, SUB_Y, TITLE_FS, TITLE_Y, W, H
                  from PIL import Image, ImageDraw, ImageFont
                  sub, title = params.get('sub', ''), params.get('title', '')
                  both = bool(params.get('bothBg'))   # 배경 체크 = 흰칸 없는 버전도(2장) · 기본(미체크) = 흰칸만 1장(운영자 260623)
                  box, nobg = f'{outdir}/box.jpg', f'{outdir}/nobg.jpg'   # 헤더 = 2K JPG q95(불투명 베이스+텍스트)
                  box_tmp = '/tmp/_box.png'
                  render(sub, title, BASE, box_tmp)                             # 흰칸(영상자리) — render가 BASE를 2K 업스케일(PNG)
                  save_jpg(Image.open(box_tmp), box)
                  produced.append(box)
                  if both:                                                      # 배경 체크 시에만 nobg(흰칸 없음) — 2K
                      im = Image.open(BASE).convert('RGB').resize((W, H), Image.LANCZOS); d = ImageDraw.Draw(im)
                      _draw_line(d, sub,   SUB_Y,   ImageFont.truetype(FONT, SUB_FS,   index=1), WHITE, SUB_FS)
                      _draw_line(d, title, TITLE_Y, ImageFont.truetype(FONT, TITLE_FS, index=1), GREEN, TITLE_FS)
                      save_jpg(im, nobg)
                      produced.append(nobg)
              else:                 # 오버레이 — opa별. 배경 있으면 JPG합성(2K)·없으면 FHD PNG (포스트와 통일)
                  from nomute_overlay import generate
                  tr = fit_tracking(params['lines'], 'reels')
                  for o in params.get('opas', [60, 30]):
                      ov = f'/tmp/_ov_{o}.png'
                      generate('reels', params['lines'], ov, opacity=int(o), tracking=tr)
                      produced.append(emit(ov, image, 'reels', f'{outdir}/opa{o}'))
          elif app == '3':          # 저작권 — 투명 오버레이 (CLI subprocess). 출력 = FHD PNG.
              argv = ['python3', 'apps/thumbnail/nomute_copyright.py', out, params.get('fmt', 'post')]
              if params.get('raw'):
                  argv += ['--raw', params['raw']]
              else:
                  argv += [str(params['year']), params['name'], params['platform']]
              subprocess.run(argv, check=True)
              from nomute_copyright import SCALE as _CS3
              save_fhd_png(_PIM.open(out), out, _CS3)   # 2K→FHD PNG·투명 보존
              produced.append(out)
          elif app == '1':          # 포스트 — opas별 1장. 배경 있으면 JPG합성(2K)·없으면 FHD PNG (릴스와 통일).
              from nomute_overlay import generate
              fmt1 = params.get('fmt', 'post')
              tr = fit_tracking(params['lines'], fmt1)   # 자간 sweep — opa 무관·1회 계산 후 재사용
              opas1 = params.get('opas') or [params.get('opacity', 58)]   # 다중(58·30 등) · 하위호환(단일 opacity)
              flags = []
              for k, flag in (('offset_x', '--offset-x'), ('offset_y', '--offset-y'), ('scale', '--scale')):
                  v = params.get(k)
                  if v not in (None, ''):
                      flags += [flag, str(v)]
              if params.get('blur'):
                  flags += ['--blur']
              for o in opas1:
                  ov = f'/tmp/_ov_{o}.png'
                  generate(fmt1, params['lines'], ov, opacity=int(o), tracking=tr)
                  base = f'{outdir}/out' if len(opas1) == 1 else f'{outdir}/opa{o}'
                  produced.append(emit(ov, image, fmt1, base, flags))
          else:
              sys.exit(f'::error::알 수 없는 app: {app}')
          from PIL import Image
          for f in produced:
              im = Image.open(f)
              print(f'RENDERED app={app} {im.size} {im.mode} -> {f}')
          # ── R2 업로드 = 썸네일 출력 저장(git 미커밋 → 즉시 서빙·배포지연 0·비대 0). 실패 시 잡 실패(git 폴백 안 함 = API가 R2 URL 예측).
          sys.path.insert(0, '.github/scripts')
          import thumb_gen as tg, time
          if not tg.R2_ON:
              sys.exit('::error::R2 미설정 — 썸네일은 R2 저장 필수(R2 5시크릿 확인)')
          meta = []
          for f in produced:
              fn = os.path.basename(f)
              ctype = 'image/jpeg' if fn.endswith('.jpg') else 'image/png'
              data = open(f, 'rb').read()
              url = None
              for _t in range(3):
                  url = tg.r2_upload(data, f'thumb_out/{in_id}/{fn}', ctype)
                  if url:
                      break
                  if _t < 2:
                      time.sleep(2 * (_t + 1))   # 2s·4s 백오프(즉시 재시도는 같은 일시장애에 무의미)
              if not url:
                  sys.exit(f'::error::R2 업로드 실패(3회): {fn}')
              meta.append([fn, url])
          json.dump(meta, open(f'{outdir}/_meta.json', 'w'), ensure_ascii=False)
          print(f'R2 UPLOADED {len(meta)} → {outdir}/_meta.json')

      - name: Commit output
        if: always()
        env:
          IN_ID: ${{ inputs.id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "nomute-bot"
          git config user.email "bot@nomute.local"
          git add "viewer/thumb_out/${IN_ID}/_meta.json" 2>/dev/null || true   # 이미지는 R2(git 미저장) — _meta.json(수KB)만 커밋해 이전제작 cross-device 유지
          git add "uploads/${IN_ID}" 2>/dev/null || true
          git commit -m "thumb: ${IN_ID} R2 메타" || { echo "커밋할 것 없음"; exit 0; }
          # 동시 렌더 push 레이스 대비 — 매 시도 origin 흡수 후 push(naive 재push는 non-ff로 무한실패)
          pushed=0
          for i in 1 2 3 4 5; do
            if git fetch origin "$BRANCH" && git rebase "origin/$BRANCH" && git push origin "HEAD:$BRANCH"; then pushed=1; break; fi
            git rebase --abort 2>/dev/null || true; sleep $((i*3))
          done
          [ "$pushed" = 1 ] || { echo "::error::push ${BRANCH} 5회 실패 — 출력 유실"; exit 1; }

      # 제작 완료 푸시 — 창 닫아도 서버 렌더는 계속되므로, 완료 시 구독자(=프로필 알림 ON)에게 통지. 비치명.
      - name: 제작 완료 푸시 (pywebpush)
        if: success()
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          python3 -m pip install --quiet --break-system-packages pywebpush || { echo "::warning::pywebpush 미설치 — 푸시 생략"; exit 0; }
          case "${{ inputs.app }}" in 1) T=포스트;; 2) T=릴스;; 3) T=저작권;; 4) T=경고문;; *) T=썸네일;; esac
          # 탭하면 제작 화면으로 이동 → #done=<id> 로 *그 작업* 결과(잡 로그행/이력 항목)에 정확히 중상단 랜딩(운영자 260622).
          # 잡별 고유 tag = 알림 안 덮어씀(여러 건 동시 제작 시 각자 탭 → 각자 그 작업으로).
          python3 .github/scripts/push_send.py --notify "알림" "$T 제작 완료 — 탭해서 확인" --url "/thumb.html#done=${{ inputs.id }}" --tag "nomute-make-${{ inputs.id }}" || echo "::warning::완료 푸시 실패(비치명)"
