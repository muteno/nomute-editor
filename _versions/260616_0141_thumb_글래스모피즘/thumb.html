<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>노뮤트 썸네일 — 이미지 제작</title>
<style>
  :root { --bg:#0b0b0c; --pan:#16171a; --line:#2a2c31; --fg:#e9eaec; --mut:#8b8f98; --grn:#0FFD02;
          --accent:#0FFD02; --accent-dim:rgba(15,253,2,.15); --line2:#2a2c31; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:560px; margin:0 auto; padding:18px 16px 60px; }
  h1 { font-size:18px; margin:6px 0 14px; }
  h1 b { color:var(--grn); }
  .tabs { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-bottom:16px; }
  .tab { padding:11px 3px; text-align:center; background:var(--pan); border:1px solid var(--line); border-radius:10px; cursor:pointer; font-weight:600; font-size:12.5px; }
  .tab small { display:block; color:var(--mut); font-weight:400; font-size:11px; margin-top:2px; }
  .tab.on { border-color:var(--grn); color:var(--grn); }
  .tab.on small { color:#bfeeb6; }
  .panel { background:var(--pan); border:1px solid var(--line); border-radius:12px; padding:14px; }
  label { display:block; font-size:13px; color:var(--mut); margin:12px 0 5px; }
  label:first-child { margin-top:0; }
  input[type=text], input[type=number], textarea, select {
    width:100%; padding:10px; background:#0e0f11; border:1px solid var(--line); border-radius:8px; color:var(--fg); font:inherit;
  }
  textarea { min-height:84px; resize:vertical; }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .hint { font-size:12px; color:var(--mut); margin-top:5px; }
  .hint b { color:var(--grn); }
  .seg { display:flex; gap:6px; }
  .seg button { flex:1; padding:8px; background:#0e0f11; border:1px solid var(--line); border-radius:8px; color:var(--fg); cursor:pointer; }
  .seg button.on { border-color:var(--grn); color:var(--grn); }
  /* 직접입력 = 버튼 자체가 입력창 (선택 시 라벨 숨고 안에 커서) */
  #rOpaCustom, #opaCustom { padding:0; overflow:hidden; }
  #rOpaCustom .lab, #opaCustom .lab { display:block; padding:8px 2px; }
  .opa-in { display:none; width:100%; padding:8px 2px; border:none; background:transparent; color:var(--grn); text-align:center; font:inherit; outline:none; }
  #rOpaCustom.on .lab, #opaCustom.on .lab { display:none; }
  #rOpaCustom.on .opa-in, #opaCustom.on .opa-in { display:block; }
  /* 플랫폼 로고 선택 (2:1 박스 가로 한 줄) */
  .pseg { display:flex; gap:6px; flex-wrap:nowrap; }
  .pbtn { flex:1 1 0; min-width:0; aspect-ratio:2/1; display:flex; align-items:center; justify-content:center; background:#0e0f11; border:1px solid var(--line); border-radius:8px; color:var(--mut); cursor:pointer; padding:0; font-weight:800; font-size:14px; }
  .pbtn.on { border-color:var(--grn); color:var(--grn); }
  .pbtn .plab { font-size:11px; font-weight:600; }
  /* 경고문 프리셋 = 줄바꿈 허용 세그 */
  .wseg { flex-wrap:wrap; }
  .wseg button { min-width:62px; }
  /* 실시간 자간(tracking) 표시 — 줄어들기 시작하면 노랑, 한도 초과 빨강 */
  .trk { font-size:12px; font-weight:800; }
  .trk.on { color:#ffd84d; }
  .trk.over { color:#ff7a7a; }
  .file { display:block; padding:10px; border:1px dashed var(--line); border-radius:8px; text-align:center; color:var(--mut); cursor:pointer; }
  .file img { max-width:100%; max-height:170px; border-radius:6px; margin-top:8px; }
  .go { width:100%; margin-top:16px; padding:13px; background:var(--grn); color:#07210a; border:none; border-radius:10px; font-weight:800; font-size:15px; cursor:pointer; }
  .go:disabled { opacity:.5; cursor:default; }
  .out { margin-top:18px; }
  .status { font-size:13px; color:var(--mut); white-space:pre-wrap; }
  .status.err { color:#ff8a8a; }
  .result img { width:100%; border:1px solid var(--line); border-radius:10px; }
  .slot { margin-bottom:14px; }
  .slot-lab { font-size:12.5px; color:var(--mut); margin-bottom:5px; font-weight:600; }
  .slot-img { min-height:40px; position:relative; }
  .slot-img img { width:100%; border:1px solid var(--line); border-radius:10px; display:block; }
  /* 결과 이미지 다운로드 (우상단 · 뷰어 캐러셀 계승) */
  .imgdl { position:absolute; top:10px; right:10px; width:36px; height:36px; display:grid; place-items:center; color:#fff; background:rgba(8,15,11,.6); border:1px solid rgba(255,255,255,.22); border-radius:10px; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); text-decoration:none; z-index:2; }
  .imgdl:active { transform:scale(.9); } .imgdl svg { display:block; }
  /* 텍스트칸 붙여넣기↔복사 (우상단 · 뷰어 .copy 계승) */
  .iobtn { position:absolute; top:8px; right:8px; width:30px; height:30px; display:grid; place-items:center; padding:0; color:var(--mut); background:rgba(255,255,255,.06); border:1px solid var(--line); border-radius:9px; cursor:pointer; z-index:2; transition:transform .12s, background .15s, color .15s; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
  .iobtn:hover { background:rgba(255,255,255,.12); color:var(--fg); }
  .iobtn:active { transform:scale(.85); }
  .iobtn.ok { background:var(--grn); color:#07210a; border-color:var(--grn); }
  .iobtn svg { display:block; }
  .cardhdr { display:flex; align-items:center; gap:8px; margin:12px 0 5px; }
  .cardhdr .hdlbl { font-size:13px; color:var(--mut); }
  .cardhdr .hdsub { font-size:11px; color:var(--mut); opacity:.7; flex:1; min-width:0; }
  .slot-wait { font-size:13px; color:var(--mut); }
  .none { display:none; }

  /* ── 카드 텍스트 칩 에디터 (인라인 — /5 카드뉴스) ── */
  .ed-chips { display:flex; flex-direction:column; align-items:stretch; gap:5px; min-height:34px; padding:6px; background:rgba(5,12,8,.4); border:1px dashed var(--line2); border-radius:11px; }
  .ed-line { display:flex; flex-wrap:nowrap; align-items:center; gap:calc(6px * var(--eds,1)); min-height:calc(30px * var(--eds,1)); position:relative; padding-right:22px; }
  .ed-chip { flex:none; font-size:calc(16px * var(--eds,1)); line-height:1.4; padding:calc(2px * var(--eds,1)) calc(3px * var(--eds,1)); border-radius:7px; background:rgba(255,255,255,.05); border:1px solid var(--line2); color:var(--fg); cursor:pointer; user-select:none; white-space:nowrap; transition:background .12s, color .12s, border-color .12s; }
  .ed-chip:hover { border-color:rgba(15,253,2,.4); }
  .ed-add { position:absolute; right:2px; top:50%; transform:translateY(-50%); flex:none; width:16px; height:calc(30px * var(--eds,1)); padding:0; border-radius:5px; display:inline-flex; align-items:center; justify-content:center; font:800 16px/1 inherit; color:var(--accent); background:rgba(15,253,2,.1); border:1px solid rgba(15,253,2,.42); cursor:pointer; }
  .ed-add:active { transform:translateY(-50%) scale(.9); }
  .ed-add.cap { color:transparent; cursor:not-allowed; opacity:.55; border-color:rgba(255,77,77,.5); filter:brightness(.6); background:repeating-linear-gradient(45deg, rgba(255,77,77,.5) 0 3px, transparent 3px 6px), rgba(10,14,12,.6); }
  .ed-empty { min-width:calc(46px * var(--eds,1)); min-height:calc(22px * var(--eds,1)); cursor:text; white-space:normal; }
  .ed-empty:empty::before { content:'입력…'; color:var(--mut); opacity:.5; }
  .ed-chip:empty { min-width:calc(15px * var(--eds,1)); }
  .ed-addw { flex:none; display:inline-flex; align-items:center; justify-content:center; width:calc(22px * var(--eds,1)); height:calc(22px * var(--eds,1)); border-radius:50%; color:var(--accent); font:800 calc(15px * var(--eds,1))/1 inherit; cursor:pointer; user-select:none; align-self:center; background:rgba(15,253,2,.1); border:1px solid rgba(15,253,2,.4); }
  .ovc { color:#ff5d5d; font-weight:800; }
  .emon { color:var(--accent); font-weight:800; }
  .ed-chip.on { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); font-weight:800; box-shadow:0 0 8px rgba(15,253,2,.3); }
  .ed-chip.warn { border-color:rgba(255,176,32,.55); }
  .ed-chip.warn.on { border-color:var(--accent); }
  .ed-chip.over { border-color:#ff5d5d; background:rgba(255,77,77,.14); }
  .ed-chip.editing { outline:2px solid var(--accent); outline-offset:1px; background:rgba(15,253,2,.08); color:var(--fg); cursor:text; white-space:normal; word-break:break-word; max-width:100%; }
  .ed-chip.editing.over { outline-color:#ff5d5d; color:#ff7a7a; background:rgba(255,77,77,.12); }
  .ed-chip.reject { border-color:#ff5d5d !important; color:#ff7a7a; background:rgba(255,77,77,.12); animation:edshake .42s; }
  @keyframes edshake { 0%,100%{transform:translateX(0)} 18%{transform:translateX(-4px)} 38%{transform:translateX(4px)} 58%{transform:translateX(-3px)} 78%{transform:translateX(2px)} }
</style>
</head>
<body>
<div class="wrap">
  <h1>노뮤트 <b>썸네일</b> · 이미지 제작</h1>

  <div class="tabs" id="tabs">
    <div class="tab" data-app="1">포스트</div>
    <div class="tab" data-app="2">릴스</div>
    <div class="tab" data-app="3">저작권</div>
    <div class="tab" data-app="4">경고문</div>
    <div class="tab" data-app="5">카드뉴스</div>
  </div>

  <div class="panel">
    <!-- 포맷(2는 릴스 고정이라 숨김) -->
    <div id="fmtBox">
      <label>포맷</label>
      <div class="seg" id="fmtSeg">
        <button data-fmt="post" class="on">포스트 1080×1350</button>
        <button data-fmt="reels">릴스 1080×1920</button>
      </div>
    </div>

    <!-- /1 배경 이미지 -->
    <div id="imgBox" class="none">
      <label>배경 이미지</label>
      <label class="file" id="fileLab"><span>탭해서 이미지 선택</span>
        <input type="file" accept="image/*" id="file" style="display:none">
      </label>
    </div>

    <!-- OPA (1 — 오버레이 투명도: 58 기본 / 30 / 직접입력) -->
    <div id="opaBox" class="none">
      <label>투명도 (OPA)</label>
      <div class="seg" id="opaSeg">
        <button data-opa="58" class="on">58 (기본)</button>
        <button data-opa="30">30</button>
        <button data-opa="custom" id="opaCustom"><span class="lab">직접입력</span><input type="text" id="opaNum" class="opa-in" inputmode="numeric" pattern="[0-9]*" maxlength="3" placeholder="OPA"></button>
      </div>
    </div>

    <!-- lines (1 포스트·5 카드뉴스) -->
    <div id="linesBox" class="none">
      <label>텍스트 (줄바꿈 = 여러 줄)</label>
      <textarea id="lines" placeholder="속보 *강조는 별표로*&#10;둘째 줄"></textarea>
      <div class="hint"><b>*별표*</b>로 감싸면 초록 강조 · <span id="linesMax"></span> <span id="linesTrk" class="trk"></span></div>
    </div>

    <!-- /4 경고문 — 프리셋 선택(법적 검토) + 직접입력. 선택 시 채워지고 수정 가능 -->
    <div id="warnBox" class="none">
      <label>경고문 선택 <span style="color:var(--mut);font-weight:400">(탭하면 채워짐 · 수정 가능 · 최대 2줄)</span></label>
      <div class="seg wseg" id="warnPreset">
        <button type="button" data-wp="ai">AI 생성</button>
        <button type="button" data-wp="caution" class="on">경고</button>
        <button type="button" data-wp="custom">직접입력</button>
      </div>
      <textarea id="warnLines">민감하거나 충격적인 내용이 포함될 수 있으니 시청에 주의 바랍니다.</textarea>
      <div class="hint"><b>*별표*</b>로 강조 · 최대 2줄 · <b>AI 생성</b>=AI기본법 §31② 표시의무(나머지는 자율 안내)</div>
    </div>

    <!-- /2 릴스 — 헤더(기본) / 오버레이 모드 -->
    <div id="reelsBox" class="none">
      <label>모드</label>
      <div class="seg" id="rmodeSeg">
        <button data-rmode="header" class="on">헤더 (기본)</button>
        <button data-rmode="overlay">오버레이</button>
      </div>

      <!-- 헤더 모드: 부제 + 제목 → 기본(흰칸無) + 흰칸 2장 -->
      <div id="rHeader">
        <label>부제 (흰색)</label>
        <input type="text" id="sub" placeholder="부제 한 줄">
        <label>제목 (초록)</label>
        <input type="text" id="title" placeholder="제목 한 줄">
        <div class="hint">출력 2장 — <b>기본</b>(흰칸 없음) + <b>흰칸</b>(영상자리) <span id="hdrTrk" class="trk"></span></div>
      </div>

      <!-- 오버레이 모드: 이미지(옵션) + OPA + 텍스트 -->
      <div id="rOverlay" class="none">
        <label>배경 이미지 <span style="color:var(--mut);font-weight:400">(옵션 — 없으면 오버레이만)</span></label>
        <label class="file" id="rFileLab"><span>탭해서 이미지 선택</span>
          <input type="file" accept="image/*" id="rFile" style="display:none">
        </label>
        <label>투명도 (OPA)</label>
        <div class="seg" id="rOpaSeg">
          <button data-opa="60" class="on">60 (기본)</button>
          <button data-opa="30">30</button>
          <button data-opa="custom" id="rOpaCustom"><span class="lab">직접입력</span><input type="text" id="rOpaNum" class="opa-in" inputmode="numeric" pattern="[0-9]*" maxlength="3" placeholder="OPA"></button>
        </div>
        <label>텍스트 (줄바꿈 = 여러 줄)</label>
        <textarea id="rLines" placeholder="속보 *강조는 별표로*&#10;둘째 줄"></textarea>
        <div class="hint"><b>*별표*</b>로 강조 · 기본 <b>opa60+opa30</b>, 직접입력 +1 <span id="rLinesTrk" class="trk"></span></div>
      </div>
    </div>

    <!-- /3 저작권 -->
    <div id="copyBox" class="none">
      <div class="row">
        <div><label>연도</label><input type="text" id="cyear" value="2026"></div>
        <div><label>이름</label><input type="text" id="cname" placeholder="nomute"></div>
      </div>
      <label>플랫폼 <span style="color:var(--mut);font-weight:400">(로고 탭 · 직접입력은 마지막)</span></label>
      <div class="pseg" id="pseg">
        <button type="button" class="pbtn" data-plat="youtube" title="유튜브">YT</button>
        <button type="button" class="pbtn on" data-plat="instagram" title="인스타그램">IG</button>
        <button type="button" class="pbtn" data-plat="threads" title="스레드">Th</button>
        <button type="button" class="pbtn" data-plat="x" title="X">X</button>
        <button type="button" class="pbtn" data-plat="facebook" title="페이스북">Fb</button>
        <button type="button" class="pbtn" data-plat="custom" id="pCustom" title="직접입력"><span class="plab">직접</span></button>
      </div>
      <input type="text" id="cplat" class="none" placeholder="플랫폼 직접입력 (예: tiktok)" style="margin-top:6px">
      <div class="hint" id="copyHint">→ ⓒ 2026. nomute(instagram). all rights reserved.</div>
    </div>

    <!-- /5 카드뉴스 — 칩 에디터 인라인(텍스트 입력 전면 교체·처음부터) -->
    <div id="cardBox" class="none">
      <div class="cardhdr"><span class="hdlbl">카드 텍스트</span><span class="hdsub">탭=강조 · 더블탭=수정 · + 줄추가 · 최대 4줄·한글18/줄</span></div>
      <div class="ed-chips" id="edChips" aria-label="단어 — 탭하면 강조"></div>
    </div>

    <button class="go" id="go">이미지 제작</button>
  </div>

  <div class="out">
    <div class="status" id="status"></div>
    <div class="result" id="result"></div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let APP = '1', FMT = 'post', RMODE = 'header';
const IMG = { b64: '', name: '' };    // /1·/5 배경
const RIMG = { b64: '', name: '' };   // /2 오버레이 배경(옵션)

// ---- 탭 ----
function selApp(a) {
  APP = a;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.app === a));
  // 표시 토글
  $('#imgBox').classList.toggle('none', !(a === '1' || a === '5'));   // 이미지 = /1·/5
  $('#linesBox').classList.toggle('none', a !== '1');   // 텍스트 = /1 포스트만 (/5는 칩 에디터)
  $('#warnBox').classList.toggle('none', a !== '4');                    // 경고문 = /4 (프리셋)
  $('#cardBox').classList.toggle('none', a !== '5');                    // 카드뉴스 = /5 인라인 칩 에디터
  $('#reelsBox').classList.toggle('none', a !== '2');
  $('#copyBox').classList.toggle('none', a !== '3');
  $('#fmtBox').classList.toggle('none', a === '1' || a === '2' || a === '5');   // 1·2·5 포맷 고정
  $('#opaBox').classList.toggle('none', a !== '1');   // OPA = /1 포스트만
  $('#linesMax').textContent = a === '1' ? '최대 3줄' : '';
  if (a === '5') { if (!edLines.length) edLines = [[]]; renderEditChips(); }   // 인라인 칩 에디터 init/refresh
  if (a === '1') updateTrkHint('lines', 'linesTrk', 'post');                   // 실시간 자간
}
document.querySelectorAll('.tab').forEach(t => t.onclick = () => selApp(t.dataset.app));

// ---- 줄 수 하드캡 (포스트3·카드뉴스4·릴스오버레이3·경고문2 — 넘는 줄 못 쓰게) ----
function maxLinesFor(ta) {
  if (ta.id === 'lines') return APP === '1' ? 3 : APP === '5' ? 4 : 0;
  if (ta.id === 'rLines') return 3;
  if (ta.id === 'warnLines') return 2;
  return 0;
}
['lines', 'rLines', 'warnLines'].forEach(id => {
  const ta = document.getElementById(id);
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter') { const m = maxLinesFor(ta); if (m && ta.value.split('\n').length >= m) e.preventDefault(); }
  });
  ta.addEventListener('input', () => {
    const m = maxLinesFor(ta); if (!m) return;
    const ls = ta.value.split('\n'); if (ls.length > m) ta.value = ls.slice(0, m).join('\n');   // 붙여넣기 등 초과분 잘라냄
  });
});

// ---- /3 플랫폼 로고 선택 (직접입력 = 하단 입력창 포커스) ----
function getPlatform() {
  const sel = document.querySelector('#pseg .on');
  if (!sel) return '';
  return sel.dataset.plat === 'custom' ? $('#cplat').value.trim() : sel.dataset.plat;
}
function updateCopyHint() {
  const y = $('#cyear').value.trim() || '2026', n = $('#cname').value.trim() || 'nomute', p = getPlatform();
  $('#copyHint').textContent = '→ ⓒ ' + y + '. ' + n + (p ? '(' + p + ')' : '') + '. all rights reserved.';
}
document.querySelectorAll('#pseg button').forEach(b => b.onclick = () => {
  document.querySelectorAll('#pseg button').forEach(x => x.classList.toggle('on', x === b));
  const custom = b.dataset.plat === 'custom';
  $('#cplat').classList.toggle('none', !custom);
  if (custom) $('#cplat').focus();
  updateCopyHint();
});
['cplat', 'cyear', 'cname'].forEach(id => $('#' + id).addEventListener('input', updateCopyHint));

  const ref = document.createElement('div'); ref.className = 'ed-line';
  ref.style.cssText = 'position:absolute; left:-9999px; top:0; visibility:hidden; width:max-content;';
  ['뉴스종합', '정치경제', '국제사회', '심층분석속보'].forEach(t => {
    const c = document.createElement('span'); c.className = 'ed-chip'; c.textContent = t; ref.appendChild(c);
  });
  { const aw = document.createElement('span'); aw.className = 'ed-addw'; aw.textContent = '+'; ref.appendChild(aw); }
  wrap.appendChild(ref);
  const refW = ref.getBoundingClientRect().width;
  wrap.removeChild(ref);
  let eds = refW > 0 ? Math.min(1.1, avail / refW) : 1;
  eds = Math.max(0.45, eds);
  wrap.style.setProperty('--eds', eds.toFixed(3));
  for (let pass = 0; pass < 4; pass++) {
    let maxw = 0; rows.forEach(r => { if (r.scrollWidth > maxw) maxw = r.scrollWidth; });
    if (maxw <= avail) break;
    eds = Math.max(0.4, eds * avail / maxw);
    wrap.style.setProperty('--eds', eds.toFixed(3));
  }
}
function buildEmphText() {
  const charEm = (wd, ci) => wd.em ? !!wd.em[ci] : wd.on;
  return edLines.map(line => {
    const words = line.filter(wd => wd.text !== '');
    const seq = [];
    words.forEach((wd, k) => {
      const chars = [...wd.text];
      if (k) {
        const prev = words[k - 1], pc = [...prev.text];
        seq.push({ c: ' ', e: charEm(prev, pc.length - 1) && charEm(wd, 0) });
      }
      chars.forEach((c, ci) => seq.push({ c, e: charEm(wd, ci) }));
    });
    let out = '', on = false;
    seq.forEach(s => { if (s.e && !on) { out += '*'; on = true; } else if (!s.e && on) { out += '*'; on = false; } out += s.c; });
    if (on) out += '*';
    return out;
  }).filter(s => s !== '').join('\n');
}
// 카드 에디터 copy/paste (buildEmphText ↔ parseEmphLines) — edLines 정의 뒤에 둠(TDZ 회피). renderEditChips 끝에서 cardIo() 갱신
(function () {
  const hdr = $('#cardBox .cardhdr'); if (!hdr) return;
  const btn = document.createElement('button'); btn.type = 'button'; btn.className = 'iobtn'; btn.style.position = 'static'; hdr.appendChild(btn);
  cardIo = () => { if (btn.classList.contains('ok')) return; const filled = buildEmphText().trim().length > 0; btn.innerHTML = filled ? COPY_SVG : PASTE_SVG; btn.dataset.mode = filled ? 'copy' : 'paste'; btn.setAttribute('aria-label', filled ? '복사' : '붙여넣기'); };
  btn.onclick = async ev => {
    ev.preventDefault();
    if (btn.dataset.mode === 'copy') clipCopy(buildEmphText(), btn, cardIo);
    else { try { const t = await navigator.clipboard.readText(); if (t) { edLines = parseEmphLines(t); if (!edLines.length) edLines = [[]]; renderEditChips(); } } catch {} cardIo(); }
  };
  cardIo();
})();
// ---- 실시간 자간(tracking) 추정 — 워크플로 measure+sweep의 브라우저판 (글자폭 = PIL 실측 상수) ----
const TRK = {
  post:  { H: 70, S: 17, N: 48, fs: 76, limit: 920, start: 0,  floor: -45 },
  reels: { H: 72, S: 18, N: 48, fs: 78, limit: 844, start: -1, floor: -30 },
};
function lineWidthPx(text, tr, cfg) {   // ΣbbW + tp*(len-1) + 5 (한글 monospace · 약간 보수적)
  const plain = text.replace(/\*/g, '');
  let s = 0; for (const ch of plain) s += /[가-힣ㄱ-ㅎㅏ-ㅣ]/.test(ch) ? cfg.H : ch === ' ' ? cfg.S : cfg.N;
  return s + (tr / 1000 * cfg.fs) * Math.max(plain.length - 1, 0) + 5;
}
function estTracking(lines, fmt) {   // 전 줄이 마진 안에 드는 전역 tr (워크플로 fit_tracking 동일 로직)
  const cfg = TRK[fmt];
  const widest = tr => Math.max(0, ...lines.map(l => lineWidthPx(l, tr, cfg)));
  if (widest(cfg.start) <= cfg.limit) return { tr: cfg.start, swept: false, over: false };
  for (let x = cfg.start; x >= cfg.floor; x--) if (widest(x) <= cfg.limit) return { tr: x, swept: true, over: false };
  return { tr: cfg.floor, swept: true, over: true };
}
function updateTrkHint(taId, hintId, fmt) {   // 자간 줄어들기 시작하면 그때부터 '자간 -N' · 한도 초과 빨강
  const el = $('#' + hintId); if (!el) return;
  const lines = ($('#' + taId).value || '').split('\n').map(s => s.trim()).filter(Boolean);
  const r = lines.length ? estTracking(lines, fmt) : null;
  if (!r || (!r.swept && !r.over)) { el.textContent = ''; el.className = 'trk'; return; }   // 여유 = 숨김
  if (r.over) { el.textContent = `⚠ 자간 ${TRK[fmt].floor}로도 초과 — 축약 필요`; el.className = 'trk over'; }
  else { el.textContent = `· 자간 ${r.tr}`; el.className = 'trk on'; }
}
$('#lines').addEventListener('input', () => updateTrkHint('lines', 'linesTrk', 'post'));
$('#rLines').addEventListener('input', () => updateTrkHint('rLines', 'rLinesTrk', 'reels'));

// ---- 릴스 헤더(부제/제목) 실시간 자간 — reels2 _fit_tr 추정(getlength 기준 · AVAIL 960) ----
const HDR = {
  sub:   { H: 60.72, S: 14.98, N: 38.94, fs: 66, avail: 960, floor: -45 },
  title: { H: 82.80, S: 20.44, N: 53.09, fs: 90, avail: 960, floor: -45 },
};
function estHeaderTr(text, cfg) {   // reels2 _fit_tr(0→-45) 추정
  if (!text) return { tr: 0, over: false };
  const w = tr => { let s = 0; for (const ch of text) s += /[가-힣ㄱ-ㅎㅏ-ㅣ]/.test(ch) ? cfg.H : ch === ' ' ? cfg.S : cfg.N; return s + (tr / 1000 * cfg.fs) * Math.max(text.length - 1, 0); };
  if (w(0) <= cfg.avail) return { tr: 0, over: false };
  for (let x = -1; x >= cfg.floor; x--) if (w(x) <= cfg.avail) return { tr: x, over: false };
  return { tr: cfg.floor, over: true };
}
function updateHdrTrk() {
  const el = $('#hdrTrk'); if (!el) return;
  const s = estHeaderTr($('#sub').value.trim(), HDR.sub), t = estHeaderTr($('#title').value.trim(), HDR.title);
  const parts = [];
  if (s.over) parts.push('부제 축약필요'); else if (s.tr < 0) parts.push(`부제 자간${s.tr}`);
  if (t.over) parts.push('제목 축약필요'); else if (t.tr < 0) parts.push(`제목 자간${t.tr}`);
  el.textContent = parts.length ? '· ' + parts.join(' · ') : '';
  el.className = 'trk' + ((s.over || t.over) ? ' over' : parts.length ? ' on' : '');
}
$('#sub').addEventListener('input', updateHdrTrk);
$('#title').addEventListener('input', updateHdrTrk);

// ---- 발사 ----
$('#go').onclick = async () => {
  const status = $('#status'); status.classList.remove('err'); $('#result').innerHTML = '';
  // 카드뉴스(5) = /api/compose (이미지 + 텍스트, 1080×1350)
  if (APP === '5') {
    if (!IMG.b64) { status.textContent = '이미지를 선택해줘'; status.classList.add('err'); return; }
    if (edAnyOver()) { status.textContent = '빨간 글자 = 한 줄 한도(한글 18자) 초과 — 줄이거나 + 로 새 줄'; status.classList.add('err'); return; }
    const clines = buildEmphText().split('\n').map(s => s.trim()).filter(Boolean);   // 인라인 칩 에디터 → *강조* 텍스트
    if (!clines.length) { status.textContent = '텍스트를 입력해줘'; status.classList.add('err'); return; }
    $('#go').disabled = true; status.textContent = '제작 중…';
    try {
      const res = await fetch('/api/compose', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ imageB64: IMG.b64, name: IMG.name, lines: clines }) });
      const j = await res.json();
      if (!res.ok || j.error) { status.textContent = '⚠️ ' + (j.error || res.status); status.classList.add('err'); }
      else pollMany([{ path: j.out, label: '' }]);
    } catch (e) { status.textContent = '⚠️ 요청 실패: ' + e.message; status.classList.add('err'); }
    finally { $('#go').disabled = false; }
    return;
  }
  const params = buildParams();
  if (APP === '1' && !IMG.b64) { status.textContent = '배경 이미지를 선택해줘'; status.classList.add('err'); return; }
  if (APP === '2' && params.mode === 'header' && !params.sub && !params.title) { status.textContent = '부제 또는 제목을 입력해줘'; status.classList.add('err'); return; }
  if (APP === '2' && params.mode === 'overlay' && !params.lines.length) { status.textContent = '텍스트를 입력해줘'; status.classList.add('err'); return; }
  if (APP === '4' && !params.lines.length) { status.textContent = '경고문 텍스트를 입력해줘'; status.classList.add('err'); return; }
  $('#go').disabled = true; status.textContent = '발사 중…';
  try {
    const payload = { app: APP, params };
    if (APP === '1') { payload.imageB64 = IMG.b64; payload.name = IMG.name; }
    if (APP === '2' && params.mode === 'overlay' && RIMG.b64) { payload.imageB64 = RIMG.b64; payload.name = RIMG.name; }   // 오버레이 배경 = 옵션
    const res = await fetch('/api/thumb', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(payload) });
    const j = await res.json();
    if (!res.ok || j.error) { status.textContent = '⚠️ ' + (j.error || res.status); status.classList.add('err'); $('#go').disabled = false; return; }
    pollMany(j.outs || (j.out ? [{ path: j.out, label: '' }] : []));
  } catch (e) {
    status.textContent = '⚠️ 요청 실패: ' + e.message; status.classList.add('err');
  } finally { $('#go').disabled = false; }
};

selApp('1');
</script>
