<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>노뮤트 뉴스 큐레이션</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  :root { --bg:#0f1115; --card:#171a21; --line:#262b35; --fg:#e7e9ee; --mut:#9aa3b2; --accent:#0FFD02; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif; }
  header { position:sticky; top:0; background:rgba(15,17,21,.95); border-bottom:1px solid var(--line); padding:14px 16px; backdrop-filter:blur(6px); }
  h1 { font-size:16px; margin:0; letter-spacing:-.3px; } h1 b { color:var(--accent); }
  .wrap { max-width:860px; margin:0 auto; padding:16px; }
  .bar { display:flex; gap:8px; align-items:center; margin-top:8px; flex-wrap:wrap; }
  .bar input, .bar select { background:var(--card); color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:6px 10px; font-size:13px; }
  .meta { color:var(--mut); font-size:12px; margin-left:auto; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin:10px 0; cursor:pointer; transition:border-color .15s; }
  .card:hover { border-color:var(--accent); }
  .card .t { font-weight:600; font-size:15px; }
  .card .s { color:var(--mut); font-size:13px; margin-top:4px; }
  .chips { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .chip { font-size:11px; color:var(--mut); border:1px solid var(--line); border-radius:999px; padding:2px 8px; }
  .empty { color:var(--mut); text-align:center; padding:48px 0; }
  dialog { width:min(820px,94vw); max-height:88vh; background:var(--card); color:var(--fg); border:1px solid var(--line); border-radius:14px; padding:0; }
  dialog::backdrop { background:rgba(0,0,0,.6); }
  .dlg-h { position:sticky; top:0; background:var(--card); border-bottom:1px solid var(--line); padding:12px 16px; display:flex; gap:10px; align-items:center; }
  .dlg-h a { color:var(--accent); font-size:12px; text-decoration:none; }
  .dlg-h button { margin-left:auto; background:transparent; color:var(--fg); border:1px solid var(--line); border-radius:8px; padding:4px 10px; cursor:pointer; }
  .md { padding:8px 20px 24px; }
  .md h1 { font-size:20px; } .md h2 { font-size:15px; color:var(--accent); border-bottom:1px solid var(--line); padding-bottom:4px; margin-top:22px; }
  .md a { color:var(--accent); } .md code { background:#0b0d11; padding:1px 5px; border-radius:5px; }
  .md ul { padding-left:20px; }
  .md pre { position:relative; background:#0b0d11; border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin:10px 0; }
  .md pre code { background:none; padding:0; display:block; white-space:pre-wrap; word-break:break-word; font-family:inherit; font-size:14px; line-height:1.7; }
  .copy { position:absolute; top:8px; right:8px; font-size:11px; background:var(--card); color:var(--mut); border:1px solid var(--line); border-radius:7px; padding:3px 10px; cursor:pointer; }
  .copy:hover { color:var(--accent); border-color:var(--accent); }
  .copy.ok { color:var(--accent); border-color:var(--accent); }
  .mkbtn { display:block; width:100%; margin:14px 0 4px; padding:10px; font-size:14px; background:transparent; color:var(--accent); border:1px dashed var(--accent); border-radius:10px; cursor:pointer; }
  .mkbtn:hover { background:rgba(15,253,2,.06); }
  .mkall { background:var(--card); color:var(--mut); border:1px solid var(--line); border-radius:8px; padding:6px 10px; font-size:13px; cursor:pointer; }
  .mkall:hover { color:var(--accent); border-color:var(--accent); }
  .genstat { margin:14px 0 4px; padding:10px 12px; border:1px solid var(--line); border-radius:10px; color:var(--mut); font-size:13px; }
  .cardnote { margin:16px 0 6px; font-size:13px; color:var(--accent); font-weight:600; }
  .gal { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin:8px 0; }
  .gal figure { margin:0; }
  .gal img { width:100%; border-radius:8px; border:1px solid var(--line); display:block; }
  .gal .dl { display:block; text-align:center; font-size:11px; color:var(--mut); text-decoration:none; padding:3px 0; }
  .gal .dl:hover { color:var(--accent); }
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding:0">
    <h1>노<b>뮤트</b> 뉴스 큐레이션</h1>
    <div class="bar">
      <input id="q" type="search" placeholder="제목·매체 검색">
      <select id="day"><option value="">전체 날짜</option></select>
      <button id="mkall" class="mkall" title="카드 미제작 기사 전체 일괄 생성(유료)">🎴 일괄</button>
      <span class="meta" id="meta"></span>
    </div>
  </div>
</header>
<div class="wrap"><div id="list"></div></div>

<dialog id="dlg">
  <div class="dlg-h"><a id="src" target="_blank" rel="noopener">원문 ↗</a><button onclick="dlg.close()">닫기</button></div>
  <div class="md" id="cardsec"></div>
  <div class="md" id="mdbody"></div>
</dialog>

<script>
const $ = s => document.querySelector(s);
let DATA = [];
let CUR = '';   // 열려 있는 기사 file — 자동 갱신 때 다이얼로그 카드 섹션 동기화용
marked.setOptions({ breaks:true });

async function load() {
  try {
    const r = await fetch('articles.json?_=' + Date.now());
    const j = await r.json();
    DATA = j.articles || [];
    $('#meta').textContent = `${j.count}건 · ${(j.generated||'').slice(0,10)}`;
    const sel = $('#day'), keep = sel.value;
    sel.innerHTML = '<option value="">전체 날짜</option>';
    const days = [...new Set(DATA.map(a => a.date).filter(Boolean))].sort().reverse();
    for (const d of days) { const o = document.createElement('option'); o.value=d; o.textContent=d; sel.appendChild(o); }
    sel.value = keep;
  } catch(e) { DATA = []; $('#meta').textContent = 'articles.json 없음'; }
  render();
  if ($('#dlg').open && CUR) {
    const a = DATA.find(x => x.file === CUR);
    if (a) cardSec(a);
  }
}

function render() {
  const q = $('#q').value.trim().toLowerCase();
  const day = $('#day').value;
  const rows = DATA.filter(a =>
    (!day || a.date === day) &&
    (!q || (a.title+a.media).toLowerCase().includes(q)));
  const list = $('#list');
  if (!rows.length) { list.innerHTML = '<div class="empty">결과 없음</div>'; return; }
  list.innerHTML = '';
  rows.forEach((a, i) => {
    const c = document.createElement('div'); c.className='card';
    c.innerHTML = `<div class="t"></div><div class="s"></div>
      <div class="chips">
        ${cardChip(a)}
        ${a.media?`<span class="chip">📰 ${esc(a.media)}</span>`:''}
        ${a.date?`<span class="chip">${esc(a.date)}</span>`:''}
        ${a.type?`<span class="chip">유형 ${esc(a.type)}</span>`:''}
        ${a.bias?`<span class="chip">📊 ${esc(a.bias)}</span>`:''}
        ${a.tags && a.tags!=='해당 없음'?`<span class="chip">${esc(a.tags)}</span>`:''}
      </div>`;
    c.querySelector('.t').textContent = a.title;
    c.querySelector('.s').textContent = a.summary || '';
    c.onclick = () => open(a);
    list.appendChild(c);
  });
}
function open(a) {
  CUR = a.file;
  const md = $('#mdbody');
  md.innerHTML = DOMPurify.sanitize(marked.parse(a.body || ''));
  addCopyButtons(md);
  cardSec(a);
  const src = $('#src'); if (a.url){ src.href=a.url; src.style.display=''; } else src.style.display='none';
  $('#dlg').showModal();
}
// 코드블록마다 복사 버튼 — ```text 복사 박스(자유요약·IG·Thread·썸네일·카드)를 탭 한 번에 복사
function addCopyButtons(root) {
  root.querySelectorAll('pre').forEach(pre => {
    const btn = document.createElement('button');
    btn.className = 'copy'; btn.textContent = '복사';
    btn.onclick = ev => { ev.stopPropagation(); copyBlock(pre, btn); };
    pre.appendChild(btn);
  });
}

// ── 카드뉴스 섹션: 상태별 버튼/로딩/갤러리 ──────────────────────────
const CARD_LABEL = { generating:'⏳ 생성중', done:'🎴 카드', fired_partial:'🚀 발사됨', text_done:'📝 텍스트', failed:'⚠️ 실패' };
function cardChip(a) {
  const st = a.cards && a.cards.state;
  return st ? `<span class="chip">${CARD_LABEL[st] || st}</span>` : '';
}
function cardSec(a) {
  const sec = $('#cardsec'); sec.innerHTML = '';
  const c = a.cards || {}, st = c.state || '';
  if (!st || st === 'failed') {
    if (st === 'failed') sec.insertAdjacentHTML('beforeend',
      `<div class="genstat">⚠️ 직전 카드 제작 실패 — 레포 cards/ 의 error.log 참조</div>`);
    const b = document.createElement('button');
    b.className = 'mkbtn';
    b.textContent = st === 'failed' ? '🎴 카드뉴스 다시 생성 (유료 발사)' : '🎴 카드뉴스 일괄 생성 (유료 발사)';
    b.onclick = () => makeCards(a.file, b);
    sec.appendChild(b);
    return;
  }
  if (st === 'generating') {
    sec.innerHTML = `<div class="genstat">⏳ 카드 생성 중… 완료되면 여기에 자동으로 뜸(1~2분 단위 갱신)</div>`;
    return;
  }
  const note = {
    done: '🎴 카드뉴스 완성 — 이미지 탭하면 원본, ⬇로 저장',
    fired_partial: '🚀 발사됨 — 이미지 일부/대기 중(Drive에서 계속 생성, 다음 갱신 때 반영)',
    text_done: '📝 카드 텍스트·프롬프트 생성 완료 (이미지 발사는 GDRIVE_SA_JSON 시크릿 등록 후)',
  }[st] || st;
  sec.insertAdjacentHTML('beforeend', `<div class="cardnote">${note}</div>`);
  if (c.images && c.images.length) {
    const gal = document.createElement('div'); gal.className = 'gal';
    gal.innerHTML = c.images.map(p =>
      `<figure><a href="${esc(p)}" target="_blank" rel="noopener"><img src="${esc(p)}" loading="lazy" alt=""></a>
       <a class="dl" href="${esc(p)}" download>⬇ 저장</a></figure>`).join('');
    sec.appendChild(gal);
  }
  if (c.md) {
    const div = document.createElement('div');
    div.innerHTML = DOMPurify.sanitize(marked.parse(c.md));
    addCopyButtons(div);
    sec.appendChild(div);
  }
}
async function makeCards(target, btn) {
  const n = target === 'all'
    ? DATA.filter(a => !a.cards || !a.cards.state || a.cards.state === 'failed').length
    : 1;
  if (target === 'all' && !n) { alert('미제작 기사 없음'); return; }
  if (!confirm(`카드뉴스 ${n}건 일괄 생성 — 유료 발사야(Opus + Gemini·Cloud Run). 진행?`)) return;
  let pass = localStorage.getItem('cardpass') || prompt('카드 생성 암호');
  if (!pass) return;
  try {
    const r = await fetch('api/make-cards', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ article: target === 'all' ? 'all' : target, pass }),
    });
    const j = await r.json().catch(() => ({}));
    if (r.ok && j.ok) {
      localStorage.setItem('cardpass', pass);
      if (btn) btn.outerHTML = `<div class="genstat">🚀 발사됨 — 워크플로 시작, 1~2분 내 ⏳로 바뀜</div>`;
      else alert(`발사됨 — ${n}건 순차 생성 시작`);
    } else {
      if (r.status === 401) localStorage.removeItem('cardpass');
      alert(j.error || `실패 (${r.status})`);
    }
  } catch (e) { alert('요청 실패: ' + e.message); }
}
async function copyBlock(pre, btn) {
  const code = pre.querySelector('code');
  const text = (code ? code.innerText : pre.innerText).replace(/\n+$/, '');
  try { await navigator.clipboard.writeText(text); }
  catch {
    // 폴백 — dialog가 top layer라 textarea도 dialog 안에 넣어야 선택·복사가 된다
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    $('#dlg').appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
  }
  btn.textContent = '✅ 복사됨'; btn.classList.add('ok');
  setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('ok'); }, 1500);
}
const esc = s => (s||'').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
$('#q').addEventListener('input', render);
$('#day').addEventListener('change', render);
$('#mkall').addEventListener('click', () => makeCards('all', null));
// 자동 갱신 — 생성 중 상태가 커밋→Pages 재배포로 바뀌는 걸 새로고침 없이 반영
setInterval(() => { if (document.visibilityState === 'visible') load(); }, 60000);
load();
</script>
</body>
</html>
