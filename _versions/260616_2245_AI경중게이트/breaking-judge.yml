name: breaking-judge
# 속보 2차 판정 — viewer/candidates.json 의 미판정 속보후보(breaking_candidate & 'breaking' 없음)를
# Claude(claude -p) 로 '긴급 속보?' 판정 → breaking=true/false 확정. 급발 사건만 push(사용자 확정).
# scrape 가 새 속보후보 뜰 때만 디스패치(매 15분 X) → 토큰 절약. self-gate: 후보 없으면 Claude 설치도 안 함.
# GITHUB_TOKEN 커밋은 워크플로를 재트리거하지 않음(루프 방지).

on:
  workflow_dispatch:
    inputs:
      account:
        description: '이 실행에 쓸 구독 OAuth 계정'
        type: choice
        default: MUTENO
        options:
          - MUTENO
          - EMS1130G

concurrency:
  group: breaking-judge
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  judge:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # 첫 런 = 경중 4청크(각 ≤5분) + 속보 1콜 → 15분 빠듯, 여유 확보
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      # 게이트 — 미판정 속보후보 + 미채점 경중후보 수. 0이면 아래 Claude 설치·판정 스텝 전부 스킵(비용 0).
      - name: 미판정 후보 확인 (속보 + 경중)
        id: chk
        run: |
          nb=$(python3 .github/scripts/breaking_judge.py --count)
          ng=$(python3 .github/scripts/gate_judge.py --count)
          n=$((nb + ng))
          echo "pending=$n" >> "$GITHUB_OUTPUT"
          echo "미판정: 속보 ${nb}건 · 경중 ${ng}건 (총 ${n})"

      - name: Setup Node
        if: steps.chk.outputs.pending != '0'
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Claude Code CLI
        if: steps.chk.outputs.pending != '0'
        run: npm install -g @anthropic-ai/claude-code

      - name: 속보 판정 (claude -p)
        if: steps.chk.outputs.pending != '0'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN 비어있음 — 판정 생략(다음 런 재시도)"; exit 0
          fi
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          python3 .github/scripts/breaking_judge.py

      - name: 경중 채점 (claude -p · AI 게이트)
        if: steps.chk.outputs.pending != '0'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN 비어있음 — 채점 생략(다음 런 재시도)"; exit 0
          fi
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          python3 .github/scripts/gate_judge.py

      - name: Commit (breaking 확정)
        if: steps.chk.outputs.pending != '0'
        run: |
          if [ -z "$(git status --porcelain viewer/candidates.json)" ]; then
            echo "변동 없음 — 커밋 생략"; exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add viewer/candidates.json
          git commit -m "AI 판정: 속보 breaking · 경중 grade 갱신"
          for i in 1 2 3 4; do
            git pull --rebase -X theirs origin main && git push origin HEAD:main && exit 0
            git rebase --abort 2>/dev/null || true
            sleep $((2**i))
          done
          echo "::error::breaking 판정 push 실패"; exit 1
