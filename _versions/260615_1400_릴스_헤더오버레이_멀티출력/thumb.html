<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>노뮤트 썸네일 — 웹</title>
<style>
  :root { --bg:#0b0b0c; --pan:#16171a; --line:#2a2c31; --fg:#e9eaec; --mut:#8b8f98; --grn:#0FFD02; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:560px; margin:0 auto; padding:18px 16px 60px; }
  h1 { font-size:18px; margin:6px 0 14px; }
  h1 b { color:var(--grn); }
  .tabs { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-bottom:16px; }
  .tab { padding:11px 3px; text-align:center; background:var(--pan); border:1px solid var(--line); border-radius:10px; cursor:pointer; font-weight:600; font-size:12.5px; }
  .tab small { display:block; color:var(--mut); font-weight:400; font-size:11px; margin-top:2px; }
  .tab.on { border-color:var(--grn); color:var(--grn); }
  .tab.on small { color:#bfeeb6; }
  .panel { background:var(--pan); border:1px solid var(--line); border-radius:12px; padding:14px; }
  label { display:block; font-size:13px; color:var(--mut); margin:12px 0 5px; }
  label:first-child { margin-top:0; }
  input[type=text], input[type=number], textarea, select {
    width:100%; padding:10px; background:#0e0f11; border:1px solid var(--line); border-radius:8px; color:var(--fg); font:inherit;
  }
  textarea { min-height:84px; resize:vertical; }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .hint { font-size:12px; color:var(--mut); margin-top:5px; }
  .hint b { color:var(--grn); }
  .seg { display:flex; gap:6px; }
  .seg button { flex:1; padding:8px; background:#0e0f11; border:1px solid var(--line); border-radius:8px; color:var(--fg); cursor:pointer; }
  .seg button.on { border-color:var(--grn); color:var(--grn); }
  .file { display:block; padding:10px; border:1px dashed var(--line); border-radius:8px; text-align:center; color:var(--mut); cursor:pointer; }
  .file img { max-width:100%; max-height:170px; border-radius:6px; margin-top:8px; }
  .go { width:100%; margin-top:16px; padding:13px; background:var(--grn); color:#07210a; border:none; border-radius:10px; font-weight:800; font-size:15px; cursor:pointer; }
  .go:disabled { opacity:.5; cursor:default; }
  .out { margin-top:18px; }
  .status { font-size:13px; color:var(--mut); white-space:pre-wrap; }
  .status.err { color:#ff8a8a; }
  .result img { width:100%; border:1px solid var(--line); border-radius:10px; }
  .none { display:none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>노뮤트 <b>썸네일</b> · 웹 렌더</h1>

  <div class="tabs" id="tabs">
    <div class="tab" data-app="1">포스트</div>
    <div class="tab" data-app="2">릴스</div>
    <div class="tab" data-app="3">저작권</div>
    <div class="tab" data-app="4">경고문</div>
    <div class="tab" data-app="5">카드뉴스</div>
  </div>

  <div class="panel">
    <!-- 포맷(2는 릴스 고정이라 숨김) -->
    <div id="fmtBox">
      <label>포맷</label>
      <div class="seg" id="fmtSeg">
        <button data-fmt="post" class="on">포스트 1080×1350</button>
        <button data-fmt="reels">릴스 1080×1920</button>
      </div>
    </div>

    <!-- /1 배경 이미지 -->
    <div id="imgBox" class="none">
      <label>배경 이미지</label>
      <label class="file" id="fileLab"><span>탭해서 이미지 선택</span>
        <input type="file" accept="image/*" id="file" style="display:none">
      </label>
    </div>

    <!-- OPA (1 — 오버레이 투명도: 58 기본 / 30 / 직접입력) -->
    <div id="opaBox" class="none">
      <label>투명도 (OPA)</label>
      <div class="seg" id="opaSeg">
        <button data-opa="58" class="on">58 (기본)</button>
        <button data-opa="30">30</button>
        <button data-opa="custom">직접입력</button>
      </div>
      <input type="number" id="opaNum" min="0" max="100" value="45" placeholder="0–100" class="none" style="margin-top:6px">
    </div>

    <!-- lines (1·4) -->
    <div id="linesBox" class="none">
      <label>텍스트 (줄바꿈 = 여러 줄)</label>
      <textarea id="lines" placeholder="속보 *강조는 별표로*&#10;둘째 줄"></textarea>
      <div class="hint"><b>*별표*</b>로 감싸면 초록 강조</div>
    </div>

    <!-- /2 릴스 -->
    <div id="reelsBox" class="none">
      <label>부제 (흰색)</label>
      <input type="text" id="sub" placeholder="부제 한 줄">
      <label>제목 (초록)</label>
      <input type="text" id="title" placeholder="제목 한 줄">
    </div>

    <!-- /3 저작권 -->
    <div id="copyBox" class="none">
      <div class="row">
        <div><label>연도</label><input type="text" id="cyear" value="2026"></div>
        <div><label>이름</label><input type="text" id="cname" placeholder="nomute"></div>
      </div>
      <label>플랫폼</label>
      <input type="text" id="cplat" placeholder="instagram">
      <div class="hint">→ ⓒ 2026. nomute(instagram). all rights reserved.</div>
    </div>

    <button class="go" id="go">웹 렌더 발사</button>
  </div>

  <div class="out">
    <div class="status" id="status"></div>
    <div class="result" id="result"></div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let APP = '1', FMT = 'post', IMG_B64 = '', IMG_NAME = '';

// ---- 탭 ----
function selApp(a) {
  APP = a;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.app === a));
  // 표시 토글
  $('#imgBox').classList.toggle('none', !(a === '1' || a === '5'));   // 이미지 = /1·/5
  $('#linesBox').classList.toggle('none', !(a === '1' || a === '4' || a === '5'));   // 텍스트 = /1·/4·/5
  $('#reelsBox').classList.toggle('none', a !== '2');
  $('#copyBox').classList.toggle('none', a !== '3');
  $('#fmtBox').classList.toggle('none', a === '1' || a === '2' || a === '5');   // 1·2·5 포맷 고정
  $('#opaBox').classList.toggle('none', a !== '1');   // OPA = /1 포스트만
}
document.querySelectorAll('.tab').forEach(t => t.onclick = () => selApp(t.dataset.app));

// ---- 포맷 세그 ----
document.querySelectorAll('#fmtSeg button').forEach(b => b.onclick = () => {
  FMT = b.dataset.fmt;
  document.querySelectorAll('#fmtSeg button').forEach(x => x.classList.toggle('on', x === b));
});

// ---- OPA 세그 (58 기본 / 30 / 직접입력) ----
document.querySelectorAll('#opaSeg button').forEach(b => b.onclick = () => {
  document.querySelectorAll('#opaSeg button').forEach(x => x.classList.toggle('on', x === b));
  $('#opaNum').classList.toggle('none', b.dataset.opa !== 'custom');
});
function getOpa() {
  const sel = document.querySelector('#opaSeg .on');
  if (sel && sel.dataset.opa === 'custom') return Math.max(0, Math.min(100, parseInt($('#opaNum').value) || 0));
  return parseInt(sel && sel.dataset.opa) || 58;
}

// ---- 파일 ----
$('#file').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  IMG_NAME = f.name;
  const r = new FileReader();
  r.onload = () => {
    IMG_B64 = r.result;
    $('#fileLab').innerHTML = '<span>' + f.name + ' ✓</span><img src="' + r.result + '">' +
      '<input type="file" accept="image/*" id="file" style="display:none">';
    $('#fileLab').querySelector('#file').onchange = $('#file').onchange;
  };
  r.readAsDataURL(f);
};

// ---- 입력 → params ----
function buildParams() {
  const linesArr = ($('#lines').value || '').split('\n').map(s => s.trim()).filter(Boolean);
  if (APP === '4') return { fmt: FMT, lines: linesArr };
  if (APP === '1') return { fmt: 'post', lines: linesArr, opacity: getOpa() };   // /1 = post 고정 + OPA
  if (APP === '2') return { sub: $('#sub').value.trim(), title: $('#title').value.trim() };
  if (APP === '3') return { fmt: FMT, year: $('#cyear').value.trim(), name: $('#cname').value.trim(), platform: $('#cplat').value.trim() };
}

// ---- 폴링 ----
function poll(outPath) {
  const t0 = Date.now();
  const result = $('#result'), status = $('#status');
  const tick = () => {
    const sec = Math.round((Date.now() - t0) / 1000);
    if (sec > 600) { status.textContent = '시간 초과 — Actions 로그 확인 필요'; status.classList.add('err'); return; }
    status.textContent = '⏳ 렌더 중… ' + sec + 's (러너 실행 + 배포 대기, 보통 1–2분)';
    const img = new Image();
    const url = outPath + '?t=' + Date.now();
    img.onload = () => {
      status.textContent = '✅ 완료 (' + sec + 's)';
      result.innerHTML = '<img src="' + url + '">';
    };
    img.onerror = () => setTimeout(tick, 5000);
    img.src = url;
  };
  tick();
}

// ---- 발사 ----
$('#go').onclick = async () => {
  const status = $('#status'); status.classList.remove('err'); $('#result').innerHTML = '';
  // 카드뉴스(5) = /api/compose (이미지 + 텍스트, 1080×1350)
  if (APP === '5') {
    const clines = ($('#lines').value || '').split('\n').map(s => s.trim()).filter(Boolean);
    if (!IMG_B64) { status.textContent = '이미지를 선택해줘'; status.classList.add('err'); return; }
    if (!clines.length) { status.textContent = '텍스트를 입력해줘'; status.classList.add('err'); return; }
    $('#go').disabled = true; status.textContent = '발사 중…';
    try {
      const res = await fetch('/api/compose', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ imageB64: IMG_B64, name: IMG_NAME, lines: clines }) });
      const j = await res.json();
      if (!res.ok || j.error) { status.textContent = '⚠️ ' + (j.error || res.status); status.classList.add('err'); }
      else poll(j.out);
    } catch (e) { status.textContent = '⚠️ 요청 실패: ' + e.message; status.classList.add('err'); }
    finally { $('#go').disabled = false; }
    return;
  }
  const params = buildParams();
  if (APP === '1' && !IMG_B64) { status.textContent = '배경 이미지를 선택해줘'; status.classList.add('err'); return; }
  $('#go').disabled = true; status.textContent = '발사 중…';
  try {
    const payload = { app: APP, params };
    if (APP === '1') { payload.imageB64 = IMG_B64; payload.name = IMG_NAME; }
    const res = await fetch('/api/thumb', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(payload) });
    const j = await res.json();
    if (!res.ok || j.error) { status.textContent = '⚠️ ' + (j.error || res.status); status.classList.add('err'); $('#go').disabled = false; return; }
    poll(j.out);
  } catch (e) {
    status.textContent = '⚠️ 요청 실패: ' + e.message; status.classList.add('err');
  } finally { $('#go').disabled = false; }
};

selApp('1');
</script>
</body>
</html>
