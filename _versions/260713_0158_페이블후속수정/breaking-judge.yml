name: breaking-judge
# 속보 2차 판정 — viewer/candidates.json 의 미판정 속보후보(breaking_candidate & 'breaking' 없음)를
# Claude(claude -p) 로 '긴급 속보?' 판정 → breaking=true/false 확정. 급발 사건만 push(사용자 확정).
# scrape 가 새 속보후보 뜰 때만 디스패치(매 15분 X) → 토큰 절약. self-gate: 후보 없으면 Claude 설치도 안 함.
# GITHUB_TOKEN 커밋은 워크플로를 재트리거하지 않음(루프 방지).

on:
  workflow_dispatch:
    inputs:
      account:
        description: '이 실행에 쓸 구독 OAuth 계정'
        type: choice
        default: MUTENO
        options:
          - NOMUTEFB
          - MUTENO
          - EMS1130G
      test_push:
        description: '테스트 알림 1발(구독자 전원·긴급 무관)'
        type: boolean
        default: false
      preview:
        description: '실제 긴급 포맷(News / (긴급)…) 미리보기 1발'
        type: boolean
        default: false
      safe_mode:
        description: 'judge --safe-mode 카나리아(CLAUDE.md 로드 스킵 = cache_w 절감 시험 · 기본 OFF)'
        type: boolean
        default: false
      group_canary:
        description: '사건 묶기(group_judge) 카나리아 1런(기본 OFF — §📰 플래그 절차 · 실측 후 env GROUP_ON 승격)'
        type: boolean
        default: false
      trans_canary:
        description: '외신 제목 번역(title_translate) 카나리아 1런(기본 OFF — §📰 플래그 절차 · 실측 후 env TRANS_ON 승격)'
        type: boolean
        default: false

env:
  GROUP_ON: '1'   # 사건 묶기(group_judge) 승격 완료(260702 카나리아 3차 실측: 판정 20/20·YES15/NO5·베네수↔일본 강진 등 템플릿 다른사건 정확 분리·rc=0·opus·~46s). 롤백 = 이 줄 제거(스텝 자동 OFF · scrape 게이트 gg 합산 줄도 짝 제거).
  TRANS_ON: '1'   # 외신 제목 번역 — gate_judge *편승*(별도 콜 0 · 같은 배치 줄에 번역 칸 추가 · title_ko 표시 전용). 승격 완료(260703 카나리아 run 28626025242 실측: 번역 106건 도장·불량 0·grade/cat 파싱 무손상[분포 {0:12,1:14,2:58,3:22}·cat구제 53]·rubric 해시 불변·rc=0·5.5분). 롤백 = 이 값 ''(편승·계상 자동 OFF · scrape 게이트 TRANS_ON 줄도 짝 제거).

concurrency:
  group: breaking-judge
  cancel-in-progress: false

permissions:
  contents: write   # candidates.json·pending·seen·push 원장 커밋
  actions: write    # 긴급 자동픽 → news-analyze 디스패치(GITHUB_TOKEN push 는 재귀방지로 못 깨움 → 명시 발동 · pick.yml 동일)

jobs:
  judge:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # 런당 상한 상향 25→45(운영자 260701 전수검증) — 속보 ≤2청크 + 경중 MAX_PER_RUN=200(≤5청크)+cat QUOTA=120(≤3청크). sonnet 청크당 ~2-3분 → ~35분 내 · 나머지는 재디스패치
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      # 게이트 — 미판정 속보후보 + 미채점 경중후보 수. 0이면 아래 Claude 설치·판정 스텝 전부 스킵(비용 0).
      # 외신 번역 편승분은 gate_judge --count 가 TRANS_ON 일 때 스스로 계상(needs_grading에 미번역 포함) = 별도 카운트 불요.
      - name: 미판정 후보 확인 (속보 + 경중 + 묶기)
        id: chk
        env:
          TRANS_ON: ${{ inputs.trans_canary && '1' || env.TRANS_ON }}   # 카나리아 1런 = 이 런만 번역 편승 ON(계상 포함)
        run: |
          nb=$(python3 .github/scripts/breaking_judge.py --count)
          ng=$(python3 .github/scripts/gate_judge.py --count)
          gj=0   # 사건 묶기 백로그 — canary/GROUP_ON일 때만 합산(OFF면 group 때문에 CLI 설치하는 낭비 0 · 260702 카나리아 1차가 pending=0에 막힌 것 보완)
          if [ "${{ inputs.group_canary }}" = "true" ] || [ "${GROUP_ON}" = "1" ]; then
            gj=$(python3 .github/scripts/group_judge.py --count 2>/dev/null || echo 0)
          fi
          n=$((nb + ng + gj))
          echo "pending=$n" >> "$GITHUB_OUTPUT"
          echo "미판정: 속보 ${nb}건 · 경중 ${ng}건(번역 편승 포함) · 묶기 ${gj}건 (총 ${n})"

      - name: Setup Node
        if: steps.chk.outputs.pending != '0' || github.event.inputs.safe_mode == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Claude Code CLI
        if: steps.chk.outputs.pending != '0' || github.event.inputs.safe_mode == 'true'
        run: npm install -g @anthropic-ai/claude-code

      # 카나리아 self-test (safe_mode 디스패치 전용 · pending=0에도 실행) — 실 OAuth env에서 --safe-mode가
      # ① rc=0(인증 정상 = --bare와 달리 OAuth 유지) ② cache_creation 급락(CLAUDE.md 로드 스킵) 인지 A/B 실측.
      # 레포에 아무것도 안 씀(read-only). safe-mode가 OAuth로 실패하면 이 스텝이 exit 1 = 카나리아 실패 가시화.
      - name: --safe-mode 카나리아 self-test
        if: github.event.inputs.safe_mode == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then echo "::warning::OAuth 토큰 없음 — self-test 생략"; exit 0; fi
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          TOOLS="Write,Edit,NotebookEdit,Bash,Task,WebFetch,WebSearch,Read,Glob,Grep"
          P='판정: 다음 제목이 속보인가? "삼성전자 2분기 실적 발표" — 오직 YES 또는 NO로만 답하라.'
          echo "=== normal 모드 (CLAUDE.md 로드) ==="
          printf '%s' "$P" | claude -p --model claude-sonnet-5 --output-format json --disallowedTools "$TOOLS" --max-turns 1 > /tmp/n.json 2>/tmp/n.err || true
          echo "=== --safe-mode (CLAUDE.md 스킵) ==="
          printf '%s' "$P" | claude -p --safe-mode --model claude-sonnet-5 --output-format json --disallowedTools "$TOOLS" --max-turns 1 > /tmp/s.json 2>/tmp/s.err || true
          python3 - <<'PY'
          import json
          def rd(p):
            try: return json.load(open(p))
            except Exception as e: return {"_load_err": str(e)}
          n, s = rd('/tmp/n.json'), rd('/tmp/s.json')
          nu, su = n.get('usage',{}), s.get('usage',{})
          ncw, scw = nu.get('cache_creation_input_tokens'), su.get('cache_creation_input_tokens')
          serr = s.get('is_error', True)
          print(f"normal : cache_creation={ncw} is_error={n.get('is_error')} result={ (n.get('result') or '')[:20]!r}")
          print(f"safe   : cache_creation={scw} is_error={serr} result={ (s.get('result') or '')[:20]!r}")
          if ncw and scw: print(f"→ cache_creation 절감 = {100*(1-scw/ncw):.1f}%")
          import sys
          if serr or scw is None:
            print("::error::--safe-mode 카나리아 실패 — 실 OAuth env에서 rc≠0/usage없음. 승격 금지, 롤백 유지.")
            open('/tmp/s.err').read() and print(open('/tmp/s.err').read()[:400])
            sys.exit(1)
          print("::notice::--safe-mode 카나리아 통과 — OAuth 정상(rc=0) + CLAUDE.md 로드 스킵 확인.")
          PY

      - name: 속보 판정 (claude -p)
        if: steps.chk.outputs.pending != '0'
        env:
          BREAKING_MODEL: claude-sonnet-5   # 룰북 이진 분류 = sonnet-5 운영(opus 대비 쿼터 대폭↓·다층 게이트가 오탐 흡수 · effort 미사용=코드 기본 · 260630 평의회). 롤백=이 줄 제거(코드 기본 opus 복귀).
          BREAKING_SAFE: '1'   # 승격 완료(260701 카나리아 실측 rc=0·OAuth 정상·cache_creation 53,855→1,512 −97.2%): 자동/예약 judge 런도 --safe-mode(CLAUDE.md 로드 스킵). 롤백=이 줄을 '' 또는 제거(코드 기본 OFF).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'NOMUTEFB' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_NOMUTEFB }}   # 서브1 폴오버(활성 다음 우선순위 · 체인 MUTENO→NOMUTEFB→EMS1130G→MUTENONA)
          CLAUDE_CODE_OAUTH_TOKEN_ALT2: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'MUTENO' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENO }}   # 서브2 폴오버(체인 3번째)
          CLAUDE_CODE_OAUTH_TOKEN_ALT3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENONA }}   # 서브3 폴오버(체인 실꼬리 = 항상 MUTENONA · 앞 3계정 소진 후)
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN 비어있음 — 판정 생략(다음 런 재시도)"; exit 0
          fi
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          python3 .github/scripts/breaking_judge.py

      - name: 경중 채점 (claude -p · AI 게이트 · 외신 번역 편승)
        if: steps.chk.outputs.pending != '0'
        env:
          GATE_MODEL: claude-sonnet-5   # 룰북 0~3 분류 = sonnet-5 운영(빈도·쿼터 1위 호출 · gradeW완화·cat_force·grade게이트가 경계오차 흡수 · effort 미사용=코드 기본 · 260630 평의회). 롤백=이 줄 제거(코드 기본 opus 복귀).
          TRANS_ON: ${{ inputs.trans_canary && '1' || env.TRANS_ON }}   # 외신 제목 번역 편승(같은 콜 · 번역도 sonnet 급 = 운영자 260703 "번역도 소넷"). 카나리아 = trans_canary 1런.
          GATE_MAX_PER_RUN: "200"   # 한 런 노출권 경중 채점 상한 80→200(운영자 260701 전수검증 — 미채점 백로그 소진·수집함 노출건 다 AI 검증). sonnet 빠름·timeout 45로 커버. 롤백=이 줄 제거(코드 기본 80).
          GATE_CAT_QUOTA: "80"      # 한 런 cross-2 cat 재판별 상한 120→80(운영자 260713 · 백로그 만재 시 가시 grade 노출권이 80으로 역차별되던 우선순위 역전 교정[평의회3] — surf 120/cat 80 = 가시 우선 복원 · cat 백로그 재적체 시 재상향 검토). 롤백=이 줄 제거(코드 기본 40).
          GATE_SAFE: '1'   # 승격 완료(260701 카나리아 실측 rc=0·OAuth 정상·cache_creation 53,855→1,512 −97.2%): 자동/예약 judge 런도 --safe-mode(CLAUDE.md 로드 스킵). 롤백=이 줄을 '' 또는 제거(코드 기본 OFF).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'NOMUTEFB' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_NOMUTEFB }}   # 서브1 폴오버(활성 다음 우선순위 · 체인 MUTENO→NOMUTEFB→EMS1130G→MUTENONA)
          CLAUDE_CODE_OAUTH_TOKEN_ALT2: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'MUTENO' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENO }}   # 서브2 폴오버(체인 3번째)
          CLAUDE_CODE_OAUTH_TOKEN_ALT3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENONA }}   # 서브3 폴오버(체인 실꼬리 = 항상 MUTENONA · 앞 3계정 소진 후)
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN 비어있음 — 채점 생략(다음 런 재시도)"; exit 0
          fi
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          python3 .github/scripts/gate_judge.py

      # 사건 묶기 판정 — 토큰 클러스터링서 갈라진 같은 사건을 AI가 확정(YES→group_id → 뷰어 자동 병합·mergeDecorate 파이프).
      # ⚠️ 카나리아 OFF 기본(§📰 라이브 플래그 절차): dispatch inputs.group_canary=true 단건 실측 → 통과 시 env GROUP_ON: '1' 승격.
      # 모델 = opus 4.8(사건 동일성 = 정밀 판정·autopick _ai_same 선례 · 운영자 260702 "탄탄하게") · 도장 캐시 = 같은 그룹 재판정 0.
      - name: 사건 묶기 판정 (claude -p · group_judge)
        if: steps.chk.outputs.pending != '0' && (inputs.group_canary || env.GROUP_ON == '1')
        env:
          GROUP_SAFE: '1'   # judge류 공통 --safe-mode(§📰 · 판정은 stdin 룰북만 = CLAUDE.md 불필요)
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'NOMUTEFB' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_NOMUTEFB }}   # 서브1 폴오버(체인 MUTENO→NOMUTEFB→EMS1130G→MUTENONA)
          CLAUDE_CODE_OAUTH_TOKEN_ALT2: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'MUTENO' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENO }}   # 서브2 폴오버(체인 3번째)
          CLAUDE_CODE_OAUTH_TOKEN_ALT3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENONA }}   # 서브3 폴오버(체인 실꼬리 = 항상 MUTENONA · 앞 3계정 소진 후)
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN 비어있음 — 사건 묶기 생략(다음 런 재시도)"; exit 0
          fi
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN
          python3 .github/scripts/group_judge.py

      - name: Commit (breaking 확정)
        if: steps.chk.outputs.pending != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add viewer/candidates.json 2>/dev/null || true
          git add metrics 2>/dev/null || true   # 토큰 계측 shard(claude_meter·gate/breaking) 동반 커밋 — 있을 때만
          if git diff --cached --quiet; then echo "변동 없음 — 커밋 생략"; exit 0; fi
          git commit -m "AI 판정: 속보 breaking · 경중 grade 갱신"
          for i in 1 2 3 4; do
            git pull --rebase -X theirs origin main && git push origin HEAD:main && exit 0
            git rebase --abort 2>/dev/null || true
            sleep $((2**i))
          done
          echo "::error::breaking 판정 push 실패"; exit 1

      # 긴급(breaking AND grade≥2) 새 사건 → 구독자에게 웹푸시(앱 꺼도 옴). 비치명·dedup(push/sent.json).
      - name: 긴급 웹푸시 발송 (pywebpush)
        if: steps.chk.outputs.pending != '0' || github.event.inputs.test_push == 'true' || github.event.inputs.preview == 'true'
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          python3 -m pip install --quiet --break-system-packages pywebpush || { echo "::warning::pywebpush 설치 실패 — 발송 생략"; exit 0; }
          if [ "${{ github.event.inputs.test_push }}" = "true" ]; then
            python3 .github/scripts/push_send.py --test
          elif [ "${{ github.event.inputs.preview }}" = "true" ]; then
            python3 .github/scripts/push_send.py --notify "News" "(긴급) 이런 식으로 긴급 속보가 옵니다 — 미리보기"
          else
            python3 .github/scripts/push_send.py
          fi

      - name: Commit (push 원장·구독 정리)
        if: steps.chk.outputs.pending != '0' || github.event.inputs.test_push == 'true' || github.event.inputs.preview == 'true'
        run: |
          if [ -z "$(git status --porcelain push/)" ]; then echo "push 변동 없음 — 커밋 생략"; exit 0; fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add push/
          git commit -m "push: 발송 원장·구독 정리"
          for i in 1 2 3 4; do
            git pull --rebase -X theirs origin main && git push origin HEAD:main && exit 0
            git rebase --abort 2>/dev/null || true
            sleep $((2**i))
          done
          echo "::error::push 원장 커밋 실패"; exit 1

      # ── 긴급 grade≥3 자동 픽 → pending 적재 + news-analyze 발동(자동 요약·카드). 운영자 260622. ──
      # ⚠️ 자동 과금 경로 — 픽 1건 = Opus 분석 1콜(구독) + Gemini 썸네일 2장($). 보수적 다중 가드는
      #    scraper/auto_pick_breaking.py 안(grade≥3·cross≥2·<4h[first_seen 기준]·사건당1회 다중키 영구dedup·런2/일8 상한 · PICK_URL=c.url 로 수동픽과 dedup 정합).
      - name: 긴급 grade≥3 자동 픽
        if: steps.chk.outputs.pending != '0'
        id: autopick
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets[format('CLAUDE_CODE_OAUTH_TOKEN_{0}', inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO')] }}
          CLAUDE_CODE_OAUTH_TOKEN_ALT: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'NOMUTEFB' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_NOMUTEFB }}   # 서브1 폴오버(활성 다음 우선순위 · 체인 MUTENO→NOMUTEFB→EMS1130G→MUTENONA)
          CLAUDE_CODE_OAUTH_TOKEN_ALT2: ${{ (inputs.account || vars.ACTIVE_ACCOUNT || 'MUTENO') == 'MUTENO' && secrets.CLAUDE_CODE_OAUTH_TOKEN_EMS1130G || secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENO }}   # 서브2 폴오버(체인 3번째)
          CLAUDE_CODE_OAUTH_TOKEN_ALT3: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN_MUTENONA }}   # 서브3 폴오버(체인 실꼬리 = 항상 MUTENONA · 앞 3계정 소진 후)
        run: |
          set -o pipefail   # 기본 셸은 -e만(pipefail OFF) → 아래 tee 파이프가 스크립트 크래시를 green으로 삼키던 것 차단(평의회3 · 런로그 실측)
          unset ANTHROPIC_API_KEY ANTHROPIC_AUTH_TOKEN   # 구독 OAuth만 사용(api-key 충돌 차단 · 판정 스텝과 동일)
          python3 -m pip install --quiet --break-system-packages feedparser requests || { echo "::warning::deps 설치 실패 — 자동픽 생략"; echo "picked=0" >> "$GITHUB_OUTPUT"; exit 0; }   # 24.04 PEP-668 = --break-system-packages 필수(push 스텝과 동일 · 없으면 자동픽 무성과 green)
          python3 scraper/auto_pick_breaking.py | tee /tmp/autopick.out
          echo "picked=$(sed -n 's/^PICKED=//p' /tmp/autopick.out | tail -1)" >> "$GITHUB_OUTPUT"

      - name: 자동픽 커밋 & 분석 발동
        if: steps.chk.outputs.pending != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # ⚠️ metrics 동반 필수(260702 유실 근인): 자동픽의 AI 중복판정(run_claude source=autopick)이 이 런의
          #    metrics/usage shard(위 Commit 스텝이 이미 커밋한 추적파일)에 계측 1줄을 append → add 목록에 metrics가
          #    없으면 unstaged가 남아 아래 pull --rebase가 "You have unstaged changes"로 4회 전부 실패 = 픽 유실.
          #    (실측: 24h 내 선행 픽이 있어 AI 콜이 뜬 픽은 전부 미반영·런은 green — 260702 윤석열 상고심·김명수 기소)
          if [ -z "$(git status --porcelain pending scraper/seen_urls.txt push/autopick.json push/autopick_events.json metrics)" ]; then
            echo "자동픽 변동 없음 — 커밋 생략"; exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pending scraper/seen_urls.txt push/autopick.json push/autopick_events.json   # 'pending'은 pick_pending._clear_stale_failed의 pending/failed/* 삭제까지 스테이징(제2 오염원 — 목록서 pending 빼면 재발 · 평의회1)
          git add metrics 2>/dev/null || true   # 계측 shard 동반 커밋(위 ⚠️ · judge Commit 스텝의 'git add metrics' 패턴과 동일)
          if git diff --cached --quiet; then echo "스테이지 변화 없음 — 커밋 생략"; exit 0; fi   # 스테이지 0인데 commit 치면 rc≠0 = 오탐 red(judge Commit 스텝과 대칭 · 평의회3)
          git commit -m "auto-pick: 긴급 grade≥3 자동 분석 (픽 ${{ steps.autopick.outputs.picked }}건)"
          pushed=0
          for i in 0 1 2 3; do
            [ "$i" -gt 0 ] && sleep $((2**i))
            git pull --rebase --autostash -X ours origin main && git push origin HEAD:main && { pushed=1; break; }
            git rebase --abort 2>/dev/null || true
          done
          # ⚠️ pending·seen·ledger = 한 커밋(원자) → push 실패면 셋 다 main 미반영 = 분석 발동해도 news-analyze가 pending 못 봄(무과금)
          #    + 다음 런 재평가(self-heal·로컬 커밋은 runner 종료 시 폐기). ∴ push 성공했을 때만 발동(무의미 no-op 디스패치 회피).
          #    실패는 red 표면화(exit 1 · judge Commit 스텝과 동일) — 옛 warning+green이 260625~0702 유실을 가렸음.
          if [ "$pushed" != 1 ]; then echo "::error::자동픽 커밋 push 실패 — 분석 미발동(pending 미반영·다음 런 재평가)"; exit 1; fi
          # 실제 픽이 있을 때만 분석 발동(GITHUB_TOKEN push 는 재귀방지로 news-analyze 못 깨움 → 명시 디스패치 · pick.yml 패턴)
          if [ "${{ steps.autopick.outputs.picked }}" != "0" ] && [ -n "${{ steps.autopick.outputs.picked }}" ]; then
            ok=0; for i in 1 2 3; do
              gh workflow run news-analyze.yml && { ok=1; break; }
              echo "::warning::news-analyze 디스패치 실패 — 재시도 $i"; sleep $((i*3))
            done
            [ "$ok" = 1 ] || echo "::warning::news-analyze 디스패치 3회 실패 — pending 적재됨(다음 흡수)"
          fi
