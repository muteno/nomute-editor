name: conv-make

# 뷰어 변환 폼(Pages Function /api/conv)이 발사 — 단일 잡: 영상(URL/업로드) → ffmpeg{트림·비율 크롭·스케일·fps(60 보간/다운)}
#   → R2 conv_res/<id>/out.mp4 → viewer/conv_out/<id>/video.json 커밋(폼이 폴링). LLM 0콜 · 순수 ffmpeg. 골격 = track-make 미러.
on:
  workflow_dispatch:
    inputs:
      id:
        description: '작업 id(타임스탬프-hex6)'
        type: string
      url:
        description: '영상 URL(yt-dlp)'
        type: string
        default: ''
      file:
        description: '업로드 영상 파일 경로(uploads/<id>/src.*)'
        type: string
        default: ''
      up_branch:
        description: '업로드 일회용 브랜치(up-<id> · 빈값=main 커밋 경로) — ly/track 동일'
        type: string
        default: ''
      opts:
        description: '변환 옵션 JSON {"fps":"keep|60i|30|24","ar":"orig|9:16|1:1|4:5|16:9","pos":0..1,"t0":s,"t1":s,"res":"orig|1080|720"}'
        type: string
        default: '{}'

concurrency:
  group: conv-make-${{ inputs.id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  conv:
    runs-on: ubuntu-latest
    timeout-minutes: 38   # 60fps 보간 예산 25분(코드 INTERP_BUDGET) + 다운로드·인코딩·업로드 여유 — 무한 행만 차단(§9)
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 변환 환경 (ffmpeg+yt-dlp)
        timeout-minutes: 10
        uses: ./.github/actions/runner-setup
        with:
          setup: apps/conv/setup.sh
          apt: ffmpeg

      - name: 소스 확보 (URL)
        if: ${{ inputs.url != '' }}
        timeout-minutes: 8   # yt-dlp 행 차단 — 전처리가 길어지면 FF_TIMEOUT 정직-에러 창(잡 캡 전 발화)이 줄어드는 결함 완화(평의회2)
        env:
          URL: ${{ inputs.url }}
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          set -e
          COOKIES=""
          if [ -n "$YT_COOKIES" ]; then printf '%s\n' "$YT_COOKIES" > /tmp/ck.txt; COOKIES="--cookies /tmp/ck.txt"; fi
          python3 -m yt_dlp -f "bv*[height<=1920]+ba/b" --merge-output-format mp4 --no-playlist --socket-timeout 30 $COOKIES -o "/tmp/src.%(ext)s" "$URL" \
            || { echo "영상 다운로드 실패 — 사이트가 봇을 막았을 수 있어. 파일 업로드로 해줘." > /tmp/conv_err.txt; echo "::error::yt-dlp 실패: $URL"; exit 1; }
          SRC="$(ls /tmp/src.* 2>/dev/null | head -1 || true)"
          [ -n "$SRC" ] || { echo "영상 다운로드 실패 — 파일 업로드로 해줘." > /tmp/conv_err.txt; echo "::error::다운 산출 없음"; exit 1; }
          echo "CONV_SRC=$SRC" >> "$GITHUB_ENV"

      - name: 소스 확보 (업로드 파일)
        if: ${{ inputs.file != '' }}
        env:
          FILE: ${{ inputs.file }}
          UP_BRANCH: ${{ inputs.up_branch }}
        run: |
          set -e
          if [ -n "$UP_BRANCH" ]; then
            case "$UP_BRANCH" in up-*) ;; *) echo "::error::up_branch는 up-* 만 허용: $UP_BRANCH"; exit 1;; esac
            git fetch origin "$UP_BRANCH" --depth=1 || { echo "업로드 파일이 유실됐어 — 다시 올려줘." > /tmp/conv_err.txt; echo "::error::업로드 브랜치 fetch 실패: $UP_BRANCH"; exit 1; }
            EXT="${FILE##*.}"
            git show "FETCH_HEAD:$FILE" > "/tmp/upsrc.$EXT" || { echo "업로드 파일 회수 실패 — 다시 올려줘." > /tmp/conv_err.txt; echo "::error::브랜치서 파일 회수 실패: $FILE"; exit 1; }
            FILE="/tmp/upsrc.$EXT"
          fi
          [ -f "$FILE" ] || { echo "업로드 파일이 없어 — 다시 올려줘." > /tmp/conv_err.txt; echo "::error::업로드 파일 없음: $FILE"; exit 1; }
          echo "CONV_SRC=$FILE" >> "$GITHUB_ENV"

      - name: 변환 (ffmpeg → R2 → video.json)
        timeout-minutes: 33   # 스텝 자체 캡 — 잡 38분 하드캔슬 전에 failure() error.log 표면화(track 문법)
        env:
          IN_ID: ${{ inputs.id }}
          CONV_OPTS: ${{ inputs.opts }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -e
          [ -n "$IN_ID" ] || { echo "::error::id 없음"; exit 1; }
          case "$IN_ID" in *[!0-9a-f-]*) echo "::error::잘못된 id"; exit 1;; esac
          [ -n "${CONV_SRC:-}" ] || { echo "영상 입력이 없어 — URL이나 파일을 넣어줘." > /tmp/conv_err.txt; echo "::error::CONV_SRC 빈값"; exit 1; }
          python3 apps/conv/conv_run.py "$IN_ID" "$CONV_SRC"

      - name: 실패 기록(error.log) — 프론트가 폴링해 즉시 표시
        if: failure()
        env:
          IN_ID: ${{ inputs.id }}
        run: |
          [ -n "$IN_ID" ] || exit 0
          case "$IN_ID" in *[!0-9a-f-]*) exit 0;; esac
          mkdir -p "viewer/conv_out/${IN_ID}"
          if [ -s /tmp/conv_err.txt ]; then cp /tmp/conv_err.txt "viewer/conv_out/${IN_ID}/error.log";
          else echo "변환 실패 — Actions 로그를 확인해줘." > "viewer/conv_out/${IN_ID}/error.log"; fi
          echo "error.log: $(cat viewer/conv_out/${IN_ID}/error.log)"

      - name: Commit output
        if: always()
        env:
          IN_ID: ${{ inputs.id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          [ -n "$IN_ID" ] || { echo "id 없음 — 커밋 스킵"; exit 0; }
          case "$IN_ID" in *[!0-9a-f-]*) echo "잘못된 id — 커밋 스킵"; exit 0;; esac
          git config user.name "nomute-bot"
          git config user.email "bot@nomute.local"
          git rm -r "uploads/${IN_ID}" 2>/dev/null || true   # 업로드 원본 = R2/산출 후 불필요(git 비대화 방지 · ly 동일)
          git add "viewer/conv_out/${IN_ID}" 2>/dev/null || true
          git commit -m "conv: ${IN_ID} 변환 출력" || { echo "커밋할 것 없음"; exit 0; }
          pushed=0
          for i in 1 2 3 4 5; do
            if git fetch origin "$BRANCH" && git rebase "origin/$BRANCH" && git push origin "HEAD:$BRANCH"; then pushed=1; break; fi
            git rebase --abort 2>/dev/null || true; sleep $((i*3))
          done
          [ "$pushed" = 1 ] || { echo "::error::push ${BRANCH} 5회 실패 — 출력 유실"; exit 1; }

      - name: 업로드 브랜치 정리
        if: ${{ always() && inputs.up_branch != '' }}
        env:
          UP_BRANCH: ${{ inputs.up_branch }}
        run: |
          case "$UP_BRANCH" in up-*) ;; *) echo "up-* 아님 — 스킵"; exit 0;; esac
          git push origin --delete "$UP_BRANCH" || echo "브랜치 정리 실패(무해 — 수동 정리 대상): $UP_BRANCH"
