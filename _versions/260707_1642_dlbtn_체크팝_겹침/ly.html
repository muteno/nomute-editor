<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<!-- 전역 버튼 탭 햅틱 = 폐지(운영자 260706 5차 "PIN 입력 빼고는 진동 넣지 마" — 진동은 index PIN 키패드만) --><!-- 부모(index)와 color-scheme 일치 필수 — 불일치면 크로미움이 투명 iframe에 불투명 흰 캔버스 강제 → 글래스 전부 회색 파손(운영자 260705 실측 · index color-scheme dark 도입과 한 쌍) -->
<title>영상 자막 생성기</title>
<link rel="stylesheet" href="tokens.css">   <!-- 공유 구조토큰(§🎨 STAGE3·index :root 파생·색 제외). 인라인 :root가 팔레트 오버라이드 -->
<style>
  :root { --bg:#121212;   /* 스포티파이 블랙(중립)·운영자 260623 */ --pan:#16171a; --line:#2a2c31; --fg:#eef7f0; --mut:#8fa697; --accent:#00EED2; --accent-rgb:0,238,210;
    --danger:#e23b2a; --danger-rgb:226,59,42;   /* 역할색 danger = 브랜드 유일 레드(index 동일·감사 260704) */   /* index :root 동기 — raw rgba(0,238,210) 박기 차단(분신술 4·8) */ --accent-dim:rgba(var(--accent-rgb),.13); --on-accent:#032322;
    --accent-5:#0FFD02; }   /* 콘텐츠 그린(index --accent-5 값 계승·track.html 로컬 계승 관례 동형) = 번인 키워드 실색 미리보기 전용 — :root 정본 정의는 legacy_green 게이트 미계수·컴포넌트는 var()만 */   /* --press-* = tokens.css 상속(인라인 이중정의 제거·감사 260704·comp 기준·회귀0) */
  @media (prefers-reduced-motion:reduce){ :root{ --press-pico:1; --press-xs:1; --press-s:1; --press-m:1; --press-l:1; } }   /* 눌림 토큰 무효화 = 로컬(tokens.css엔 없음·comp 기준) */
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }   /* 모바일 기본 하늘색 탭 하이라이트 박스 제거 = index:78·thumb:15 전역 계승(체크박스·라벨 탭 시 시안 박스 차단·운영자 260629) */
  /* 키보드 포커스 링 — 도구앱 접근성 P0(분신술 10·규약 §8 "2px accent 링") · :focus-visible라 마우스엔 안 뜸 */
  button:focus-visible, a:focus-visible, [tabindex]:focus-visible, [role=button]:focus-visible, label.file:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  /* 스크롤바 = 반투명 검정(중립) — 뉴스 뷰어 통일(index 계승 · 운영자 260626) */
  html { scrollbar-width:thin; scrollbar-color:rgba(0,0,0,.45) transparent; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(0,0,0,.42); border-radius:999px;
    border:2px solid var(--bg); background-clip:padding-box; }
  ::-webkit-scrollbar-thumb:hover { background:rgba(0,0,0,.6); background-clip:padding-box; }
  body { margin:0; background:radial-gradient(125% 70% at 50% -8%, rgba(var(--accent-rgb),.06), transparent 55%) fixed, var(--bg); color:var(--fg); font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:600px; margin:0 auto; padding:18px 16px 70px; }
  h1 { font-size:18px; margin:6px 0 4px; } h1 b { color:var(--accent); }
  .sub { color:var(--mut); font-size:13px; margin:0 0 16px; }
  label { display:block; font-size:var(--fs-label); color:var(--fg); margin:14px 0 6px; }   /* 비-소머리 라벨 베이스(.file 등) · 소머리는 .fl(흰색800+형광블릿) */
  label.fl { font-weight:var(--fw-x); color:var(--fg); }   /* 소머리 = 흰색(--fg)·800(--fw-x) = 뉴스 .cref-lbl 표준 형광통일(운영자 260629) */
  label.fl::before { content:'• '; color:var(--accent); font-weight:var(--fw-b); }   /* 블릿 = 형광(--accent)·700(--fw-b) · 뉴스 정본 content:'• ' 동일 */
  label:first-of-type { margin-top:0; }
  textarea { width:100%; min-height:150px; padding:12px; background:#0e0f11; border:1px solid var(--line); border-radius:var(--r-s); color:var(--fg); font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; resize:none; }   /* 리사이즈 핸들 제거(운영자 260629 · 전역) */
  input[type=text], input[type=url] { width:100%; padding:12px; background:#0e0f11; border:1px solid var(--line); border-radius:var(--r-s); color:var(--fg); font:inherit; }
  textarea:focus, input:focus { border-color:rgba(var(--accent-rgb),.35); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.08); outline:none; }
  /* 붙여넣기 = 2A 동그라미, URL 입력칸 상단 우측 테두리에 중앙정렬 걸침(뉴스요약·썸네일과 통일 · 운영자 260625) */
  .urlwrap { position:relative; }
  .urlclip { position:absolute; top:0; right:14px; transform:translateY(-50%); display:grid; place-items:center; width:26px; height:26px; padding:0; z-index:5; opacity:.6;   /* URL 복사/붙여넣기 = opacity 60%(운영자 260625) */
    border-radius:50%; border:1px solid rgba(255,255,255,.17); background:rgba(26,28,26,.3); color:var(--mut); cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
    -webkit-backdrop-filter:blur(13px) saturate(1.3); backdrop-filter:blur(13px) saturate(1.3); -webkit-tap-highlight-color:transparent; transition:transform .12s, color .15s, border-color .15s; }   /* G1 글래스모피즘(260625) */
  .urlclip svg { display:block; width:13px; height:13px; }
  .urlclip::before { content:""; position:absolute; inset:-8px; }
  .urlclip:hover { color:var(--fg); border-color:rgba(255,255,255,.27); }
  .urlclip:active { transform:translateY(-50%) scale(var(--press-s,.85)); color:var(--accent); border-color:rgba(var(--accent-rgb),.6); }
  .urlclip.ok { color:var(--accent); border-color:rgba(255,255,255,.14); }
  .urlclip.url-pp { right:46px; }                       /* 붙여넣기 = 지우개 좌측(46) · 운영자 260627 */
  .urlclip.url-cp { right:78px; }                       /* 복사 = 붙여넣기 좌측(78·내용 있을 때만) = thumb/index 3종 분리 통일(운영자 260628) */
  .url-hide { display:none; }                           /* 내용 비면 복사 숨김(붙여넣기·지우개는 유지) */
  .url-erase { right:14px; }                            /* 지우개 = 최우측 · 누르면 입력 비움→~10초 되돌리기 */
  .url-erase.url-off { opacity:.3; pointer-events:none; }   /* 빈칸 = 흐리게·비활성 */
  .url-erase.url-undo { color:var(--fg); border-color:rgba(255,255,255,.34); }   /* 지움 직후 ~10초 = 되돌리기(흰 픽토그램·또렷한 링) */
  /* 붙여넣기 폴백 모달 = readText 막힌 환경(모바일 도구 iframe)에서 '길게 눌러 붙여넣기' (thumb/index 통일 기틀·운영자 260628) · dialog=top-layer */
  .pastefb { border:none; outline:none; background:transparent; max-width:100vw; max-height:100dvh; width:auto; padding:0; margin:auto; }
  .pastefb::backdrop { background:rgba(0,0,0,.55); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); }
  .pastefb-box { width:min(360px,90vw); background:linear-gradient(165deg,#14160f,#0c0f0c); border:1px solid var(--line); border-radius:var(--r-l); padding:16px; display:flex; flex-direction:column; gap:12px; box-shadow:0 16px 48px rgba(0,0,0,.55); }
  .pastefb-msg { font-size:13px; color:var(--fg); line-height:1.5; } .pastefb-msg b { color:var(--accent); }
  .pastefb-ta { width:100%; box-sizing:border-box; min-height:90px; resize:none; padding:10px 12px; border:1px solid var(--line); border-radius:10px; background:rgba(255,255,255,.05); color:var(--fg); font:inherit; font-size:14px; }
  .pastefb-ta:focus { border-color:rgba(var(--accent-rgb),.4); outline:none; }
  .pastefb-row { display:flex; gap:8px; justify-content:flex-end; }
  .pastefb-btn { padding:8px 16px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.05); color:var(--fg); font:inherit; font-size:13px; font-weight:700; cursor:pointer; }
  .pastefb-ok { color:var(--accent); border-color:rgba(var(--accent-rgb),.4); background:rgba(var(--accent-rgb),.1); }
  textarea::placeholder, input::placeholder { color:var(--mut); }
  .paid { color:var(--mut); font-size:11px; font-weight:400; }
  .orsep { text-align:center; color:var(--mut); font-size:12px; margin:13px 0; }
  .divider { border:none; border-top:1px solid var(--line); margin:20px 0 6px; }
  .file { display:block; padding:12px; border:1px dashed transparent; border-radius:var(--r-s); text-align:center; color:var(--accent); cursor:pointer; background:transparent; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; transition:transform .12s ease, background .15s ease, border-color .15s ease, color .15s ease; }   /* 빈 상태 = 플레이트 없는 픽토그램만(강조색·.covimg 참조·운영자 260627) */
  .file svg { width:26px; height:26px; display:block; transition:transform .14s cubic-bezier(.2,.9,.3,1.25); }   /* 파일 픽토그램(빈 상태) */
  .file:active { background:transparent; }   /* 누름 = 박스 전체 칠하기 금지 → 픽토그램만 축소(운영자 260628) */
  .file:active svg { transform:scale(var(--press-xs,.8)); }   /* 픽토그램만 액티브(블록 전체 X · .rmin:active svg 패턴 계승) */
  .file.has { color:var(--accent); border-color:var(--accent); border-style:solid; animation:fileIn .42s ease; }   /* 파일 들어옴 = 솔리드 강조 테두리로 프레임 + 팝+글로우 확인 모션(파일명 표시·가독) */
  @keyframes fileIn { 0% { transform:scale(.965); box-shadow:0 0 0 0 rgba(var(--accent-rgb),.45); } 45% { transform:scale(1.025); box-shadow:0 0 0 6px rgba(var(--accent-rgb),.10); } 100% { transform:scale(1); box-shadow:0 0 0 0 rgba(var(--accent-rgb),0); } }
  @media (prefers-reduced-motion:reduce) { .file.has { animation:none; } }
  /* 파일 업로드(좌·넓게) + 생성(우·짧게) 한 줄 가로 분할 — 풀폭 스택 대신 */
  .filerow { display:flex; gap:10px; align-items:stretch; margin-top:6px; }
  .filerow .file { flex:1.4 1 0; min-width:0; margin:0; display:flex; align-items:center; justify-content:center; overflow:hidden; white-space:nowrap; }
  .filerow .go { flex:1 1 0; width:auto; margin-top:0; white-space:nowrap; }
  #fileTxt { display:flex; align-items:center; justify-content:center; min-width:0; max-width:100%; }   /* 배지↔파일명 세로중앙 정렬(flex) */
  #fileTxt .fname { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
  /* 파일타입 색배지 = 카테고리(경제·사회) 칩 계승: 검정 반투명 글래스 + 타입별 글 색만 바꿈 */
  .ftype { display:inline-block; flex:none; font-size:11px; font-weight:800; letter-spacing:-.2px; line-height:1;
    padding:4px 9px; border-radius:999px; margin-right:7px; background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.1);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
  /* 업로드 게이지 = 뉴스요약 진행바(.prog .seg.cur)의 움직이는 shine 계승(실패 빗금 X) */
  .lybar { height:7px; border-radius:999px; background:rgba(var(--accent-rgb),.16); position:relative; overflow:hidden; margin:10px 0 2px; }
  .lybar::after { content:''; position:absolute; top:0; bottom:0; left:0; width:45%; border-radius:999px;
    background:linear-gradient(90deg,transparent,rgba(var(--accent-rgb),.85),transparent);
    transform:translateX(-120%); animation:lyshine 1.35s linear infinite; will-change:transform; }
  @keyframes lyshine { to { transform:translateX(360%); } }
  @media (prefers-reduced-motion:reduce){ .lybar::after { animation:none; } }
  /* 생성 버튼 = 카드/썸네일 생성 버튼과 통일 = 글래스 고스트(.mkbtn 정합·운영자 260622) */
  .go { width:100%; margin-top:16px; padding:14px; background:rgba(255,255,255,.05); color:var(--accent); border:1px solid var(--line); border-radius:999px; font-weight:800; font-size:14px; font-family:inherit; cursor:pointer; position:relative; overflow:hidden; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; transition:transform .12s ease, background .15s ease, border-color .15s ease; }
  /* .go:hover 제거 — 메인 버튼(index .mkbtn) 계승: hover 전경 fill 없음·:active만 피드백(운영자 260629 "마우스 올리면 버튼 전경 뜸" 차단 + 터치 stuck-hover 동시 차단) */
  .go:active { transform:scale(.955); background:rgba(var(--accent-rgb),.08); border-color:rgba(var(--accent-rgb),.35); }
  .go:disabled { opacity:.5; cursor:default; transform:none; }
  .go svg { width:20px; height:20px; vertical-align:-5px; }   /* 접수 체크(CHECK_SVG 14px 속성) 버튼 스케일 승격 — 픽토그램 단독 교체(§📐 텍스트·SVG 공존 금지) */
  .go.shake { animation:edshake .42s; }   /* 내용 미입력 = 좌우 흔들림(thumb .go 통일·운영자 260622) */
  @media (prefers-reduced-motion:reduce) { .go.shake { animation:none; } }
  .go.err { background:rgba(var(--danger-rgb),.14); color:var(--danger); border-color:var(--danger); }   /* 미입력 메시지를 버튼 안에 빨강 액티브로 표시(thumb .go.err 통일·운영자 260622) */
  @keyframes edshake { 0%,100%{transform:translateX(0)} 18%{transform:translateX(-4px)} 38%{transform:translateX(4px)} 58%{transform:translateX(-3px)} 78%{transform:translateX(2px)} }
  .go.firing { color:var(--on-accent); pointer-events:none; opacity:1;
    background:linear-gradient(var(--accent),var(--accent)) left/0% 100% no-repeat, linear-gradient(var(--accent-dim),var(--accent-dim));
    animation:goFill .72s var(--gauge-ease) forwards; }   /* 누르면 버튼 전체를 초록이 좌→우로 채움(구성도 .send.is-fire 정본·260622) */
  @keyframes goFill { from { background-size:0% 100%, 100% 100%; } to { background-size:100% 100%, 100% 100%; } }   /* 0%(퍼센트)+명시 from = 부드러운 보간(0 길이면 끝에서 툭 튐) */
  @media (prefers-reduced-motion:reduce) { .go.firing { animation-duration:.2s; } }
  .status { margin-top:16px; font-size:13px; color:var(--mut); white-space:pre-wrap; } .status.err { color:var(--danger); }
  .out { margin-top:18px; }
  .out h1.t { font-size:20px; color:var(--fg); margin:18px 0 6px; }
  .out h2 { font-size:16px; color:var(--accent); margin:18px 0 6px; }
  .out h3 { font-size:14px; color:var(--fg); margin:16px 0 6px; }
  .out p { margin:5px 0; color:var(--mut); word-break:break-word; }
  .out table { width:100%; border-collapse:collapse; margin:8px 0; font-size:13px; }
  .out td, .out th { border:1px solid var(--line); padding:6px 8px; text-align:left; color:var(--mut); }
  .code { position:relative; background:#0e0f11; border:1px solid var(--line); border-radius:10px; margin:8px 0 12px; }
  .code pre { margin:0; padding:13px; white-space:pre-wrap; word-break:break-word; font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; color:#eef7f0; }
  .code button { position:absolute; top:8px; right:8px; display:grid; place-items:center; width:30px; height:30px; padding:0;
    color:rgba(255,255,255,.92); background:rgba(8,15,11,.4); border:1px solid rgba(255,255,255,.14); border-radius:var(--r-s); cursor:pointer;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:transform .12s, background .15s, color .15s, border-color .15s; }   /* 캐러셀 .sbtn 글래스 아이콘 계승(§📋) */
  .code button svg { display:block; }
  .code button:hover { background:rgba(255,255,255,.16); }
  .code button:active { transform:scale(var(--press-s,.85)); }
  .code button.done { background:var(--accent); color:var(--on-accent); border-color:var(--accent); }
  /* ══ 자막 상세 편집기(조각 카드·단어 칩·미리보기 싱크) — 부품 전부 정본 계승: 탭=.tooltab(index) · 단어칩=.ed-chip(index #edChips 어절칩 엔진) · 체크=.dl-cbox(index) · 다운로드=.dlbtn(전 앱 표준) · 아이콘=nm-svg SSOT · 색=기존 ly 팔레트 var()만(신규 raw 색 0·신규 blur 0) ══ */
  .lyfind[hidden], .lypv-row[hidden], .lypv-cap[hidden] { display:none; }   /* ⚠️ display:flex가 UA [hidden]을 덮는 함정 가드(#rfab .ro[hidden] 전례 동일 · lypv-cap 누락은 평의회5 적발 = 생성 전 빈 캡션바 노출 버그) */
  .lyseg-a, .lyseg-t, .lybtn, .lyrate, .lyfbtn, .lytab, .lyreset { touch-action:manipulation; }   /* 더블탭 줌·300ms 지연 차단(평의회4·.ed-chip와 동일) */
  .lytabs { display:none; grid-template-columns:1fr 1fr; gap:6px; padding:0 2px; border-bottom:1px solid var(--line); margin:16px 0 12px; }
  .lytabs.show { display:grid; }
  .lytab { padding:9px 4px; text-align:center; color:var(--mut); cursor:pointer; font-weight:600; font-size:13px; background:none; border:none; border-radius:0; font-family:inherit; transition:color .15s, transform .12s; -webkit-tap-highlight-color:transparent; }   /* 글자 탭 = index .tooltab 계승(알약 아님) */
  .lytab:active { transform:scale(var(--press-l,.95)); }
  @media (hover:hover){ .lytab:hover { color:var(--fg); } }   /* index .tooltab:hover 계승(평의회5) */

<script src="nm-svg.js"></script><!-- 공유 아이콘 SSOT(§🎨 CII P1·운영자 260628) — 인라인 복제 폐지·단일정본 -->
<script>
const $ = s => document.querySelector(s);
const esc = s => s.replace(/[&<>]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[c]));
// 복사 버튼 = 캐러셀 .sbtn 글래스 아이콘 계승(§📋 · 이모지 X · SVG만)
// 상태문구 픽토그램(§🎨 이모지 금지 · 인라인 vertical-align) — 동적문자열은 esc() 동반 innerHTML만(XSS 가드·운영자 260628)
// URL 칸 붙여넣기↔복사 + 지우개/되돌리기 (뉴스요약/썸네일 통일·운영자 260625·260627) · ERASE_SVG·UNDO_SVG = nm-svg.js 공유 SSOT(인라인 복제 폐지·CII P1)
// 붙여넣기 = readText 우선 / 막힌 환경(모바일 iframe·도구창)엔 '길게 눌러 붙여넣기' 폴백 — thumb/index 통일 기틀(clipPasteText·운영자 260628)
async function clipPasteText() {
  try { if (navigator.clipboard && navigator.clipboard.readText) { const t = await navigator.clipboard.readText(); if (t) return t; } } catch {}
  return await clipPasteFallback();
}
function clipPasteFallback() {
  return new Promise(resolve => {
    const ov = document.createElement('dialog'); ov.className = 'pastefb';
    ov.innerHTML = '<div class="pastefb-box"><div class="pastefb-msg">아래 칸을 <b>길게 눌러 “붙여넣기”</b> 하면 자동 반영돼</div>'
      + '<textarea class="pastefb-ta" placeholder="여기에 붙여넣기" autocapitalize="off" autocomplete="off" spellcheck="false"></textarea>'
      + '<div class="pastefb-row"><button type="button" class="pastefb-btn pastefb-cancel">취소</button><button type="button" class="pastefb-btn pastefb-ok">적용</button></div></div>';
    document.body.appendChild(ov);
    const ta = ov.querySelector('.pastefb-ta'); let done = false;
    const finish = v => { if (done) return; done = true; try { ov.close(); } catch {} ov.remove(); resolve(v || null); };

let FF = null, ffOnMsg = null;   // ffOnMsg = 현재 호출의 진행 콜백 — 리스너는 로드 시 1회만 등록(매 호출 등록 시 누적되던 것 방지)
async function ffExtractAudio(file, onMsg) {
  ffOnMsg = onMsg;
  if (!FF) {
    onMsg('소리 추출 도구 준비 중… (첫 회만 잠시)');   // 개발자 용어(ffmpeg) 비노출(평의회8)
    const ffBase = 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm';
    const coreBase = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm';   // 모듈 워커는 importScripts 불가 → import() → ESM 코어 필요(UMD✗)
    const { FFmpeg } = await import(`${ffBase}/index.js`);
    const { fetchFile, toBlobURL } = await import('https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js');
    const ff = new FFmpeg();
    // 교차출처(CDN) Worker 생성은 브라우저가 차단 → 같은-출처 blob 워커가 CDN worker.js를 import(그 안 상대 import는 CDN 기준 해석). classWorkerURL 미지정이 'Failed to construct Worker' 원인이었음.
    const classWorkerURL = URL.createObjectURL(new Blob([`import ${JSON.stringify(ffBase + '/worker.js')};`], { type: 'text/javascript' }));
    await ff.load({
      classWorkerURL,
      coreURL: await toBlobURL(`${coreBase}/ffmpeg-core.js`, 'text/javascript'),
      wasmURL: await toBlobURL(`${coreBase}/ffmpeg-core.wasm`, 'application/wasm'),
    });

    FF = { ff, fetchFile };
  }
  const { ff, fetchFile } = FF;
  const ext = (file.name.match(/\.[a-z0-9]+$/i) || ['.mp4'])[0].toLowerCase();
  await ff.writeFile('in' + ext, await fetchFile(file));
  await ff.exec(['-i', 'in' + ext, '-vn', '-ac', '1', '-ar', '16000', '-b:a', '48k', '-y', 'out.mp3']);   // 모노 16k 48kbps mp3(Whisper용·작음)
  const data = await ff.readFile('out.mp3');
  ff.deleteFile('in' + ext).catch(() => {});
  return new Blob([data.buffer], { type: 'audio/mpeg' });
}

// 최소 마크다운: ``` 코드블록(복사 버튼) · #/##/### 헤딩 · | 표 · 문단.
function renderMd(md) {
  const parts = md.split('```');
  let html = '';
  parts.forEach((part, i) => {
    if (i % 2 === 1) {
      let code = part; const nl = code.indexOf('\n');
      const first = nl >= 0 ? code.slice(0, nl).trim() : '';
      if (/^[a-zA-Z]+$/.test(first)) code = code.slice(nl + 1);
      code = code.replace(/\s+$/, '');
      html += `<div class="code"><button data-c="${encodeURIComponent(code)}" aria-label="복사" title="복사">${COPY_SVG}</button><pre>${esc(code)}</pre></div>`;
    } else {
      const lines = part.split('\n'); let tbl = [];
      const flush = () => {
        if (!tbl.length) return;
        const rows = tbl.filter(r => !/^\s*\|?\s*[-:|\s]+\|?\s*$/.test(r));   // 구분줄 제거
        html += '<table>' + rows.map(r => {
          const cells = r.replace(/^\s*\||\|\s*$/g, '').split('|').map(c => c.trim());
          return '<tr>' + cells.map(c => `<td>${esc(c)}</td>`).join('') + '</tr>';
        }).join('') + '</table>';
        tbl = [];
      };
      lines.forEach(line => {
        const t = line.trim();
        if (t.startsWith('|')) { tbl.push(t); return; }
        flush();
        if (!t) return;
        if (t.startsWith('### ')) html += `<h3>${esc(t.slice(4))}</h3>`;
        else if (t.startsWith('## ')) html += `<h2>${esc(t.slice(3))}</h2>`;
        else if (t.startsWith('# ')) html += `<h1 class="t">${esc(t.slice(2))}</h1>`;
        else if (t === '---') html += '<hr style="border-color:#2a2c31">';
        else html += `<p>${esc(t)}</p>`;
      });
      flush();
    }
  });
  return html;
}

    if (sec > budget) { status.innerHTML = WAIT_SVG + (early ? ' 받아쓴 자막 나옴 — 아직 다듬는 중… ' : ' 아직 만드는 중… ') + sec + 's (오래 걸리는 중 — 닫아도 나중에 이어받아)'; return; }   // 소프트 초과 = 계속(구 즉사 '시간 초과' 폐지)
    status.innerHTML = WAIT_SVG + (early ? ' 받아쓴 자막 먼저 손봐도 돼 · 다듬는 중… ' + sec + 's' : ' 자막 생성 중… ' + sec + 's' + (isUrl ? ' (영상 다운+Whisper STT 포함 — 첫 회 길 수 있음)' : ' (보통 1–3분)'));   // 조기 문구 = 기존 어휘 통일(받아쓴 자막·다듬기 — 전사/의역 신조어 금지·평의회4) · 허가문은 주 상태문에 접음(산문최소)

      } catch (e) { /* 재시도 */ }

  };

}
