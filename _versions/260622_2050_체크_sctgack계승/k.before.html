<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>영상 프롬프트</title>
<style>
  :root { --bg:#0b0b0c; --pan:#16171a; --line:#2a2c31; --fg:#e9eaec; --mut:#8b8f98; --accent:#0FFD02; --accent-dim:rgba(15,253,2,.13); --on-accent:#062108; }
  * { box-sizing:border-box; }
  /* 스크롤바 톤앤톤(초록 글래스) — 뉴스 요약기(viewer/index.html) 계승 · 전 페이지 공통 */
  html { scrollbar-width:thin; scrollbar-color:rgba(15,253,2,.30) transparent; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(15,253,2,.26); border-radius:999px;
    border:2px solid var(--bg); background-clip:padding-box; }
  ::-webkit-scrollbar-thumb:hover { background:rgba(15,253,2,.45); background-clip:padding-box; }
  body { margin:0; background:radial-gradient(125% 70% at 50% -8%, rgba(15,253,2,.06), transparent 55%) fixed, var(--bg); color:var(--fg); font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:600px; margin:0 auto; padding:18px 16px 70px; }
  h1 { font-size:18px; margin:6px 0 4px; } h1 b { color:var(--accent); }
  .sub { color:var(--mut); font-size:13px; margin:0 0 16px; }
  label { display:block; font-size:13px; color:var(--mut); margin:14px 0 6px; }
  label:first-of-type { margin-top:0; }
  textarea { width:100%; min-height:150px; padding:12px; background:#0e0f11; border:1px solid var(--line); border-radius:9px; color:var(--fg); font:inherit; resize:vertical; }
  textarea:focus, input:focus { border-color:rgba(15,253,2,.35); box-shadow:0 0 0 3px rgba(15,253,2,.08); outline:none; }
  textarea::placeholder, input::placeholder { color:var(--mut); }
  /* 생성 버튼 = 카드/썸네일 생성 버튼과 통일 = 글래스 고스트(.mkbtn 정합·운영자 260622) */
  .go { width:100%; margin-top:16px; padding:14px; background:var(--accent-dim); color:var(--accent); border:1px solid rgba(15,253,2,.36); border-radius:999px; font-weight:800; font-size:14px; font-family:inherit; cursor:pointer; position:relative; overflow:hidden; transition:transform .12s ease, background .15s ease, border-color .15s ease; }
  .go:hover { background:rgba(15,253,2,.18); border-color:rgba(15,253,2,.5); }
  .go:active { transform:scale(.955); background:rgba(15,253,2,.2); }
  .go:disabled { opacity:.5; cursor:default; transform:none; }
  .go.firing { color:var(--on-accent); pointer-events:none; opacity:1;
    background:linear-gradient(var(--accent),var(--accent)) left/0% 100% no-repeat, linear-gradient(var(--accent-dim),var(--accent-dim));
    animation:goFill .72s linear forwards; }   /* 누르면 버튼 전체를 초록이 좌→우로 채움(구성도 .send.is-fire 정본·260622) */
  @keyframes goFill { from { background-size:0% 100%, 100% 100%; } to { background-size:100% 100%, 100% 100%; } }   /* 0%(퍼센트)+명시 from = 부드러운 보간(0 길이면 끝에서 툭 튐) */
  @media (prefers-reduced-motion:reduce) { .go.firing { animation-duration:.2s; } }
  .chk { display:flex; align-items:center; gap:8px; margin-top:12px; font-size:14px; color:var(--fg); cursor:pointer; }
  .chk input { width:18px; height:18px; accent-color:var(--accent); }
  .paid { color:var(--mut); font-size:11px; font-weight:400; }
  .ref { margin:0 0 16px; }
  .ref img { width:100%; border:1px solid var(--line); border-radius:10px; display:block; }
  .ref .cap { color:var(--mut); font-size:12px; margin-top:5px; }
  .status { margin-top:16px; font-size:13px; color:var(--mut); white-space:pre-wrap; }
  .status.err { color:#ff8a8a; }
  .out { margin-top:18px; }
  .out h1.t { font-size:20px; color:var(--fg); margin:18px 0 6px; }
  .out h2 { font-size:16px; color:var(--accent); margin:18px 0 6px; }
  .out h3 { font-size:14px; color:var(--fg); margin:16px 0 6px; }
  .out p { margin:6px 0; color:#cfd2d7; }
  .code { position:relative; background:#0e0f11; border:1px solid var(--line); border-radius:10px; margin:8px 0 14px; }
  .code pre { margin:0; padding:13px; white-space:pre-wrap; word-break:break-word; font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; color:#e9eaec; }
  .code button { position:absolute; top:8px; right:8px; display:grid; place-items:center; width:30px; height:30px; padding:0;
    color:rgba(255,255,255,.92); background:rgba(8,15,11,.4); border:1px solid rgba(255,255,255,.14); border-radius:9px; cursor:pointer;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:transform .12s, background .15s, color .15s, border-color .15s; }   /* 캐러셀 .sbtn 글래스 아이콘 계승(§📋) */
  .code button svg { display:block; }
  .code button:hover { background:rgba(255,255,255,.16); }
  .code button:active { transform:scale(.85); }
  .code button.done { background:var(--accent); color:var(--on-accent); border-color:var(--accent); }
  html.inmodal, html.inmodal body { background:transparent; }   /* 모달(iframe) 안에선 투명 → tooldlg 반투명 글래스 비침 */
</style>
<script>if(window.self!==window.top)document.documentElement.classList.add('inmodal');</script>
</head>
<body>
<div class="wrap">
  <p class="sub">장면·기사 넣으면 → Kling 복붙 프롬프트(샷별 복사). 영상 생성은 Kling 웹앱에서 붙여넣어. ※ 원샷(대화형 /k는 Claude Code).</p>

  <label>장면 / 기사 입력</label>
  <textarea id="scene" placeholder="예) 폭우 속 한강 다리 위, 우산 쓴 사람이 카메라를 향해 천천히 걸어온다. 네온 반사, 시네마틱..."></textarea>
  <label class="chk"><input type="checkbox" id="refimage"> 레퍼런스 이미지도 생성 <span class="paid">유료 Gemini · 최대 ~15분</span></label>
  <button class="go" id="go">웹 렌더 생성</button>

  <div class="status" id="status"></div>
  <div class="out" id="out"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const esc = s => s.replace(/[&<>]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[c]));
const COPY_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>';
const CHECK_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';

// 최소 마크다운 렌더: ``` 펜스 = 코드블록(복사 버튼), 그 외 #/##/### 헤딩 + 문단.
function renderMd(md) {
  const parts = md.split('```');
  let html = '';
  parts.forEach((part, i) => {
    if (i % 2 === 1) {                    // 코드블록
      let code = part;
      const nl = code.indexOf('\n');
      const first = nl >= 0 ? code.slice(0, nl).trim() : '';
      if (/^[a-zA-Z]+$/.test(first)) code = code.slice(nl + 1);   // 언어 태그 줄 제거(```text 등)
      code = code.replace(/\s+$/, '');
      const enc = encodeURIComponent(code);
      html += `<div class="code"><button data-c="${enc}" aria-label="복사" title="복사">${COPY_SVG}</button><pre>${esc(code)}</pre></div>`;
    } else {
      part.split('\n').forEach(line => {
        const t = line.trim();
        if (!t) return;
        if (t.startsWith('### ')) html += `<h3>${esc(t.slice(4))}</h3>`;
        else if (t.startsWith('## ')) html += `<h2>${esc(t.slice(3))}</h2>`;
        else if (t.startsWith('# ')) html += `<h1 class="t">${esc(t.slice(2))}</h1>`;
        else html += `<p>${esc(t)}</p>`;
      });
    }
  });
  return html;
}

function wireCopy() {
  document.querySelectorAll('.code button').forEach(b => b.onclick = () => {
    navigator.clipboard.writeText(decodeURIComponent(b.dataset.c)).then(() => {
      b.innerHTML = CHECK_SVG; b.classList.add('done');
      setTimeout(() => { b.innerHTML = COPY_SVG; b.classList.remove('done'); }, 1500);
    });
  });
}

let _curStop = null;   // 현재 진행 폴 중단 핸들 — 재시도(재클릭)로 새 폴 시작 시 옛 폴 멈춰 상태표시 충돌·중복 폴 차단
function poll(outPath, refPath) {
  if (_curStop) _curStop();   // 재시도: 이전 폴 중단
  const t0 = Date.now(), status = $('#status'), out = $('#out');
  const budget = refPath ? 900 : 600;   // 컴팩트 백스톱 — 생성 보통 1~5분, 실패·타임아웃은 error.log로 즉시(아래) → budget은 '워크플로 증발'만 대비. ref有=이미지생성 포함 여유(260619)
  const errPath = outPath.replace(/[^/]+$/, 'error.log');   // 같은 폴더 error.log = kmake 실패 메시지(있으면 즉시 표시 — budget 다 안 기다림·260619)
  let live = true; const stop = () => { live = false; clearInterval(disp); }; _curStop = stop;
  const draw = () => {   // 1초 벽시계 티커 — 표시 초가 실제 시간과 일치(네트워크 폴 5s와 분리·260619)
    if (!live) return;
    const sec = Math.round((Date.now() - t0) / 1000);
    if (sec > budget) { stop(); status.textContent = '시간 초과 — 위 버튼으로 다시 시도해줘(또는 Actions 로그 확인)'; status.classList.add('err'); return; }
    status.textContent = '⏳ /k 생성 중… ' + sec + 's' + (refPath ? ' (레퍼런스 이미지 포함 — 최대 ~15분)' : ' (보통 1–3분)');
  };
  const disp = setInterval(draw, 1000); draw();
  const tick = async () => {
    if (!live) return;
    // 1) 실패 먼저 — error.log 뜨면 즉시 에러 표시(budget 다 안 기다림). SPA 폴백(index.html) HTML은 무시.
    try {
      const er = await fetch(errPath + '?t=' + Date.now());
      if (er.ok) {
        const ect = (er.headers.get('content-type') || '').toLowerCase();
        const em = await er.text();
        const eHtml = ect.includes('text/html') || /^\s*<!doctype/i.test(em) || /<html[\s>]/i.test(em.slice(0, 300));
        if (em && em.trim() && !eHtml) { stop(); status.textContent = '❌ ' + em.trim(); status.classList.add('err'); out.innerHTML = ''; return; }
      }
    } catch (e) { /* 재시도 */ }
    // 2) 결과 확인
    try {
      const r = await fetch(outPath + '?t=' + Date.now());
      if (r.ok) {
        const ct = (r.headers.get('content-type') || '').toLowerCase();
        const md = await r.text();
        // 결과 md가 아직 없으면 Pages가 index.html(SPA 폴백·200)을 줌 → 결과로 오인 시 '완료 (0s)'에
        // 페이지 HTML 덤프됨. HTML 응답은 무시하고 진짜 마크다운만 통과.
        const isHtml = ct.includes('text/html') || /^\s*<!doctype/i.test(md) || /<html[\s>]/i.test(md.slice(0, 300));
        if (md && md.trim() && !isHtml) {
          stop();
          status.textContent = '✅ 완료 (' + Math.round((Date.now() - t0) / 1000) + 's)';
          let html = renderMd(md);
          if (refPath) {
            // 직영 레퍼런스: R2 URL(ref.json) 우선 · 없으면 git 폴백(ref.jpg). (Apps Script/Drive 제거·260621)
            let rsrc = refPath;
            try { const jr = await fetch(refPath.replace(/ref\.jpg$/, 'ref.json') + '?t=' + Date.now()); if (jr.ok) { const j = await jr.json(); if (j && j.url) rsrc = j.url; } } catch (e) { /* 폴백 */ }
            const bust = rsrc.includes('?') ? '' : '?t=' + Date.now();
            html = '<div class="ref"><img src="' + rsrc + bust + '" onerror="this.parentElement.style.display=\'none\'"><div class="cap">🖼 레퍼런스 이미지</div></div>' + html;
          }
          out.innerHTML = html;
          wireCopy();
          return;
        }
      }
    } catch (e) { /* 아직 — 재시도 */ }
    if (live) setTimeout(tick, 5000);
  };
  tick();
}

$('#go').onclick = async () => {
  { const gb = document.getElementById('go'); gb.classList.remove('firing'); void gb.offsetWidth; gb.classList.add('firing'); setTimeout(() => gb.classList.remove('firing'), 760); }   // 누름 게이지(생성 버튼 통일·260622)
  const status = $('#status'); status.classList.remove('err'); $('#out').innerHTML = '';
  const scene = $('#scene').value.trim();
  if (!scene) { status.textContent = '장면을 입력해줘'; status.classList.add('err'); return; }
  $('#go').disabled = true; status.textContent = '생성 중…';
  try {
    const refimage = $('#refimage').checked;
    const res = await fetch('/api/k', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ scene, refimage }) });
    const j = await res.json();
    if (!res.ok || j.error) { status.textContent = '⚠️ ' + (j.error || res.status); status.classList.add('err'); return; }
    poll(j.out, j.refimage ? j.ref : null);
  } catch (e) {
    status.textContent = '⚠️ 요청 실패: ' + e.message; status.classList.add('err');
  } finally { $('#go').disabled = false; }
};
</script>
<script src="cscroll.js"></script>
</body>
</html>
