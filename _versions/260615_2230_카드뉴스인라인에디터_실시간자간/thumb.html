<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>노뮤트 썸네일 — 웹</title>
<style>
  :root { --bg:#0b0b0c; --pan:#16171a; --line:#2a2c31; --fg:#e9eaec; --mut:#8b8f98; --grn:#0FFD02;
          --accent:#0FFD02; --accent-dim:rgba(15,253,2,.15); --on-accent:#07210a; --line2:#2a2c31; --glass2:#0e0f11; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:560px; margin:0 auto; padding:18px 16px 60px; }
  h1 { font-size:18px; margin:6px 0 14px; }
  h1 b { color:var(--grn); }
  .tabs { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-bottom:16px; }
  .tab { padding:11px 3px; text-align:center; background:var(--pan); border:1px solid var(--line); border-radius:10px; cursor:pointer; font-weight:600; font-size:12.5px; }
  .tab small { display:block; color:var(--mut); font-weight:400; font-size:11px; margin-top:2px; }
  .tab.on { border-color:var(--grn); color:var(--grn); }
  .tab.on small { color:#bfeeb6; }
  .panel { background:var(--pan); border:1px solid var(--line); border-radius:12px; padding:14px; }
  label { display:block; font-size:13px; color:var(--mut); margin:12px 0 5px; }
  label:first-child { margin-top:0; }
  input[type=text], input[type=number], textarea, select {
    width:100%; padding:10px; background:#0e0f11; border:1px solid var(--line); border-radius:8px; color:var(--fg); font:inherit;
  }
  textarea { min-height:84px; resize:vertical; }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .hint { font-size:12px; color:var(--mut); margin-top:5px; }
  .hint b { color:var(--grn); }
  .seg { display:flex; gap:6px; }
  .seg button { flex:1; padding:8px; background:#0e0f11; border:1px solid var(--line); border-radius:8px; color:var(--fg); cursor:pointer; }
  .seg button.on { border-color:var(--grn); color:var(--grn); }
  /* 직접입력 = 버튼 자체가 입력창 (선택 시 라벨 숨고 안에 커서) */
  #rOpaCustom { padding:0; overflow:hidden; }
  #rOpaCustom .lab { display:block; padding:8px 2px; }
  #rOpaCustom #rOpaNum { display:none; width:100%; padding:8px 2px; border:none; background:transparent; color:var(--grn); text-align:center; font:inherit; outline:none; }
  #rOpaCustom.on .lab { display:none; }
  #rOpaCustom.on #rOpaNum { display:block; }
  /* 플랫폼 로고 선택 (2:1 박스 가로 한 줄) */
  .pseg { display:flex; gap:6px; flex-wrap:nowrap; }
  .pbtn { flex:1 1 0; min-width:0; aspect-ratio:2/1; display:flex; align-items:center; justify-content:center; background:#0e0f11; border:1px solid var(--line); border-radius:8px; color:var(--mut); cursor:pointer; padding:0; }
  .pbtn.on { border-color:var(--grn); color:var(--grn); }
  .pbtn svg { width:58%; height:54%; fill:none; stroke:currentColor; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
  .pbtn svg .solid { fill:currentColor; stroke:none; }
  .pbtn .plab { font-size:11px; font-weight:600; }
  /* 경고문 프리셋 = 줄바꿈 허용 세그 */
  .wseg { flex-wrap:wrap; }
  .wseg button { min-width:62px; }
  .file { display:block; padding:10px; border:1px dashed var(--line); border-radius:8px; text-align:center; color:var(--mut); cursor:pointer; }
  .file img { max-width:100%; max-height:170px; border-radius:6px; margin-top:8px; }
  .go { width:100%; margin-top:16px; padding:13px; background:var(--grn); color:#07210a; border:none; border-radius:10px; font-weight:800; font-size:15px; cursor:pointer; }
  .go:disabled { opacity:.5; cursor:default; }
  .out { margin-top:18px; }
  .status { font-size:13px; color:var(--mut); white-space:pre-wrap; }
  .status.err { color:#ff8a8a; }
  .result img { width:100%; border:1px solid var(--line); border-radius:10px; }
  .slot { margin-bottom:14px; }
  .slot-lab { font-size:12.5px; color:var(--mut); margin-bottom:5px; font-weight:600; }
  .slot-img { min-height:40px; }
  .slot-img img { width:100%; border:1px solid var(--line); border-radius:10px; display:block; }
  .slot-wait { font-size:13px; color:var(--mut); }
  .none { display:none; }

  /* ── 카드 텍스트 칩 에디터 (뷰어 #editdlg 포팅) ── */
  #editdlg { width:min(460px,94vw); max-width:460px; max-height:94vh; height:auto; margin:auto; padding:0; color:var(--fg);
    background:linear-gradient(165deg, rgba(27,44,32,.96), rgba(11,19,14,.98)); border:1px solid rgba(255,255,255,.14); border-radius:22px; box-shadow:0 30px 80px rgba(0,0,0,.6); }
  #editdlg::backdrop { background:rgba(4,8,5,.6); }
  .ed-h { display:flex; align-items:center; padding:13px 16px; border-bottom:1px solid var(--line2); }
  .ed-title { font-size:15px; font-weight:800; color:var(--accent); letter-spacing:-.2px; }
  .ed-x { margin-left:auto; width:30px; height:30px; border-radius:50%; font-size:13px; color:var(--mut); background:rgba(255,255,255,.06); border:1px solid var(--line); cursor:pointer; }
  .ed-body { padding:12px 16px 16px; overflow-x:hidden; overflow-y:auto; max-height:calc(94vh - 114px); display:flex; flex-direction:column; gap:6px; }
  .ed-img { display:block; max-width:100%; max-height:30vh; width:auto; height:auto; margin:2px auto 4px; border-radius:14px; border:1px solid var(--line); }
  .ed-lbl { font-size:12px; font-weight:800; color:var(--mut); margin-top:9px; }
  .ed-hint { font-weight:600; opacity:.6; }
  .ed-chips { display:flex; flex-direction:column; align-items:stretch; gap:5px; min-height:34px; padding:6px; background:rgba(5,12,8,.4); border:1px dashed var(--line2); border-radius:11px; }
  .ed-line { display:flex; flex-wrap:nowrap; align-items:center; gap:calc(6px * var(--eds,1)); min-height:calc(30px * var(--eds,1)); position:relative; padding-right:22px; }
  .ed-chip { flex:none; font-size:calc(16px * var(--eds,1)); line-height:1.4; padding:calc(2px * var(--eds,1)) calc(3px * var(--eds,1)); border-radius:7px; background:rgba(255,255,255,.05); border:1px solid var(--line2); color:var(--fg); cursor:pointer; user-select:none; white-space:nowrap; transition:background .12s, color .12s, border-color .12s; }
  .ed-chip:hover { border-color:rgba(15,253,2,.4); }
  .ed-add { position:absolute; right:2px; top:50%; transform:translateY(-50%); flex:none; width:16px; height:calc(30px * var(--eds,1)); padding:0; border-radius:5px; display:inline-flex; align-items:center; justify-content:center; font:800 16px/1 inherit; color:var(--accent); background:rgba(15,253,2,.1); border:1px solid rgba(15,253,2,.42); cursor:pointer; }
  .ed-add:active { transform:translateY(-50%) scale(.9); }
  .ed-add.cap { color:transparent; cursor:not-allowed; opacity:.55; border-color:rgba(255,77,77,.5); filter:brightness(.6); background:repeating-linear-gradient(45deg, rgba(255,77,77,.5) 0 3px, transparent 3px 6px), rgba(10,14,12,.6); }
  .ed-empty { min-width:calc(46px * var(--eds,1)); min-height:calc(22px * var(--eds,1)); cursor:text; white-space:normal; }
  .ed-empty:empty::before { content:'입력…'; color:var(--mut); opacity:.5; }
  .ed-chip:empty { min-width:calc(15px * var(--eds,1)); }
  .ed-addw { flex:none; display:inline-flex; align-items:center; justify-content:center; width:calc(22px * var(--eds,1)); height:calc(22px * var(--eds,1)); border-radius:50%; color:var(--accent); font:800 calc(15px * var(--eds,1))/1 inherit; cursor:pointer; user-select:none; align-self:center; background:rgba(15,253,2,.1); border:1px solid rgba(15,253,2,.4); }
  .ovc { color:#ff5d5d; font-weight:800; }
  .emon { color:var(--accent); font-weight:800; }
  .ed-chip.on { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); font-weight:800; box-shadow:0 0 8px rgba(15,253,2,.3); }
  .ed-chip.warn { border-color:rgba(255,176,32,.55); }
  .ed-chip.warn.on { border-color:var(--accent); }
  .ed-chip.over { border-color:#ff5d5d; background:rgba(255,77,77,.14); }
  .ed-chip.editing { outline:2px solid var(--accent); outline-offset:1px; background:rgba(15,253,2,.08); color:var(--fg); cursor:text; white-space:normal; word-break:break-word; max-width:100%; }
  .ed-chip.editing.over { outline-color:#ff5d5d; color:#ff7a7a; background:rgba(255,77,77,.12); }
  .ed-chip.reject { border-color:#ff5d5d !important; color:#ff7a7a; background:rgba(255,77,77,.12); animation:edshake .42s; }
  @keyframes edshake { 0%,100%{transform:translateX(0)} 18%{transform:translateX(-4px)} 38%{transform:translateX(4px)} 58%{transform:translateX(-3px)} 78%{transform:translateX(2px)} }
  .ed-foot { display:flex; gap:10px; justify-content:flex-end; align-items:center; padding:11px 16px; border-top:1px solid var(--line2); }
  .ed-cancel { padding:9px 18px; font:700 12.5px inherit; color:var(--mut); background:rgba(255,255,255,.05); border:1px solid var(--line2); border-radius:999px; cursor:pointer; }
  .ed-go { padding:9px 24px; font:800 12.5px inherit; color:var(--on-accent); background:linear-gradient(90deg,#d8ff3d,var(--accent)); border:none; border-radius:999px; cursor:pointer; }
  .ed-go:active { transform:scale(.97); } .ed-go[disabled] { opacity:.55; cursor:default; }
  @media (max-width:600px) { #editdlg { width:94vw; } .ed-img { max-height:34vh; } }
  @media (min-aspect-ratio:1/1) { #editdlg { max-height:66vh; } .ed-img { max-height:24vh; } .ed-body { max-height:calc(66vh - 114px); } }
</style>
</head>
<body>
<div class="wrap">
  <h1>노뮤트 <b>썸네일</b> · 웹 렌더</h1>

  <div class="tabs" id="tabs">
    <div class="tab" data-app="1">포스트</div>
    <div class="tab" data-app="2">릴스</div>
    <div class="tab" data-app="3">저작권</div>
    <div class="tab" data-app="4">경고문</div>
    <div class="tab" data-app="5">카드뉴스</div>
  </div>

  <div class="panel">
    <!-- 포맷(2는 릴스 고정이라 숨김) -->
    <div id="fmtBox">
      <label>포맷</label>
      <div class="seg" id="fmtSeg">
        <button data-fmt="post" class="on">포스트 1080×1350</button>
        <button data-fmt="reels">릴스 1080×1920</button>
      </div>
    </div>

    <!-- /1 배경 이미지 -->
    <div id="imgBox" class="none">
      <label>배경 이미지</label>
      <label class="file" id="fileLab"><span>탭해서 이미지 선택</span>
        <input type="file" accept="image/*" id="file" style="display:none">
      </label>
    </div>

    <!-- OPA (1 — 오버레이 투명도: 58 기본 / 30 / 직접입력) -->
    <div id="opaBox" class="none">
      <label>투명도 (OPA)</label>
      <div class="seg" id="opaSeg">
        <button data-opa="58" class="on">58 (기본)</button>
        <button data-opa="30">30</button>
        <button data-opa="custom">직접입력</button>
      </div>
      <input type="number" id="opaNum" min="0" max="100" value="45" placeholder="0–100" class="none" style="margin-top:6px">
    </div>

    <!-- lines (1 포스트·5 카드뉴스) -->
    <div id="linesBox" class="none">
      <label>텍스트 (줄바꿈 = 여러 줄)</label>
      <textarea id="lines" placeholder="속보 *강조는 별표로*&#10;둘째 줄"></textarea>
      <div class="hint"><b>*별표*</b>로 감싸면 초록 강조 · <span id="linesMax"></span></div>
      <button type="button" id="cardEditBtn" class="none" style="width:100%;margin-top:8px;padding:11px;background:var(--glass2);color:var(--grn);border:1px solid var(--grn);border-radius:10px;font-weight:700;cursor:pointer">🃏 칩 에디터로 편집 (줄·강조·한도 빨강)</button>
    </div>

    <!-- /4 경고문 — 프리셋 선택(법적 검토) + 직접입력. 선택 시 채워지고 수정 가능 -->
    <div id="warnBox" class="none">
      <label>경고문 선택 <span style="color:var(--mut);font-weight:400">(탭하면 채워짐 · 수정 가능 · 최대 2줄)</span></label>
      <div class="seg wseg" id="warnPreset">
        <button type="button" data-wp="caution" class="on">시청 주의</button>
        <button type="button" data-wp="ai">AI 생성</button>
        <button type="button" data-wp="sensitive">민감·자극성</button>
        <button type="button" data-wp="custom">직접입력</button>
      </div>
      <textarea id="warnLines">민감·충격적 장면이 포함될 수 있으니 시청에 주의 바랍니다.
본 게시물은 공익 정보 전달 목적의 콘텐츠입니다.</textarea>
      <div class="hint"><b>*별표*</b>로 강조 · 최대 2줄 · <b>AI 생성</b>=AI기본법 §31② 표시의무(나머지는 자율 안내)</div>
    </div>

    <!-- /2 릴스 — 헤더(기본) / 오버레이 모드 -->
    <div id="reelsBox" class="none">
      <label>모드</label>
      <div class="seg" id="rmodeSeg">
        <button data-rmode="header" class="on">헤더 (기본)</button>
        <button data-rmode="overlay">오버레이</button>
      </div>

      <!-- 헤더 모드: 부제 + 제목 → 기본(흰칸無) + 흰칸 2장 -->
      <div id="rHeader">
        <label>부제 (흰색)</label>
        <input type="text" id="sub" placeholder="부제 한 줄">
        <label>제목 (초록)</label>
        <input type="text" id="title" placeholder="제목 한 줄">
        <div class="hint">출력 2장 — <b>기본</b>(흰칸 없음) + <b>흰칸</b>(영상자리)</div>
      </div>

      <!-- 오버레이 모드: 이미지(옵션) + OPA + 텍스트 -->
      <div id="rOverlay" class="none">
        <label>배경 이미지 <span style="color:var(--mut);font-weight:400">(옵션 — 없으면 오버레이만)</span></label>
        <label class="file" id="rFileLab"><span>탭해서 이미지 선택</span>
          <input type="file" accept="image/*" id="rFile" style="display:none">
        </label>
        <label>투명도 (OPA)</label>
        <div class="seg" id="rOpaSeg">
          <button data-opa="60" class="on">60 (기본)</button>
          <button data-opa="30">30</button>
          <button data-opa="custom" id="rOpaCustom"><span class="lab">직접입력</span><input type="text" id="rOpaNum" inputmode="numeric" pattern="[0-9]*" maxlength="3" placeholder="OPA"></button>
        </div>
        <label>텍스트 (줄바꿈 = 여러 줄)</label>
        <textarea id="rLines" placeholder="속보 *강조는 별표로*&#10;둘째 줄"></textarea>
        <div class="hint"><b>*별표*</b>로 감싸면 초록 강조 · 기본 출력 <b>opa60 + opa30</b>, 직접입력은 추가(+1)</div>
      </div>
    </div>

    <!-- /3 저작권 -->
    <div id="copyBox" class="none">
      <div class="row">
        <div><label>연도</label><input type="text" id="cyear" value="2026"></div>
        <div><label>이름</label><input type="text" id="cname" placeholder="nomute"></div>
      </div>
      <label>플랫폼 <span style="color:var(--mut);font-weight:400">(로고 탭 · 직접입력은 마지막)</span></label>
      <div class="pseg" id="pseg">
        <button type="button" class="pbtn" data-plat="youtube" title="유튜브"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="4"/><path class="solid" d="M10 9l5 3-5 3z"/></svg></button>
        <button type="button" class="pbtn on" data-plat="instagram" title="인스타그램"><svg viewBox="0 0 24 24"><rect x="3.5" y="3.5" width="17" height="17" rx="5"/><circle cx="12" cy="12" r="3.8"/><circle class="solid" cx="16.6" cy="7.4" r="1.1"/></svg></button>
        <button type="button" class="pbtn" data-plat="threads" title="스레드"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M15 12v1.6a2.2 2.2 0 0 0 4.4 0 7.8 7.8 0 1 0-2.4 5.5"/></svg></button>
        <button type="button" class="pbtn" data-plat="x" title="X"><svg viewBox="0 0 24 24"><path d="M5.5 5.5l13 13M18.5 5.5l-13 13"/></svg></button>
        <button type="button" class="pbtn" data-plat="facebook" title="페이스북"><svg viewBox="0 0 24 24"><path class="solid" d="M13.5 21v-7h2.3l.4-3h-2.7V9.1c0-.9.3-1.5 1.5-1.5H16V5c-.3 0-1.2-.1-2.2-.1-2.2 0-3.7 1.3-3.7 3.8V11H8v3h2.1v7z"/></svg></button>
        <button type="button" class="pbtn" data-plat="custom" id="pCustom" title="직접입력"><span class="plab">직접</span></button>
      </div>
      <input type="text" id="cplat" class="none" placeholder="플랫폼 직접입력 (예: tiktok)" style="margin-top:6px">
      <div class="hint" id="copyHint">→ ⓒ 2026. nomute(instagram). all rights reserved.</div>
    </div>

    <button class="go" id="go">웹 렌더 발사</button>
  </div>

  <div class="out">
    <div class="status" id="status"></div>
    <div class="result" id="result"></div>
  </div>
</div>

<!-- 카드뉴스(/5) 텍스트 칩 에디터 — 뷰어 #editdlg 포팅(어절칩·줄=행·강조·한도 빨강) -->
<dialog id="editdlg">
  <div class="ed-h"><b class="ed-title">카드 텍스트</b><button class="ed-x" type="button" aria-label="닫기" onclick="editdlg.close()">✕</button></div>
  <div class="ed-body">
    <img class="ed-img" alt="" style="display:none">
    <label class="ed-lbl">텍스트 <span class="ed-hint">— 탭=강조 · 더블탭=수정 · + 줄추가 · 비우면 줄삭제 · 최대 4줄·한 줄 한글 18자</span></label>
    <div class="ed-chips" id="edChips" aria-label="단어 — 탭하면 강조"></div>
  </div>
  <div class="ed-foot"><button class="ed-cancel" type="button" onclick="editdlg.close()">취소</button><button class="ed-go" id="edGo" type="button">적용</button></div>
</dialog>

<script>
const $ = s => document.querySelector(s);
let APP = '1', FMT = 'post', RMODE = 'header';
const IMG = { b64: '', name: '' };    // /1·/5 배경
const RIMG = { b64: '', name: '' };   // /2 오버레이 배경(옵션)

// ---- 탭 ----
function selApp(a) {
  APP = a;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.app === a));
  // 표시 토글
  $('#imgBox').classList.toggle('none', !(a === '1' || a === '5'));   // 이미지 = /1·/5
  $('#linesBox').classList.toggle('none', !(a === '1' || a === '5'));   // 텍스트 = /1·/5
  $('#warnBox').classList.toggle('none', a !== '4');                    // 경고문 = /4 (지침 프리필)
  $('#reelsBox').classList.toggle('none', a !== '2');
  $('#copyBox').classList.toggle('none', a !== '3');
  $('#fmtBox').classList.toggle('none', a === '1' || a === '2' || a === '5');   // 1·2·5 포맷 고정
  $('#opaBox').classList.toggle('none', a !== '1');   // OPA = /1 포스트만
  $('#linesMax').textContent = a === '1' ? '최대 3줄' : a === '5' ? '최대 4줄' : '';   // 공유 textarea 모드별 줄 한도
  $('#cardEditBtn').classList.toggle('none', a !== '5');   // 칩 에디터 = /5 카드뉴스만
}

  result.innerHTML = outs.map((o, i) =>
    '<div class="slot" data-i="' + i + '">' +
    (o.label ? '<div class="slot-lab">' + o.label + '</div>' : '') +
    '<div class="slot-img"><span class="slot-wait">⏳ 대기…</span></div></div>').join('');

    const sec = Math.round((Date.now() - t0) / 1000);

    status.textContent = '⏳ 렌더 중… ' + sec + 's (' + done.filter(Boolean).length + '/' + outs.length + '장 · 보통 1–2분)';
    outs.forEach((o, i) => {
      if (done[i]) return;
      const img = new Image();
      const url = o.path + '?t=' + Date.now();
      img.onload = () => {
        done[i] = true;
        const slot = result.querySelector('.slot[data-i="' + i + '"] .slot-img');

    });
    setTimeout(tick, 5000);
  };
  tick();
}

    });
    let out = '', on = false;
    seq.forEach(s => { if (s.e && !on) { out += '*'; on = true; } else if (!s.e && on) { out += '*'; on = false; } out += s.c; });
    if (on) out += '*';
    return out;
  }).filter(s => s !== '').join('\n');
}
// 엔트리 = /5 현 텍스트(#lines)에서 열기 · 엑시트 = buildEmphText → #lines (재슛 plumbing 제거)
function openCardEditor() {
  const img = $('#editdlg .ed-img');
  if (IMG.b64) { img.src = IMG.b64; img.style.display = 'block'; } else { img.removeAttribute('src'); img.style.display = 'none'; }
  edLines = parseEmphLines($('#lines').value || '');
  if (!edLines.length) edLines = [[]];
  PENDING_FOCUS = null; PENDING_EDIT = null;
  renderEditChips();
  $('#editdlg').showModal();
  fitEditLines($('#edChips'));
}
function applyCardEditor() {
  if (edAnyOver()) { alert('빨간 글자 = 한 줄 한도(한글 18자) 초과야. 그 어절을 줄이거나 + 로 새 줄을 만들어줘.'); return; }
  $('#lines').value = buildEmphText().trim();
  $('#editdlg').close();
}
$('#edGo').onclick = applyCardEditor;
$('#cardEditBtn').onclick = openCardEditor;

// ---- 발사 ----
$('#go').onclick = async () => {
  const status = $('#status'); status.classList.remove('err'); $('#result').innerHTML = '';
  // 카드뉴스(5) = /api/compose (이미지 + 텍스트, 1080×1350)
  if (APP === '5') {
    const clines = ($('#lines').value || '').split('\n').map(s => s.trim()).filter(Boolean);
    if (!IMG.b64) { status.textContent = '이미지를 선택해줘'; status.classList.add('err'); return; }
    if (!clines.length) { status.textContent = '텍스트를 입력해줘'; status.classList.add('err'); return; }
    $('#go').disabled = true; status.textContent = '발사 중…';
    try {
      const res = await fetch('/api/compose', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ imageB64: IMG.b64, name: IMG.name, lines: clines }) });
      const j = await res.json();
      if (!res.ok || j.error) { status.textContent = '⚠️ ' + (j.error || res.status); status.classList.add('err'); }
      else pollMany([{ path: j.out, label: '' }]);
    } catch (e) { status.textContent = '⚠️ 요청 실패: ' + e.message; status.classList.add('err'); }
    finally { $('#go').disabled = false; }
    return;
  }
  const params = buildParams();
  if (APP === '1' && !IMG.b64) { status.textContent = '배경 이미지를 선택해줘'; status.classList.add('err'); return; }
  if (APP === '2' && params.mode === 'header' && !params.sub && !params.title) { status.textContent = '부제 또는 제목을 입력해줘'; status.classList.add('err'); return; }
  if (APP === '2' && params.mode === 'overlay' && !params.lines.length) { status.textContent = '텍스트를 입력해줘'; status.classList.add('err'); return; }
  if (APP === '4' && !params.lines.length) { status.textContent = '경고문 텍스트를 입력해줘'; status.classList.add('err'); return; }
  $('#go').disabled = true; status.textContent = '발사 중…';
  try {
    const payload = { app: APP, params };
    if (APP === '1') { payload.imageB64 = IMG.b64; payload.name = IMG.name; }
    if (APP === '2' && params.mode === 'overlay' && RIMG.b64) { payload.imageB64 = RIMG.b64; payload.name = RIMG.name; }   // 오버레이 배경 = 옵션
    const res = await fetch('/api/thumb', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(payload) });
    const j = await res.json();
    if (!res.ok || j.error) { status.textContent = '⚠️ ' + (j.error || res.status); status.classList.add('err'); $('#go').disabled = false; return; }
    pollMany(j.outs || (j.out ? [{ path: j.out, label: '' }] : []));
  } catch (e) {
    status.textContent = '⚠️ 요청 실패: ' + e.message; status.classList.add('err');
  } finally { $('#go').disabled = false; }
};

selApp('1');
</script>
