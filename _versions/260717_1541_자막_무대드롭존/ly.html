<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<!-- 전역 버튼 탭 햅틱 = 폐지(운영자 260706 5차 "PIN 입력 빼고는 진동 넣지 마" — 진동은 index PIN 키패드만) --><!-- 부모(index)와 color-scheme 일치 필수 — 불일치면 크로미움이 투명 iframe에 불투명 흰 캔버스 강제 → 글래스 전부 회색 파손(운영자 260705 실측 · index color-scheme dark 도입과 한 쌍) -->
<title>영상 자막 생성기</title>
<link rel="stylesheet" href="tokens.css">   <!-- 공유 구조토큰(§🎨 STAGE3·index :root 파생·색 제외). 인라인 :root가 팔레트 오버라이드 -->
<style>
  :root { --well:#0e0f11;   /* 인셋 웰(입력·코드박스 배경 — 7뷰어 공유 raw 추출 = 동값·픽셀 0 · 평의회 260713 ⑨) */ --bg:#121212;   /* 스포티파이 블랙(중립)·운영자 260623 */ --pan:#16171a; --line:#2a2c31; --fg:#eef7f0; --mut:#8fa697; --accent:#00EED2; --accent-rgb:0,238,210;
    --danger:#e23b2a; --danger-rgb:226,59,42;   /* 역할색 danger = 브랜드 유일 레드(index 동일·감사 260704) */   /* index :root 동기 — raw rgba(0,238,210) 박기 차단(분신술 4·8) */ --accent-dim:rgba(var(--accent-rgb),.13); --on-accent:#032322;
    --accent-5:#0FFD02; --accent-6:#FF5EC8; --bias-l2:#3a6ddb; --warn:#FFE13D;
    --hist-accent:#d8ff3d; --hist-rgb:216,255,61; }   /* 이력색(라임) = 작업 내역 접기 마커 — index·thumb --hist-accent 동값 복사 계승(4뷰어 색 비공유 = inline 정본 · 운영자 260712 영상 계승) */   /* +콘텐츠 산출물 색 견본 3(index 값 계승 · edit.html 음영색 견본 동형 · §핵심명령 3-b-1 — 컴포넌트는 var()만) */   /* 콘텐츠 그린(index --accent-5 값 계승·track.html 로컬 계승 관례 동형) = 번인 키워드 실색 미리보기 전용 — :root 정본 정의는 legacy_green 게이트 미계수·컴포넌트는 var()만 */   /* --press-* = tokens.css 상속(인라인 이중정의 제거·감사 260704·comp 기준·회귀0) */
  @media (prefers-reduced-motion:reduce){ :root{ --press-pico:1; --press-xs:1; --press-s:1; --press-m:1; --press-l:1; } }   /* 눌림 토큰 무효화 = 로컬(tokens.css엔 없음·comp 기준) */
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }   /* 모바일 기본 하늘색 탭 하이라이트 박스 제거 = index:78·thumb:15 전역 계승(체크박스·라벨 탭 시 시안 박스 차단·운영자 260629) */
  [hidden] { display:none !important; }   /* hidden 속성 = 무조건 승(기저 가드) — 클래스 display(flex/grid/block)가 UA hidden을 이겨 유령 노출되던 계열(#carDl·#carbar·#pushrow·ly 버튼 3종 실측 260710) 원천 종식 · 퇴장 애니는 hidden을 애니 종료 후 부여라 무영향 */
  /* 키보드 포커스 링 — 도구앱 접근성 P0(분신술 10·규약 §8 "2px accent 링") · :focus-visible라 마우스엔 안 뜸 */
  button:focus-visible, a:focus-visible, [tabindex]:focus-visible, [role=button]:focus-visible, label.file:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  /* 스크롤바 = 반투명 검정(중립) — 뉴스 뷰어 통일(index 계승 · 운영자 260626) */
  html { scrollbar-width:thin; scrollbar-color:rgba(0,0,0,.45) transparent; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(0,0,0,.42); border-radius:999px;
    border:2px solid var(--bg); background-clip:padding-box; }
  ::-webkit-scrollbar-thumb:hover { background:rgba(0,0,0,.6); background-clip:padding-box; }
  body { margin:0; background:radial-gradient(125% 70% at 50% -8%, rgba(var(--accent-rgb),.06), transparent 55%) fixed, var(--bg); color:var(--fg); font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width:600px; margin:0 auto; padding:18px 16px 70px; }
  h1 { font-size:18px; margin:6px 0 4px; } h1 b { color:var(--accent); }
  .sub { color:var(--mut); font-size:13px; margin:0 0 16px; }
  label { display:block; font-size:var(--fs-label); color:var(--fg); margin:14px 0 6px; }   /* 비-소머리 라벨 베이스(.file 등) · 소머리는 .fl(흰색800+형광블릿) */
  label.fl { font-weight:var(--fw-x); color:var(--fg); }   /* 소머리 = 흰색(--fg)·800(--fw-x) = 뉴스 .cref-lbl 표준 형광통일(운영자 260629) */
  label.fl::before { content:'• '; color:var(--accent); font-weight:var(--fw-b); }   /* 블릿 = 형광(--accent)·700(--fw-b) · 뉴스 정본 content:'• ' 동일 */
  label:first-of-type { margin-top:0; }
  textarea { width:100%; min-height:150px; padding:12px; background:var(--well); border:1px solid var(--line); border-radius:var(--r-s); color:var(--fg); font:13px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; resize:none; }   /* 리사이즈 핸들 제거(운영자 260629 · 전역) */
  input[type=text], input[type=url] { width:100%; padding:12px; background:var(--well); border:1px solid var(--line); border-radius:var(--r-s); color:var(--fg); font:inherit; }
  textarea:focus, input:focus { border-color:rgba(var(--accent-rgb),.35); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.08); outline:none; }
  /* 붙여넣기 = 2A 동그라미, URL 입력칸 상단 우측 테두리에 중앙정렬 걸침(뉴스요약·썸네일과 통일 · 운영자 260625) */
  .urlwrap { position:relative; }
  .urlclip { position:absolute; top:0; right:14px; transform:translateY(-50%); display:grid; place-items:center; width:26px; height:26px; padding:0; z-index:5; opacity:.6;   /* URL 복사/붙여넣기 = opacity 60%(운영자 260625) */
    border-radius:50%; border:1px solid rgba(255,255,255,.17); background:rgba(26,28,26,.3); color:var(--mut); cursor:pointer; box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
    -webkit-backdrop-filter:blur(13px) saturate(1.3); backdrop-filter:blur(13px) saturate(1.3); -webkit-tap-highlight-color:transparent; transition:transform .12s, color .15s, border-color .15s; }   /* G1 글래스모피즘(260625) */
  .urlclip svg { display:block; width:13px; height:13px; }
  .urlclip::before { content:""; position:absolute; inset:-8px; }
  .urlclip:hover { color:var(--fg); border-color:rgba(255,255,255,.27); }
  .urlclip:active { transform:translateY(-50%) scale(var(--press-s,.85)); color:var(--accent); border-color:rgba(var(--accent-rgb),.6); }
  .urlclip.ok { color:var(--accent); border-color:rgba(255,255,255,.14); }
  .urlclip.url-pp { right:46px; }                       /* 붙여넣기 = 지우개 좌측(46) · 운영자 260627 */
  .urlclip.url-cp { right:78px; }                       /* 복사 = 붙여넣기 좌측(78·내용 있을 때만) = thumb/index 3종 분리 통일(운영자 260628) */
  .url-hide { display:none; }                           /* 내용 비면 복사 숨김(붙여넣기·지우개는 유지) */
  .url-erase { right:14px; }                            /* 지우개 = 최우측 · 누르면 입력 비움→~10초 되돌리기 */
  .url-erase.url-off { opacity:.3; pointer-events:none; }   /* 빈칸 = 흐리게·비활성 */
  .url-erase.url-undo { color:var(--fg); border-color:rgba(255,255,255,.34); }   /* 지움 직후 ~10초 = 되돌리기(흰 픽토그램·또렷한 링) */
  /* 붙여넣기 폴백 모달 = readText 막힌 환경(모바일 도구 iframe)에서 '길게 눌러 붙여넣기' (thumb/index 통일 기틀·운영자 260628) · dialog=top-layer */
  .pastefb { border:none; outline:none; background:transparent; max-width:100vw; max-height:100dvh; width:auto; padding:0; margin:auto; }
  .pastefb::backdrop { background:rgba(0,0,0,.55); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); }
  .pastefb-box { width:min(360px,90vw); background:linear-gradient(165deg,#14160f,#0c0f0c); border:1px solid var(--line); border-radius:var(--r-l); padding:16px; display:flex; flex-direction:column; gap:12px; box-shadow:0 16px 48px rgba(0,0,0,.55); }
  .pastefb-msg { font-size:13px; color:var(--fg); line-height:1.5; } .pastefb-msg b { color:var(--accent); }
  .pastefb-ta { width:100%; box-sizing:border-box; min-height:90px; resize:none; padding:10px 12px; border:1px solid var(--line); border-radius:10px; background:rgba(255,255,255,.05); color:var(--fg); font:inherit; font-size:14px; }
  .pastefb-ta:focus { border-color:rgba(var(--accent-rgb),.4); outline:none; }
  .pastefb-row { display:flex; gap:8px; justify-content:flex-end; }
  .pastefb-btn:active { transform:scale(var(--press-l)); }   /* 다이얼로그 버튼 눌림 마감(thumb .cfm-btn 동급) */
  .pastefb-btn { padding:8px 16px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.05); color:var(--fg); font:inherit; font-size:13px; font-weight:700; cursor:pointer; }
  .pastefb-ok { color:var(--accent); border-color:rgba(var(--accent-rgb),.4); background:rgba(var(--accent-rgb),.1); }
  textarea::placeholder, input::placeholder { color:var(--mut); }
  .paid { color:var(--mut); font-size:11px; font-weight:400; }
  .orsep { text-align:center; color:var(--mut); font-size:12px; margin:13px 0; }
  .divider { border:none; border-top:1px solid var(--line); margin:20px 0 6px; }
  .file { display:block; padding:12px; border:1px dashed transparent; border-radius:var(--r-s); text-align:center; color:var(--accent); cursor:pointer; background:transparent; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; transition:transform .12s ease, background .15s ease, border-color .15s ease, color .15s ease; }   /* 빈 상태 = 플레이트 없는 픽토그램만(강조색·.covimg 참조·운영자 260627) */
  .file svg { width:26px; height:26px; display:block; transition:transform .14s cubic-bezier(.2,.9,.3,1.25); }   /* 파일 픽토그램(빈 상태) */
  .file:active { background:transparent; }   /* 누름 = 박스 전체 칠하기 금지 → 픽토그램만 축소(운영자 260628) */
  .file:active svg { transform:scale(var(--press-xs,.8)); }   /* 픽토그램만 액티브(블록 전체 X · .rmin:active svg 패턴 계승) */
  .file.has { color:var(--accent); border-color:var(--accent); border-style:solid; animation:fileIn .42s ease; }   /* 파일 들어옴 = 솔리드 강조 테두리로 프레임 + 팝+글로우 확인 모션(파일명 표시·가독) */
  @keyframes fileIn { 0% { transform:scale(.965); box-shadow:0 0 0 0 rgba(var(--accent-rgb),.45); } 45% { transform:scale(1.025); box-shadow:0 0 0 6px rgba(var(--accent-rgb),.10); } 100% { transform:scale(1); box-shadow:0 0 0 0 rgba(var(--accent-rgb),0); } }
  @media (prefers-reduced-motion:reduce) { .file.has { animation:none; } }
  /* 파일 업로드(좌·넓게) + 생성(우·짧게) 한 줄 가로 분할 — 풀폭 스택 대신 */
  .filerow { display:flex; gap:10px; align-items:stretch; margin-top:6px; }
  .filerow .file { flex:1.4 1 0; min-width:0; margin:0; display:flex; align-items:center; justify-content:center; overflow:hidden; white-space:nowrap; }
  .filerow .go { flex:1 1 0; width:auto; margin-top:0; white-space:nowrap; }
  #fileTxt { display:flex; align-items:center; justify-content:center; min-width:0; max-width:100%; }   /* 배지↔파일명 세로중앙 정렬(flex) */
  #fileTxt .fname { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
  /* 파일타입 색배지 = 카테고리(경제·사회) 칩 계승: 검정 반투명 글래스 + 타입별 글 색만 바꿈 */
  .ftype { display:inline-block; flex:none; font-size:11px; font-weight:800; letter-spacing:-.2px; line-height:1;
    padding:4px 9px; border-radius:999px; margin-right:7px; background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.1);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
  /* 업로드 게이지 = 뉴스요약 진행바(.prog .seg.cur)의 움직이는 shine 계승(실패 빗금 X) */
  .lybar { height:7px; border-radius:999px; background:rgba(var(--accent-rgb),.16); position:relative; overflow:hidden; margin:10px 0 2px; }
  .lybar::after { content:''; position:absolute; top:0; bottom:0; left:0; width:45%; border-radius:999px;
    background:linear-gradient(90deg,transparent,rgba(var(--accent-rgb),.85),transparent);
    transform:translateX(-120%); animation:lyshine 1.35s linear infinite; will-change:transform; }
  @keyframes lyshine { to { transform:translateX(360%); } }
  @media (prefers-reduced-motion:reduce){ .lybar::after { animation:none; } }
  /* 생성 버튼 = 카드/썸네일 생성 버튼과 통일 = 글래스 고스트(.mkbtn 정합·운영자 260622) */
  .go { width:100%; margin-top:16px; padding:12px; background:rgba(255,255,255,.02); color:var(--accent); border:1px solid var(--line); border-radius:999px; font-weight:800; font-size:14px; font-family:inherit; line-height:1; cursor:pointer; position:relative; overflow:hidden; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; transition:transform .12s ease, background .15s ease, border-color .15s ease; }   /* 배경 .05→.02(운영자 260713 B) · padding 18→12 = "9→6 줄어든 만큼"(⅔·33%↓ · 운영자 260713 2차 · 높이 52→40 · 18→12=sp-3→sp-2) + line-height:1 = thumb .go 발사 게이지바 정본 계승(글자 정중앙 dy0 · 8뷰어 통일) */
  /* .go:hover 제거 — 메인 버튼(index .mkbtn) 계승: hover 전경 fill 없음·:active만 피드백(운영자 260629 "마우스 올리면 버튼 전경 뜸" 차단 + 터치 stuck-hover 동시 차단) */
  .go:active { transform:scale(.955); background:rgba(var(--accent-rgb),.08); border-color:rgba(var(--accent-rgb),.35); }
  .go:disabled { opacity:.5; cursor:default; transform:none; }
  .go svg { width:20px; height:20px; vertical-align:-5px; }   /* 접수 체크(CHECK_SVG 14px 속성) 버튼 스케일 승격 — 픽토그램 단독 교체(§📐 텍스트·SVG 공존 금지) */
  .go.shake { animation:edshake .42s; }   /* 내용 미입력 = 좌우 흔들림(thumb .go 통일·운영자 260622) */
  @media (prefers-reduced-motion:reduce) { .go.shake { animation:none; } }
  .go.err { background:rgba(var(--danger-rgb),.14); color:var(--danger); border-color:var(--danger); }   /* 미입력 메시지를 버튼 안에 빨강 액티브로 표시(thumb .go.err 통일·운영자 260622) */
  @keyframes edshake { 0%,100%{transform:translateX(0)} 18%{transform:translateX(-4px)} 38%{transform:translateX(4px)} 58%{transform:translateX(-3px)} 78%{transform:translateX(2px)} }
  .go.firing { color:var(--on-accent); pointer-events:none; opacity:1;
    background:linear-gradient(var(--accent),var(--accent)) left/0% 100% no-repeat, linear-gradient(var(--accent-dim),var(--accent-dim));
    animation:goFill .72s var(--gauge-ease) forwards; }   /* 누르면 버튼 전체를 초록이 좌→우로 채움(구성도 .send.is-fire 정본·260622) */
  @keyframes goFill { from { background-size:0% 100%, 100% 100%; } to { background-size:100% 100%, 100% 100%; } }   /* 0%(퍼센트)+명시 from = 부드러운 보간(0 길이면 끝에서 툭 튐) */
  @media (prefers-reduced-motion:reduce) { .go.firing { animation-duration:.2s; } }
  .go.okdone { background:var(--accent); color:var(--on-accent); border-color:var(--accent); opacity:1; }   /* 게이지 만땅 직후 체크 구간 = 초록 유지(thumb .go.okdone 계승) · opacity:1 = ly는 발사 중 disabled라 디밍(.5) 눌림 방지(.firing과 동일 처리) */
  .go.checking { display:grid; place-items:center; }   /* 체크 그리는 동안 SVG 중앙정렬(thumb 계승) */
  .go .gck { width:26px; height:26px; }
  .go .gck path { fill:none; stroke:var(--on-accent); stroke-width:2.7; stroke-linecap:round; stroke-linejoin:round; stroke-dasharray:24; stroke-dashoffset:24; animation:goTick .38s .04s ease forwards; }   /* 스트로크 드로우 체크(thumb 시안1 계승) */
  @keyframes goTick { to { stroke-dashoffset:0; } }
  @media (prefers-reduced-motion:reduce) { .go .gck path { animation:none; stroke-dashoffset:0; } }
  .status { margin-top:16px; font-size:13px; color:var(--mut); white-space:pre-wrap; } .status.err { color:var(--danger); }
  .out { margin-top:18px; }
  .out h1.t { font-size:20px; color:var(--fg); margin:18px 0 6px; }
  .out h2 { font-size:16px; color:var(--accent); margin:18px 0 6px; }
  .out h3 { font-size:14px; color:var(--fg); margin:16px 0 6px; }
  .out p { margin:5px 0; color:var(--mut); word-break:break-word; }
  .out table { width:100%; border-collapse:collapse; margin:8px 0; font-size:13px; }
  .out td, .out th { border:1px solid var(--line); padding:6px 8px; text-align:left; color:var(--mut); }
  .code { position:relative; background:var(--well); border:1px solid var(--line); border-radius:10px; margin:8px 0 12px; }
  .code pre { margin:0; padding:13px; white-space:pre-wrap; word-break:break-word; font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; color:#eef7f0; }
  .code button { position:absolute; top:8px; right:8px; display:grid; place-items:center; width:30px; height:30px; padding:0;
    color:rgba(255,255,255,.92); background:rgba(8,15,11,.4); border:1px solid rgba(255,255,255,.14); border-radius:var(--r-s); cursor:pointer;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:transform .12s, background .15s, color .15s, border-color .15s; }   /* 캐러셀 .sbtn 글래스 아이콘 계승(§📋) */

<script>

async function clipPasteText() {
  try { if (navigator.clipboard && navigator.clipboard.readText) { const t = await navigator.clipboard.readText(); if (t) return t; } } catch {}
  return await clipPasteFallback();
}
function clipPasteFallback() {
  return new Promise(resolve => {
    const ov = document.createElement('dialog'); ov.className = 'pastefb';
    ov.innerHTML = '<div class="pastefb-box"><div class="pastefb-msg">아래 칸을 <b>길게 눌러 “붙여넣기”</b> 하면 자동 반영돼</div>'
      + '<textarea class="pastefb-ta" placeholder="여기에 붙여넣기" autocapitalize="off" autocomplete="off" spellcheck="false"></textarea>'
      + '<div class="pastefb-row"><button type="button" class="pastefb-btn pastefb-cancel">취소</button><button type="button" class="pastefb-btn pastefb-ok">적용</button></div></div>';
    document.body.appendChild(ov);
    const ta = ov.querySelector('.pastefb-ta'); let done = false;
    const finish = v => { if (done) return; done = true; try { ov.close(); } catch {} ov.remove(); resolve(v || null); };
    ta.addEventListener('paste', () => setTimeout(() => { if (ta.value) finish(ta.value); }, 30));
    ov.querySelector('.pastefb-ok').onclick = () => finish(ta.value);
    ov.querySelector('.pastefb-cancel').onclick = () => finish(null);
    ov.addEventListener('cancel', e => { e.preventDefault(); finish(null); });
    ov.addEventListener('click', e => { if (e.target === ov) finish(null); });
    try { ov.showModal(); } catch { ov.setAttribute('open', ''); }
    setTimeout(() => { try { ta.focus(); } catch {} }, 60);
  });
}
// URL 입력칸 클립 = 복사/붙여넣기/지우개 3버튼 분리(thumb/index attachCopyPaste 통일·운영자 260628) · 붙여넣기는 clipPasteText(폴백)
(function () {
  const inp = $('#url'), b = $('#urlClip'); if (!inp || !b) return;
  b.classList.add('url-pp');   // 붙여넣기 = 지우개 좌측(46)
  const cp = document.createElement('button'); cp.type = 'button'; cp.className = 'urlclip url-cp url-hide'; cp.setAttribute('aria-label', '복사'); cp.title = '복사'; b.parentNode.appendChild(cp);   // 복사 = 내용 있을 때만(78·붙여넣기 좌측)
  const er = document.createElement('button'); er.type = 'button'; er.className = 'urlclip url-erase'; er.setAttribute('aria-label', '입력 지우기'); er.title = '입력 지우기'; b.parentNode.appendChild(er);
  let undoTimer = null, undoVal = '', prog = false;
  const setIcon = (el, svg, key) => { if (el._icon !== key) { el.innerHTML = svg; el._icon = key; } };   // 동일 아이콘 재대입 안 함 = 타이핑 번쩍 차단
  const upd = () => {
    const f = inp.value.trim().length > 0;
    if (!b.classList.contains('ok')) { setIcon(b, PASTE_SVG, 'paste'); b.setAttribute('aria-label', '붙여넣기'); }   // 붙여넣기 = 항상(복사로 안 바뀜)
    if (!cp.classList.contains('ok')) { setIcon(cp, COPY_SVG, 'copy'); cp.classList.toggle('url-hide', !f); }   // 복사 = 내용 있을 때만 노출
    if (!er.classList.contains('url-undo')) { setIcon(er, ERASE_SVG, 'erase'); er.classList.toggle('url-off', !f); }
  };
  const exitUndo = () => { if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; } er.classList.remove('url-undo'); er.innerHTML = ERASE_SVG; er._icon = 'erase'; er.setAttribute('aria-label', '입력 지우기'); er.title = '입력 지우기'; upd(); };
  er.addEventListener('click', e => { e.preventDefault();
    if (er.classList.contains('url-undo')) { prog = true; inp.value = undoVal; inp.dispatchEvent(new Event('input', { bubbles: true })); prog = false; try { inp.focus(); } catch {} exitUndo(); return; }
    if (!(inp.value || '').length) return;
    undoVal = inp.value; prog = true; inp.value = ''; inp.dispatchEvent(new Event('input', { bubbles: true })); prog = false; try { inp.focus(); } catch {}
    er.classList.remove('url-off'); er.classList.add('url-undo'); er.innerHTML = UNDO_SVG; er._icon = 'undo'; er.setAttribute('aria-label', '되돌리기'); er.title = '되돌리기 (직전 입력 복원)';
    if (undoTimer) clearTimeout(undoTimer); undoTimer = setTimeout(exitUndo, 10000);
  });
  cp.addEventListener('click', async e => { e.preventDefault(); try { await navigator.clipboard.writeText(inp.value); cp.innerHTML = CHECK_SVG; cp._icon = 'check'; cp.classList.add('ok'); setTimeout(() => { cp.classList.remove('ok'); upd(); }, 1200); } catch {} });   // 복사
  b.addEventListener('click', async e => { e.preventDefault(); const t = await clipPasteText(); if (t) { inp.value = t; inp.dispatchEvent(new Event('input', { bubbles: true })); } upd(); });   // 붙여넣기(readText→폴백 통일 기틀)
  inp.addEventListener('input', () => { if (!prog && undoTimer) exitUndo(); upd(); }); upd();
})();

  if (msg) { const st = $('#status'); st.textContent = msg; st.classList.toggle('err', !!isErr); }
}

// ffmpeg.wasm(싱글스레드 코어 — ⚠️ -mt 금지: COEP 부재라 깨짐). 20MB↑ 영상에서 음성만 추출(압축). 첫 호출 시에만 CDN 로드. CSP/COEP 불필요.
let FF = null, ffOnMsg = null;   // ffOnMsg = 현재 호출의 진행 콜백 — 리스너는 로드 시 1회만 등록(매 호출 등록 시 누적되던 것 방지)
async function ffExtractAudio(file, onMsg) {
  ffOnMsg = onMsg;
  if (!FF) {
    onMsg('소리 추출 도구 준비 중… (첫 회만 잠시)');   // 개발자 용어(ffmpeg) 비노출(평의회8)
    const ffBase = 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm';
    const coreBase = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm';   // 모듈 워커는 importScripts 불가 → import() → ESM 코어 필요(UMD✗)
    const { FFmpeg } = await import(`${ffBase}/index.js`);
    const { fetchFile, toBlobURL } = await import('https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js');
    const ff = new FFmpeg();
    // 교차출처(CDN) Worker 생성은 브라우저가 차단 → 같은-출처 blob 워커가 CDN worker.js를 import(그 안 상대 import는 CDN 기준 해석). classWorkerURL 미지정이 'Failed to construct Worker' 원인이었음.
    const classWorkerURL = URL.createObjectURL(new Blob([`import ${JSON.stringify(ffBase + '/worker.js')};`], { type: 'text/javascript' }));
    await ff.load({
      classWorkerURL,
      coreURL: await toBlobURL(`${coreBase}/ffmpeg-core.js`, 'text/javascript'),
      wasmURL: await toBlobURL(`${coreBase}/ffmpeg-core.wasm`, 'application/wasm'),
    });
    ff.on('progress', ({ progress }) => ffOnMsg && ffOnMsg(`음성 추출 중… ${Math.max(0, Math.min(99, Math.round((progress || 0) * 100)))}%`));   // 1회만 등록·현재 onMsg로 위임
    FF = { ff, fetchFile };
  }
  const { ff, fetchFile } = FF;
  const ext = (file.name.match(/\.[a-z0-9]+$/i) || ['.mp4'])[0].toLowerCase();
  await ff.writeFile('in' + ext, await fetchFile(file));
  await ff.exec(['-i', 'in' + ext, '-vn', '-ac', '1', '-ar', '16000', '-b:a', '48k', '-y', 'out.mp3']);   // 모노 16k 48kbps mp3(Whisper용·작음)
  const data = await ff.readFile('out.mp3');
  ff.deleteFile('in' + ext).catch(() => {});
  return new Blob([data.buffer], { type: 'audio/mpeg' });
}

$('#file').onchange = async e => {
  const f = e.target.files[0]; if (!f) return;
  FILE_B64 = ''; FILE_NAME = ''; SRT_TEXT = '';   // 새 선택 = 이전 입력 초기화
  const st = $('#status'); st.classList.remove('err'); st.textContent = ''; $('#out').innerHTML = '';
  lyHideEditor(); lyBurnReset();   // 이전 완성 영상도 정리(새 작업 준비)
  lyPvSet((/^(video|audio)\//.test(f.type) || /\.(mp4|mov|m4v|webm|mkv|avi|3gp|mp3|m4a|wav|ogg|oga|aac|flac|opus)$/i.test(f.name)) ? f : null);   // 영상·음성 = 즉시 미리보기(objectURL·업로드와 무관) · 텍스트 = 해제
  setUploading();   // 게이지 + '업로드 중입니다…' + #go 잠금
  try {   // 바깥 try = f.text()·readB64 등 어떤 throw에도 #go·게이지 복구(잠금 고착 차단)
    // TXT/SRT/VTT = 텍스트로 읽어 자막 입력(STT 건너뜀) + 아래 내용 출력
    if (/\.(txt|srt|vtt)$/i.test(f.name) || /^text\//.test(f.type)) {
      if (f.size > 2 * 1024 * 1024) { clearFile('텍스트 파일이 너무 큼(2MB↑)', true); return; }
      const text = await f.text();
      SRT_TEXT = text.trim(); FILE_NAME = f.name;
      setBadge(/\.srt$/i.test(f.name) ? 'SRT' : 'TXT', f.name);
      $('#out').innerHTML = '<h3>업로드 내용</h3><div class="code"><pre>' + esc(text) + '</pre></div>';
      st.innerHTML = OK_SVG + ' 텍스트(TXT/SRT) — 자막 생성 가능';
      return;
    }
    const isVideo = /^video\//.test(f.type) || /\.(mp4|mov|m4v|webm|mkv|avi|3gp)$/i.test(f.name);
    if (!isVideo) {                                        // 오디오 = 그대로(이미 작음)
      if (f.size > FILE_MAX) { clearFile(`오디오가 커 — ${(f.size / 1048576).toFixed(1)}MB (최대 20MB). URL로.`, true); return; }
      await readB64(f, f.name); setBadge('음성', f.name); return;
    }
    if (f.size > FILE_HARD) { clearFile(`영상이 너무 큼 — ${(f.size / 1048576).toFixed(0)}MB (한계 ${Math.round(FILE_HARD / 1048576)}MB). URL로 시도해줘.`, true); return; }
    // 자막 붙이기 ON + 20MB 이하 = 영상 원본 그대로 업로드(러너가 추출+합성 — 러너에 영상이 있어야 자막을 입힘 · 260707)
    if (LY_OPTS.burn && f.size <= FILE_MAX) {
      await readB64(f, f.name); setBadge('영상', f.name);
      st.innerHTML = OK_SVG + ' 영상 준비 완료 — 생성하면 자막까지 입혀 나와';
      return;
    }
    // 영상 = 음성만 추출(붙이기 OFF 또는 20MB 초과 — 초과분 합성은 URL 입력만 가능)
    setUploading(f.size > 150 * 1048576 ? '업로드 중입니다… (큰 영상 — 폰서 실패 시 URL 권장)' : '업로드 중입니다… (음성 추출)');
    try {
      const blob = await ffExtractAudio(f, m => { st.textContent = m; });
      if (blob.size > FILE_MAX) { clearFile(`추출 음성도 커(${(blob.size / 1048576).toFixed(1)}MB) — URL로.`, true); return; }
      await readB64(blob, f.name.replace(/\.[^.]+$/, '') + '.mp3');
      setBadge('영상', f.name);
      st.innerHTML = OK_SVG + ` 음성 추출 완료 (${(blob.size / 1048576).toFixed(1)}MB) — 자막 생성 가능` + (LY_OPTS.burn ? ' · 20MB 초과라 합성은 URL 입력만' : '');
    } catch (err) {
      if (f.size <= FILE_MAX) {                            // 추출 실패 + 작은 영상 → 그대로 업로드(러너가 추출)
        await readB64(f, f.name); setBadge('영상', f.name);
        st.textContent = '음성 추출 건너뜀 → 영상 그대로 업로드(러너가 추출).';
      } else {
        clearFile('음성 추출 실패 — 영상 URL로 시도해줘 (' + ((err && err.message) ? err.message.slice(0, 160) : 'error') + ')', true);
      }
    }
  } catch (err) {   // 파일 읽기 실패(f.text·FileReader 등) = 잠금·게이지 풀고 안내(고착 차단)
    clearFile('파일 처리 실패 — 다시 선택해줘 (' + ((err && err.message) ? err.message.slice(0, 120) : 'error') + ')', true);
  }
};

// 최소 마크다운: ``` 코드블록(복사 버튼) · #/##/### 헤딩 · | 표 · 문단.
function renderMd(md) {
  const parts = md.split('```');
  let html = '';
  parts.forEach((part, i) => {
    if (i % 2 === 1) {
      let code = part; const nl = code.indexOf('\n');
      const first = nl >= 0 ? code.slice(0, nl).trim() : '';
      if (/^[a-zA-Z]+$/.test(first)) code = code.slice(nl + 1);
      code = code.replace(/\s+$/, '');
      html += `<div class="code"><button data-c="${encodeURIComponent(code)}" aria-label="복사" title="복사">${COPY_SVG}</button><pre>${esc(code)}</pre></div>`;
    } else {
      const lines = part.split('\n'); let tbl = [];
      const flush = () => {
        if (!tbl.length) return;
        const rows = tbl.filter(r => !/^\s*\|?\s*[-:|\s]+\|?\s*$/.test(r));   // 구분줄 제거
        html += '<table>' + rows.map(r => {
          const cells = r.replace(/^\s*\||\|\s*$/g, '').split('|').map(c => c.trim());
          return '<tr>' + cells.map(c => `<td>${esc(c)}</td>`).join('') + '</tr>';
        }).join('') + '</table>';
        tbl = [];
      };
      lines.forEach(line => {
        const t = line.trim();
        if (t.startsWith('|')) { tbl.push(t); return; }
        flush();
        if (!t) return;
        if (t.startsWith('### ')) html += `<h3>${esc(t.slice(4))}</h3>`;
        else if (t.startsWith('## ')) html += `<h2>${esc(t.slice(3))}</h2>`;
        else if (t.startsWith('# ')) html += `<h1 class="t">${esc(t.slice(2))}</h1>`;
        else if (t === '---') html += '<hr class="divider">';
        else html += `<p>${esc(t)}</p>`;
      });
      flush();
    }
  });
  return html;
}

let _curStop = null;   // 현재 진행 폴 중단 핸들 — 재시도(재클릭)로 새 폴 시작 시 옛 폴 멈춰 상태표시 충돌·중복 폴 차단
function poll(outPath, isUrl, resumeT0) {
  if (_curStop) _curStop();   // 재시도: 이전 폴 중단
  const t0 = resumeT0 || Date.now(), status = $('#status'), out = $('#out');   // resumeT0 = 리로드 후 이어받기(평의회R2 C1)
  const budget = isUrl ? 1200 : 720;   // 컴팩트 백스톱 — 생성 보통 1~5분, 실패는 error.log로 즉시(아래) → budget은 백스톱. URL/파일=Whisper 첫다운+STT 여유(GH 빠른망 1~3분), SRT=짧음(260619)
  const errPath = outPath.replace(/[^/]+$/, 'error.log');   // 같은 폴더 error.log = 워크플로 실패 메시지(있으면 즉시 표시)
  let live = true; const stop = () => { live = false; clearInterval(disp); goWait(false); }; _curStop = stop;
  goWait(true);   // 대기 내내 버튼 = 정직한 진행 상태(평의회R2 C2)
  const draw = () => {   // 1초 벽시계 티커 — 표시 초가 실제 시간과 일치(네트워크 폴 5s와 분리·260619)
    if (!live) return;
    const sec = Math.round((Date.now() - t0) / 1000);
    const early = LY_EARLY === outPath && LY_SEGS;   // 조기 전사 편집기 표시됨(LY-EARLY) — 문구·초과 처리 분기
    if (sec > budget * 2) { stop(); status.innerHTML = ERR_SVG + (early ? ' 다듬기 시간 초과 — 완성되면 다음에 열 때 이어받아 (받아쓴 자막은 아래 살아있어)' : ' 시간 초과 — 완성되면 다음에 열 때 이어받아'); status.classList.add('err'); if (!early) { out.innerHTML = ''; lyHideEditor(); } return; }   // 하드 초과 = 폴만 종료·pend 유지(서버는 계속 돌 수 있음 → 늦게 끝나도 0 유실 · 평의회R2 검토4) · 조기 편집기는 유지(받아쓴 자막·편집 납치 금지)
    if (sec > budget) { status.innerHTML = WAIT_SVG + (early ? ' 받아쓴 자막 나옴 — 아직 다듬는 중… ' : ' 아직 만드는 중… ') + sec + 's (오래 걸리는 중 — 닫아도 나중에 이어받아)'; return; }   // 소프트 초과 = 계속(구 즉사 '시간 초과' 폐지)
    status.innerHTML = WAIT_SVG + (early ? ' 받아쓴 자막 먼저 손봐도 돼 · 다듬는 중… ' + sec + 's' : ' 자막 생성 중… ' + sec + 's' + (isUrl ? ' (영상 다운+Whisper STT 포함 — 첫 회 길 수 있음)' : ' (보통 1–3분)'));   // 조기 문구 = 기존 어휘 통일(받아쓴 자막·다듬기 — 전사/의역 신조어 금지·평의회4) · 허가문은 주 상태문에 접음(산문최소)
  };
  const disp = setInterval(draw, 1000); draw();
  const tick = async () => {
    if (!live) return;
    // 1) 실패 먼저 — error.log 뜨면 즉시 에러 표시(무한 폴링·'시간 초과' 방지). SPA 폴백(index.html) HTML은 무시.
    try {
      const er = await fetch(errPath + '?t=' + Date.now());
      if (er.ok) {
        const ect = (er.headers.get('content-type') || '').toLowerCase();
        const em = await er.text();
        const eHtml = ect.includes('text/html') || /^\s*<!doctype/i.test(em) || /<html[\s>]/i.test(em.slice(0, 300));
        if (em && em.trim() && !eHtml) { stop(); lyPendClear(); status.innerHTML = ERR_SVG + ' ' + esc(em.trim()); status.classList.add('err'); out.innerHTML = '';
          if (LY_EARLY === outPath && LY_SEGS) { status.innerHTML += ' — 받아쓴 자막은 아래 살아있어'; LY_EARLY = ''; }   // 조기 편집기 이미 표시(LY-EARLY) = 재렌더 안 함(lyResultErr는 원본 렌더라 편집을 덮음 — 보존)
          else lyResultErr(outPath);
          return; }   // 의역 실패여도 STT 전사(segments.json)는 복구 표시 · 실패 확정 = pend 해제
      }
    } catch (e) { /* 재시도 */ }
    // 2) 결과(subs.md) 확인
    try {
      const r = await fetch(outPath + '?t=' + Date.now());
      if (r.ok) {
        const ct = (r.headers.get('content-type') || '').toLowerCase();
        const md = await r.text();
        // 결과(subs.md)가 아직 없으면 Pages가 index.html(SPA 폴백·200)을 준다 → 그걸 결과로 오인하면
        // '완료 (0s)'에 페이지 HTML이 통째로 덤프됨. HTML 응답은 무시하고 진짜 마크다운만 통과시킨다.
        const isHtml = ct.includes('text/html') || /^\s*<!doctype/i.test(md) || /<html[\s>]/i.test(md.slice(0, 300));
        if (md && md.trim() && !isHtml) { stop(); lyPendClear(); status.innerHTML = OK_SVG + ' 완료 (' + Math.round((Date.now() - t0) / 1000) + 's)' + (LY_EARLY === outPath && LY_SEGS ? ' — 완성 자막은 개요 탭에' : ''); lyResult(outPath, md); if (LY_WANTVID === outPath) lyPollVideo(outPath, Date.now()); return; }   // 상세 편집기 경로(segments.json 동반 로드 · 없으면 종전 렌더) · 완료 = pend 해제 · 조기 세션이면 개요 탭 힌트(탭 유지 = lyResult) · 합성 기대면 video.json 연속 폴 개시
      }
    } catch (e) { /* 재시도 */ }
    // 3) 조기 전사(segments.json) — 워크플로 LY-EARLY 짝: STT 직후 조기 커밋분이 도착하면 편집기 선행 표시(의역은 계속 생성 중 = 폴·pend 유지). URL/파일 경로만(SRT 텍스트는 segments.json 자체가 없음 — 클라 파싱 즉시라 무대상).
    if (isUrl && LY_EARLY !== outPath && live) {
      try {
        const raw = await lyFetchSegs(outPath);
        if (raw && raw.segs && raw.segs.length && live) { LY_EARLY = outPath; lyResult(outPath, '', undefined, raw); }   // md='' = 상세 탭 단독 렌더(lyResult 재사용 = 저장 편집 스냅샷 우선·랜딩 스크롤 동일) · raw 전달 = 이중 fetch·부동 프로미스 창 제거(평의회8 F3)
      } catch (e) { /* 재시도 */ }
    }
    if (live) setTimeout(tick, 5000);
  };
  tick();
}

function errStatus(m) {   // 전송 막힘 = 메시지를 버튼 안에 빨강 액티브로 띄우며 흔들고 1.7s 뒤 원복(thumb errStatus 통일·운영자 260622)

}
function goWait(on) {   // 생성 대기 = #go 라벨을 정직한 대기 상태로(poll 수명 동안 · 재클릭=재시도 그대로 = disabled 아님 · 평의회R2 C2 — goFill 0.72s 가짜충전의 유휴 외관 교정)

  else { g.classList.remove('wait'); g.removeAttribute('aria-busy'); if (g.dataset.label) g.textContent = g.dataset.label; }

function goLbl(html) {   // 전송 구간 버튼 라벨 — 게이지(0.72s) 이후 fetch(파일 = base64 통업로드 = 수십 초) 동안 무표정 공백 교정(운영자 260707 "게이지 찬 다음 멈춰")
  const g = $('#go'); if (!g) return;
  if (!g.dataset.label) g.dataset.label = g.textContent;   // 원라벨 1회 포획(goWait와 같은 칸 공유 — 전송 라벨을 원본으로 오포획 방지 위해 항상 이 함수가 선행)
  if (html === null) { g.innerHTML = ''; g.textContent = g.dataset.label; g.removeAttribute('aria-busy'); }

  o.innerHTML = '<span class="dl-ring"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
  if (getComputedStyle(b).position === 'static') b.style.position = 'relative';
  b.appendChild(o); setTimeout(() => o.remove(), 700);
}, true);
// 픽토그램 누름 = 시맨틱 아이콘 모션(index 위임 1핸들러 축약 이식 · 신규 버튼 스코프 한정 = 기존 컨트롤 무영향)
document.addEventListener('click', e => {

  const svg = b.querySelector('svg'); if (!svg) return;

  svg.classList.remove('ic-spin', 'ic-bounce', 'ic-check'); void b.offsetWidth; svg.classList.add(m);   // 리플로우 = HTMLElement 기준(svg.offsetWidth 함정 — index 8617 주석 계승)

// 칩 편집 중 붙여넣기 = 평문 강제 — text/html 클립보드의 라이브 노드 삽입(일시 자기-XSS 창) 차단(평의회3)
document.addEventListener('paste', e => {
  const t = e.target && e.target.closest ? e.target.closest('.ed-chip') : null;
  if (!t || !t.isContentEditable) return;

// 이전 결과 자동 복원(72h) — cap 탭 전환 리로드·재진입 시 결과/편집 증발 방지(Vrew '캐시된 전사 불러옴' UX) · 호출 = 아래 이어받기 IIFE가 전 경로에서 정확히 1회 위임
async function lyRestoreLast() {
  try {
    const last = JSON.parse(localStorage.getItem(LY_LAST_KEY) || 'null');
    if (!last || !last.out || Date.now() - last.ts > 72 * 3600e3) return;
    if (!/^ly_out\/[A-Za-z0-9_-]+\/subs\.md$/.test(last.out)) { localStorage.removeItem(LY_LAST_KEY); return; }   // 경로 허용목록 = 위조 키 방어심화(평의회3)
    if (LY_SEGS || LY_GEN) return;
    const r = await fetch(last.out + '?t=' + Date.now()); if (!r.ok) return;
    const ct = (r.headers.get('content-type') || '').toLowerCase(); const md = await r.text();
    if (!md || !md.trim() || ct.includes('text/html') || /^\s*<!doctype/i.test(md) || /<html[\s>]/i.test(md.slice(0, 300))) return;
    if (LY_SEGS || LY_GEN) return;   // 그 사이 새 생성 시작됐으면 복원 금지(진행 UI 덮어쓰기 차단 · 평의회2 F1)
    await lyResult(last.out, md, false);   // fresh=false = ts 재기록 안 함(72h 슬라이딩 방지) · 자동 스크롤 없음
    if (LY_GEN) return;   // 렌더 직전 재확인(과잉 방어)
    const h = Math.max(1, Math.round((Date.now() - last.ts) / 3600e3));
    const st = $('#status'); st.classList.remove('err');
    st.innerHTML = OK_SVG + ' 이전 결과 복원 (' + (h >= 24 ? Math.round(h / 24) + '일' : h + '시간') + ' 전 생성) — 새로 생성하면 대체돼';
  } catch (e) {}
}
// 진행 중 생성 이어받기(평의회R2 C1+검토4) — 발사 후 리로드·탭전환 리로드·타임아웃 뒤에도 완성본 0 유실. 자동 복원보다 먼저 판정(동기 선점 = 경쟁 차단).
(function () {
  let p = null; try { p = JSON.parse(localStorage.getItem(LY_PEND_KEY) || 'null'); } catch (e) {}
  if (!p || !p.out || !/^ly_out\/[A-Za-z0-9_-]+\/subs\.md$/.test(p.out)) { if (p) lyPendClear(); lyRestoreLast(); return; }   // 무효 pend = 정리 후 평시 복원
  const budget = (p.b ? 1200 : 720) * 1000;
  if (Date.now() - (p.t0 || 0) < budget * 2) { LY_GEN = true; if (p.v) LY_WANTVID = p.out; $('#status').classList.remove('err'); $('#out').innerHTML = '<div class="lybar"></div>'; poll(p.out, p.b, p.t0); return; }   // 창 안 = 폴 그대로 재개(경과초는 draw가 이어 표기 · 복원 IIFE는 LY_GEN 보고 양보) · v = 합성 기대 복원
  (async () => {   // 창 밖(오래된 pend) = 1회 확인 — 완성돼 있으면 이어받고, 아니면 정리 후 평시 복원
    try {
      const r = await fetch(p.out + '?t=' + Date.now());
      if (r.ok) {
        const ct = (r.headers.get('content-type') || '').toLowerCase(); const md = await r.text();
        const isHtml = ct.includes('text/html') || /^\s*<!doctype/i.test(md) || /<html[\s>]/i.test(md.slice(0, 300));
        if (LY_SEGS || LY_GEN) { lyPendClear(); return; }   // 그 사이 새 생성 = 이어받기 폐기(덮어쓰기 차단)
        if (md && md.trim() && !isHtml) { lyPendClear(); const st = $('#status'); st.classList.remove('err'); st.innerHTML = OK_SVG + ' 완료 — 지난 생성 이어받음'; await lyResult(p.out, md); return; }   // fresh = LY_LAST 갱신+랜딩 스크롤
      }
    } catch (e) {}
    try {   // 전사 폴백(LY-EARLY) — 완성본은 없어도 조기 전사가 커밋돼 있으면 받아쓴 자막+편집 스냅샷 재수면(pend = 유일 앵커라 유지 = 다음 열기 때 완성 재확인 · 평의회3·6 좌초 봉합)
      const raw = await lyFetchSegs(p.out);
      if (raw && raw.segs && raw.segs.length && !LY_SEGS && !LY_GEN) { await lyResult(p.out, '', false, raw); const st = $('#status'); st.classList.remove('err'); st.innerHTML = WAIT_SVG + ' 받아쓴 자막 복원 — 완성되면 다음에 열 때 이어받아'; return; }
    } catch (e) {}
    lyPendClear(); lyRestoreLast();
  })();
})();
/* ── [1] 편집 제작본 불러오기(운영자 260711) — 목록 = ly_out/index.json 완료분 · 선택 = 그 작업 video.json.url을 소스 URL로(자막 생성 = 새 잡) ── */
(function(){
  const btn=$('#lyPickBtn'), list=$('#lyPickList'), t=$('#lyPickT'); if(!btn||!list) return;
  btn.addEventListener('click', async()=>{

      const arr=JSON.parse(raw);
      const done=(Array.isArray(arr)?arr:[]).filter(x=>x&&x.st==='done'&&/^[A-Za-z0-9_-]+$/.test(String(x.id||''))).slice(0,8);   // id 화이트리스트(경로 주입 방어심화 · F1)
      list.innerHTML=done.length? done.map(x=>'<button class="opt" type="button" data-pick="'+esc(String(x.id))+'">'+esc(String(x.ts||'').slice(5,16).replace('T',' '))+' · '+esc(String(x.t||x.id))+'</button>').join('') : '<span class="lypick-t">완료된 산출이 아직 없어</span>';
      list.hidden=false;
    }catch(e){ t.textContent='목록을 못 불러왔어 — 다시'; }
    btn.disabled=false;
  });
  list.addEventListener('click', async e=>{
    const b=e.target.closest('[data-pick]'); if(!b) return;
    if(!/^[A-Za-z0-9_-]+$/.test(String(b.dataset.pick||''))) return;   // id 재검증(F1)
    b.disabled=true;
    try{
      const r=await fetch('ly_out/'+b.dataset.pick+'/video.json?t='+Date.now()); const j=r.ok? await r.json():null;
      if(j&&typeof j.url==='string'&&/^https?:\/\//.test(j.url)){ const u=$('#url'); u.value=j.url; u.dispatchEvent(new Event('input',{bubbles:true})); t.textContent='연결됨 — 이 완성 영상으로 자막 생성이 돎'; list.hidden=true; }
      else t.textContent='이 작업엔 완성 영상 URL이 없어 — 다른 항목으로';
    }catch(e){ t.textContent='못 불러왔어 — 다시'; }
    b.disabled=false;
  });
})();
/* ── (260717 Q11) 소머리 우측 픽토 2 배선 — 클립 = URL 입력 토글 · 작업본 = 제작본 팝업(.lypop = qpop 동형) · 데이터 규약(index.json→done 필터→id 화이트리스트→video.json.url 주입)은 위 lyPickBtn 경로와 동일(그쪽은 srcSeg와 함께 도먼트) ── */
(function(){
  const ub=$('#srcUrlBtn'), pb=$('#srcPickBtn'), pop=$('#lyPop'), px=$('#lyPopX'), list=$('#lyPopList'); if(!ub||!pb||!pop) return;
  const openUrl=on=>{ const w=$('#srcUrl'); if(!w) return; w.hidden=!on; ub.setAttribute('aria-expanded',String(on)); if(on){ const u=$('#url'); if(u) u.focus(); } };
  ub.addEventListener('click',()=>openUrl($('#srcUrl').hidden));
  const fb=$('#srcFileBtn'); if(fb) fb.addEventListener('click',()=>{ const fi=$('#file'); if(fi) fi.click(); });   // 파일 픽토 = input#file 대리 클릭(카드 행 도먼트 · 첨부/추출 로직 불변)
  const eb=document.querySelector('.lysh-box .cpv-photobtn'); if(eb) eb.addEventListener('click',()=>{ const fi=$('#file'); if(fi) fi.click(); });   // 빈 무대 첨부 픽토 = 동일 위임(Q18)
  const close=()=>{ pop.hidden=true; pb.setAttribute('aria-expanded','false'); };
  const msg=t=>{ list.innerHTML='<div class="lp-empty">'+esc(t)+'</div>'; };
  pb.addEventListener('click', async()=>{
    if(!pop.hidden){ close(); return; }
    pop.hidden=false; pb.setAttribute('aria-expanded','true'); msg('불러오는 중…');
    try{
      const r=await fetch('ly_out/index.json?t='+Date.now());
      const raw=r.ok? await r.text():'[]';
      if(/^\s*</.test(raw)) throw new Error('spa');   // SPA 폴백 HTML 가드(위 lyPickBtn·작업내역 로더 규약 동일)
      const arr=JSON.parse(raw);
      const done=(Array.isArray(arr)?arr:[]).filter(x=>x&&x.st==='done'&&/^[A-Za-z0-9_-]+$/.test(String(x.id||''))).slice(0,8);   // id 화이트리스트(경로 주입 방어 · lyPickBtn 동일)
      list.innerHTML=done.length? done.map((x,i)=>'<button class="lprow" type="button" style="--i:'+i+'" data-pick="'+esc(String(x.id))+'" data-t="'+esc(String(x.t||''))+'"><span class="lp-ts">'+esc(String(x.ts||'').slice(5,16).replace('T',' '))+'</span><span class="lp-t">'+esc(String(x.t||x.id))+'</span></button>').join('') : '<div class="lp-empty">완료된 산출이 아직 없어</div>';
    }catch(e){ msg('목록을 못 불러왔어 — 다시'); }
  });
  list.addEventListener('click', async e=>{
    const b=e.target.closest('[data-pick]'); if(!b) return;
    if(!/^[A-Za-z0-9_-]+$/.test(String(b.dataset.pick||''))) return;   // id 재검증
    b.disabled=true;
    try{
      const r=await fetch('ly_out/'+b.dataset.pick+'/video.json?t='+Date.now()); const j=r.ok? await r.json():null;
      if(j&&typeof j.url==='string'&&/^https?:\/\//.test(j.url)){ const u=$('#url'); u.value=j.url; u.dispatchEvent(new Event('input',{bubbles:true})); lySrcLine('영상', b.dataset.t||j.url); openUrl(true); close(); }   // 주입 = 기존 발사 규약 그대로(#url + input 이벤트) · 요약 라인 = 제작본 타이틀(input 리스너의 URL 표기를 후행 덮어씀) · URL 칸 열어 실물 노출
      else{ b.querySelector('.lp-t').textContent='완성 영상 URL이 없어 — 다른 항목으로'; }

// ── 작업 내역 게시판(운영자 260707 "게시판처럼 리스트") — ly_out/index.json 로드 · 행 = 일시(KST)·타이틀·상태 · 탭 = 그 작업 열기(lyResult 복원 경로 재사용 = fresh:false) ──
(async function () {
  try {
    const r = await fetch('ly_out/index.json?t=' + Date.now()); if (!r.ok) return;
    const ct = (r.headers.get('content-type') || '').toLowerCase(); const tx = await r.text();
    if (ct.includes('text/html') || /^\s*</.test(tx)) return;   // SPA 폴백(HTML 200) 무시 = poll 동일 가드
    const jobs = JSON.parse(tx); if (!Array.isArray(jobs) || !jobs.length) return;   // 빈 목록 = 조용한 공백(§디자인 빈 상태)
    const box = $('#lyJobs'), list = $('#lyJobList'); if (!box || !list) return;
    const ST = { done: '완료', subs: '자막만', clip: '클립 후보', fail: '실패', gen: '진행중' };   // clip = 클리퍼 스캔 잡(구 '진행중' 오표기 정정 · 260712)
    jobs.slice(0, 60).forEach(j => {   // 캡 20→60(전체 보관 취지 정합 · 운영자 260712 "항상 기존 작업분" — 인덱스 자체는 만료 없음)
      if (!/^[A-Za-z0-9_-]+$/.test(j.id || '')) return;   // 경로 화이트리스트(복원 정규식과 동일 정신)
      const b = document.createElement('button'); b.type = 'button'; b.className = 'lyjob';
      const ts = String(j.ts || '');
      b.innerHTML = '<span class="jts"></span><span class="jt"></span><span class="jst"></span>';
      b.querySelector('.jts').textContent = ts.length >= 16 ? ts.slice(5, 10) + ' ' + ts.slice(11, 16) : '';   // KST 도장 ISO를 문자열 절단 = 'MM-DD HH:MM'(TZ 재해석 함정 0 · §📐 KST)
      b.querySelector('.jt').textContent = j.t || '(제목 없음)';
      const stEl = b.querySelector('.jst'); stEl.textContent = ST[j.st] || '진행중'; if (ST[j.st]) stEl.classList.add(j.st);
      b.onclick = async () => {
        if (LY_GEN) return;   // 생성 진행 중 = 진행 UI 보호(열기 보류)
        const st = $('#status');
        if (j.st === 'fail') { st.classList.add('err'); st.innerHTML = WARN_SVG + ' 실패한 작업 — 남은 산출물 없음'; return; }
        const out = 'ly_out/' + j.id + '/subs.md';
        try {
          const rr = await fetch(out + '?t=' + Date.now()); if (!rr.ok) { st.classList.add('err'); st.innerHTML = WARN_SVG + ' 산출물이 아직/이미 없음'; return; }
          const md = await rr.text(); if (!md.trim() || /^\s*</.test(md)) return;
          await lyResult(out, md, false);   // 복원 모드 = 최근작업 포인터·스크롤 안 건드림
          st.classList.remove('err'); st.innerHTML = OK_SVG + ' 이전 작업 열었어 — 새로 생성하면 대체돼';
        } catch (e) {}
      };
      list.appendChild(b);
    });
    if (!list.children.length) return;   // 화이트리스트 전탈락 = 빈 헤더 방지(조용한 공백 유지)
    box.hidden = false;
    $('#lyJobsCnt').textContent = '(' + list.children.length + ')';
    // 접기 토글 — thumb '이전 제작' histH 로직 계승(기본 접힘 · 펼침 = 스태거 촤르륵 + 섹션 랜딩 · 닫힘 = histOut 후 hidden · 운영자 260712). 닫힘 시 상단 복귀는 미계승(자막 폼 맥락 = 제자리 유지 · 의도 divergence)
    let closeT = null;
    $('#lyJobsH').onclick = () => {
      const open = list.hidden;
      clearTimeout(closeT); list.classList.remove('closing');   // 닫힘 중 재클릭 = 취소(다시 펼침)
      $('#lyJobsH').setAttribute('aria-expanded', String(open)); box.classList.toggle('open', open);
      const rm = matchMedia('(prefers-reduced-motion:reduce)').matches;
      if (open) { list.hidden = false; requestAnimationFrame(() => box.scrollIntoView({ behavior: rm ? 'auto' : 'smooth', block: 'start' })); }
      else if (rm) { list.hidden = true; }
      else { list.classList.add('closing'); closeT = setTimeout(() => { list.hidden = true; list.classList.remove('closing'); }, 270); }   // .26s 애니 + 여유(thumb 동값)
    };
  } catch (e) {}
})();
