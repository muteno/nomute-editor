let CATS = ['정치','사회','경제','국제','문화','테크','스포츠'];
const LS = 'nm_catlab_v1';
let SEL = {};
try { SEL = JSON.parse(localStorage.getItem(LS) || '{}'); } catch (e) {}
try { const xc = JSON.parse(localStorage.getItem(LS + '_cats') || '[]'); xc.forEach(c => { if (!CATS.includes(c)) CATS.push(c); }); } catch (e) {}
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const vf = n => n >= 1e4 ? (n / 1e4).toFixed(1).replace(/\.0$/, '') + '만' : String(n);
function render() {
  document.getElementById('list').innerHTML = DATA.map((r, i) => {
    const cur = SEL[r.id] || '';
    return '<div class="row' + (cur ? ' sel' : '') + '" data-i="' + i + '">' +
      '<div class="rh"><span class="rk">' + (i + 1) + ' · ' + vf(r.v) + ' · ' + esc(r.f) + ' · ' + esc(r.d) + '</span></div>' +
      '<div class="rh"><a class="rt" href="' + esc(r.u) + '" target="_blank" rel="noopener">' + esc(r.n) + '</a></div>' +
      '<div class="chips">' + CATS.map(c => '<button type="button" class="chip' + (cur === c ? ' on' : '') + '" data-c="' + esc(c) + '">' + esc(c) + '</button>').join('') + '</div></div>';
  }).join('');
  upd();
}
function upd() {
  const n = Object.keys(SEL).length;
  document.getElementById('cnt').textContent = n + ' / ' + DATA.length;
  try { localStorage.setItem(LS, JSON.stringify(SEL)); } catch (e) {}
}
document.getElementById('list').addEventListener('click', e => {
  const b = e.target.closest('.chip'); if (!b) return;
  const row = e.target.closest('.row'), r = DATA[+row.dataset.i], c = b.dataset.c;
  if (SEL[r.id] === c) { delete SEL[r.id]; } else { SEL[r.id] = c; }
  row.classList.toggle('sel', !!SEL[r.id]);
  row.querySelectorAll('.chip').forEach(x => x.classList.toggle('on', SEL[r.id] === x.dataset.c));
  upd();
});
document.getElementById('nbAdd').addEventListener('click', () => {
  const v = document.getElementById('nb').value.trim();
  if (!v || CATS.includes(v)) return;
  CATS.push(v);
  try { localStorage.setItem(LS + '_cats', JSON.stringify(CATS.slice(7))); } catch (e) {}
  document.getElementById('nb').value = '';
  render();
});
document.getElementById('copy').addEventListener('click', async () => {
  const txt = JSON.stringify(SEL, null, 0);
  try { await navigator.clipboard.writeText(txt); const b = document.getElementById('copy'); b.textContent = '복사됨 ✓'; setTimeout(() => b.textContent = '값 복사', 1200); }
  catch (e) { const o = document.getElementById('out'); document.getElementById('outT').value = txt; o.classList.add('show'); document.getElementById('outT').select(); }
});
document.getElementById('outX').addEventListener('click', () => document.getElementById('out').classList.remove('show'));
render();
</script></body></html>
