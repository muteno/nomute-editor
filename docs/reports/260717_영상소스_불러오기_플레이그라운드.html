<!--
  ═══════════════════════════════════════════════════════════════════════
  노뮤트 플레이그라운드 템플릿 v1 (운영자 260713 정본 · §플레이그라운드 0-1)
  ─ 사용법: 이 파일을 docs/reports/{yymmdd}_{라벨}_플레이그라운드.html로 복사한 뒤
    맨 아래 "CONFIG(세션이 채우는 전부)" 블록만 교체한다.
  ─ 동결 엔진(수정 금지): 컨트롤 빌더 · near() 계승판정 · 프리셋 양방향 동기 ·
    선택값 복사 모달(역제안) · 재렌더 스크롤 보존 · 한글 열맞춤.
    골격을 손으로 다시 쓰면 위반 = check_refs.check_playground() 게이트(rc=1).
  ─ 철학(운영자): 완제품을 부품으로 쪼개 미세조정 = 무의미.
    부품 1개당 "방식 N가지"를 실물로 나란히(변형 갤러리 = 발산) → 선택 → 7축 미세조정(수렴).
    핵심 7축 = 자간 · 폰트 크기 · 위치 · 불투명도 · 블러 · 라인 · 액티브 효과.
  ─ 색·값: 아래 --pg-*는 viewer/index.html :root 실측값의 복사(자기완결 스냅샷 · §핵심명령 3-c).

-->
<style>

/* ── 미리보기 전용(영상 스튜디오 소스부 재현 — edit.html 톤 :root 실측 복사 · 값 정본 = edit/thumb/index·CII 쉘 행) ── */
:root{ --e-bg:#121212; --e-pan:#16171a; --e-line:#2a2c31; --e-fg:#eef7f0; --e-mut:#8fa697; --e-well:#0e0f11;

/* CII 「합성 미리보기 쉘」 재현 — mat·box·stage·skirt·도구(행 통째 계승 · 스테이지 내용물만 영상) */
.esh{ position:var(--t-stickyPos,sticky); top:var(--t-stickyTop,0px); z-index:6; margin:10px -16px 6px;

.esh-stage.r916{ aspect-ratio:9/16; height:100%; width:auto; }
.esh-stage.r45{ aspect-ratio:4/5; height:100%; width:auto; }
.esh-stage.r169{ aspect-ratio:16/9; height:100%; width:auto; }
.esh-stage.fitcover{ width:100%; aspect-ratio:auto; }
.evmock{ position:absolute; inset:0; background:linear-gradient(168deg,#2e5d3a 0%,#487a4e 34%,#7fb069 55%,#3c6e47 78%,#24462e 100%); }
.evmock::before{ content:''; position:absolute; inset:0; background:radial-gradient(90px 60px at 70% 30%, rgba(255,120,120,.5), transparent 70%), radial-gradient(120px 80px at 25% 20%, rgba(255,170,150,.35), transparent 70%); }
.evsub{ position:absolute; left:50%; transform:translateX(-50%); top:16%; white-space:nowrap; font-size:11px; font-weight:800;
  color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.8); }

.etool{ position:absolute; top:var(--t-tTop,6px); width:var(--t-tBtn,30px); height:var(--t-tBtn,30px); display:grid; place-items:center;
  padding:0; color:var(--t-tColorV,var(--e-acc)); background:rgba(18,18,18,var(--t-tPlateOp,1)); border:1px solid rgba(255,255,255,var(--t-tBorderOp,0));
  border-radius:9px; }
.etool:active{ transform:scale(var(--t-tPress,.82)); }
.etool svg{ width:var(--t-tSvg,15px); height:var(--t-tSvg,15px); }
.etool.t1{ right:var(--t-tRight,6px); }
.etool.t2{ right:calc(var(--t-tRight,6px) + var(--t-tBtn,30px) + var(--t-tGap,6px)); }
/* 제작본 팝업 — 대기열(qpop) 동형 재현: 컨테이너 11/11/11/16 · full-bleed 헤더 py12 · 무채 글래스(근사) */
.epop{ position:absolute; right:8px; top:calc(100% + var(--t-ppOffY,8px)); width:min(88%, var(--t-ppW,440px)); z-index:9;
  border-radius:var(--t-ppR,16px); padding:11px 11px 11px 16px; overflow:hidden;
  background:rgba(20,23,26,.92); backdrop-filter:blur(24px) saturate(1.05); -webkit-backdrop-filter:blur(24px) saturate(1.05);
  border:1px solid rgba(255,255,255,.12); display:none; box-shadow:0 18px 40px rgba(0,0,0,.45); }
.epop.on{ display:block; animation:epUnfold var(--t-ppDur,.26s) cubic-bezier(.22,.61,.36,1) both; }
.epop.cen{ position:fixed; left:50%; right:auto; top:50%; transform:translate(-50%,-50%); }
@keyframes epUnfold{ from{ opacity:0; transform:translateY(-8px) scale(.98); } }
.epop .eph{ display:flex; align-items:center; gap:6px; margin:-11px -11px 0 -16px; padding:var(--t-ppHeadPy,12px) 14px var(--t-ppHeadPy,12px) 18px;
  background:rgba(24,27,30,.9); border-bottom:1px solid rgba(255,255,255,.09); font-weight:800; font-size:14px; }
.epop .eph .xc{ margin-left:auto; width:var(--t-ppX,30px); height:var(--t-ppX,30px); display:grid; place-items:center;
  border:1px solid var(--e-line); border-radius:9px; background:rgba(255,255,255,.06); color:var(--e-mut); }

  font-size:12px; color:var(--e-fg); opacity:0; animation:epRow .3s ease forwards; }
.epop.on .erow{ animation-delay:calc(var(--t-ppStagger,22ms) * var(--i)); }
@keyframes epRow{ to{ opacity:1; } }

  background:rgba(var(--e-acc-rgb),.14); color:var(--e-acc); font-size:11px; font-weight:800; }
.epop .erow .nm2{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--e-mut); }

<body data-pg-template="v1">
<h1>플레이그라운드 <span style="color:var(--pg-accent)">템플릿 v1</span></h1>
<p class="sub">부품 1개 = 방식 N가지(갤러리 선택) → 7축 미세조정 → 선택값 복사. 기본값 = 현행 실측 · 골격 = 동결(config만 교체).</p>
<div class="wrap">
  <section class="stagewrap">
    <div class="frame" data-pg-scrollhost id="frame">
      <div class="app" data-pg-preview id="pv"></div>
      <div class="baseline" data-pg-baseline id="bl"></div>
    </div>
    <div class="stagebar">
      <div class="vseg" id="vseg"><button data-v="prop" class="on">제안</button><button data-v="cur">현행(비교)</button></div>
      <span class="finfo" id="finfo"></span>
    </div>
  </section>
  <aside class="console">
    <section class="csec" id="psec"><h2><span class="b">•</span> 프리셋</h2><div id="presets" data-pg-presets></div></section>
    <section class="csec"><h2><span class="b">•</span> 변형 갤러리 — 부품별 방식 선택</h2><div id="gallery"></div></section>
    <section class="csec"><h2><span class="b">•</span> 미세조정 (7축)</h2><div id="axes" data-pg-controls></div></section>
    <section class="csec" data-pg-copy><h2><span class="b">•</span> 선택값 <span id="warnN" style="color:var(--pg-warn);font-size:10.5px"></span></h2>
      <pre id="outtxt"></pre><button class="copybtn" id="copy">선택값 복사</button></section>
    <section class="csec" data-pg-note><h2><span class="b">•</span> 재현 한계 각주</h2><div class="note" id="notes"></div></section>
  </aside>
</div>
<div id="cmodal" data-pg-warnmodal><div class="box">
  <h3>⚠ 확립 사다리 밖 값 포함</h3><div class="ls" id="cmLs"></div>
  <div class="row"><button class="pri" id="cInc">역제안 포함 복사</button><button id="cOnly">계승분만 복사</button><button id="cNo">취소</button></div>
</div></div>

<script>
/* ═══════════ 동결 엔진 v1 — 여기부터 CONFIG 전까지 수정 금지 ═══════════ */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const near=(a,b,eps)=>Math.abs((+a)-(+b))<=((eps==null)?.26:eps);          // 계승판정(축별 eps)
const kw=s=>[...String(s)].reduce((n,c)=>n+(c.charCodeAt(0)>127?2:1),0);   // 한글 2칸 폭
const padK=(s,w)=>String(s)+' '.repeat(Math.max(0,w-kw(s)));
const state={v:{},a:{}};
function scrollGuard(fn){const h=$('#frame');const y=h?h.scrollTop:0;fn();if(h)h.scrollTop=y;} // 재렌더 스크롤 보존(§7-1-6)
function initState(){CONFIG.AXES.forEach(ax=>state.a[ax.k]=CONFIG.DEFAULTS[ax.k]);
  CONFIG.GALLERY.forEach(g=>state.v[g.comp]=CONFIG.DEFAULTS['v_'+g.comp]);}
function fmt(ax,v){return (ax.step&&ax.step<1)?(+v).toFixed(ax.step<.01?3:2):String(v)}
function applyAll(structural){
  const pv=$('#pv');
  CONFIG.AXES.forEach(ax=>pv.style.setProperty('--t-'+ax.k, state.a[ax.k]+(ax.u||'')));
  if(structural){scrollGuard(()=>{pv.innerHTML=CONFIG.renderPreview(state);});}
  syncPresets(); warnAxes(); buildOut();
}
function buildGallery(){
  $('#gallery').innerHTML=CONFIG.GALLERY.map(g=>
    '<div class="gal"><div class="gal-t">'+g.nm+(g.desc?' — '+g.desc:'')+'</div><div class="gal-grid">'+
    g.variants.map(v=>'<div class="gcard'+(state.v[g.comp]===v.id?' on':'')+'" data-comp="'+g.comp+'" data-id="'+v.id+'">'+
      '<div class="demo">'+v.r(state)+'</div><div class="gnm">'+v.nm+(v.id===(CONFIG.DEFAULTS['v_'+g.comp])?' <span style="color:var(--pg-mut)">(현행)</span>':'')+'</div>'+
      (v.tag?'<div class="gtag">'+v.tag+'</div>':'')+'</div>').join('')+'</div></div>').join('');
}
function buildControls(){
  let html='',grp='';
  CONFIG.AXES.forEach(ax=>{
    if(ax.grp!==grp){grp=ax.grp;html+='<div class="grp-t">'+grp+'</div>';}
    html+='<div class="axis" data-k="'+ax.k+'"><span class="nm">'+ax.nm+'</span>';
    if(ax.type==='seg'){html+='<div class="seg">'+ax.sg.map(o=>'<button data-val="'+o[0]+'"'+(String(state.a[ax.k])===String(o[0])?' class="on"':'')+'>'+o[1]+'</button>').join('')+'</div>';}
    else if(ax.type==='select'){html+='<select>'+ (ax.pal||[]).map(o=>'<option value="'+o[0]+'"'+(String(state.a[ax.k])===String(o[0])?' selected':'')+'>'+o[1]+'</option>').join('')+'</select>';}
    else{const lid=ax.lad?('lad-'+ax.k):'';

  renderPreview(s){
    const v=s.v||state.v, a=s.a||state.a;
    const colMap={acc:'var(--e-acc)',mut:'var(--e-mut)',fg:'var(--e-fg)'};
    const headBtns =
      v.loader==='txtbtn' ? '<span class="hbz"><button class="ehb" onclick="pgPopToggle(event)">불러오기</button></span>' :
      v.loader==='headpict' ? '<span class="hbz"><button class="etool" style="position:static" title="URL(클립)">'+SVG_CLIP+'</button><button class="etool" style="position:static" onclick="pgPopToggle(event)" title="제작본">'+SVG_WORK+'</button></span>' :
      v.loader==='mix' ? '<span class="hbz"><button class="ehb" onclick="pgPopToggle(event)">불러오기</button></span>' : '';
    const chips = (a.chips==='keep'||v.loader==='chips')
      ? '<div class="echips esec-in"><span class="echip on">[1] 제작본</span><span class="echip">파일</span><span class="echip">URL</span></div>' : '';
    const inlineBtn = v.loader==='chips' ? '<div class="esec-in"><button class="eload" onclick="pgPopToggle(event)">[1] 편집 제작본 불러오기</button></div>' : '';
    const dz = v.loader!=='chips' ? '<div class="edz esec-in">'+SVG_FILE+(String(a.dzHint)==='1'?'<span class="dzt"><b>영상 파일 선택</b> 또는 여기로 드래그<br>MP4 · MOV · 세로/가로 자동</span>':'')+'</div>' : '';
    const shellTools = (v.loader==='shelltool') ? '<button class="etool t1" title="URL(클립)">'+SVG_CLIP+'</button><button class="etool t2" onclick="pgPopToggle(event)" title="제작본">'+SVG_WORK+'</button>'
      : (v.loader==='mix') ? '<button class="etool t1" title="URL(클립)">'+SVG_CLIP+'</button>' : '';
    const stage = '<div class="esh-stage '+(a.fit==='cover'?'fitcover':({r916:'r916',r45:'r45',r169:'r169'}[a.ratio]))+'"><div class="evmock"></div><div class="evsub">자막이 이렇게 <b>강조돼</b></div></div>';
    const shell = v.shell==='cii'
      ? '<div class="esh"><div class="esh-box">'+stage+shellTools+'</div></div>'
      : '<div class="etall"><div class="tf"><div class="evmock"></div><div class="evsub">자막이 이렇게 <b>강조돼</b></div>'+(shellTools?'<div style="position:absolute;top:0;right:0;left:0;height:0">'+shellTools+'</div>':'')+'</div></div>';
    let rows=''; const N=Math.round(a.ppRows);
    for(let i=0;i<N;i++) rows+='<div class="erow" style="--i:'+i+'"><span class="tag">['+(i+1)+']</span><span class="nm2">'+['버스 안 대화 장면 — 자막 강조','정원 산책 · 하이라이트 3구간','인터뷰 클립(무자막 원본)','야간 드라이브 — 색보정판','옥상 대사 리테이크','B-roll 모음','엔딩 몽타주','메이킹 스케치'][i%8]+'</span></div>';
    const pop = v.popup==='inline' ? '' :
      '<div class="epop'+(v.popup==='center'?' cen':'')+'"><div class="edim" onclick="pgPopClose(event)"></div><div class="eph">편집 제작본<span class="xc" onclick="pgPopClose(event)">'+SVG_X+'</span></div>'+rows+'</div>';
    return '<div class="est" style="--t-tColorV:'+colMap[a.tColor]+';--t-tPress:'+a.tPress+'">'
      +'<div class="efl" style="position:relative"><span class="bl">•</span> 소스'+headBtns+pop+'</div>'
      +chips+inlineBtn+dz+shell
      +'<div class="esec-in" style="margin-top:6px;color:var(--e-mut);font-size:11px">· 베스트컷 / PRESET — (이하 섹션 목업)</div>'
      +'<div class="esec-in" style="margin-top:14px;height:220px;border:1px dashed rgba(255,255,255,.08);border-radius:9px;display:grid;place-items:center;color:var(--e-mut);font-size:11px">아래 섹션(스크롤 확인용 여백)</div></div>';
  },
  renderBaseline(){
    return '<div class="est"><div class="efl"><span class="bl">•</span> 소스</div>'
      +'<div class="echips esec-in"><span class="echip on">[1] 제작본</span><span class="echip">파일</span><span class="echip">URL</span></div>'

      +'<div class="etall"><div class="tf"><div class="evmock"></div><div class="evsub">자막이 이렇게 <b>강조돼</b></div></div></div>'
      +'<div class="esec-in" style="margin-top:14px;height:260px;border:1px dashed rgba(255,255,255,.08);border-radius:9px;display:grid;place-items:center;color:var(--e-mut);font-size:11px">아래 섹션(현행 — 프리뷰가 화면 대부분 잠식)</div></div>';
  },
