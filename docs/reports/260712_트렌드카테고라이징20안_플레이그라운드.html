<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<title>260712 · 트렌드 카테고라이징 20안 플레이그라운드</title>
<style>
/* viewer :root 토큰 사본(값 정본 = viewer/index.html :root) */
:root{--bg:#0f1113;--fg:#eef7f0;--mut:#8b9591;--accent:#00EED2;--accent-rgb:0,238,210;--accent-2:#c8f542;--accent-4:#FFE13D;--hist-accent:#c8f542;
--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.13);--r-s:9px;--r-m:11px;--r-l:16px;--r-pill:999px;
--sp-1:6px;--sp-2:12px;--sp-3:18px;--sp-4:24px;--fs-label:13px;--fs-sm:12px;--fs-xs:11px;--fw-x:800;--fw-b:700;--press-m:.9;--btn-sm:30px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0c0e;color:var(--fg);font-family:"Pretendard","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;font-size:14px;line-height:1.5;padding:14px 10px 40px}
h1{font-size:16px;margin:2px 2px}
.sub{color:var(--mut);font-size:11.5px;margin:0 2px 12px}
.wrap{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start;max-width:1060px;margin:0 auto}
.stagewrap{flex:0 1 392px;margin:0 auto;position:sticky;top:8px}
.frame{width:100%;max-width:392px;aspect-ratio:9/17.5;background:var(--bg);border:1px solid var(--line2);border-radius:26px;overflow:hidden;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.app{position:absolute;inset:0;overflow-y:auto;padding:12px 12px 40px;scrollbar-width:none}
.app::-webkit-scrollbar{display:none}
.stagecap{color:var(--mut);font-size:11px;text-align:center;margin-top:7px;min-height:30px;line-height:1.45;padding:0 6px}
.stagecap b{color:var(--fg)}
.console{flex:1 1 300px;min-width:280px;display:flex;flex-direction:column;gap:10px}
.csec{background:rgba(18,30,34,.28);border:1px solid var(--line);border-radius:var(--r-l);padding:12px 13px}
.csec h3{font-size:12px;font-weight:800;display:flex;align-items:center;gap:6px;margin-bottom:9px}
.csec h3::before{content:'•';color:var(--accent);font-weight:700}
.pills{display:flex;flex-wrap:wrap;gap:6px;max-height:280px;overflow-y:auto}
.pill{border:1px solid rgba(255,255,255,.14);background:rgba(8,15,11,.34);color:rgba(255,255,255,.78);border-radius:var(--r-pill);padding:4px 10px;font-size:11.5px;font-weight:600;cursor:pointer}
.pill.on{color:var(--accent);font-weight:800;border-color:rgba(var(--accent-rgb),.5)}
.pill .st{color:var(--accent-4)}
.ax{display:flex;align-items:center;gap:8px;padding:3px 0}
.ax label{flex:0 0 108px;font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ax input[type=range]{flex:1;accent-color:var(--accent);min-width:0}
.ax .val{flex:0 0 46px;text-align:right;font-variant-numeric:tabular-nums;font-size:11px;color:var(--mut)}
.seg{display:flex;gap:4px;flex:1;flex-wrap:wrap}
.seg button{flex:1;border:1px solid rgba(255,255,255,.14);background:rgba(8,15,11,.34);color:rgba(255,255,255,.7);border-radius:var(--r-s);padding:3px 6px;font-size:11px;cursor:pointer;white-space:nowrap}
.seg button.on{color:var(--accent);font-weight:800;border-color:rgba(var(--accent-rgb),.5)}
pre#out{background:rgba(0,0,0,.35);border:1px solid var(--line);border-radius:var(--r-m);padding:10px;font-size:10.5px;line-height:1.55;white-space:pre-wrap;word-break:break-all;max-height:260px;overflow:auto}
#copy{margin-top:8px;width:100%;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--accent);border-radius:var(--r-pill);padding:9px;font-weight:800;font-size:13px;cursor:pointer}
.note{color:var(--mut);font-size:11px;line-height:1.6}
.note b{color:var(--fg)}
/* ══ 미리보기 재현(트렌드 정본 계승 · 커버 몰입 채택 반영) ══ */
.app{--t-ghgap:20;--t-items:2;--t-gh:1}
.t-head{display:flex;align-items:center;gap:8px;margin:0 0 8px}
.t-time{color:var(--mut);font-size:var(--fs-xs)}
.t-acc{margin-left:auto;display:grid;place-items:center;height:24px;padding:0 8px;font-size:12px;font-weight:600;border-radius:var(--r-s);border:1px solid rgba(255,255,255,.14);background:rgba(8,15,11,.34);color:rgba(255,255,255,.78)}
.chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin:0 0 12px;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;display:grid;place-items:center;height:24px;padding:0 10px;font-size:12px;font-weight:600;border-radius:var(--r-pill);border:1px solid rgba(255,255,255,.14);background:rgba(8,15,11,.34);color:rgba(255,255,255,.78)}
.chip.on{color:var(--accent);font-weight:800;border-color:rgba(var(--accent-rgb),.5)}
.chips.row2{margin-top:-8px}
.gh{margin:calc(var(--t-ghgap)*1px) 0 10px;font-size:14.5px;font-weight:var(--fw-x);color:var(--fg);letter-spacing:-.2px}
.gh:first-of-type{margin-top:2px}
.gh small{color:var(--mut);font-weight:400;font-size:var(--fs-xs);margin-left:6px}
.gh.chipstyle{display:inline-flex;height:24px;align-items:center;padding:0 11px;border-radius:var(--r-pill);border:1px solid rgba(var(--accent-rgb),.5);color:var(--accent);font-size:12px}
details.t-sec{margin-bottom:11px}
details.t-sec summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:var(--fs-label);font-weight:var(--fw-x);margin:2px 0 9px;user-select:none}
details.t-sec summary::-webkit-details-marker{display:none}
details.t-sec summary::before{content:'•';color:var(--accent);font-weight:var(--fw-b)}
details.t-sec summary .u{color:var(--mut);font-weight:400;font-size:var(--fs-xs)}
.g{display:grid;grid-template-columns:1fr 1fr;gap:12px 8px}
.c{display:block;color:var(--fg);min-width:0;position:relative;cursor:pointer}
.cov{position:relative;display:block;aspect-ratio:3/4;border-radius:var(--r-l);overflow:hidden;background:var(--line)}
.cov img{width:100%;height:100%;object-fit:cover;display:block}
.cov::after{content:'';position:absolute;inset:auto 0 0;height:52%;background:linear-gradient(transparent,rgba(0,0,0,.66));pointer-events:none}
.cov.wd{aspect-ratio:16/9}.cov.wd::after{display:none}
.rk{position:absolute;top:5px;left:5px;display:inline-flex;align-items:center;height:18px;padding:0 7px;border-radius:var(--r-pill);background:rgba(0,0,0,.55);font-size:10.5px;font-weight:800;z-index:2}
.rk.top{color:var(--accent)}
.ov-t{position:absolute;left:8px;right:8px;bottom:22px;font-size:var(--fs-sm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 3px rgba(0,0,0,.7);z-index:1}
.ov-a{position:absolute;left:8px;right:60px;bottom:6px;font-size:var(--fs-xs);color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:1}
.ov-v{position:absolute;right:8px;bottom:6px;font-size:var(--fs-xs);color:var(--mut);z-index:1}
.r{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:var(--fs-sm);cursor:pointer}
.r .n{color:var(--accent);font-weight:var(--fw-x);width:15px;flex:none;text-align:right;font-variant-numeric:tabular-nums}
.r .n.m{color:var(--mut);font-size:10px}
.r .q{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.r .v{color:var(--mut);font-size:var(--fs-xs);flex:none;font-variant-numeric:tabular-nums}
.r img{width:44px;height:26px;flex:none;border-radius:var(--r-s);object-fit:cover}
.r .b{flex:none;font-size:var(--fs-xs);font-weight:var(--fw-b);color:var(--mut);background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:var(--r-pill);padding:1px 7px}
.xc{display:block;padding:10px 12px;border-radius:var(--r-m);background:rgba(255,255,255,.04);border:1px solid var(--line);cursor:pointer;margin-bottom:8px}
.xc .xh{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.xc .xh b{font-size:12.5px}
.xc .xt{font-size:var(--fs-sm);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.xc .xm{display:flex;gap:8px;color:var(--mut);font-size:var(--fs-xs);margin-top:5px}
.seg2{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--line2);border-radius:var(--r-m);overflow:hidden;margin-bottom:12px}
.seg2 b{text-align:center;padding:8px;font-size:13px;color:var(--mut);cursor:pointer;background:rgba(255,255,255,.02)}
.seg2 b.on{color:var(--accent);font-weight:800;background:rgba(var(--accent-rgb),.07)}
.irail{display:flex;gap:10px;margin:0 0 12px;justify-content:space-around;padding:8px 4px;border:1px solid var(--line);border-radius:var(--r-l);background:rgba(255,255,255,.02)}
.irail svg{width:20px;height:20px;color:var(--mut)}
.irail .on svg{color:var(--accent)}
.kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.kpi .k{border:1px solid var(--line);border-radius:var(--r-m);padding:9px 10px;background:linear-gradient(135deg,rgba(18,30,34,.18),rgba(11,19,23,.20))}
.kpi .k small{display:block;color:var(--mut);font-size:10px;margin-bottom:3px}
.kpi .k b{font-size:11.5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-weight:700}
.dual{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.dual .dh{font-size:var(--fs-label);font-weight:var(--fw-x);margin-bottom:8px;display:flex;gap:6px;align-items:center}
.dual .dh::before{content:'•';color:var(--accent)}
.hero{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px;padding-bottom:2px}
.hero::-webkit-scrollbar{display:none}
.hero .c{flex:0 0 120px}
.badge{display:inline-flex;align-items:center;height:16px;padding:0 6px;border-radius:var(--r-pill);background:rgba(0,0,0,.4);border:1px solid var(--line);color:var(--accent);font-size:9.5px;font-weight:800;margin-left:6px}
.nest{margin-left:10px;padding-left:10px;border-left:1px solid var(--line2)}
</style>
</head>

<h1>트렌드 <b style="color:var(--accent)">카테고라이징 20안</b> 플레이그라운드</h1>
<div class="sub">260712 · 10섹션 평면 나열(중구난방) → 어떻게 묶을지 · 프리셋 탭 → 아래 설명 확인 → 마음에 든 안에서 선택값 복사</div>

 {id:9,nm:'9 AI 허브',g:[['AI 소식',['ai','sx']],['일반 트렌드',['tk','sh','yt','gt']],['내 구독',['stk','sre','syt']]],chips:['전체','AI','일반','구독'],cap:'<b>AI 대그룹 신설·최상단</b> — 구독 시드가 AI 회사들이라 AI 업계 뉴스룸으로 정체화. 나머지는 일반/구독 2그룹.'},
 {id:10,nm:'10 국내·글로벌',g:[['국내',['gt','yt','ytn']],['글로벌',['tk','sh','sx','sre']]],chips:['전체','국내','글로벌'],cap:'<b>지역 2분법</b> — 국내(실검·유튜브 KR) vs 글로벌(틱톡·쇼츠·X·릴스). 한계: 틱톡 피드가 글로벌 혼합이라 경계 근사.'},
 {id:11,nm:'11 하이라이트 매거진',g:[['전체',['tk','sx','sh']]],hero:1,cap:'<b>오늘의 하이라이트</b> — 최상단에 각 소스 1위만 모은 가로 레일(표지) + 아래 소스 섹션 그대로. 분류 대신 요약층 추가.'},
 {id:12,nm:'12 칩 2행 교차',g:[['틱톡 × 인기',['tk']]],chips2:[['전체','인기','구독'],['유튜브','틱톡','인스타','X']],cap:'<b>교차 필터</b> — 1행 = 성격(인기/구독) · 2행 = 플랫폼. [인기×틱톡]처럼 곱해서 좁힘. (시연 = 그 상태)'},
 {id:13,nm:'13 커스텀 순서',g:[['내 구독',['stk','sre']],['지금 인기',['tk','sh']],['검색어',['gt']]],chips:['전체','구독','인기','검색어'],cap:'<b>운영자 편집형</b> — 카테고리 순서·표시를 계정 모달처럼 편집(구독을 맨 위로 올린 예). 분류 자체를 사용자화.'},
 {id:14,nm:'14 목적별(액션)',g:[['볼 것',['tk','sh','yt']],['만들 소재',['stk','sre','syt']],['읽을 것',['sx','gt','ytn']]],chips:['전체','볼','만들','읽을'],cap:'<b>다음 행동 기준</b> — 볼 것(임베드) / 만들 소재(다운로드·편집기行) / 읽을 것(요약 요청行). 모달 3버튼과 한 세계관.'},
 {id:15,nm:'15 서브탭 세그',g:[['',['gt','yt','tk','sh','ai']]],seg:['트렌드','구독'],cap:'<b>메뉴4 안 2탭</b> — 상단 세그(도구 모달 탭 문법)로 트렌드|구독 강분리. 칩보다 상위 레벨 분리·한 탭이 가벼워짐.'},
 {id:16,nm:'16 아코디언 대그룹',g:[],nest:1,cap:'<b>접기 2계층</b> — 대그룹(인기/구독/검색어) 자체가 접이식, 그 안에 소스 섹션 중첩. 안 보는 대그룹은 통째로 접어둠.'},
 {id:17,nm:'17 열도 자동 배열',g:[['지금 인기',['sh','tk']],['내 구독',['sx']]],hot:1,cap:'<b>순서 = 데이터가 결정</b> — 라벨은 유지하되 그날 NEW·▲ 많은 섹션이 위로 자동 재배열 + 헤더에 「↑급상승 N」 배지로 근거 표시.'},
 {id:18,nm:'18 아이콘 레일 내비',g:[['',['yt','tk','sre','sx','gt']]],irail:1,cap:'<b>플랫폼 SVG 레일</b> — 상단 아이콘 행이 섹션 앵커 점프(분류 = 내비). 섹션 나열은 유지·이동만 빨라짐.'},
 {id:19,nm:'19 듀얼 컬럼',g:[],dual:1,cap:'<b>수집함 문법 계승</b> — 좌 = 인기(안정 차트) / 우 = 급상승(NEW·▲만). 두 컬럼 심성모형을 트렌드에 이식.'},
 {id:20,nm:'20 KPI 대시보드',g:[['영상',['tk','sh']],['소셜·검색어',['sx','gt']]],kpi:1,cap:'<b>상단 1위 3장</b> — 오늘의 틱톡 1위·실검 1위·X 1위 KPI 카드 + 아래 3그룹. 열자마자 오늘의 요지 3초 파악.'}
];
const AXES = [
 {k:'gh',nm:'대그룹 헤더',seg:[[1,'부제 타이포'],[2,'칩형'],[0,'없음']],d:1},
 {k:'ghgap',nm:'그룹 간 간격',min:12,max:32,step:1,d:20},
 {k:'items',nm:'섹션당 항목',min:1,max:2,step:1,d:2},
 {k:'chips',nm:'상단 칩',seg:[[1,'표시'],[0,'숨김']],d:1},
 {k:'fold',nm:'타그룹 기본',seg:[['open','펼침'],['fold','접힘']],d:'open'},
 {k:'unit',nm:'소스명 배지',seg:[[1,'그룹헤더에 요약'],[0,'섹션별 소머리']],d:0}
];
let state={gh:1,ghgap:20,items:2,chips:1,fold:'open',unit:0}, cur=1;
/* 렌더 */
function cardH(t,i){return `<span class="c"><span class="cov"><img src="${t.img}"><span class="rk${i<3?' top':''}">${i+1}위</span><span class="ov-t">${t.t}</span><span class="ov-a">@${t.a}</span><span class="ov-v">${t.v}</span></span></span>`}
function secH(key,open){
 const s=D[key]; const its=s.items.slice(0,state.items);
 let body='';
 if(s.kind==='grid') body=`<div class="g">${its.map((t,i)=>cardH(t,i)).join('')}</div>`;
 else if(s.kind==='wd') body=`<div class="g">${its.map((t,i)=>`<span class="c"><span class="cov wd"><img src="${t.img}"><span class="rk top">1위</span></span><span style="font-size:var(--fs-sm);display:block;margin-top:5px">${t.t}</span><span style="color:var(--mut);font-size:var(--fs-xs)">${t.a} · ${t.v}</span></span>`).join('')}</div>`;
 else if(s.kind==='x') body=its.map(t=>`<span class="xc"><span class="xh"><span class="rk top" style="position:static">1위</span><b>${t.a}</b></span><span class="xt">${t.t}</span><span class="xm"><span>♡ ${t.l}</span><span>💬 ${t.c}</span></span></span>`).join('');
 else body=its.map((t,i)=>`<span class="r"><span class="n">${i+1}</span>${t.img?`<img src="${t.img}">`:''}<span class="q">${t.t}</span><span class="v">${t.v}</span></span>`).join('');
 return `<details class="t-sec"${open?' open':''}><summary>${s.nm} <span class="u">· ${({grid:'조회수',wd:'조회수',x:'좋아요',rows:'조회수',rows0:'검색량≈'})[s.kind]}</span></summary>${body}</details>`;
}
function render(){
 const ia = IA.find(x=>x.id===cur); const app=$('#app');
 app.style.setProperty('--t-ghgap',state.ghgap);
 let h=`<div class="t-head"><span class="t-time">00:15 수집</span><span class="t-acc">계정</span></div>`;
 if(ia.seg) h+=`<div class="seg2"><b class="on">${ia.seg[0]}</b><b>${ia.seg[1]}</b></div>`;
 if(ia.irail) h+=`<div class="irail">${['M10 15l5.2-3L10 9z','M9 3v10.5a3.5 3.5 0 1 1-2-3.2V3z','M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm6-1h.01','M4 4l7.5 9.7L4.6 20h2l6-5.5L17 20h3l-7.8-10L19 4h-2l-5.3 5L7 4z','M11 4a7 7 0 1 0 4.4 12.4L20 21l1-1-4.6-4.6A7 7 0 0 0 11 4z'].map((p,i)=>`<span class="${i===1?'on':''}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="${p}"/></svg></span>`).join('')}</div>`;
 if(ia.chips2){ h+=`<div class="chips">${ia.chips2[0].map((c,i)=>`<span class="chip${i===1?' on':''}">${c}</span>`).join('')}</div><div class="chips row2">${ia.chips2[1].map((c,i)=>`<span class="chip${i===0?' on':''}" style="height:22px;font-size:11px">${c}</span>`).join('')}</div>`; }
 else if(state.chips&&ia.chips!==null&&!ia.seg&&!ia.irail){ const cs=ia.chips||['전체']; h+=`<div class="chips">${cs.map((c,i)=>`<span class="chip${i===0?' on':''}">${c}</span>`).join('')}</div>`; }
 if(ia.kpi) h+=`<div class="kpi"><span class="k"><small>틱톡 1위</small><b>They rejected my application…</b></span><span class="k"><small>실검 1위</small><b>수도권 폭우</b></span><span class="k"><small>X 1위</small><b>Midjourney Medical 발표</b></span></div>`;
 if(ia.hero) h+=`<div class="gh">오늘의 하이라이트<small>각 소스 1위</small></div><div class="hero">${[D.tk.items[0],D.sh.items[0],D.sre.items[0],D.stk.items[0]].map((t,i)=>cardH(t,0)).join('')}</div>`;
 if(ia.mix){ h+=`<div class="gh">전체 통합 TOP<small>소스내 순위 정규화</small></div>`;
  const mix=[['틱톡',D.tk.items[0]],['X',{t:D.sx.items[0].a+' · '+D.sx.items[0].t,v:D.sx.items[0].l}],['쇼츠',D.sh.items[0]],['검색',D.gt.items[0]],['릴스',D.sre.items[0]],['AI',D.ai.items[0]]];
  h+=mix.map((m,i)=>`<span class="r"><span class="n">${i+1}</span><span class="b">${m[0]}</span>${m[1].img?`<img src="${m[1].img}">`:''}<span class="q">${m[1].t}</span><span class="v">${m[1].v||''}</span></span>`).join('');
  h+=`<div class="gh" style="margin-top:18px">소스별<small>칩 선택 시</small></div>`+secH('tk',false);
 }
 if(ia.nest){ h+=[['지금 인기',['tk','sh'],true],['내 구독',['sx','stk'],false],['검색어·뉴스',['gt','ytn'],false]].map(([g,ks,op])=>`<details class="t-sec"${op?' open':''}><summary style="font-size:14.5px">${g}</summary><div class="nest">${ks.map(k=>secH(k,op)).join('')}</div></details>`).join(''); }
 if(ia.dual){ h+=`<div class="dual"><div><div class="dh">인기</div>${['tk','yt'].map(k=>D[k].items.slice(0,1).map((t,i)=>`<span class="r"><span class="n">${i+1}</span><span class="q">${t.t}</span></span>`).join('')).join('')}${cardH(D.tk.items[0],0)}</div><div><div class="dh">급상승</div><span class="r"><span class="n" style="color:var(--hist-accent);font-size:10px">NEW</span><span class="q">a message to all AI</span></span>${cardH(D.sh.items[0],1)}</div></div>`; }
 for(const [gname,keys] of ia.g){
  if(gname&&state.gh) h+=`<div class="gh${state.gh===2?' chipstyle':''}">${gname}${ia.hot?'<span class="badge">↑급상승 '+(3-ia.g.findIndex(x=>x[0]===gname))+'</span>':''}${state.unit&&state.gh===1?`<small>${keys.map(k=>D[k].nm).join(' · ')}</small>`:''}</div>`;
  const first = ia.g.indexOf(ia.g.find(x=>x[0]===gname))===0;
  h+=keys.map(k=>secH(k, state.fold==='open'||first)).join('');
 }
 app.innerHTML=h;
 $('#cap').innerHTML=ia.cap;
 buildOut();
}
function buildConsole(){
 $('#presets').innerHTML=IA.map(p=>`<span class="pill${p.id===cur?' on':''}" data-p="${p.id}">${p.nm}${p.star?' <span class="st">★</span>':''}</span>`).join('');
 $('#sliders').innerHTML=AXES.map(s=>{
  if(s.seg) return `<div class="ax"><label>${s.nm}</label><span class="seg">${s.seg.map(o=>`<button data-k="${s.k}" data-v="${o[0]}"${String(state[s.k])===String(o[0])?' class="on"':''}>${o[1]}</button>`).join('')}</span></div>`;
  return `<div class="ax"><label>${s.nm}</label><input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${state[s.k]}" data-k="${s.k}"><span class="val vv">${state[s.k]}</span></div>`;
 }).join('');
}
function buildOut(){
 const ia=IA.find(x=>x.id===cur);
 $('#out').textContent=`[트렌드 카테고라이징 — 선택값]
구성안   : ${ia.nm}${ia.star?' ★':''}
대그룹   : ${ia.g.length?ia.g.map(g=>g[0]||'(무제)').join(' / '):'특수 구조(설명 참조)'}
헤더     : ${({1:'부제 타이포',2:'칩형',0:'없음'})[state.gh]}   [기본 부제]
그룹 간격: ${state.ghgap}px   [기본 20]
상단 칩  : ${state.chips?'표시':'숨김'} · 타그룹 기본 ${state.fold==='open'?'펼침':'접힘'} · 소스명 ${state.unit?'그룹헤더 요약':'섹션 소머리'}
비고     : ${ia.cap.replace(/<[^>]+>/g,'')}`;
}
document.addEventListener('click',e=>{
 const p=e.target.closest('.pill[data-p]'); if(p){cur=+p.dataset.p; buildConsole(); render(); return;}
 const b=e.target.closest('.seg button'); if(b){const v=b.dataset.v; state[b.dataset.k]=isNaN(+v)||v===''?v:+v; buildConsole(); render(); return;}
});
document.addEventListener('input',e=>{const r=e.target.closest('input[type=range]'); if(!r)return; state[r.dataset.k]=+r.value; r.closest('.ax').querySelector('.vv').textContent=r.value; render();});
$('#copy').addEventListener('click',()=>{const t=$('#out').textContent; const done=()=>{$('#copy').textContent='복사됨 ✓';setTimeout(()=>$('#copy').textContent='선택값 복사',1200)};
 if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(done).catch(fb);}else fb();
 function fb(){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy')}catch(e2){}ta.remove();done();}});
buildConsole(); render();
</script>
</body>
</html>
